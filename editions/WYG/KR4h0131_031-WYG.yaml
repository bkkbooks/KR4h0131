body:
  text: 釋文紀巻三十一明梅鼎祚輯陳二江總字總持濟南考城人歴陳尚書令終隋上開府羣臣請陳武帝懺文某位某甲稽􅈡和南十方三世一切諸佛十方三世一切尊法十方三世一切賢聖見前大徳僧皇帝某菩薩睿哲聰明廣淵齊聖心若虚空照窮般若發𢎞大誓荷負衆生神道㑹昌膺兹景業百王既季運屬艱難五嶽維塵六軍日動劬勞在念有切皇心既而深悟苦空極信無我寶臺蕐柱本非實録賊城樓櫓苦具兹多遂坐道場靜居禪室堅固善本具足檀那石壁山河珍車象馬頭目髓腦妻子國城鑾輅龍章翠帳玉几福徳所感威惠所及莫不肅然大捨供養三尊便欲拂衣崆峒高歩六合到林間而宴坐與釋衆而同遊紫微虚宮黄屋曠位上靈聳動厚土怔惶弟子等身纒愛惑業搆煩惱天生烝民樹以司牧惵惵黔首非后罔戴豈容至尊居萬乘而伸獨徃之情應在帝王而為布衣之事且蠻夷猾夏冦賊姦宄燧人警職日照甘泉之火四郊多壘未肆樓船之威若使七聖遂迷窅然汾水之上八駿沃若方在瑤池之濱則天下何依羣臣莫奉宗社廟堂有廢彞則弟子不勝狼狽之切謹捨如干錢如干物仰嚫三寶大衆奉贖皇帝及諸王所捨悉還本位伏願十方三寶見前大徳僧以慈悲力用無礙心坐道放灮顯揚宣説歡喜和合超然降許當使皇帝望雲望日之姿與南山等固乃聖乃神之徳與北極同尊中宮后妃之星金楨玉幹之戚窮積善之慶盡萬嵗之歡玉鑾廻鑣金門洞啓百辟翹首縉紳竝􅍌願塵勞與雲沴俱銷億兆與天地同泰慊慊丹愚敢以死請弟子某和南廣𢎞明集金陵攝山棲霞寺碑文幷銘陳李霈書宋賜金紫沙門懐則重書葢聞天有神宮地云靈府桑欽博記始敘四衢之塔金朔著經因知千歩之寺至如峯形甑累岫勢堂密亦烏足言哉南徐州瑯琊郡江乘縣界有攝山者其狀如繖亦名繖山尹先生記曰山多藥草可以攝養故以攝為名焉南瞻舊落顧悌鎮戍之塢北望荒村扈謙卜筮之宅此山西南隅有外道館地俄而疫痢磨滅三清􅔪法未明五怖之灾萬善開宗遂變四禪之境倐見齊居士平原明僧紹空解淵㴱至理高妙遺榮軒冕遁蹟巖穴宋太始中嘗遊此山仍有終焉之志村民野老競来諌曰山多猛虎毒蛇所以久絶行踐僧紹曰毒中之毒無過三毒忠信可蹈水火猛獸亦何能為乃刋木駕峯薙草開逕披拂蓁梗結搆茅茨廿許年不事人世渡河息㬥擾篋無意皆曰誠至所感有法度禪師家本黄龍來㳺白社梵行殫苦法性純僃與僧紹冥契甚善嘗於山舍講無量壽佛經中夜忽有金灮照室灮中如有臺館形像豈止一念之間人王照其香葢八未曽有淵石朗其夜室於是居士遂捨本宅欲成此寺卽齊永明七年正月三日度上人之所搆也山情率易野製疎朴崖檐峻絶澗戸幽㴱卉木滋榮四時助其彫綺煙霞舒巻五色成其藻絢居士嘗夢此巖有如來灮彩又因閒居依稀目見昔寶海梵志睡覩花臺智猛比丘行逢影窟故知神應非逺靈相斯在居士有懐創造俄而物故其第二子仲璋為臨沂令克荷先業莊嚴龕像首於西峯石壁與度禪師鎸造無量壽佛坐身三丈一尺五寸通座四丈幷二菩薩倚高三丈三寸若乃圖冩瓌竒刻削宏壯蓮花瑩目石鏡沈暉藕絲縈髪雲崖失彩頂日流影東方韜其大明面月馳灮西照匿其成魄大同二年龕頂復放灮灮色身相晃若炎山林間樹下赩如火殿禪師自識終期欣瞻瑞應以建武四年於此寺順寂豈非六和精進十念允諧向沐寶池方登金地者也齊文惠太子豫章文獻王竟陵文宣王始安王等慧心開發信力明悟各捨泉貝共成福業宋太宰江夏王霍姬藩閨内徳齊雍州刺史田奐方牧貴臣深曉正見妙識來果竝於此巖阿廣収財施琢磨巨石影擬法身梁太尉臨川靖惠王道契真如心𢎞檀宻見此山製置踈闊功用稀少以天監十年八月爰撒帑藏復加瑩飾繢以丹青鏤之銑璗五分照發千輪啓煥排天堂廡玉露分色接岫軒墀翠微布影八定之侶歩纖草而揚梵三慧之徒挹飛泉而動色喜園凝靜豈傲吏之凡遊深谷𤣥虚非愚公之俗路是以王公縉紳之輩郎吏胥史之屬歩林壑陟臯壤升精舍拜道場莫不洗滌無明澣濯囂暗非直心之砥路孰能如斯者乎慧振法師志業該練心力精確度上人將就遷神深相囑付法師聿修厥緒勸助衆功基業田園多所創置先有名徳僧朗法師者去鄉遼水問道京師清規挺出碩學精詣早成波若之性夙植尸羅之本闡方等之指歸𢎞中道之宗致北山之北南山之南不游皇都將渉三紀梁武皇帝能行四等善悟三空以法師累降徵書確乎不㧞天監十一年帝乃遣中寺釋僧懐靈根寺釋慧令等十僧詣山諮受經論大義賈誼曰學聖道如日之明孫卿曰登高山知天之峻今之探賾其此之謂南蘭陵蕭眕幽棲抗志獨法絶羣遁世茲山多歴年所臨終遺言葬法師墓側還符田豫託西門之塚更似梁鴻偶要離之瘞又按搜神録云楚靳神在今臨泝縣齊永明初神詣法度道人受戒自通曰靳尚即楚大夫之靈也大同元年二月五日神又現形著菩薩巾披袈裟閒雅甚都來入禪堂請寺衆説法崑嶺之中百神所在首陽之路八駟竝驅未有修淨界之品詣得道之僧整忍辱之衣入安禪之室是知名山火澤靈異憑依者矣慧布法師㓜落煩惱早出塵勞律儀明白貞節峻逺貫綜三乘不自媒衒楷模七衆無所詆訶曩日静憩鍾巖余便覯止餐仁飲徳十有餘年頃於攝阜受持珠戒佩服之敬雖敢怠於斯須汲引之勞且曷伸於報効矣夫言意難盡鉛槧易凋固比河山莫如金石凡諸徴應幷預隨喜並勒於碑左乃為頌曰漫漫心火冥冥世流論生若寄喻死如休三明未了十智難周盡纏癡愛豈離瘡疣敬仰鷄足恭聞鷲頭斯風可羡其路可由我開梵宇面壑臨丘我圖靈蹟果植因修兼金畵繢泐石彫鎪連雲出沒泄雨沈浮經行松磴禪坐蕙樓澗風長瀉崖溜懸抽花臺似雪夏室疑秋名僧宴息勝侶薰修三乘謂筏六度為舟金幢合葢寶駕驅輈地祇來格天衆追游五時無爽七䖏相侔辭題翠琰字勒銀鉤賢乎樂餌過客宜畱此碑經唐㑹昌毁廢後已曽重立至今其石斷缺文字訛隱寺主僧契先購石依本冩之作康定元年三月十七日鐫立地云一作地之藥草草藥猛虎作狼虎行踐作行踪無意作無立布影作抽影之徒作之僧𤣥虚作虚𤣥京師作京蕐經論作三論菩薩作廾卅禪堂作禪室畵繢作繢畵大莊嚴寺碑葢聞僧伽水濱波斯創以禪地醍醐山頂舍那肇其梵域此乃徃劫之勝因上方之妙範於是俯察地勢懸之以水仰惟星極揆之以日百堵咸作千坊洞啓前望則紅塵四合見三市之盈虚後睇則紫閣九重連雙闕之聳峭加以園習歡喜水成功徳池溢甘露不因玉掌樹揺音樂無待金奏薫罏夜爇遙來海岸之香法鼓早讙非動泗濵之石擢莖金表跨八萬之俱成界道銀繩面四衢而拓製厠璧綴珠凌丹霞而結宇雕光鏤采望紫極而開軒俯看驚電影徹璢璃之道遙拖宛虹灮徧水精之域層楹刻桷風伯走而未升虚橑飛甍雨師攀而不逮銘曰灼爍金莖崔嵬銀表翔鶤仰翥威鳯靈矯木宻連緜香泥繚繞日圖檐外荷披棟杪翠落隂虬珠填陽鳥高僧累萃碩學滋多𢎞宣方等博綜圍陁皆傷寸晷竝悟尺波式旌鏤碣無待雕戈標年刹土比數恒河建初寺瓊法師碑夫智慧精進皆曰第一妙徳浄名竝稱不二若乃斡五欲之泥觧六情之網禦寶車之跡面香城之路荷像法引人倫惟此法師心力僃矣東山北山之部貫花散花之句並編栁成簡題蒲就業學非全朔無待冬書師夢尹儒自知秋駕銘曰屑屑人世茫茫大千欲流心火意樹身田老驚靈籥孔惜逝川三空莫辨二諦何詮佛日初照慈雲不偏秋露寂滅莫繫悠然明慶寺尚禪師碑銘百世之上百世之下含章隱璞明真照假空行巳無希音和寡不有耆徳誰其繼者朗月靈懸高風獨冩懐安寺刹下銘四聰睿后萬行了因運光玉鏡道茂金輪爰構靈刹地迹重闉迎風雲表承露天津飛甍􅏭􅙙累棟嶙峋護持七衆警衛百神籌銷草木刼盡沙塵支提永固福業恒新變易東海長久北辰優填像銘如花譬象若火疑龍毫光此遇法相今逢眸雲齒雪月貎金容大僊下降避席為恭鐘銘鳧氏之匠狃陽之銅圖欒鑄鑮刻獸鎸蟲聲飛雪裏韻切脣中遙符玉律逺雜金風朝驚鷲嶺夜動龍宮冀憑慧業冥感神功百非洗蕩萬善招通長如五淨永證三空又篆間鎔刻欒上雕鐫聲齊法鼔響逸鳴楗舟移巨壑火壊初禪香贊海岸相傳香流大千不吹自轉将銷更燃縈空雜霧散迥飛煙還符戒品薰修福田花贊池中寶花葉覆金沙逆風氣亂映水灮斜散由天女賣乃王家若生心樹願結因牙燈贊寶燈夜開影徧花臺煙抽細燄燼落輕灰珠慙色並月恥灮來一明暗室若遣塵埃影一作灮幡贊金幡化成揺蕩相明留無定影散乃俱輕灮分紺殿采布香城恒知自轉福與之生並藝文類聚入攝山棲霞寺詩序壬寅年十月十八日入攝山棲霞寺登岸極峭頗暢懐抱至徳元年癸卯十月二十六日又再遊此寺布法師施菩薩戒甲辰年十月二十五日奉送金像還山限以時務不得恣情淹留乙巳年十一月十六日更獲拜禮仍停山中宿永夜畱連棲神悚聽但交臂不停薪指俄謝率製此篇以記歳月俾後來賞者知余山志遊攝山棲霞寺詩序禎明元年太嵗丁未四月十九日癸亥入攝山展慧布法師憶謝靈運集還故山入石壁中尋曇隆道人有詩一首十一韻今此拙作仍學康樂之體並廣𢎞明集修心賦序太清四年秋七月避地于㑹稽龍蕐寺此伽藍者余六世祖宋尚書右僕射州陵矦元嘉二十四年之所構也侯之王父晉護軍將軍彪昔莅此邦卜居山隂都陽里貽厥子孫有終焉之志寺域則宅之舊基左江右湖面山背壑東西連跨南北紆縈聊與苦節名僧同銷日用曉修經戒夕覧圖書寢䖏風雲憑棲水月不意蕐戎莫辨朝市傾淪以此傷情情可知矣啜泣濡翰豈攄鬰結庻後生君子憫余此槩焉張君祖馮惟訥詩紀云張君祖庾僧淵諸詩有晉風陳無此也高僧傳有康僧淵竺法雅並在晉或是頵與庾字誤贈沙門竺法頵詩序沙門竺法頵遠還西山作詩以贈因亦嘲之省其二經聊為之讚道樹經讚峩峩王舍國鬱鬱靈竹園中有神化長空觀體善權私呵晞灮景豈識真迹端恢恢道明𤣥解發至神懽飄忽凌虚起無云受慧難三昧經讚迹超十二燒戒由三昧成賢行極妙住道志慧以明九本既殊動四禪不同冥淵哉不起滅始自無從生借問道氣倫安測泥洹靈庾僧淵代答張君祖詩序省贈法頵詩經通妙逺亹亹清綺雖云言不盡意殆亦幾矣夫詩者志之所之意迹之所寄也㤀妙𤣥解神無不暢夫未能冥達𤣥通者惡得不有仰鑽之詠哉吾想茂徳之形容雖栖守殊塗標寄𤣥同仰代答之未足盡美亦各言其志也並廣𢎞明集朱世卿性法自然論釋真觀作因縁無性論以駁之寓茲先生喟然嘆曰夫萬法萬性皆自然之理也夫惟自然故不得而遷貿矣故善人雖知善之不足憑也善人終不能一時而為惡惡人復以惡之不足誡也惡人亦不能須臾而為善又體仁者不自知其為善體愚者不自覺其為惡皆自然而然也座右之賓假氏大夫忽然作色而謂曰固哉先生之説也違大道而謬聖人之言先生曰大道誰主聖人何言大夫曰大道無主而無所不主聖人無言而無所不言先生曰請言其所言言性命之所由致乎請説其所主主善惡之報應乎大夫曰何為其不然也葢天地扶大道之功以載育聖人合天地之徳以設教序仁義五徳以檢其心説詩書六藝以訓其業此聖人之言也若積善之家必有餘慶積不善之家必有餘殃故曰聖人無親常與善人六極序而隆行懲五福陳而善心勸三世為将覩覆敗之權七葉修善有興隆之性陳賞寵而不侯邴昌踈而紹國斯道家之效也何先生言皆自然之理而不可遷貿者哉先生笑而應曰世所謂捋繩之人繩盡而不知遷若大夫之徒是也敬課管陋為吾子陳之葢二儀著而六子施百姓育而五材用用此句者隔萬法而盡然焉人為生最靈膺自然之秀氣禀姸媸盈減之質懐哀樂喜怒之情挺窮逹脩短之命封愚智善惡之性夫哀樂喜怒伏之於情感物而動窮逹脩短藏之於命事至而後明姸媸盈減著之於形有生而表見愚智善惡封之於性觸用而顯徹此八句者總人事而竭焉皆由自然之數無有造為之者夫有造為之者必勞有出入之者必漏有酬酢之者必謬此三者非造物之功也故墨子曰使造化三年成一葉天下之葉少哉葢聖人設權巧以成教借事似以勸威見强勇之㬥寡怯也懼刑戮之弗禁乃陳禍滛之威傷敦善之不勸也知性命之不可易序福善以奨之故聽其言也似若勿爽徵其事也萬不一驗子以本枝繁植斯履道之所致蒸嘗莫主由遺行之所招身居逸樂為善士之明報體事窮苦是惡人之顯戮孫叔少不埋虵長無令尹之貴邴吉前無隂徳終闕丞相之尊若然則天道以重蕐文命答鮌叟之極愚以商均丹朱酬堯舜之至聖太伯三世無翫兵之咎而假嗣於仲虞漢祖七葉不聞篤善之行遂造配天之業箕稱享用五福身抱夷滅之痛孔云慶鍾積善躬事旅人之悲顔冠七十之上有不秀之咨冉在四科之初致斯人之歎而商臣累王荆南冒頓世居塞北首山無解顏之鬼汨水有抱怨之魂康成以姓改鄉不濟小聖之禍王裦哀變隴木適受非妄之災二生居衛覆舟之痛誰罪三仁在亳剖心之酷何辜若乃側近邦畿宻近世代非墳籍所載在耳目之前者至有腹藏孟門之險心庫豺虺之毒役慮唯以害他為念行已必用利我為先錐刀推其尖鋭谿壑訝其難滿内則百兩外榮千鍾内實優偃綺羅坐列甘膩鳴金綰玉冨逸終身自有懐白璧而為襟瑩明珠而成性心不能行啓蟄之殺手不忍折方長之條懐殊材而莫採蓄美志而誰眄偏糅於冗雜之中見詆於鄉閭之末抱饑寒而溘死與麋鹿而共埋享嘗寂寞孀孩無寄名字不聞湮沈電滅如斯可恨豈一人哉是知桀跖之凶殘無懼來禍之将及閔曽之篤行勿擬後慶之當臻故鶡冠子曰夫命者自然者也賢者未必得之不肖者未必失之斯之謂矣大夫曰若子引百家之言則列子之為名者必廉廉斯貧為名者必譲譲斯賤若然者則貧賤者立名之士所營而至也則富貴者貪競之徒所求而得也何名自然之數哉先生曰此乃一隅之説非周於理者也夫冨貴自有貪競冨貴非貪競所能得貧賤自有廉譲貧賤非廉譲所欲邀自有冨貴而非貪求貧賤而不廉譲且子罕言命道藉人𢎞故性命之理先聖之所憚説善惡報應天道有常而關哉譬如溫風轉蕐寒飆颺雪有委溲糞之下有累玉階之上風飆無心於厚薄而蕐霰有穢淨之殊途天道無心於愛憎而性命有窮通之異術子聞于公待封而封至嚴母望喪而喪及若見善人便言其後必昌若覩惡人便言其後必亡此猶終身守株而冀狡兔之更獲耳大夫於是歛容而謝曰若僕者所執偏迷而昧通途守狹近而失遐曠今承徳音渙然䝉啓譬猶疏屬伏尸歴萬古而忽悟中山沈醉未千朝而遽醒請事斯語以銘諸紳或問曰朱子託憑虚之談暢方寸之底論情指事深有趣焉但詳之先典有所未逹夫人哀樂喜怒之情包善惡之性資待之方不足於是爭奪之事斯興才識均者不能相御天生仁聖實使司牧樂者聖人之所作禮者先王之所制三千之儀以檢其迹五音之和以導其心設爵以勸善懸刑以懲惡纖毫不漏酬酢如響玉帛云乎非無為所薦鼔鐘斯合豈自然而諧千科滿目靡非力用所構百貫參差悉由智思而造吾子湯武之臣隸周孔之學徒出入戸牖伏膺名教而云善人知善之不足憑也惡人知惡之不足誡也善不能招慶禍不能報惡是何背理之談也且翾翔蠕動猶知去就況人為最靈而同一自然之物此豈高厚之詩何取譬之非類情所未逹敬待清酬答曰昔盧敖北遭若士自傷足跡之未曠河宗東窺溟海方歎秋水之不多吾子習近成性未易可與談遠大者也今子以屈伸俯仰心慮所為雕鏤剪琢身手所作禮樂者聖人之所作聖人者天地之所生請為吾子近取諸身則可以逺通諸物子以耳聞眼見足蹈手握意謂孰使之然身有疴疾冷熱皆不自知哀樂喜怒興廢安在何地有識者自知識之所在者乎有智者自知智之所存者乎若識遍身中傷身則識裂智若隨事起事謝則智滅果識不知識智不知智於是推近以達逺觸類而長之故知禮樂不自知其所由而製聖人不自知其所由而生兩像亦不知其所由而立矣於是殊形異慮委積充盈靜動合散自生自滅動靜者莫有識其主生滅者不自曉其根葢自然之理著矣所謂非自然者乃大自然也是有為者乃大無為也子云天生聖人是使司牧何故唐虞疊聖加以五臣文武重灮益以十亂豈天道之不能一其終始將末代貽咎於天地大舜大堯非欲生不肖之子龍逢比干豈樂身就誅割孔子歴聘栖遑卒云執鞭不憚顔稱囘何敢死終使慈父請車彼三聖三仁可謂妙取捨矣天能令東海亢旱不如理孝婦之怨地能使高城復塹未若救杞梁之隕故榮落死生自然定分若聖與仁不能自免深味鄙句理存顯然釋眞觀字聖達錢塘人住靈隱山天竺寺洪偃稱觀有八能謂義導書詩辯貎聲棊是也至隋大業終因縁無性論幷序泉亭令徳有朱三議者非唯外學通敏亦是内信淵明常自心重大乘口誦般若忽著自然之論便興有性之執或是示同邪見或是實起倒心交復有損正真過傷至道聊裁後論以袪彼執雖復辭無足採而理或可觀若與余同志希共詳覧也請疑公子致言於通敏先生曰夫二儀始判則庻類是依七曜既懸則兆民斯仰但生前死後繫象之所未明古徃今來賢聖於焉莫究而希𤣥君子互騁鑽求慕理名人競加穿鑿寓兹所説則盛辨自然假氏所明則高陳報應雖自然鋒鏑克勝於前報應干戈敗績於後而愚心難啓暗識易迷二理交加未知孰是通敏先生乃抵掌而對曰省二君之清論實各擅於偏隅自然則依傍於老荘報應則祖述於周孔可謂楚則已失而齊亦未為得也今為吾子揚㩁而陳之夫三墳五典善惡之理未彰八索九丘幽明之路猶壅況復漆園傲吏恍惚狂生獨稱造化之宗偏據自然之性乃為一時之矯俗非關契理之𤣥謀今請問自然之本為何所趣有因果耶無因果乎若謂自然尚論因果則事同矛盾兩言相食愚人所笑智者所悲直置已傾不煩多難若謂永無報應頓絶因果則君臣父子斯道不行仁義孝慈此言何用便當造惡招慶為善致殃亦應鑽火得冰種豆生麥未見聲和響戾形曲影端者也若以放勛上聖而誕育於丹朱重蕐至徳而生於瞽叟便為自然而然者竊為足下不足焉夫至親之道乃曰天性而各随行業曾不相關堯舜樹徳於徃生故禀茲靈智瞽叟興惡乎前世故致此頑嚚而復共結重縁還相影發乃欲因凡顯聖以智化愚若無瞽叟之兇豈知克諧之美自非放勛之聖誰化慢遊之惡故阿難調逹並為世尊之弟羅睺善星同是如來之𦙍而阿難常親給侍調逹每興害逆羅睺則䕶珠莫犯善星則破器難收以此而觀諒可知矣若云各有自性不可遷貿者此殊不然至如鷹化為鳩本心頓盡橘變成枳前味永消昔冨今貧定性之理難奪先貴後賤賦命之言何在呂望屠牛之士終享太師伊尹負鼎之人卒登丞相戴淵四隣所患後著高名周處三害之端晚稱令徳闍王無間之罪翻然改圖育王莫大之愆忽能尊善若依自性之理豈容得有斯義善人唯應修善不可片時造惡惡人恒自起惡無容一念生善是則榮枯寵辱皆守必然愚智尊卑永無悛革豈其然乎決不然也又若以修徳之人翻感憂慼行善之士反致沉淪以為自然之命亦不然也若行善而望報去善更遙修徳以邀名離德逾遠若必挺珪璋之性懐琬琰之心本無意於名聞曾不欣乎富貴而英聲必孱雅慶方臻或可未值知音便同散木不逢别玉遂等沈泥暫且龍潛無虧鳯徳豈容區區於天壤擾擾於世間自可固窮無煩隕穫至如太伯高譲而流芳千祀仲尼窮厄而傳名萬代顔稱早世特是命業不長冉致斯疾當由病因未斷二子伏誅彌顯衛靈之惡三仁受戮方見殷紂之愆首山之餓不免求名之責汩水之沈尚貽懐怨之咎且夫決定成業非神力之所救必應受報豈聖智而能禳竝起昔因非今造也若謂屠割為務而永壽百齡盜竊居懐而豐財巨億以為定性而然者亦所未喻也斯由曩生片善感此命財今世重殃未招果報以其為罪既大受苦冝多所以且緩其誅宜縱其惡一朝禍盈釁積則便覆巢碎卵長歸鬲子泥黎永䖏無間地獄故書云惡不積無以滅身此之謂矣亦有見招果報事接見聞至如王莽簒逆則懸首漸臺董卓凶殘則曝屍都市晉侯殺趙朔感䧟厠之悲齊主害彭生有墜車之痛夏祚顛覆桀之罪也殷宗殄喪紂之過焉故知因果之義陸離難准業報之理參差不定所謂生報現報及後報也請疑公子曰若以自然之計於義不可則報應之辨在言為得而前旨復云二君所述皆非契理未知此意可得而聞耶通敏先生曰子既慇懃屢請余亦僶俛相答但自省庸陋未伸其要妙耳尋法本非有非有則無生理自非無非無則無滅無生無滅諸法安在非有非無萬物何寄蕩乎清淨推求之路斯斷夷然平等取舍之徑無從豈有報應之理可求善惡之相可得直以凡品衆生未了斯致故横興諍論强生分别所謂渴人逐燄水在何池眼病見蕐空曾無樹但為引接近情袪其重惑微示因果略顯業縁使定性執除自然見弭若達乎正理悟此真法亦復何所而有何所而無哉於是二三君子相視心驚欣然領悟退席敬伏而言曰今者可謂朝聞夕死虚徃實歸積滯皆傾等秋風之落葉繁疑並散譬春日之銷冰謹當共捨前迷同遵後業矣與徐僕射領軍述役僧書宣帝太建十年征周失利朝議括僧無名者休道充役觀致書徐陵陵封書令奏其事遂寝泉亭灮顯寺釋真觀致書領軍檀越竊聞四依開士匡正法於將頽十地高人秉𤣥文於已絶能使崫山遺跡無虧宴坐之風祗樹餘苖得肆經行之道伏見今者皇蕐奉宣嚴憲絓是僧尼之類不書名籍之人並令捐兹淨戒就此黎民去彼伽藍歸其里閈既暜天之下莫非王臣正當僶俛恭承鞠躬祗奉但愚情所謂竊或疑焉自佛法肇興千有餘載流傳此地數百年間濟濟僧徒一何為盛雖復市朝亟改風化頻移慧炬常明戒香恒馥其為福利難可勝言所現靈祥聞諸史傳至如浮圖和上曜彩鄴中高座法師流芳鞏洛或復昆明池内識刼燒之餘灰長沙寺裏感碎身之遺隂道開入境仙人之星乃出法成去世紺馬之瑞爰浮乃有青目赤髭黄眸白足連眉表稱大耳傳芳莫不定水淵澄義峯山䜿汪汪道望類迦葉之高蹤肅肅威儀似頞鞞之清行頃年訛替乃日澆漓而正法洪基猶應未殄忽復違其本志奪彼前心莫不仰高殿而酸傷辭舊房而悽楚依依法座重反何期戀戀禪門再還無日乃非歧路而有分袂之悲雖異河梁遂結言離之痛若以不斷名籍為其深罪延兹咎累亦可哀矜夫出俗之人務應修道許其方外之禮不拘域中之節或有不貫名籍無關薄領並皆遊方採聽隨䖏利安望刹為居臨中告飯或頭陀林下或蘭若巖阿如此之流寜容繼屬若勝業不全清禁多毁宜應休道此事誠然而持犯難知聖凡相濫譬菴羅之果生熟難分雪山之藥真偽難辨忽使崑峯之上玉石同焚大澤之中龍蛇等斃何期惜也吁可傷哉又其割愛辭親披緇翦髪既無僕使永絶妻孥或老病之年單貧之士皆憑子弟還相養衞如其一朝而散便溘死溝渠遂有赴峻壑而投身縊長繩而隕命雖復汨羅之痛匹此猶輕荒谷之悲方斯未重且復竒才絶學並寄後生聽講誦經咸資晩秀所以須陀得戒猶是㓜童身子揚名差非耆老如斯之類若並翻緇恐此法門便無紹繼梵輪絶矣精舍空焉若八陣未休四郊多壘前房所寄後殿斯憑愚謂此人殆誠無用若必有拔距投石之能索鐵伸鉤之力則竝從軍幕久預長驅儻復尚服緇衣猶居寺宇則是習勇心薄樂道情深若非衛玠之清羸便同孟昶之浮怯既不便弓馬徒勞行陣雖復身披甲胄還想法衣手執干戈猶疑錫杖必當遙聞戰鼓色變心驚逺望軍麾魂飛氣懾將恐有阻都䕶之威無益貳師之勇若謂不輸王課靡助國儲所以暜使收其賦斂但浮游之屬萍迸蓬飛散誕之流且貧終窶鄉里既無田宅京師又闕主人納屨則兩踵併穿斂襟則雙肘皆現觀董生之百結尚覺輕華見顏子之一簞更疑豐飽求朽壌以為藥寧識紫丸服糞掃而為衣豈逢黄絹貨財之禮此則無從懐璧之愆信哉應免若令其在道猶可分衞自資遂使還民便是􅀈糧莫寄伏惟皇朝御厯齊聖欽明繼踵軒犧比肩炎昊握鏡之風彌遠垂衣之化方深兼復梁棟三寶敷宏十善昔漢明靈感上夢金人晉武覆修纔招玉像用今方古彼有慙焉或深經是護等仙預大王寶塔斯成類無憂國主明揚仄陋信巢父之淸虚徵聘漁畋許嚴君之高尚愚謂絓預今者俛首僧尼若已離法衣無過道業或常居邸肆恒䖏田園竝依民例宜從䇿使如其禪誦知觧蔬素淸虚或宣唱有功梵聲可録或繕修塔廟建造經書救濟在心聽習為務乃至羸老之屬貧病之流幸於編戸無所堪用竝許停寺仍上僧籍必望十城之寶或出荆山百歩之中時逢芳草於是寺斷流俗之僧衆無餔糟之客六時翹請常以國界為心三業精修必用君王為本豈不幽明踴躍人鬼欣歡冥力護持善縁扶助然後二儀交泰六氣調和征馬息鞍軍旗巻斾邉荒入附無待丹水之師玉帛來朝還想稽山之集何期樂矣實可欣哉儻復疆場不虞軍資有闕薄須費計伏聽徴求仰惟領軍檀越外則探賾典墳内則鉤深經論才高帷幄寄重鹽梅必願降意芻蕘留心正法㣲恵硏詳薄垂觀覽如其一毫可採深希曲為矜論無使蘭艾同鋤薰蕕共剪庻得仙人苑裏更轉法輪長者園中還鋪講席則匡維之徳比恒岱以齊高擁護之功似滄溟而共廣横此忤煩彌增悚惕竝廣𢎞明集常州安國寺碑花磚錦石更累平階夏藻秋蓮環莊竦塔月臨月殿粉壁照於金波雲暎雲臺畵梁承於玉葉續高僧傳釋慧愷陳世沙門與法泰等知名梁代並義聲高邈宗匠當時攝大乘論序夫至道𢎞曠無思不洽大悲平等誘進靡窮徳被含生理非偏漏但迷塗易乆淪惑難息若先談出世則疑性莫啟故設敎立方各隨性欲唐虞之前圖牒簡少姬周已後經誥𢎞多雖復製禮作訓並導之以俗法而真假妙趣尚冥然未覩故迹隱蔥嶺以西敎祕滄海之外自漢室受命方稍東漸爰及晉朝斯風乃盛梁有天下彌具興隆歴千祀其將半渉七代而迄今法蘭導清源於前童壽振芳塵於後安叡騁壯思以發義端生肇擅𤣥言以釋幽致雖並策分鑣同瀾比派而深淺競馳昭晦相雜自兹以降篤好逾廣莫不異軌同奔轉相祖習而去取隨情開抑殊軫慧愷志慙負橐勤愧聚螢謬得齒迹學徒禀承訓義遊寓講肆多歴年所名師勝友僃得諮詢但綜渉疎淺鑽仰無術尋波討源多所未悟此葢慮窮於文字思迷於𢎞㫖明發興嗟負心非一每欲順風問道而未知厥路有三藏法師是優禪尼國婆羅門種姓頗羅墯名拘羅那他此土翻譯稱曰親依識鑒淵曠風表俊越天才髙桀神辨閒縱道氣逸羣徳音邁俗少遊諸國歴事衆師先習外典洽通書奥苞四韋於懐抱呑六論於胷衿學窮三藏貫練五部硏究大乘僃盡深極法師既博綜墳典妙逹幽微每欲振𤣥宗於他域啓法門於未悟以身許道無憚遠遊跨萬里猶比隣越四海如咫尺以梁太清二年方届建業仍值梁季混淆横流荐及法師因此避地東西遂使大法壅而不暢末至九江及遊五嶺凡所翻譯巻軸未多後適閩越敷説不少法師每懐慷慨所歎知音者希故伯牙絶絃卞和泣璧良由妙旨之典難辯盈尺之珍罕别法師遊方既久欲旋返舊國經塗所亘遂逹番禺儀同三司廣州刺史陽山郡公歐陽頠叡表岳靈徳洞河府經文緯武匡道佐時康流民於百越建正法於五嶺欽法師之高行慕大士之勝規奉請為菩薩戒師恭承盡弟子禮愷昔嘗受業已少滌沈蔽服膺未久便致暌違今重奉值倍懐蹈儛復欲餐和稟徳訪道陳疑雖慇懃三請而不䝉允遂怳然失圖心魂靡託衡州刺史陽山公世子歐陽紇風業峻整威武貞拔該閲文史深逹治要崇瀾内湛清輝外溢飲賢味道篤信愛竒躬爲請主兼申禮事法師乃欣然受請許為翻譯制旨寺主慧智法師戒行清白道氣宏壯志業閒贍觸途必舉匡濟不窮輪奐靡息征南長史袁敬徳履沖明志託夷遠徽猷清簡氷桂齊質弼諧蕃正民譽早聞兼深重佛法崇情至理黑白二賢為經始檀越辰次昭陽歳維協洽月呂姑洗神紀勾芒於廣州制旨寺便就翻譯法師既妙解聲論善識方言詞有以而必彰義無微而不暢席間函文終朝靡息愷謹筆受隨出隨書一章一句僃盡硏覈釋義若竟方乃著文然翻譯之事殊難不可存於蕐綺若一字參差則理趣胡越乃可令質而得義不可使文而失旨故今所翻文質相半與僧忍等同共禀學夙夜匪懈無棄寸隂即以其年樹檀之月文義俱竟本論三卷釋論十二巻義疏八巻合二十三巻此論乃是大乘之宗極正法之秘奥妙義雲興清詞海溢深固幽逺二乘由此迷墜曠壯該含十地之所宗學如來滅後將千一百餘年彌勒菩薩投適時機降靈俯接忘已屈應為阿僧伽法師廣釋大乘中義阿僧伽者此言無著法師得一㑹道體二居宗該𤣥鑒極凝神物表欲敷闡至理故製造斯論惟識微言因兹得顯三性妙趣由此而彰冠冕彞倫舟航有識本論即無著法師之所造也法師次弟婆藪槃豆此曰天親道亞生知德僃藏徃風格峻峙神氣爽發稟厥兄之雅訓習大乘之𢎞旨無著法師所造諸論詞致淵理𤣥趣難曉將恐後生復成紕紊故製釋論以解本文籠小乘於形内挫外道於筆端自斯已後迄于像季方等圓敎乃盛宣通慧愷不揆虚薄情慮庸淺乃欲泛芥舟於巨壑䇿駘足於長路庻累毫成仞聚爝為明有識君子幸宜尋閲其道必然無失墜也大藏物字函阿毗達磨俱舍釋論序正敎本宗文惟三藏梵音所闡諒無異説法相深微名實繁曠若非圓明獨朗孰能通達自日隱頞多之山月翳羅睺之手時移解昧部執競興或以文釋義或以義判文雖復得失參差皆以三藏為本可謂殊途同歸一致百慮者也尋十八部師友弟子竝各造論解其所執於一部中多有諸論此土先譯薩婆多部止有毗婆沙及雜心四巻毗婆沙明義雖廣而文句本不具足雜心説乃䖏中止述自部宗致四巻過存省略旨趣難可尋求此土先譯經部止有成實一論成實乃以經部駮斥餘師其間所用或同餘部又於破立之中亦未皆盡其妙且傳譯參差難可具述佛滅度後千一百餘年有出家菩薩名婆藪槃豆器度宏曠神才壯逸學窮文字思徹淵源德隆終古名葢當世造大小乘論凡數十部並盛宣行靡不宗學法師德業具如别傳先於薩婆多部出家仍學彼部所立三藏復見彼法多有乖違故造此論具述彼執隨其謬䖏以經部破之故此論本宗是薩婆多部其中取捨以經部為正博綜羣籍妙拔衆師談𤣥微窮於與極述事象略而周徧顯成聖旨僃摧異説立不可闚破無能擬義兼數論而深廣愈之詞不繁而義顯義雖深而易入故天竺咸稱為聰明論於大小乘學悉依此為本有三藏法師俱羅那他聰敏強記才辯無竭碩學多聞該通内外為𢎞法故遠遊此國值梁室將傾時事紛梗法師避地東西垂二十載欲還天竺來至番禺慧愷因請翻講攝大乘等論經渉二年文義方畢法師爾後猶欲旋歸刺史歐陽紇尚仁貴道久申敬事重復請畱彌加殊禮慧愷與僧忍等更請翻講此論以陳天嘉四年歳次閼逢龍集涒灘正月二十五日於制旨寺始就開闡或品未畢仍事徙居於南海郡内續更敷説法師遊方既久精解此土音義凡所翻譯不須度語但梵音所目於義易彰今既改變梵音詞理難卒符㑹故於一句之中循環辯釋翻覆鄭重乃得相應慧愷謹即領受隨定隨書日夜相繼無懈晷刻至其年閏十月十日文義究竟論文二十二巻論偈一巻義疏五十三巻刺史仍請於城内講説既得溫故頗識大宗非惟闇弱多有疑滯又恐所翻不免謬失至天嘉五年嵗次柔兆二月二日與僧忍等更請法師重譯論文再解義意至灮大元年歳次强圉十二月二十五日治定前本始末究竟長史袁敬識覽沈深信解明正長史長子元友愛文重法博學多藝並禮事法師備盡經始絓南中翻譯悉頼此貴門方希永傳來世以為後生模式佛法大海深廣無際若不局一塗能信順求學豈不同餐甘露共齅薝蔔者哉如或專執非所喻也大藏鼔字函釋智愷姓曹氏住揚都大寺與法泰等就真諦對翻經論灮大中終廣州大乘起信論序夫起信論者乃是至極大乘甚㴱秘典開示如理縁起之義其旨淵𢎞寂而無相其用廣大寛廓無邊與凡聖為依衆法之本以其文㴱旨逺信者至微故於如來滅後六百餘年諸道亂興魔邪競扇於佛正法毁謗不停時有一高徳沙門名曰馬鳴㴱契大乘窮盡性法大悲内融隨機應現愍物長迷故作斯論盛隆三寶重興佛日起信未久廻邪入正使大乘正典復顯於時縁起㴱理更彰於後代迷羣異見者捨執而歸依闇類偏情之黨棄著而臻湊自㫺已來久藴西域無傳東夏者良以宣譯有時故前梁武皇帝遣聘中天竺摩伽陀國取經幷諸法師遇值三藏拘蘭難陀譯名真諦其人少小博採備覽諸經然於大乘偏洞㴱逺時彼國王應即移遣法師苦辭不免便就汎舟與瞿曇及多侍從幷送蘇合佛像來朝而至未旬便值侯景侵擾法師秀採壅流含珠未吐慧日暫停而欲還反遂囑值京邑英賢慧顯智韶智愷曇振慧旻與假黄鉞大將軍太保蕭公勃以大梁承聖三年歳次癸酉九月十日於衡州始興郡建興寺敬請法師敷演大乘闡揚秘典示導迷徒遂翻譯斯論一巻以明論旨𤣥文二十巻大品𤣥文四巻十二因縁經兩巻九識義章兩巻傳語人天竺國月支首那等執筆人智愷等首尾二年方訖馬鳴沖旨更曜於時邪見之流伏從正化余雖慨不見聖慶遇𤣥旨美其幽宗戀愛無已不揆無聞聊由題記儻遇智者賜垂改作大藏邑字函釋慧達陳時潤州江寧縣小招提寺沙門夾科肇論序慧達率愚通序長安釋僧肇法師所作宗本物不遷等四論但末代𢎞經允屬四依菩薩爰傳兹土抑亦其例至如彌天大徳童壽桑門竝創始命宗圖辯格致播揚宣述所事𤣥虚唯斯擬聖默之所祖自降乎已還歴代古今凡著名僧傳及傳所不載者釋僧叡等三千餘僧清信檀越謝靈運等八百許人至能辯正方言節文階級善覈名敎精搜義理揖此羣賢語之所統有美若人超語兼黙標本則句句深達佛心明末則言言僃通聖敎諒是大乘懿典方等博書自古自今著文著筆詳汰名賢所作諸論或六家七宗爰延十二竝判其臧否辯其差當唯此憲章無弊斯咎良由襟情泛若不知何係譬彼淵海數越九流挺拔清虚蕭然物外知公者希歸公採什如曰不知則公貴矣達猥生天幸逢此正音忻躍弗已饗讌無疲每至披尋不勝手舞誓願生生盡命𢎞述達於肇之遺文其猶若是況中百門觀爰洎方等㴱經而不至增乎世諺咸云肇之所作故是誠實真諦地論通宗莊老所資孟浪之説此實巨蠱之言欺誣亡沒街巷陋音未之足拾夫神道不形心敏難繪既文拘而義逺故衆端之所詭肇之卜意豈徒然哉良有以也如復狥狎其言願生生不面至獲忍心還度斯下達留連講肆二十餘年頗逢重席末覩斯論聊寄一序託悟在中同我賢余請俟來哲夫大分㴱義厥號本無故建言宗旨標乎實相開空法道莫逾真俗所以次釋二諦顯佛敎門但圓正之因無上般若至極之界唯有湼槃故末啟重𤣥明衆聖之所宅雖以性空擬本無本可稱語本絶言非心行䖏然則不遷當俗俗則不生不眞為眞眞但名説若能放曠蕩然崇兹一道清耳虚襟無言二諦斯則淨照之功著故般若無知無名之徳興而湼槃不稱余謂此説周圓罄佛淵海浩博無涯窮法體相雖復言約而義豐文蕐而理詣語勢連環意實孤誕敢是絶妙好辭莫不竭茲洪論所以童壽歎言解空第一肇公其人斯言有由矣彰在翰牘但宗本蕭然莫能致詰不遷等四論事開接引問答㭊微所以稱論揚輦碩望為拘那羅陀奏拘那羅陀蕐言親依或云波羅末陀譯云真諦本西天竺優禪尼國人自來東夏譯出衆經陳灮大初入南海時欲延還建業㑹揚輦碩望恐奪時榮乃奏從之嶺表所譯衆部多明無塵唯識言乖治術有蔽國風不𨽻諸蕐可流荒服續髙僧傳釋文紀巻三十一
