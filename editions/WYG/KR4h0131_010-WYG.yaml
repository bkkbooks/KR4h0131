body:
  text: 釋文紀巻十明梅鼎祚輯晉八秦後釋僧肇京兆人學善方等兼通三藏後秦主姚興命入逍遙園與僧叡等詳定經論從什諮禀所悟更多𢎞始中終長安實為興所害宗本義肇因羅什出大品之後著般若無知論以呈什什稱善曰吾解不謝子辭當相挹劉遺民見此論歎曰不意方袍復冇平叔因與逺公披尋玩味往復致書後又著不真空論物不遷論并注維摩及製詣經論序並傳于世及什亡後肇追悼永往翹思彌厲乃著湼槃無名論表上秦主姚興興答旨殷勤備加讃述班諸子姪案此梁慧皎髙僧傳所載四論般若無知最先次物不遷次不真空次湼槃無名開元釋教録亦然而並無宗本義陳釋慧達有夾科肇論其義序則今本也與傳録小異本無實相法性性空縁㑹一義耳何則一切諸法縁㑹而生縁會而生則未生無有縁離則滅如其真有有則無滅以此而推故知雖今現有有而性常自空性常自空故謂之性空性空故故曰法性法性如是故曰實相實相自無非推之使無故名本無言不有不無者不如有見常見之有邪見斷見之無耳若以有為有則以無為無有既不有則無無也夫不存無以觀法者可謂識法實相矣是謂雖觀有而無所取相然則法相為無相之相聖人之心為住無所住矣三乗等觀性空而得道也性空者謂諸法實相也見法實相故云正觀若其異者便為邪觀設二乗不見此理則顛倒也是以三乗觀法無異但心有大小為差耳漚和般若者大慧之稱也諸法實相謂之般若能不形證漚和功也適化衆生謂之漚和不染塵累般若力也然則般若之門觀空漚和之門涉有涉有未始迷虛故常處有而不染不厭有而觀空故觀空而不證是謂一念之力權慧具矣一念之力權慧具矣好思歴然可解泥洹盡諦者直結盡而已則生死永滅故謂盡耳無復别有一盡處耳物不遷論夫生死交謝寒暑迭遷有物流動人之常情余則謂之不然何者放光云法無去來無動轉者尋夫不動之作豈釋動以求静必求静於諸動必求静於諸動故雖動而常静不釋動以求静故雖静而不離動然則動静未始異而惑者不同縁使真言滯於競辯宗途屈於好異所以静躁之極未易言也何者夫談真則逆俗順俗則違真違真故迷性而莫返逆俗故言淡而無味縁使中人未分於存亡下士撫掌而弗顧近而不可知者其唯物性乎然而不能自巳聊復寄心於動静之際豈曰必然試論之曰道行云諸法本無所從來去亦無所至中觀云觀方知彼去去者不至方斯皆即動而求静以知物不遷明矣夫人之所謂動者以昔物不至今故曰動而非静我之所謂静者亦以昔物不至今故曰静而非動動而非静以其不來静而非動以其不去然則所造未嘗異所見未嘗同逆之所謂塞順之所謂通茍得其道復何滯哉傷夫人情之惑也久矣目對真而莫覺既知往物而不來而謂今物而可往往物既不來今物何所往何則求向物於向於向未嘗無則向物於今於今未嘗有於今未嘗有以明物不來於向未嘗無故知物不去覆而求今今亦不往是謂昔物自在昔不從今以至昔今物自在今不從昔以至今故仲尼曰囘也見新交臂非故如此則物不相往來明矣既無往返之微朕有何物而可動乎然則旋嵐偃嶽而常静江河競注而不流野馬飄鼔而不動日月歴天而不周復何怪哉噫聖人有言曰人命逝速速於川流是以聲聞悟非常以成道緣覺覺緣離以即真茍萬動而非化豈尋化以階道覆尋聖言微隠難測若動而静似去而留可以神㑹難以事求是以言去不必去閒人之常想稱住不必住釋人之所謂往耳豈曰去而可遣住而可留耶故成具云菩薩處計常之中而演非常之教摩訶衍論云諸法不動無去來處斯皆𨗳達羣方兩言一㑹豈曰文殊而乖其致哉是以言常而不住稱去而不遷不遷故雖往而常静不住故雖静而常往雖静而常往故徃而弗遷雖往而常静故静而弗留矣然則荘生之所以藏山仲尼之所以臨川斯皆感往者之難留豈曰排今而可往是以觀聖人心者不同人之所見得也何者人則謂少壯同體百齡一質徒知年往不覺形随是以梵志出家白首而歸鄰人見之曰昔人尚存乎梵志曰吾猶昔人非昔人也鄰人皆愕然非其言也所謂有力者負之而趨昧者不覺其斯之謂歟是以如來因羣情之所滯則方言以辯惑乗莫二之真心吐不一之殊教乖而不可異者其唯聖言乎故談真有不遷之稱導俗有流動之説雖復千途異唱㑹歸同致矣而徵文者聞不遷則謂昔物不至今聆流動者則謂今物可至昔既曰古今而欲遷之者何也是以言往不必往古今常存以其不動稱去不必去謂不從今至古以其不來不來故不馳騁於古今不動故各性住於一世然則羣籍殊文百家異説茍得其㑹豈殊文之能惑哉是以人之所謂住我則言其去人之所謂去我則言其住然則去住雖殊其致一也故經云正言似反誰當信者斯言有由矣何者人則求古於今謂其不住吾則求今於古知其不去今若至古古應有今古若至今今應有古今而無古以知不來古而無今以知不去若古不至今今亦不至古事各性住於一世有何物而可去來然則四象風馳璇璣電巻得意毫微雖速而不轉是以如來功流萬世而常存道通百劫而彌固成山假就於始簣脩途托至於初歩果以功業不可朽故也功業不可朽故雖在昔而不化不化故不遷不遷故則湛然明矣故經云三菑彌綸而行業湛然信其言也何者果不俱因因因而果因因而果因不昔滅果不俱因因不來今不滅不來則不遷之致明矣復何惑於去留踟蹰於動静之間者哉然則乾坤倒覆無謂不静洪流淊天無謂其動茍能契神於即物斯不逺而可知矣不真空論夫至虛無生者盖是般若𤣥鑒之妙趣有物之宗極者也自非聖明特達何能契神於有無之間哉是以至人通神心於無窮窮所不能滯極耳目於視聴聲色所不能制者豈不以其即萬物之自虚故物不能累其神明者也是以聖人乗真心而理順則無滯而不通審一氣以觀化故所遇而順適無滯而不通故能混雜致淳所遇而順適故則觸物而一如此則萬象雖殊而不能自異不能自異故知象非真象象非真象故則雖象而非象然則物我同根是非一氣潜㣲幽隠殆非羣情之所盡故頃爾談論至於虚宗毎有不同夫以不同而適同有何物而可同哉故衆論競作而性莫同焉何則心無者無心於萬物萬物未嘗無此得在於神静失在於物虚即色者明色不自色故雖色而非色也夫言色者但當色即色豈待色色而後為色哉此直語色不自色未領色之非色也本無者情尚於無多觸言以賔無故非有有即無非無無即無尋夫立文之本㫖者直以非有非真有非無非真無耳何必非有無此有非無無彼無此直好無之談豈謂順通事實即物之情哉夫以物物於物則所物而可物以物物非物故雖物而非物是以物不即名而就寔名不即物而履真然則真諦獨静於名教之外豈曰文言之能辯哉然不能杜黙聊復厝言以擬之試論之曰摩訶衍論云諸法亦非有相亦非無相中論云諸法不有不無者第一真諦也尋夫不有不無者豈謂滌除萬物杜塞視聽寂寥虚豁然後為真諦者乎誠以即物順通故物莫之逆即偽即真故性莫之易性莫之易故雖無而有物莫之逆故雖有而無雖有而無所謂非有雖無而有所謂非無如此則非無物也物非真物物非真物故於何而可物故經云色之性空非色敗空以明夫聖人之於物也即萬物之自虚豈待宰割以求通哉是以寢疾有不真之談超日有即虚之稱然則三藏殊文統之者一也故放光云苐一真諦無成無得世俗諦故便有成有得夫有得即是無得之偽號無得即是有得之真名真名故雖真而非有偽號故雖偽而非無是以言真未嘗有言偽未嘗無二言未始一二理未始殊故經云真諦俗諦謂有異耶答曰無異也此經直辨真諦以明非有俗諦以明非無豈以諦二而二於物哉然則萬物果有其所以不有有其所以不無有其所以不有故雖有而非有有其所以不無故雖無而非無雖無而非無無者不絶虚雖有而非有有者非真有若有不即真無不夷迹然則有無稱異其致一也故童子歎曰説法不有亦不無以因縁故諸法生瓔珞經云轉法輪者亦非有轉亦非無轉是謂轉無所轉此乃衆經之㣲言也何者謂物無耶則邪見非惑謂物有耶則常見謂得以物非無故邪見為惑以物非有故常見不得然則非有非無者信真諦之談也故道行云心亦不有亦不無中觀云物從因縁故不有縁起故不無尋理即其然矣所以然者夫有若真有有自常有豈待縁而後有哉譬彼真無無自常無豈待縁而後無哉若有不能自有待縁而後有者故知有非真有有非真有雖有不可謂之有矣不無者夫無則湛然不動可謂之無萬物若無則不應起起則非無以明縁起故不無也故摩訶衍論云一切諸法一切因縁故應有一切諸法一切因縁故不應有一切無法一切因縁故應有一切有法一切因縁故不應有尋此有無之言豈直反論而已哉若應有即是有不應言無若應無即是無不應言有言有是為假有以明非無借無以辨非有此事一稱二其文有似不同茍領其所同則無異而不同然則萬法果有其所以不有不可得而有有其所以不無不可得而無何則欲言其有有非真生欲言其無事象既形象形不即無非真非實有然則不真空義顯於兹矣故放光云諸法假號不真譬如㓜化人非無幻化人幻化人非真人也夫以名求物物無當名之實以物求名名無得物之功物無當名之實非物也名無得物之功非名也是以名不當實實不當名名實無當萬物安在故中觀云物無彼此而人以此為此以彼為彼彼亦以此為彼以彼為此此彼莫定乎一名而惑者懐必然之志然則彼此初非有惑者初非無既悟彼此之非有有何物而可有哉故知萬物非真假號久矣是以成具立强名之文園林託指馬之況如此則深逺之言於何而不在是以聖人乗千化而不變履萬惑而常通者以其即萬物之自虚不假虚而虚物也故經云甚竒世尊不動真際為諸法立處非離真而立處立處即真也然則道逺乎哉觸事而真聖逺乎哉體之即神𤣥鑒一作𤣥覧般若無知論注云假致疑難以𨗳深㫖夫般若虚𤣥者盖是三乗之宗極也誠真一之無差然異端之論紛然久矣有天竺沙門鳩摩羅什者少踐大方研幾斯趣獨拔於言象之表妙契於希夷之境齊異學於迦夷揚淳風於東扇将爰燭殊方而匿耀凉土所以道不虚應應必有由矣𢎞始三年歲次星紀秦乗入國之謀舉師以來之意也北天之運數其然矣大秦天王者道契百王之端徳洽千載之下游刃萬機𢎞道終日信季俗蒼生之所天釋迦遺法之所仗也時乃集義學沙門五百餘人於逍遥觀躬執秦文與什公參定方等其所開拓者豈唯當時之益乃累刼之津梁矣余以短乏曾厠嘉㑹以為上聞異要始於時也然則聖智幽㣲深隠難測無相無名乃非言象之所得為試惘象其懐寄之狂言耳豈曰聖心而可辨哉試論之曰放光云般若無所有相無生滅相道行云般若無所知無所見此辨智照之用而曰無相無知者何耶果有無相之知不知之照明矣何者夫有所知則有所不知以聖心無知故無所不知不知之知乃曰一切知故經云聖人無所知無所不知信矣是以聖人虛其心而實其照終日知而未嘗知也故能黙耀韜光虚心𤣥鑒閉智塞聰而獨覺𡨕𡨕者矣然則智有窮幽之鑒而無知焉神有應㑹之用而無慮焉神無慮故能獨王於世表智無知故能𤣥照於事外智雖事外未始無事神雖世表終日域中所以俯仰順化應接無窮無幽不察而無照功斯則無知之所知聖神之所㑹也然其為物也實而不有虚而不無存而不可論者其唯聖智乎何者欲言其有無状無名欲言其無聖以之靈聖以之靈故虚不失照無状無名故照不失虚照不失虚故混而不渝虚不失照故動以接麤是以聖智之用未始暫廢求之形相未暫可得故寶積曰以無心意而現行放光云不動等覺而建立諸法所以聖迹萬端其致一而已矣是以般若可虚而照真諦可亡而知萬動可即而静聖應可無而為斯則不知而自知不為而自為矣復何知哉復何為哉難曰夫聖人真心獨朗物物斯照應接無方動與事㑹物物斯照故知無所遺動與事㑹故㑹不失機㑹不失機故必有㑹於可㑹知無所遺故必有知於可知必有知於可知故聖不虚知必有㑹於可㑹故聖不虚㑹既知既㑹而曰無知無㑹者何耶若夫忘知遺㑹者則是聖人無私於知㑹以成其私耳斯可謂不自有其知安得無知哉答曰夫聖人功髙二儀而不仁明逾日月而彌昬豈曰木石瞽其懐期於無知而已哉誠以異於人者神明故不可以事相求之耳子意欲令聖人不自有其知而聖人未嘗不有知無乃乖於聖心失於文㫖者乎何者經云真般若者清浄如虚空無知無見無作無緣斯則知自無知矣豈待返照然後無知哉若有知性空而稱浄者則不辨於惑智三毒四倒皆亦清浄有何獨尊浄於般若若以所知美般若所知非般若所知自常浄故般若未嘗浄亦無緣致浄歎於般若然經云般若清浄者將無以般若體性真浄本無惑取之知本無惑取之知不可以知名哉豈唯無知名無知知自無知矣是以聖人以無知之般若照彼無相之真諦真諦無兔馬之遺般若無不窮之鑒所以㑹而不差當而無是寂漠無知而無不知者矣難曰夫物無以自通故立名以通物物雖非名果有可名之物當於此名矣是以即名求物物不能隠而論云聖心無知又云無所不知意謂無知未嘗知知未嘗無知斯則名教之所通立言之本意也然論者欲一於聖心異於文㫖尋文求實未見其當何者若知得於聖心無知無所辨若無知得於聖心知亦無所辨若二都無得無所復論哉答曰經云般若義者無名無説非有非無非實非虚虚不失照照不失虚斯則無名之法故非言所能言也言雖不能言然非言無以傳是以聖人終日言而未嘗言也今試為子狂言辨之夫聖心者㣲妙無相不可為有用之彌勤不可為無不可為無故聖智存焉不可為有故名教絶焉是以言知不為知欲以通其鑒不知非不知欲以辨其相辨相不為無通鑒不為有非有故知而無知非無故無知而知是以知即無知無知即知無以言異而異於聖心也難曰夫真諦深𤣥非智不測聖智之能在茲而顯故經云不得般若不見真諦真諦則般若之緣也以縁求智智則知矣答曰以縁求智智非知也何者放光云不縁色生識是名不見色又云五隂清浄故般若清浄般若即能知也五隂即所知也所知即縁也夫知與所知相與而有相與而無相與而無故物莫之有相與而有故物莫之無物莫之無故為縁之所起物莫之有故則縁所不能生縁所不能生故照縁而非知為縁之所起故知縁相因而生是以知與無知生於所知矣何者夫智以知所知取相故名知真諦自無相真智何由知所以然者夫所知非所知所知生於知所知既生知知亦生所知所知既相生相生即縁法縁法故非真非真故非真諦也故中觀云物從因縁有故不真不從因縁闕故即真今真諦曰真真則非縁真非縁故無物從縁而生也故經云不見有法無縁而生是以真智觀真諦未嘗取所知智不取所知此智何由知然智非無知但真諦非所知故真智亦非知而子欲以縁求智故以智為知縁自非縁於何而求知哉難曰論云不取者為無知故不取為知然後不取耶若無知故不取聖人則𡨕若夜㳺不辨緇素之異矣若知然後不取知則異於不取矣答曰非無知故不取又非知然後不取知即不取故能不取而知難曰論云不取者誠以聖心不物於物故無惑取也無取則無是無是則無當誰當聖心而云聖心無所不知耶答曰然無是無當者夫無當則物無不當無是則物無不是物無不是故是而無是物無不當故當而無當故經云盡見諸法而無所見者也難曰聖心非不能是誠以無是可是雖無是可是故當是於無是矣是以經云真諦無相故般若無知者誠以般若無有有相之知若以無相為無相有何累於真諦也答曰聖人無無相也何者若以無相為無相無相即為相捨有而之無譬猶逃峯而赴壑俱不免於患矣是以至人處有而不有居無而不無雖不取於有無然亦不捨於有無所以和光塵勞周旋五趣寂然而往泊爾而來恬淡無為而無不為泊難曰聖心雖無知然其應㑹之道不差是以可應者應之不可應者存之然則聖心有時而生有時而滅可得然乎答曰生滅者生滅心也聖人無心生滅焉起然非無心但是無心心耳又非不應但是不應應耳是以聖人應㑹之道則信若四時之質直以虚無為體斯不可得而生不可得而滅也難曰聖智之無惑智之無俱無生滅何以異之答曰聖智之無者無知惑智之無者知無其無雖同所以無者異也何者夫聖心虚静無知可無可曰無知非謂知無惑智有知故有知可無可謂知無非曰無知也無知即般若之無也知無則真諦之無也是以般若之與真諦言用即同而異言寂即異而同同故無心於彼此異故不失於照功是以辨同者同於異辨異者異於同斯則不可得而異不可得而同也何者内有獨鑒之明外有萬法之實萬法雖實然非照不得内外相與以成其照功此則聖所不能同用也内雖照而無知外雖實而無相内外寂然相與俱無此則聖所不能異寂也是以經云諸法不異者豈曰續鳧截鶴夷嶽盈壑然後無異哉誠以不異於異故雖異而不異也故經云甚竒世尊於無異法中而説諸法異又云般若與諸法亦不一相亦不異相信矣難曰論云言用則異言寂則同未詳般若之内則有用寂之異乎答曰用即寂寂即用用寂體一同出而異名更無無用之寂而主於用也是以智彌昧照逾明神彌静應逾動豈曰明昧動静之異哉故成具云不為而過為寶積曰無心無識無不覺知斯則窮神盡智極象外之談也即之明文聖心可知矣劉遺民致問僧肇條般若無知論書遺民和南頃餐徽聞有懐遙竚嵗末寒嚴體中如何音寄雍隔増用抱蘊弟子沈痾艸澤常有弊瘵耳因慧明道人北游裁通其情古人不以形疎致淡悟涉則親是以雖復江山悠邈不面當年至於企懐風味鏡心象迹佇悦之勤良以深矣􅛻然無因瞻霞永歎順時愛敬兾因行李數有承問伏願彼大衆康和外國法師常休納上人以悟發之器而遘茲淵對想開究之功足以盡過半之思故以毎惟乖闊憤愧何深此山僧清常道戒彌厲禪隠之餘則惟研惟講恂恂穆穆故可樂矣弟子既以遂宿心而覩茲上軌感寄之誠日月銘至逺法師頃恒履宜思業精詣乾乾宵夕自非道用潜流理為神御孰以過順之年湛氣若茲之勤所以憑慰既深仰謝逾絶去年夏末始見生上人示無知論才運清儁㫖中沉允推涉聖文婉而有歸披味殷勤不能釋手真可謂浴心方等之淵而悟懐絶㝠之肆者矣若令此辯遂通則般若衆流殆不言而㑹可不欣乎可不欣乎然夫理微者辭險唱獨者應希茍非絶言象之表者将以存象而致乖乎意謂答以縁求智之章婉轉窮盡極為精巧無所間然矣但暗者難以頓曉猶有餘疑一兩今輒題之如别想從容之暇復能麤為釋之論序云般若之體非有非無虚不失照照不失虚故曰不動等覺而建立諸法下章云異乎人者神明故不可以事相求之耳又云用即寂寂即用神彌静應逾動夫聖心𡨕寂理極同無不疾而疾不徐而徐是以知不廢寂寂不廢知未始不寂未始不知故其運物成功化世之道雖處有名之中而逺與無名同斯理之𤣥故常所彌昧者矣但今談者所疑於髙論之㫖欲求聖心之異為謂窮靈極數妙盡𡨕符耶為将心體自然靈怕獨感耶若窮靈極數妙盡㝠符則寂照之名故是定慧之體耳若心體自然靈怕獨感則羣數之應固以幾乎息矣夫心數既𤣥而孤運其照淳神化表而慧明獨存當有深證可試為辨之疑者當以撫㑹應機覩變之知不可謂之不有矣而論㫖云本無惑取之知而未釋所以不取之理謂宜先定聖心所以應㑹之道為當唯照無相耶為當咸覩其變耶若覩其變則異乎無相若唯照無相則無㑹可撫既無㑹可撫而有撫㑹之功意有未悟幸復悔之論云無當則物無不當無是則物無不是物無不是故是而無是物而不當故當而無當夫無當而物無不當乃所以為至當無是而物無不是乃所以為真是豈有真是而非是至當而非當而云當而無當是而無是耶若謂至當非常當真是非常是此盖悟惑之言本異耳固論㫖所以不明也願復重喻以袪其惑矣論至日即與逺法師詳省之法師亦好相領得意但標位似各有本或當不必理盡同矣頃兼以班諸有懐屢有擊其節者而恨不得與斯人同時也婉而髙僧傳作婉然題作條想作願𤣥陳耀文天中記載遺民書云易稱天盖取幽深之名詩詠彼蒼近在逺望之色浴心方䓁之淵悟懐絶㝠之肆釋答劉遺民書不面在昔佇想用勞慧明道人至徳去年十二月疏并問披尋反覆欣若暫對涼風届節頃常如何貧道勞疾多不佳耳信南返不悉八月十五日釋僧肇疏答報像雖殊妙期不二江山雖緬理契即鄰所以望途致想虛襟有寄君既遂嘉遯之志標越俗之美獨恬事外歡足方寸毎一言集何常不逺喻林下之雅詠髙致悠然清散未期厚自保愛毎因行李數有承問願彼山僧無恙道俗通佳承逺法師之勝常以為欣慰雖未清承然服膺髙軌企佇之勤為日久矣公以過順之年湛氣彌厲養徒幽巖抱一沖谷遐邇仰詠何美如之毎亦翹想一隅懸庇霄岸無由寫敬致慨良深君清對終日快有悟心之歡也即此大衆尋當什法師如宜秦王道性自然天機邁俗城塹三寶𢎞道是務由使異典勝僧方逺而至靈鷲之風萃於兹土領公逺舉乃千載之津梁也於西域還得方等新經二百餘部請大乗禪師一人三藏法師一人毗婆沙法師二人什法師於大石寺出新至諸經法藏淵曠日有異聞禪師於瓦官寺教習禪道門徒數百夙夜匪懈邕邕肅肅致可欣樂三藏法師於中寺出律藏本末精悉若覩初制毗婆沙法師於石羊寺出舎利弗阿毗曇胡本雖未及譯時問中事發言竒新貧道一生猥參嘉運遇兹盛化自恨不覩釋迦祗洹之集餘復何恨而慨不得與清勝君子同斯法集耳生上人頃在此同止數年至於言話之際常相稱詠中途還南君得與相見未更近問惘悒何言威道人至得君念佛三昧詠并得逺法師三昧詠及序此作興寄既髙辭致清婉能文之士率稱其美可謂游涉聖門扣𤣥闗之唱也君與法師當數有文集因來何少什法師以午年出維摩經貧道時預徳次參承之暇輒復條記成言以為注解辭雖不文然義承有本今因信持一本往南君閒詳試可取看來問婉切難為郢人貧道思不闗微兼拙於筆語且至趣無言言必乖趣云云不已竟何所辯聊以狂言示詶來旨耳疏云稱聖心㝠寂理極同無雖處有名之中而逺與無名同斯理之𤣥固常所彌昧者以此為懐自可忘言内得取定方寸復何足以人情之所異而求聖心之異乎疏曰談者為窮靈極数妙盡㝠符則寂照之名故是定慧之體耳若心體自然靈泊獨感則羣數之應固以幾乎息矣意謂妙盡𡨕符不可以定慧為名靈泊獨感不可稱羣數以息兩言雖殊妙用常一迹我而乖在聖不殊也何者夫聖人𤣥心黙照理極同無既曰為同同無不極何有同無之極而有定慧之名定慧之名非同外之稱也若稱生同内有稱非同若稱生同外稱非我也又聖心虚微妙絶常境感無不應㑹無不通𡨕機潜運其用不勤羣數之應亦何為而息耶且夫心之有也以其有有有不自有故聖心不有有不有有故有無有有無有故則無無無無故聖心不有不無不有不無其神乃虛何者夫有也無也心之影響也言也象也影響之所攀緣也有無既廢則心無影響影響既淪則言象莫測言象莫測則道絶羣方道絶羣方故能窮靈極數窮靈極數乃曰妙盡妙盡之道本乎無寄夫無寄在乎𡨕寂𡨕寂故虚以通之妙盡存乎極數極數故數以應之數以應之故動與事㑹虚以通之故道超名外道超名外因謂之無動與事會因謂之有因謂之有者應夫真有强謂之然耳彼何然哉故經云聖智無知而無所不知無為而無所不為此無言無相寂滅之道豈曰有而為有無而為無動而乖静静而廢用也而今談者多即言以定旨尋大方而徵隅懐前識以標𤣥存所存之必當是以聞聖有知謂之有心聞聖無知謂等太虚有無之境邊見所存豈是處中莫二之道乎何者萬物所殊然性本常一不可而物然非不物可物於物則名相異陳不物於物則物而即真是以聖人不物於物不非物於物不物於物物非有也不非物於物物非無也非有所以不取非無所以不捨不捨故妙存即真不取故名相靡因名相靡因非有知也妙存即真非無知也故經云般若於諸法無取無捨無知無不知此攀緣之外絶心之域而欲以有無詰者不亦逺乎請詰夫陳有無者夫智之生也極於相内法本無相聖智何知世稱無知者謂䓁木石太虚無情之流靈鑒幽燭形於未兆道無隠機寜曰無知且無知生於無知無無知也無有知也無有知也謂之非有無無知也謂之非無所以虚不失照照不失虚泊然永寂靡執靡拘孰能動之令有静之使無耶故經云真般若者非有非無無起無滅不可説示於人何則言其非有者言其非是有非謂是非有言其非無者言其非是無非謂是非無非有非非有非無非非無是以須菩提終日説般若而云無所説此絶言之道知何以傳庶參𤣥君子有以㑹之耳又云宜先定聖心所以應㑹之道為當唯照無相耶為當咸覩其變也談者似謂無相與變其㫖不一覩變則異乎無相照無相則失於撫㑹然則即真之義惑有滯也經云色不異空空不異色色即是空空即是色若如來㫖觀色空時應一心見色一心見空若一心見色則唯色非空若一心見空則唯空非色然則空色兩陳莫定其本也是以經云非色者誠以非色於色不非色於非色若非色於非色太虚則非色非色何所明若以非色於色即非色不異色非色不異色色即為非色故知變即無相無相即變羣情不同故教迹有異耳考之𤣥籍本之聖意豈復真偽殊心空有異照耶是以照無相不失撫會之功覩變動不乖無相之㫖造有不異無造無不異有未嘗不有未嘗不無故曰不動等覺而建立諸法以此而推寂用何妨如之何謂覩變之知異無相之照乎恐談者脱謂空有兩心静躁殊用故言覩變之知不可謂之不有耳若能捨已心於封内尋𤣥機於事外齊萬有於一虚曉至虚之非無者當言至人終日應㑹與物推移乗運撫化未始為有也聖心若此何有可取而曰未釋不取之理又云無是乃所以為真是無當乃所以為至當亦可如來言耳若能無心於為是而是於無是無心於為當而當於無當者則終日是不乖於無是終日當不乖於無當但恐有是於無是有當於無當所以為患耳何者若真是可是至當可當則名相以形美惡是生生生奔競孰與止之是以聖人空洞其懐無識無知然居動用之域而止無為之境處有名之内而宅絶言之鄉寂寥虚曠莫可以形名得若斯而巳矣乃曰真是可是至當可當未喻雅㫖也恐是當之生物謂之然彼自不然何足以然耳夫言迹之興異途之所由生也而言有所不言迹有所不迹是以善言言者求言所不能言善迹迹者尋迹所不能迹至理虚𤣥擬心已差況乃有言恐所示轉逺庶通心君子有以相期於文外耳如宜髙僧傳作休勝𢎞道作𢎞通方逺作自逺律藏作律部胡本作梵本清勝作道勝乖趣作乖至心宋釋遵式注肇論疏虚襟作虚㦗鼎案㦗音禁懃也堅固也又音金心動也與虚無預而肇注㦗云心也㦗義不得言心襟字為是涅槃無名論并上秦主姚興表僧肇言肇聞天得一以清地得一以寧君王得一以治天下伏惟陛下濬哲欽明道與神㑹妙契環中理無不統游刃萬機𢎞道終日威被蒼生垂文作則所以域中有四大而王居一焉涅槃之道盖是三乗之所歸方等之淵府渺漭希夷絶視聴之域幽致虚𤣥殆非羣情之所測肇以人微猥䝉國恩得閒居學肆在什公門下十有餘載雖衆經殊致勝趣非一然涅槃一義常以聴習為先肇才識闇短雖屢䝉誨喻猶懐疑漠漠為竭愚不已亦如似有解然未經髙勝先唱不敢自決不幸什公去世諮叅無所以為永慨而陛下聖徳不孤獨與什公神契目擊道存快盡其中方寸故能振彼𤣥風以啟末俗一日遇䝉答安城侯姚嵩書問無為宗極何者夫衆生所以久流轉生死者皆由著欲故也若欲止於心即無復生死既無生死潜神𤣥黙與虚空合其徳是名涅槃矣既曰涅槃復何容有名於其間哉斯乃窮㣲言之美極象外之談者也自非道叅文殊徳侔慈氏孰能宣揚𤣥道為法城壍使夫大教巻而復舒幽㫖淪而更顯尋玩殷勤不能暫捨欣悟交懐手舞弗暇豈直當時之勝軌方乃累刼之津梁矣然聖㫖淵𤣥理㣲言約可以匠彼先進拯拔髙士懼言題之流或未盡上意庶擬孔易十翼之作豈貪豐文圖以𢎞顯幽㫖輒作涅槃無名論論有九折十演博採衆經託證成喻以仰述陛下無名之致豈曰闗詣神心窮究逺當聊以擬議𤣥門班喻學徒耳論末章云諸家通第一義諦皆云廓然空寂無有聖人吾常以為太甚逕庭不近人情若無聖人知無者誰實如明詔實如明詔夫道恍惚窅𡨕其中有精若無聖人誰與道游頃諸學徒莫不躊躇道門快快此㫖懐疑終日莫之能正幸遭髙判宗徒㦎然扣闗之儔蔚登𤣥室真可謂法輪再轉於閻浮道光重映於千載者矣今演論之作㫖曲辨涅槃無名之體寂彼廓然排方外之談條牒如左謹以仰呈若少叅聖㫖願勅存記如其有差伏承指授僧肇言泥曰泥洹涅槃此三名前後異出盖是楚夏不同耳云涅槃音正也作作則髙僧傳作作渺漭作渺茫餘載作餘年殊致殊趣勝趣作勝致永慨作永恨九折十演作十演九折闇闇短一作昧九折十演者開宗第一無名曰經稱有餘湼槃無餘湼槃無秦言無為亦名滅度無為者取乎虚無寂寞妙絶於有為滅度者言其大患永滅超度四流斯盖是鏡像之所歸絶稱之幽宅也而曰有餘無餘者良是出處之異號應物之假名耳余嘗試言之夫涅槃之為道也寂寥虚曠不可以形名得㣲妙無相不可以有心知超羣有以幽昇量太虚而永久隨之弗得其蹤迎之㒺眺其首六趣不能攝其生力負無以化其體潢漭恍惚若存若往五目不覩其容二聴不聞其響𡨕𡨕窅窅誰見誰曉彌綸靡所不在而獨曳於有無之表然則言之者失其真知之者反其愚有之者乖其性無之者傷其軀所以釋迦掩室於摩竭浄名杜口於毘耶須菩提唱無説以顯道釋梵絶聴而雨華斯皆理為神御故口以之而黙豈曰無辯辯所不能言也經云真解脱者離於言數寂滅永安無始無終不晦不明不寒不暑湛若虚空無名無説論曰涅槃非有亦復非無言語道㫁心行處滅尋夫經論之作豈虚構哉果有其所以不有則不可得而有有其所以不無則不可得而無也何者本之有境則五隂永滅推之無鄉則幽靈不竭幽靈不竭則抱一湛然五隂永滅則萬累都捐萬累都捐故與道通洞抱一湛然故神而無功神而無功故至功常存與道通洞故沖而不改沖而不改故不可為有至功常存故不可為無然則有無絶於内稱謂淪於外視聴之所不暨四空之所昬昧恬焉而夷怕焉而泰九流於是乎交歸衆聖於是乎㝠㑹斯乃希夷之境太𤣥之鄉而欲以有無題牓標其方域而語其神道者不亦邈哉潢漭傳作眇漭以之而黙作為緘嘿無説作為證道㫁作路絶通洞並作通同恬焉作恬兮覈體第二有名曰夫名號不虛生稱謂不自起經稱有餘涅槃無餘涅槃者葢是返本之真名神道之妙稱者也請試陳之有餘者謂如來大覺始興法身初建澡八解之清流憩七覺之茂林積萬善於曠劫蕩無始之遺塵三明鏡於内神光照於外結僧那於始心終大悲於赴難仰攀𤣥根俯提弱䘮超邁三域獨蹈大方啟八正之平路坦衆庶之夷途騁六通之神驥乗五衍之安車至於出生入死與物推移道無不合徳無不施窮化母之始物極𤣥樞之妙用廓虚宇於無疆耀薩雲於幽燭将絶朕於九止永淪太虚而有餘緣不盡餘迹不泯業報猶魂聖志尚存此有餘涅槃也經云陶冶塵滓如錬真金萬累都盡而靈覺獨存無餘者謂至人教緣都訖靈照永滅廓爾無眹故曰無餘何則夫大患莫若於有身故滅身以歸無勞勤莫先於有智故絶智以淪虚然則智以形倦形以智勞輪轉脩途疲而弗已經曰智為雜毒形為桎梏淵黙以之而遼患難以之而起所以至人灰身滅智捐形絶慮内無機照之勤外息大患之本超然與羣有永分渾而與太虛同體寂焉無聞泊爾無兆㝠𡨕長往莫知所之其猶燈盡火滅膏明俱竭此無餘涅槃也經云五隂永盡譬如燈滅然則有餘可以有稱無餘可以無名無名立則宗虚者欣尚於沖黙有稱生則懐徳者彌仰於聖功斯乃典誥之所垂文先聖之所軌轍而曰有無絶於内稱謂淪於外視聴之所不暨四空之所昬昧使夫懐徳者自絶宗虛者靡託無異杜耳目於胎殻掩𤣥象於霄外而責宫商之異辨𤣥素之殊者也子徒知逺推至人於有無之表髙韻絶唱於形名之外而論㫖竟莫知所歸幽途故自薀而未顯静思幽尋寄懐無所豈所謂朗大明於𡨕室奏𤣥響於無聞者哉位體第三無名曰有餘無餘者葢是涅槃之外稱應物之假名耳而存稱謂者封名志器象者躭形名也極於題目形也盡於方圓方圓有所不寫題目有所不傳焉可以名於無名而形於無形者哉難序云有餘無餘者信是權寂致教之本意亦是如來隠顯之誠迹也但未是𤣥寂絶言之幽致又非至人環中之妙術耳子獨不聞正觀之説歟維摩詰言我觀如來無始無終六入巳過三界已出不在方不離方非為有非為無不可以識識不可以智知無言無説心行處滅以此觀者乃名正觀以他觀者非見佛也放光云佛如虚空無去無來應縁而現無有方所然則聖人之在天下也寂寞虚無無執無競導而弗先感而後應譬猶幽谷之響明鏡之像對之弗知其所以來隨之㒺識其所以往恍焉而有惚焉而亡動而逾寂隠而彌彰出幽入𡨕變化無常其為稱也因應而作顯迹為生息迹為滅生名有餘滅名無餘然則有無之稱本乎無名無名之道於何不名是以至人居方而方止圓而圓在天而天處人而人原夫能天能人者豈天人之所能哉果以非天非人故能天能人耳其為治也故應而不為因而不施因而不施故施莫之廣應而不為故為莫之大為莫之大故乃返於小成施莫之廣故乃歸乎無名經曰菩提之道不可圖度髙而無上廣不可極淵而無下深不可測大包天地細入無間故謂之道然則涅槃之道不可以有無得之明矣而惑者覩神變因謂之有見滅度便謂之無有無之境妄想之域豈足以標牓𤣥道而語聖心者哉意謂至人寂泊無兆隠顯同源存不為有亡不為無何則佛言吾無生不生雖生不生無形不形雖形不形以知存不為有經云菩薩入無盡三昧盡見過去滅度諸佛又云入於涅槃而不般涅槃以知亡不為無亡不為無雖無而有存不為有雖有而無雖有而無故所謂非有雖無而有故所謂非無然則涅槃之道果出有無之域絶言象之逕㫁矣子乃云聖人患於有身故滅身以歸無勞勤莫先於有智故絶智以淪虚無乃乖乎神極傷於𤣥㫖者也經云法身無象應物而形般若無知對縁而照萬機頓起而不撓其神千難殊對而不干其慮動若行雲止猶谷神豈有心於彼此情係於動静者乎既無心於動静亦無象於去來去來不以象故無器而不形動静不以心故無感而不應然則心生於有心象出於有象象非我出故金石流而不燋心非我生故日用而不動紜紜自彼於我何為所以智周萬物而不勞形充八極而無患益不可盈損不可虧寧復痾癘中逵夀極雙樹靈竭天棺體盡焚燎者哉而惑者居見聞之境尋殊應之迹秉執規矩而擬大方欲以智勞至人形患大聖謂捨有入無因以名之豈謂採㣲言於聴表拔𤣥根於虚壌者哉徵出第四有名曰夫渾元剖判萬有叅分有既有矣不得不無無不自無必因於有所以髙下相傾有無相生此乃自然之數數極於是以此而觀化母所育理無幽顯恢恑憰怪無非有也有化而無無非無也然則有無之境理無不統經云有無二法攝一切法又稱三無為者虚空數縁盡非數縁盡數縁盡者則涅槃也而論云有無之表别有妙道妙於有無謂之涅槃請覈妙道之本果若有也雖妙非無雖妙非無即入有境果若無也無即無差無而無差即入無境總而括之即而究之無有異有而非無無有異無而非有者明矣而曰有無之外别有妙道非有非無謂之涅槃吾聞其語未即於心也超境第五無名曰有無之數誠以法無不該理無不統然其所統俗諦而已經曰真諦何耶涅槃道是俗諦何耶有無法是何則有者有於無無者無於有有無所以稱有無有所以稱無然則有生於無無生於有離有無無離無無有有無相生具有髙下相傾有髙必有下有下必有髙矣然則有無雖殊俱未免於有也此乃言象之所以形是非之所以生豈足以統夫幽極而擬夫神道者乎是以論稱出有無者良以有無之數止乎六境之内六境之内非涅槃之宅故借出以祛之庶悕道之流髣髴幽途託情絶域得意忘言體其非有非無豈曰有無之外别有一有而可稱哉經曰三無為者盖是羣生紛繞生乎篤患篤患之尤莫先於有絶有之稱莫先於無故借無以明其非有明其非有非謂無也搜𤣥第六有名曰論㫖云涅槃既不出有無又不在有無不在有無則不可於有無得之矣不出有無則不可離有無求之矣求之無所便應都無然復不無其道其道不無則幽途可尋所以千聖同轍未嘗虚返者也其道既存而曰不出不在必有異㫖可得聞乎玅存第七無名曰夫言由名起名以相生相因可相無相無名無名無説無説無聞經曰涅槃非法非非法無聞無説非心所知吾何敢言之而子欲聞之耶雖然善吉有言衆人若能以無心而受無聴無聴者吾當以無言言之庶述其言亦可以言淨名曰不離煩惱而得涅槃天女曰不出魔界而入佛界然則𤣥道在於妙悟妙悟在於即真即真則有無齊觀齊觀則彼已莫二所以天地與我同根萬物與我一體同我則非復有無異我則乖於㑹通所以不出不在而道存乎其間矣何則夫至人虚心𡨕照理無不統懐六合於胷中而靈鑒有餘鏡萬有於方寸而其神常虚至能拔𤣥根於未始即羣動以静心恬淡淵默妙契自然所以處有不有居無不無居無不無故不無於無處有不有故不有於有故能不出有無而不在有無者也然則法無有無之相聖無有無之知聖無有無之知則無心於内法無有無之相則無數於外於外無數於内無心彼此寂滅物我㝠一怕爾無朕乃曰涅槃涅槃若此圖度絶矣豈容可責之於有無之内又可徵之於有無之外耶難差第八有名曰涅槃既絶圖度之域則超六境之外不出不在而𤣥道獨存斯則窮理盡性究竟之道妙一無差理其然矣而放光云三乗之道皆因無為而有差别佛言我昔為菩薩時名曰儒童於然燈佛所已入涅槃儒童菩薩時於七住初獲無生忍進修三位若涅槃一也則不應有三如其有三則非究竟究竟之道而有升降之殊衆經異説何以取中耶辨差第九無名曰然究竟之道理無差也法華經云第一大道無有兩正吾以方便為怠慢者於一乗道分别説三三車出火宅即其事也以俱出生死故同稱無為所乗不一故有三名統其㑹歸一而巳矣而難云三乗之道皆因無為而有差别此以人三三於無為非無為有三也故放光云涅槃有差别耶答曰無差别但如來結習都盡聲聞結習不盡耳請以近喻以況逺㫖如人斬木去尺無尺去寸無寸修短在於尺寸不在無也夫以羣生萬端識根不一智鑒有淺深徳行有厚薄所以俱之彼岸而升降不同彼岸豈異異自我耳然則衆經殊辯其致不乖責異第十有名曰俱出火宅則無患一也同出生死則無為一也而云彼岸無異異自我耳彼岸則無為岸也我則體無為者也請問我與無為為一為異若我即無為無為亦即我不得言無為無異異自我也若我異無為我則非無為無為自無為我自常有為㝠㑹之致又滯而不通然則我與無為一亦無三異亦無三三乗之名何由而生也會異第十一無名曰夫止此而此適彼而彼所以同於得者得亦得之同於失者失亦失之我適無為我即無為無為雖一何乖不一耶譬猶三鳥出網同適無患之域無患雖同而鳥鳥各異不可以鳥鳥各異謂無患亦異又不可以無患既一而一於衆鳥也然則鳥即無患無患即鳥無患豈異異自鳥耳如是三乗衆生俱越妄想之樊同適無為之境無為雖同而乗乗各異不可以乗乗各異謂無為亦異又不可以無為既一而一於三乗也然則我即無為無為即我無為豈異異自我耳所以無患雖同而升虚有逺近無為雖一而幽鑒有淺深無為即乗也乗即無為也此非我異無為以未盡無為故有三耳詰漸第十二有名曰萬累兹彰本於妄想妄想既袪則萬累都息二乗得盡智菩薩得無生智是時妄想都盡結縛永除結縛既除則心無為心既無為理無餘翳經曰是諸聖智不相違背不出不在其寶俱空又曰無為大道平等不二既曰無二則不容異二不體則已體應窮㣲而曰體而未盡是所未悟也異二一作心異明漸第十三無名曰無為無二則已然矣結是重惑而可謂頓盡亦所未喻經曰三箭中的三獸渡河中渡無異而有淺深之殊者為力不同故也三乗衆生俱濟縁起之津同鑒四諦之的絶偽即真同升無為然則所乗不一者亦以智力不同故也夫羣有雖衆然其量有涯正使智猶身子辯若滿願窮才極慮莫窺其畔況乎虚無之數重𤣥之域其道無涯欲之頓盡也書不云乎為學者日益為道者日損為道者為於無為者也為於無為而日日損此豈頓得之為要損之又損之以至於無損耳經喻螢日智用可知矣譏動第十四有名曰經稱法身已上入無為境心不可以智知形不可以象測體絶隂入心智寂滅而復云進脩三位積徳彌廣夫進脩本於好尚積徳生於涉求好尚則取捨情現涉求則損益交陳既以取捨為心損益為體而曰體絶隂入心智寂滅此文乖致殊而㑹之一人無異指南為北以曉迷夫動寂第十五無名曰經稱聖人無為而無所不為無為故雖動而常寂無所不為故雖寂而常動雖寂而常動故物莫能一雖動而常寂故物莫能二物莫能二故逾動逾寂物莫能一故逾寂逾動所以為即無為無為即為動寂雖殊而莫之可異也道行云心亦不有亦不無不有者不若有心之有不無者不若無心之無何者有心則衆庶是也無心則太虚是也衆庶止於妄想太虚絶於靈照豈可止於妄想絶於靈照標其神道而語聖心者乎是以聖心不有不可謂之無聖心不無不可謂之有不有故心想都滅不無故理無不契理無不契故萬徳斯𢎞心想都滅故功成非我所以應化無方未嘗有為寂然不動未嘗不為經云心無所行無所不行信矣儒童曰昔我於無數劫以國財身命施人無數以妄想心施非為施也今以無生心五華施佛始名施耳又空行菩薩入空解脱門方言今是行時非為證時然則心彌虚行彌廣終日行不乖於無行者也是以賢劫稱無捨之檀成具美不為之為禪典唱無縁之慈思益演不知之知聖㫖虚𤣥殊文同辨豈可以有為便有為無為便無為哉菩薩住盡不盡平等法門不盡有為不住無為即其事也而以南北為喻殊非領㑹之唱窮源第十六有名曰非衆生無以御三乗非三乗無以成涅槃然必先有衆生後有涅槃是則涅槃有始有始必有終而經云涅槃無始無終湛若虚空則涅槃先有非復學而後成者也通古第十七無名曰夫至人空洞無象而萬物無非我造㑹萬物以成已者其唯聖人乎何則非理不聖非聖不理理而為聖者聖不異理也故天帝曰般若當於何求善吉曰般若不可於色中求亦不離色中求又曰見緣起為見法見法為見佛斯則物我不異之効也所以至人戢𤣥機於未兆藏㝠運於即化總六合以鏡心一去來以成體古今通終始同窮本極末莫之與二浩然太均乃曰涅槃經曰不離諸法而得涅槃又云諸法無邉故菩薩無邉以知涅槃之道存乎妙契妙契之致本乎㝠一然則物不異我我不異物物我𤣥㑹歸乎無極進之弗先退之弗後豈容終始於其間哉天女曰耆年解脱亦何如久考得第十八有名曰經云衆生之性極於五隂之内又云得涅槃者五隂都盡譬猶燈滅然則衆生之性頓盡於五隂之内涅槃之道獨建於三有之外邈然殊域非復衆生得涅槃也果若有得則衆生之性不止於五隂必若止於五隂則五隂不都盡五隂若都盡誰復得涅槃者也𤣥得第十九無名曰夫真由離起偽因著生著故有得離故無名是以則真者同真法偽者同偽子以有得為得故求於有得耳吾以無得為得故得在於無得也且談論之作必先定其本既論涅槃不可離涅槃而語涅槃也若即涅槃以興言誰獨非涅槃而欲得之耶何者夫涅槃之道妙盡常數融冶二儀滌蕩萬有均天人同一異内視不已見返聴不我聞未嘗有得未嘗無得經曰涅槃非衆生亦不異衆生維摩詰言若彌勒得滅度者一切衆生亦當滅度所以者何一切衆生本性常滅不復更滅此名滅度在於無滅者也然則衆生非衆生誰為得之者涅槃非涅槃誰為可得者放光云菩提從有得耶答曰不也從無得耶答曰不也從有無得耶答曰不也離有無得耶答曰不也然則都無得耶答曰不也是義云何答曰無所得故為得也是故得無所得也無所得謂之得者誰獨不然耶然則𤣥道在於絶域故不得以得之妙智存乎物外故不知以知之大象隠於無形故不見以見之大音匿於希聲故不聞以聞之故能囊括終古導達羣方亭毒蒼生疎而不漏汪哉洋哉何莫由之哉故梵志曰吾聞𢎞道厥義𢎞深汪洋無涯靡不成就靡不度生然則三乗之路開真偽之途辨賢聖之道存無名之志顯矣百論序百論者盖是通聖心之津塗開真諦之要論也佛泥洹後八百餘年有出家大士厥名提婆𤣥心獨悟俊氣髙朗道映當時神超世表故能闢三藏之重闗坦十二之幽路擅歩迦夷為法城塹于時外道紛然異端競起邪辯逼真殆亂正道乃仰慨聖教之凌遲俯悼羣迷之縱惑将逺拯沈淪故作斯論所以防正閑邪大明於宗極者矣是以正化以之而隆邪道以之而替非夫領括衆妙孰能若斯論有百偈故以百為名理致淵𤣥統羣籍之要文㫖婉約窮制作之美然至趣幽簡尠得其門有婆藪開士者明慧内融妙思奇拔逺契𤣥蹤為之訓釋使沉隠之義彰於㣲翰諷味宣流被於來葉文藻煥然宗塗易曉其為論也言而無當破而無執儻然靡據而事不失真蕭焉無寄而理自𤣥㑹返本之道著乎兹矣有天竺沙門鳩摩羅什器量淵𢎞俊神超邈鑚仰累年轉不可測常味詠斯論以為心要先雖親譯而方言未融致令思尋者躊躇於謬文標位者乖迕於歸致大秦司𨽻校尉安城矦姚嵩風韻清舒沖心簡勝博涉内外理思兼通少好大道長而彌篤雖復形羇時務而法言不輟每撫兹文所慨良多以𢎞始六年嵗次夀星集理味沙門與什考校正本陶練覆疏務存論㫖使質而不野簡而必詣宗致劃尒無間然矣論凡二十品品各有五偈後十品其人以為無益此土故闕而不傳冀曉識君子詳而覽焉出三藏記集作大藏守字函劃盡梵網經序夫梵網經者葢是萬法之𤣥宗衆經之要㫖大聖開物之真模行者階道之正路是以如來權教雖復無量所言要趣莫不以此為指南之説是以秦主識達圜中神凝紛表雖威綸四海而沾想虚𤣥雖風偃八荒而静慮塵外故𢎞始三年淳風東扇於是詔天竺法師鳩摩羅什在長安草堂寺及義學沙門三千餘僧手執梵文口翻解釋五十餘部唯梵網經一百二十巻六十一品其中菩薩心地品第十専明菩薩行地是時道融道影三百人等即受菩薩戒人各從此品以為心首師徒義合敬寫一品八十一部流通於世欲使仰希菩提者追蹤以悟理故冀於後代同聞焉大藏攝字函維摩詰經序維摩詰不思議經者葢是窮㣲盡化妙絶之稱也其㫖淵𤣥非言像所測道越三空非二乗所議超羣數之表絶有心之境渺漭無為而無不為㒺知所以然而能然者不思議也何則夫聖智無知而萬品俱照法身無像而殊形並應至韻無言而𤣥籍彌布㝠權無謀而動與事㑹故能統濟羣方開物成務利見天下於我無為而惑者覩感照因謂之智觀應形則謂之身覿𤣥籍便謂之言見變動乃謂之權夫道之極者豈可以形言權智而語其神域哉然羣生長寝非言莫曉道不孤運𢎞之由人是以如來命文殊於異方召維摩於他土爰集毗耶共𢎞斯道此經所明統萬行則以權智為主樹徳本則以六度為根濟䝉惑則以慈悲為首語宗極則以不二為言凡此衆説皆不思議之本也至若借座燈王請飯香土手接大千室包乾像不思議之迹也然幽闗難啟聖應不同非本無以垂迹非迹無以顯本本迹雖殊而不思議一也故命侍者標以為名焉大秦天王俊神超世𤣥心獨悟𢎞至治於萬機之上揚道化於千載之下毎尋翫兹典以為栖神之宅而恨支竺所出理滯於文常懼𤣥宗墜於譯人北天之運運通有在也以𢎞始八年嵗次鶉火命大將軍常山公左將軍安城矦與義學沙門千二百人於常安大寺請羅什法師重譯正本什以髙世之量𡨕心真境既盡寰中又善方言時手執梵文口自宣譯道俗䖍䖍一言三復陶冶精求務存聖意其文約而詣其㫖婉而彰㣲逺之言於兹顯然余以闇短時豫聴次雖思乏參𤣥然庶得文意輙順所聞而為注解略記成言述而無作庶将來君子異世同聞焉出三藏記集函大藏務字長阿含經序夫宗極絶於稱謂賢聖以之沖黙𤣥㫖非言不傳釋迦所以致教是以如來出世大教有三約身口則防之以禁律明善惡則𨗳之以契經演幽㣲則辯之以法相然則三藏之作也本於殊應㑹之有宗則異途同趣矣禁律律藏也四分十誦法相阿毗曇藏也四分五誦契經四阿含藏也増一阿含四分八誦中阿含四分五誦雜阿含四分十誦此長阿含四分四誦合三十經以為一部阿含秦言法歸法歸者盖是萬善之淵府總持之林苑其為典也淵博𢎞富溫而彌曠明宣禍福賢愚之迹剖判真偽異濟之原歴記古今成敗之數墟域二儀品物之倫道無不由法無不在譬彼巨海百川所歸故以法歸為名開㭊修途所記長逺故以長為目翫兹典者長迷頓曉邪正難辨顯如畫夜報應𡨕昧照若影響劫數雖遼近猶朝夕六合雖曠現若目前斯可謂朗大明於幽室恵五目於衆瞽不闚五牖而智無不周矣大秦天王滌除𤣥覽髙韻獨邁恬智交養道世俱濟每懼㣲言翳於殊俗以右将軍使者司𨽻校尉晉公姚爽質直清柔𤣥心超詣尊尚大法妙悟自然上特留懐每任以法事以𢎞始十二年歲在上章掩茂於長安中寺集名徳沙門五百人請罽賔三藏沙門佛陀耶舎出律藏四分四十巻十四年訖十五年歲在昭陽奮若出此長阿含訖涼州沙門佛念為譯秦國道士道含筆受時集京夏名勝沙門於第校定恭承法言敬受無差蠲華崇朴務存聖㫖余以嘉遇猥㕘聴次雖無翼善之功而預親承之末故略記時事以示來覽焉出三藏記集大藏克字函㕘校鳩摩羅什法師誄并序夫道不自𢎞𢎞必由人俗不自覺覺必待匠待匠故世有髙悟之期由人故道有小成之運運在小成則靈津輟流期在髙悟則𤣥鋒可詣然能仁曠世期将千載時師邪心是非競起故使靈規潜逝徽緒殆亂爰有什法師者盖先覺之遺嗣也凝思大方馳懐髙觀審釋道之陵遲悼蒼生之窮藹故乃奮迅神儀寓形季俗繼承洪緒為時城塹世之安寝則覺以大音時将晝昬乃朗以慧日思結頽綱於道消緝落緒於窮運故乗時以㑹錯枉以正一扣則時無互鄉再擊則畏壘歸仁於斯時也羊鹿之駕摧輪六師之車覆轍二想之𤣥既明一乗之奥亦顯是以端坐嶺東響馳八極恬愉𢎞訓而九流思順故大秦苻姚二大王師旅以延之斯仁王也心遊大覺之門形鎮萬化之上外揚羲和之風内盛𢎞法之術道契神交屈為形授公以宗匠不重則其道不尊故蘊懐神寶感而後動自公形應秦川若燭龍之曜神光恢廓大宗若曦和之出榑桑融冶常道盡重𤣥之妙閒邪悟俗窮名教之美言既適時理有圓㑹故辯不徒興道不虚唱斯乃法鼓重震於閻浮梵輪再轉於天北矣自非位超脩成體精百練行藏應時其孰契於兹乎以要言之其為𢎞也隆於春陽其除患也厲於秋霜故巍巍乎蕩蕩乎無邊之髙韻然隘運幽興若人云暮癸丑之年年七十四月十三日薨于大寺嗚呼哀哉道匠西傾靈軸東摧朝曦落曜寶岳崩頽六合晝昬迷駕九迴神闗重閉三途競開夜光可惜盲子可哀㒺極之感人百其懷乃為誄曰先覺登遐靈風緬邈通仙潜凝應真沖漠叢叢九流是非競作悠悠盲子神根沈溺時無指南誰識𡨕度大人逺覺幽懐獨悟恬沖静黙抱此𤣥素應期乗運翔翼天路既曰應運宜當時望受生乘利形標奇相襁褓俊逺髫齓逸量思不再經悟不待匠投足八道遊神三向𤣥根挺秀宏音逺唱又以抗節忽棄榮俗從容道門尊尚素朴有典斯尋有妙斯録𢎞無自替宗無擬族霜結如冰神安如岳外跡彌髙内朗彌足恢恢髙韻可模可因愔愔沖懐惟妙惟真静以通𤣥動以應人言為世寶黙為時珍華風既立二教亦賔誰謂道消𤣥化方新自公之覺道無不𢎞靈風遐扇逸響髙騰廓之大方然斯慧燈道音始唱俗網以崩癡根彌拔上善彌増人之寓俗其途無方統斯羣有紐兹頽綱順以四恩降以慧霜如彼維摩迹㕘城坊形雖圓應神沖帝鄉來教雖妙何足以臧偉哉大人振隆圓徳標此名相顯彼沖黙通以衆妙約以𤣥則方隆般若以應天北如何運邅幽里𡨕剋天路誰通三途誰塞嗚呼哀哉至人無為而無不為擁網遐籠長羅逺羈純恩下釣客旅上摛恂恂善誘肅肅風馳道能易俗化能時移柰何昊天摧此靈規至真既往一道莫施天人哀泣悲慟靈祗嗚呼哀哉公之云亡時唯百六道匠韜斤梵輪摧軸朝陽頽景瓊岳顛覆宇宙晝昬時喪道目哀哀蒼生誰撫誰育普天悲感我増摧衂嗚呼哀哉昔吾一時曾遊仁川遵其餘波纂承虚𤣥用之無窮鑚之彌堅躍日絶塵思加數年㣲情末叙已隨化遷如可贖兮貿之以千時無可待命無可延惟身惟人靡慿靡緣馳懐㒺極情悲昊天嗚呼哀哉廣𢎞明集釋文紀巻十
