body:
  text: 釋文紀巻四十明梅鼎祚輯隋三蔡徴字希祥初名覽仕陳入隋厯儀曹郎給事與智顗書自江東披破弟子前預送京不獲䖍禮于兹五載丹誠懇結豈筆札所宣山川永逺無因諮述邃師奉命爰到闕廷天子降情君主殊遇新故崇待南北傾心可謂使乎使乎仲尼是以興歎仰陳勝託有慰延欽天高氣清願道體康悆棲眞千仞寂慮四禪梁穗煙雲餐悅法喜固非世俗之徒所能稱讚徴年衰事迫可以意求弟姪兒孫隨時過日撫塵擊壤用畢餘齡既逹於窮通之數亦不常以賤貧自恥但覲奉翛然實增馳欷伏願珍重繼復下承脱値行人賜訪存没開皇十三年九月十七日前陳侍中安右將軍中書令領軍將軍南雍州大中正新豐縣開國侯弟子濟陽蔡徴稽首和南皇甫毗當陽縣令玉泉寺碑葢聞乾元資始三辰著象于天坤道資生萬物動形于地皇王於是建國賢聖所以垂文起名教而莫同制威儀而有别至如畫卦觀爻葢取隨時之象綜經織緯㑹通爲政之辭大禮同和大樂同節安上治民移風易俗斯生前之事略矣可言死後問知仲尼弗語縱使絳雪縈空𤣥霜拂樹餌金丹而九轉呑玉髓而千年乘雲也駕九色之𤣥龍游漢焉控三山之素鵠逍遙瑀臺之上容與琳闕之間未窺解脫之門終趣葢纒之境唯正覺淵沖眞如妙有不生不滅無相無言隨緣應質則假色成形隨類觀音則因聲示說故有白銀千尺之體紫金丈六之身八部般若之文四種悉檀之義神通自在慧力無窮因導化行開示悟入歸依者盡發菩提迴向焉普登常樂是以獼猴建塔遂生忉利之天野鴈銜華復徃彌陁之國豈直日藏沙門孤游正道月光童子獨見如來四生因兹度脫六道藉此昭蘇實火宅之高車昬河之大筏若乃周室昭王之世影奪恒星漢朝明帝之時光夢如日使旋西㝢化漸東都置像南宫申心北面自摩騰入洛羅什游秦名教更𢎞道風斯熾經臺像閣寶塔香山麗溢巖阿綺盈都邑豈期後魏眞君之歲後周建徳之年靈廟一除伽藍再滅形容廢毁文字散遺響落瓊鐘聲沉寶鐸修禪耆舊巻其舌而不談護戒先賢改其形而晦影世絶調心之路時虧汲引之途無出世之津梁失生民之大望我大隋皇帝乘乾御宇握鏡披圖父愛蒼生君臨赤縣天地同其大徳日月合其重光鼓之以雷霆潤之以風雨除暴亂致太平張四維朝萬國功成作樂治定制禮正道無爲區寰有截闢泥洹之路開般若之門宣十二分之經流四千年之法精勤耆舊捨俗歸僧淨住初童持心秉戒非直法輪再轉法鼓還鳴四海於是無虞兆民因而有頼委羽乘毛之國慕風化以來庭靈禽嘉貺之祥應圖書而萃苑巍巍也非境智之思量蕩蕩乎豈言談而能盡玉泉寺者基此山焉智顗禪師之卜居也勅旨正名著額其山㟴崿嵯峨崎嶇崱嶷峯疑偃葢巒似覆船巨力窮竒之象洪崖譎詭之形崗曲抱而成垣水縈迴而結乳青楓動葉逺照金霞翠栁搖枝低臨玉沼猨吟白雲之上鸎啼碧樹之間日月爲之蔽虧霄液由之散聚前瞻江路卻望荆岑左帶昭丘右通巴峽禪師本姓陳氏潁川人也少稟生知童眞剃落從師南嶽蘊道天台睿智洪才之響非直播於江南知機妙辯之聲固亦聞於河朔皇帝外子太尉公晉王性稟孝慈情包隠惻能臣能子匡國匡家蘊機神之智垂汎愛之心布君子之風偃生民之草徃以僞陳納叛受律行師策妙指縱威稜江海遂剋定金陵化平銅柱三呉霧巻百越塵清師乃因王利涉王遂因師受戒師至此而頭陁王奏聞而起寺於是異域才情之客慕其道而雲臻他鄉鍊行之僧味其風而雨集師乃精言導理盡意談𤣥語證禪支心開定本幽宗博義若挹海而無窮辯句清辭似懸河而自㵼居朋之友雖盈量而爭歸處少之徒從窮崖而莫反爾乃信心檀越積善通人咸施一材俱投一瓦憑兹衆力事若神功營之不日而成飾矣經時而就層臺迥閣複殿連房寒暑異形陰陽殊制雕簷繡栱與危岫而爭高鑿礎鑴基共磐巖而等固風光出其戶牖雲霧生其棟梁華炫燿於金盤氣芬芳於玉樹工圖相好湛若金山匠冩眞容凝如滿月殿起三層之柱懸於自響之鐘堂開千葉之華蓮捧飛來之座燈光不滅灌海踰明刹柱俱低承幡自舉吉祥柔滑之草爛熳依庭逆風和氣之香氛氳滿院斜通洞穴直注凝泉色似琉璃味同甘露波投鼐鼎浪㵼階堂飲腹消痾澆軀愈疾石柱銅梁之狀影入蓮池桃源菊浦之華香浮奈苑可謂山類耆闍寺同離越似龍宫而出現疑鹿野以飛來竊以前王鑿鼎唯論體國之功今共刋碑永記菩提之道余任宰屬城寺居山部文雖冩意書不盡言其詞曰二儀開廓四氣氛氳方以類聚物以羣分通賢通聖明后明君隨機設教觀化垂文樂章既造禮儀方制定彼親疎決兹疑滯披圖辯物屬辭明例唯化一生不論三世𤣥都玉簡紫闕銀經解尸遺骨飲液吞精乘龍萬紀控鵠千齡終非實相猶是塵情唯有大雄湛然常住不生不滅無來無去千門妙旨一音演諭度脱衆生湼槃雙樹夢通劉后感應姬王恒星掩耀滿月澄光冩形東國指聖西方慈悲願海善逝津梁法顯還晉摩騰入洛華散經臺香流像閣釋教鬱起桑門盛作露泫珠幡風吟寶鐸眞君建徳運鍾滅道淪没四生毁除三寶我皇啓聖徳侔蒼昊妙法更𢎞眞儀再造陳氏僭號王赫斯征勾呉霧巻閩越廓清因逢智者延謁山庭珠生浮漢玉出深荆華峯峍屹石洞淵懸芬芳菊浦滴瀝瓊泉盤濄似谷覆嶺疑船來儀宴坐觸地蕭然妙辯悉檀深窮般若緇素雲㑹挹其河㵼或施之材或投之瓦經始不日翻成大厦更起龍宫還開鹿野山連紫葢江抱黄牛西臨月峽東接昭丘栴檀圍繞琳碧環周春牕夏牖水殿山樓座吐芙蓉龕懸石鏡白毫相好紺髮輝映銀鷰徘徊錦鱗游泳騰猴心靜怖鴿影定猗歟哲王命也蕃屏自天生徳孝誠俱秉旦奭非儔間平詎並出總連轡入調鐘鼎搆此伽藍實資力請魔殿􅑬嵼須彌鬱律倐覩劫終俄看燒訖豈如彼岸生死皆出金石不朽天地可畢鑴勒巖阿永垂懋實盤濄南藏作盤渦柳顧言本名䛒以字行河東人徙襄陽厯拜祕書監報智顗書晉王重乞稟受禪法師爲著淨名義疏初巻顧言與徐陵奉酬文義後智者續成𤣥義十巻顧言報之弟子柳正善具成就稽首和南暄和不審尊體起居何如伏願禪法喜悅去歲經䝉一旨至今保持奉賫十巻𤣥義徃仁壽宫服讀八徧麄疑略盡細闇難除新治六巻并入文八軸爲莊染未竟少日鑽研大王今遣使人蕭通國叅承書意自當仰簡頻被顧問奉答必來伏願夏竟便待舟檝冀此殘生盡心聽受懴悔徃日懈惰昬沉謹啓天台國清寺智者禪師碑文臣聞在天成象經緯之法存焉在地成形區方之均傚矣二儀既爾三才冏然上聖纘極明王所以敷教先覺授道契㑹方乃昇仙是故命駕崆峒紆光善巻籙圖宣業赤誦𢎞風練質九府之間騰虛六合之内斯並權宜汲引暫保逍遙終覆蔽於苦空卒邅迴於生死未臻夫不生不滅無去無來匪實匪虛非如非異常樂我淨凝寂恬愉不可思議之解脫也粤若我大隋皇帝法諱總持載融佛日瑞發淨宫利見法王應閻浮主以封唐入紹業繼高辛立聖與能祚隆姬發自天攸縱包大徳而翼小心希世膺期内文明而外柔順知微知彰鑑窮𤣥覽廼武廼文能事斯畢自永嘉失馭海内分崩恃險擅强各樹君長禮樂淪於非所龜玉毁於殊方書軌競分殆三十紀天將悔禍稔惡有辰皇上道藹汾陽迹光代邸地隆分陜神功潛著于時高廟靈謨深思統壹專征仗鉞帝曰斯哉惟君惟親知臣知子乃揚威萬里問罪九伐一舉而定江左再駕而熸餘燼浮天爭貢海外有截雖咎卨之備五臣周旦之居十亂本支盛績疇昔多慙磐石究勳莫不倣是三能宗鉉九命惟揚本之以仁慈施之以聲教行之以要道體之以無爲姑射杳然尚想淵賾滄波壯矣思濟舟航以爲能仁種覺降兹忍土信相入道淨戒居先梵網明文深傳薩埵國師僧寶必兼禪慧有會稽天台山大禪師者生而神光照室兩目重瞳禪師法諱智顗潁川陳族太丘道逺季伯風延典午衰亂播遷華容父起祖梁使持節散騎常侍封益陽縣開國侯禪師風彩超悟齠齓希有年過少學便誦法華父爲求㛰方便祈止儒門史舘多所著明柱下濠上彌所深得渚宫覆没便即蔬菲及啓弱冠於長沙之果願寺出家護戒如明珠安心若止水厯聽經論但使一聞得之於心傳之於口以湘潭局狹未發大機拂跡衡陽安步墳汝徃大蘇山請業慧思禪師禪師見便歎曰憶昔靈鷲同聽法華令進我普賢道場爲說四安樂行停二七日誦藥王品至諸佛同讚之句寂然入定明慧便發起而白師師曰非爾弗感非我莫識所入定者法華三昧之前方便及聞持陁羅尼也縱令文字之師千羣億品尋汝慧辯所不能窮於說法人中最爲第一嘗約仁王纓絡龍樹馬鳴立三觀四教述師本宗以爲大乘樞鍵得下御内碩學流通智以藏徃徴育王之建正教神以知來鑑周武之滅大法乃高蹈豫土翔集天台厯遊名山言造廬嶽秦孝王作鎭淮海遣信迎屈對使者曰雖欲相見終恐緣差即累旬大風妖賊競起水陸俱阻安坐匡岫既而龍斿龕難仍代孝王爰届邦域潔誠延請順流背風數日遄到亦既覯止便定師資等善意之仰妙光若高宗之得傅説再三固辭無可與讓以開皇十一年歲次辛亥月旅黄鍾二十三日辛丑於揚州大聽寺設無礙大齋夤受菩薩戒法降牧伯之尊由宗師之典釋龍衮而披忍服去桓珪而傳戒香圓發初心致禮諸佛於時天地交泰日月載華庭轉和風空浮休氣林明七覺之華池皦八淨之水化覃内外事等阿輸之城教轉法輪理符寶㝠之窟文武寮寀俱廕慈雲欣欣焉濟濟焉肅肅焉廱廱焉經所謂攝律儀戒攝善法戒攝衆生戒顯發三願眞正十受如一切色悉入空界者其斯之謂歟法事云畢七珍備捨出居于城外禪衆之精林四事供養睿情猶疑未滿以爲師氏禮極必有嘉名如伊尹之曰阿衡呂望之稱尚父檢地持經智者師目謹依金口䖍表玉裕便克良辰躬出頂禮雖有熊之登具茨漢文之適河上方之蔑如也智者以内行外奬諸佛之深訓實慧方便大士之兼通帝釋檀那既包信解仁王攝受逺能博益逡廵告退言歸舊山殷勤請留重違高意猶四皓之餌术南山二疏之散金東海振錫離塵始稱出世睠言儒者未足爲榮竊以四明天台剡東之玉岫兩謠雲􅢐鄞南之金庭峻極于天仰捫白日盤鎭于地俯鏡滄海雲霞沆瀣霏拂輕襟虹霓鵷鸞勝承飛舄華果競發常迷四時藥草森羅孰分億品道猷徃而證果興公賦不能申寺基本屬始豐峯名佛隴元有定光禪師隱顯變現先居此峯常謂弟子云不久當有勝善知識將領徒衆俱集此山俄而智者越江渡湖翻然來萃忽聞鐘磬聲振山谷即問光師聲之所以答云此是犍槌集僧得住之相頗憶曾經舉手相引時不智者即悟年至十五稽顙禮佛恍焉如夢見極高山臨大海曲有僧如今光師舉手接上云汝當居此處汝當終此焉拜言悲喜滂沱涕泗仍於佛隴之南尋行寺域便見五峯圍遶等耆闍之山兩溪夾㵼若縉雲之澗披榛開途葺用茆茨功徳叢林常熏薝蔔忍辱牆院無勞關楗猨嘯蚿吟泉籟響襍飛走聽法馴伏軒墀西南有永豐江泒與淛源分嶺東㑹于海潮波徃還數百里間村人常以漁捕爲業陶漸廻向焚罛廢梁墾田種果翻成富實深信解者多作沙門慈化所覃皆此連類及光師無常巳後欲大修立忽覩一僧如光師年素語智者云若欲造寺今未是時三國成一有大勢力人能爲起寺寺若成國即清當呼爲國清寺此言杳漫孰當信者豈期符應㝠契在兹逮于我君臨邊歲久孝性淳至入京省謁旋邁江都登命舟檝迎來鎭所使乎至彼便事裝束謂大衆曰在上意重弗敢致辭然徃而不返因此長别語弟子云當成就隴南下寺其堂殿基址一依我圖侍者答云若無師在豈能成辦重謂之曰當有皇太子爲我建造汝等見之吾不見也行百餘里到剡東之石城寺寺有百尺金繢石像梁太宰南平元襄王鑴創自有靈迹因此現疾右脇而臥忽然風雲變色松桂森聳宛如天樂來入房戶起坐合掌神色熙怡顧侍者云觀音來迎不久應去弟子智朗請曰佛許聖賢臨終説位行得乞垂曉示方思景慕答云我只是五品弟子位耳案五品即是法華三昧前方便之位宛與思師昔語㝠一仍命筆作偈口授遺書辭理切詣深陳勝緣潛來密徃誓當影護爲撰淨名義疏一部俱時送來仍索僧伽梨大衣手自披著迴身西向端坐遷神春秋六十旬日建齋跏趺流汗珠團髪際露泫胷間欲示諸法本自不生今則無滅繩牀輿還佛隴輕舉有若浮空爾時開香龕都不異昔驛使初訃震動于宸心爰捨淨財隨申功徳郵傳相望創起塔廟寺雖本地其舊維新瓊宇紺堂憑國雲而摸忉利鷲頭狼跡因寂默而爲道場班倕名匠競逞鉤綸庶民子來成之不日神明扶持歘同踊現背高就下即嶨嶽而基殿堂仰眩俯臨信玲瓏而勝畫繢多寶分座俱受瓔珞天冠表刹如連梵幢金函玉牒常敷講肆禪誦律儀無違師法斯可謂頭陁之極地彌陁之淨方與阿耨而常盈同須彌之永固暨乎重光篹厯天成地平以今大業元年九月鑾輿幸廵淮海􅀈矚江南惆悵台嶽集揚州名僧咸問之曰智者立寺權因山宜各述所懷朕當詳擇累日未奏㑹寺僧智璪銜狀而來具條昔年光師國清之稱太史案此語時代乃周建徳之初八表未同三方鼎峙今四十餘年聖證縣符明時徴應詔付著作書之左史仍勑皆籕篆題寺門即遣舍人送璪并施基業赴十一月二十四日先師忌齋使乎集僧跪開石室唯見空牀虛帳蘚苔蛛網法侶號咷等初滅度公私扼掔若無瞻依又法㑹千僧各有簿籍造齋㸃定忽盈一人有司再廵還滿千數及臨齋受嚫復成千一執事驚愕出沒難辨豈非先師化身來受國供王臣返命具奏一條當扆睟容深洞靈跡百司拜賀四海馳聲至矣哉象法未淪佛種常續廼聖幾感大師應變妙力難思神圖方永祥基瑞國襍沓葳蕤煥乎斯之盛者也昔金龍尊王讚佛功徳寶積長者獻葢稱揚范武子聲由在民臧文仲言垂不朽矧乎道樹勝由師門福地而建崇雲碣表際金剛俾命絲綸織載辭理若夫記言記事史家之成則散華貫華法藏之鴻演敢重述宣廼作頌曰龍圖畫卦裁萌五典金輪拯溺止𢎞十善豈若我皇樹功宏緬還源本淨歸途今顯鏡鑑先哲筌蹄何淺天造草昧日月斯昇高山巨海或影或澄虎嘯風起龍躍雲興至人幾漸養正遵承謙尊本裕師範推膺隻誰允矣具瞻克勝熏禪觀寂如冬靖凝精義泉涌如春泮冰我有匠石正直從繩我有津濟舟檝斯憑䖍臨拳拳悅受兢兢能資萬行混成一乘六反震動十方歎稱同聲相應信而有徴至誠感神道合符契淵乎智者波瀾靡際帝師既沃天台還憩于山之阿于川之澨滄溟浩瀚峯崖迢遞日浴扶桑月穿叢桂上踵婺采傍通禹計素湍風激赤城霞曵仁智肥遯山林虧蔽無言不酬既符聲響無徳不報有均景象初卜菴蘿歸誠戀仰顯允光師久要長徃非皦若昧鏡形如曩寺號國清靈扉潛敞孰意我師遽緣安養龍樓夙記鶴關無爽宸居在昔哀搆祗園令終如始師嚴道尊揆日方晝覘星正昬置􅈏崇趾削屢成垣巖分蓮蕚泉毖桃源仙窗夏冷禪室冬溫玉階馴豹金刹棲鵷風和寶鐸空轉珠幡百穀時秀萬果林繁靈芝禪悅甘露天罇玉趾按地淨域驚魂金布貿苑天宫儼存創造之福胡可勝原輪奐洞徹莊嚴修設波斯融冶優塡剞劂金容月滿玉毫霜潔象譯翻度龍宫披閱法嗣詵然端心障滅泰階既平王道既清殊途同致無慮何營皇思睿賾邃達忘情有本空淨空常有并壇戒度重定慧眞精乾臨朗鑑逺供憑誠大衆香灑拜闕龕楹全身座間嚴扄網縈迦葉佛隴賢劫齊聲飯僧數溢瑞我隆平身田雨潤心樹華榮現在同植將來共成有如懸鏡反照今生有如圭􅉴曾不虧盈神力自在遊戲香城菩提具足赫赫明明以上並國清百錄經緯南藏作穹蒼業繼作葉繼􅀈矚作眺矚鏡形作境形剡東下北藏闕之字王劭字君懋太原晉陽人厯祕書少監文獻皇后崩奏高祖覽之且悲且喜佛說人應生天上及上品上生無量壽國之時天佛放大光明以香花妓樂來迎之如來以明星出時入湼槃伏惟大行皇后聖徳仁慈福善禎符備諸秘記皆云是妙善菩薩臣謹案八月二十二日仁壽宫内再雨金銀之花二十三日大寶殿後夜有神光二十四日卯時永安宫北有自然種種音樂震滿虛空至夜五更中奄然如寐便即升遐與經文所說事皆符驗臣又以愚意思之皇后遷化不在仁壽大興宫者葢避至尊常居正處也在永安宫者象京師之永安門平生所出入也后升遐後二日苑内夜有鐘聲三百餘處此則生天之應顯然也隋書盧思道字子行范陽人仕齊待詔文林館厯隋散騎侍郎遼陽山寺願文齊興二十有三載區宇乂安列聖重光百神受職天平地成禮諧樂暢劒㦸亡鑄江海無波皇帝體膺上哲運鍾下武以至徳字黔首大明臨赤縣深仁俯漏惠化潛通榮鏡六幽照蘇八表唐旌巳立芻輿不逺而至殷網既開肖翹咸遂其所壇凝休氣渚幕榮光𤣥扈告符翠琰啓籙阿閣朝諠棘林夜靜西琯協律南鬯迎神衣氣操龜之俗懷音請吏反踵脩股之渠膜拜空首四海懾然中外禔福尉候無警書軌大同猶以爲負扆垂旒人世微業功成治定域中小道投心覺海束意𤣥門手執明珠頂受甘露調御天人不狥巖廊之重明行具足寧屑衮冕之尊十力四心東漸西被日月出矣風雨潤之屠門鮑肆化成嚴淨之所蜉蝣蟪蛄網於仁壽之域參墟奥壤王迹所基密都是宅别館攸在襟帶遐長原陸爽秀高巖鬱起作鎭東偏峯羅羣玉鷲頭之狀非美樹列三珠雞足之形可陋洞穴條風生和雅之曲圓珠積水流清妙之音于時玉燭調年金商在律職方具禮大駕西廵六龍齊轡七萃按部雷動雲移凝鑾佇蹕乃建仁祠于彼勝地成之不日既麗且康昔周夜初明漢池云鑿事隔荒裔道若存亡哲王馭厯𢎞濟區有前聖後聖旦暮爲期以此勝因仰爲武成皇帝及清廟聖靈願西遇彌陀上征兜率雄視三界高臨四衢百年之神俯輕羣后一音所導逺同佛日皇太后福踰姜水祉邁塗山壽比太陰業均厚載聖主齊明兩曜合徳二儀受寶錄於靈河開金簡於仙嶽龍官鳥紀未可匹其光大象天任地焉能喻其長久皇太子徳茂元良道高上嗣牢籠啓誦孕育莊丕六宫眷屬諸王昆弟皆智慧莊嚴玉華松茂永侍披香長固磐石以兹博利被於萬品當使法界虛空生靈動植俱沐定水同蔭法雲斯誓或差無取正覺從駕經大慈照寺詩序皇帝以上睿統天大明御極彈壓九代驅駕百王至徳上通深仁下漏威稜西被聲教東漸布政合宫考儀太室張樂洞野㑹計苗山天不愛寶神靡遺貺鱗羽效異山澤薦祉華裔率從幽顯咸秩八政惟序六府告平猶且棲志窅㝠凝神空寂俯陋區域顧遺形有救精民於苦器拯欲界於危城身心澄淨樂之境生靈仰調御之力中宫厚徳載物正位儷天道冠邵陵業踰㜪姒慧雲朝起四生佇其寸合慈燈夜爇九服照其餘光乃睠參墟實唯唐舊山川周衛襟帶巖坰東郊勝地爰構寶坊儼若化成瞬如踊出既而景躔西陸氣中南呂商飆振野白露威寒聖主御辯廵方順時育物六龍進駕七聖齊軫翠旗揚斾雕玉徐輪問百年而拜輦朝萬靈以按節熊渠佽飛之輩入參中壘虎殿金門之侶迥望屬車將届下都遘兹淨域兼悅鷲山之觀共喜龍宫之遊接足棲心俱展誠敬課虛引寂仍發詠歌雖事比擊轅義同叩角亦以雍容盛烈述讚休美豈若臯朔文辭甫陳男祝王谷蟲篆纔譬女工作者二十六人其詞云爾並廣𢎞明集薛道衡字𤣥卿河東汾陰人厯司隸大夫弔延法師亡書曇延法師開皇八年亡文帝輟視之朝勅王公巳下徃臨内史道衡弔八月二十三日薛道衡和南俗界無常延法師遷化情深悲怛不能己巳惟哀慕摧割當不可任法師弱齡捨俗高蹈塵表志度恢𢎞理識精悟靈臺神宇可仰而不可窺智海法源可涉而不可測同夫明鏡屢照不疲譬彼洪鐘有來斯應徃逢道喪𤣥維落紐栖志幽巖確乎不拔高位厚禮不能迴其慮嚴威峻法未足懼其心經行宴坐夷險莫二戒徳律儀始終如一聖皇啓運像法重興卓爾緇林鬱為稱首屈宸極之重伸師資之義三寶由其𢎞護二諦藉以宣揚信足以追蹤澄什超邁安逺而法柱忽傾仁舟遽没匪直悲纒四部固亦酸感一人師等杖錫挈瓶夙承訓𨗳升堂入室具體而微在三之情理有恒慟徃矣奈何無常奈何疾礙不獲展慰但深悲結謹白書慘愴不次弟子薛道衡和南廣𢎞明集緇林續高僧傳作緇衣而法柱作不意法柱佛祖統紀載云聖皇啓運像法載興卓爾緇衣鬱爲稱首屈宸極之威重申師資之禮文三寶藉之𢎞通二諦由其宣暢以誘人爲善之徳爲􅂇國行仁之方豈謂法柱忽傾慈舟遽覆匪直悲纒四衆固亦酸感一人王胄字承基琅邪臨沂人著作侍郎臥疾閩越述淨名意詩序余臥疾閩海彌留旬朔善友顒法師勸余以淨名妙典調伏身心力疾粗陳其意敬簡法師云爾廣𢎞明集張公􅭄歐陽修集古錄鄭樵金石略並作公禮歐以隋開皇六年立齊巳久滅尚稱齊官爲疑意文撰于齊碑立隋初耳隋龍藏寺碑見金薤琳瑯造金石略有公禮齊鄂國公爲國勸龍龕碑隋開皇六年略云龍藏碑五年誤竊以空王之道離諸名相大人之法非有去來斯故將喻師子明自在如無畏取譬金剛信畢竟而不毁是知湼槃路逺解脱源深隔愛慾之長河間生死之大海無船求渡既似龜毛無翅願飛還同兎角故以五通八解名教攸生二帝三乘法門斯起檢麄攝細良資汲引之風挽滿陷深雅得修行之致若論乾闥之城皆妄芭蕉之樹盡空應化詎眞權假寧實釋迦文缺一字說缺一字之缺一字須菩提豈證果之人然則習因之指安歸求道之趣奚向如幻如夢誰其受苦如影如響誰其得福是故維摩詰具諸佛智燈缺一字之坐斯來舍利弗盡其神通天女之花不去故知業行有優劣福報有輕重若至凡夫之與聖人天堂之與地獄詳其是非得失安可同日而論哉徃者四魔毁聖六師謗法拔髮翹足變缺吞麻李園之内結其惡黨竹林之下亡其善聚護戒比丘翻同雹草持律缺三字等霜蓮慧殿仙宫寂寥安在珠臺銀閣荒凉無處離離綴彩寧勞周客含含奏曲詎假殷人我大隋乘御金輪冕旒玉缺一字上應天命下順人心飛行而建鴻名揖讓而升大寶匪結農軒之陣誰狥湯武之師稱臣妾者遍於十方弗遇蚩尤之亂執玉帛者盡於萬國無陷防風之禍斯乃天啓至聖大造區域垂衣化俗負扆字民昧旦紫宫終朝青殿道高羲燧徳盛虞唐五福咸臻衆貺畢集低茆出月搖萐含風沉璧觀書龍負握河之紀功成治定神奉益地之圖於是東暨西漸南徂北邁隆禮言洽至樂云和感天地而動鬼神辨尊卑而明貴賤而尚勞巳亡倦求衣靡息豈非悠悠黔首垢障未除擾擾蒼生葢纒仍擁所以金編寶字玉牒綸言滿封盈函雲飛雨散慈愛之旨形於翰墨哀慇之情發於衿抱日月所照咸頼陶甄陰陽所生皆䝉鞠養故能津濟率土救護溥天協奬愚迷扶導聾瞽澍兹法雨使潤道牙燒此戒香令薰佛慧修第壹之果建最勝之幢拯既滅之文匡巳墜之典忍辱之鎧滿缺二字都微妙之臺充於赤縣豈直道安羅什有寄𢎞通故亦迦葉目連聖僧斯在龍藏寺者其地葢近於燕南昔伯珪取其謠言缺三字水母恤徃而得寶窺代常山世祖南旋至高邑而踐阼靈王北出登望臺而臨海青山歛霧淥水揚波路款晉而適秦途通缺而指衛缺二字之落矩步非遙平原之樓規行詎逺尋派避世彼亦何人幽閒博敞良爲福地太師上柱國大威公之世子使持節左武衛將缺一字上開府儀同三司恒州諸軍事恒州刺史鄂國公金城王孝􅀈世業重於金張器識逾於許郭軍府號爲飛將朝廷稱爲虎臣領袖諸缺一字冠冕羣俊探賾索隱應變知機著義尚訓御之懃立勲功事勞之績廊廟推其偉器柱石指其大材自馳傳莅藩建旟缺二字招懷散逸蠲復逃亡逺視廣聽賈琮之按冀部賞善戮惡徐邈之處凉州異軫齊奔古今一致下車未幾善政斯歸瞻彼伽藍非因草創每奉勑勸奬州内士庶壹萬人等共廣福田公爰啓至誠䖍心徙石施逾奉葢檀等布金竭黑水之銅罄赤㟁之玉結琉璃之寶網飭纓絡之珍臺於是靈刹霞舒寶坊雲搆崢嶸膠葛穹隆譎詭九重壹柱之殿三休七寶之宫彫梁刻桷之竒圖雲畫藻之異白銀成地有類悉覺之談黄金縷楯非關句踐之獻其内閒房靜室陰牖陽窗圓井垂蓮方疎度日曜明璫於朱戶植芳卉於紫墀地暎金沙似遊安養之國簷隱天樹疑入歡喜之園夜漏將竭聽鳴鐘於寺内曉相既分見承露於雲表缺三字坐來㑹之衆何憂缺一字然飲食持鉢之侣奚念粤以開皇六年歲次鶉火莊嚴粗就庶使皇隋寳祚與天長而地久種覺花臺將神䕶而鬼衞乃為詞曰多羅秘藏毗尼覺道斯文不滅憑於大造誰薰種智誰壞煩惱猗歟我皇實𢎞三寳慧燈翻照法炬還明菩提果植救護心生香樓並搆貝塔俱營充遍世界彌滿國城憬彼大林當途向術於穆州后仁風遐拂金粟施僧珠纓奉佛結瑤葺宇搆瓊架室鳳穴槩日虹梁入雲電飛窗戶雷驚橑棼綺籠金縷縹壁椒薰綈錦亂色丹素成文髣髴雪宫依稀月殿明室結幌幽堂啓扇缺一字虎未窺跧龍誰見帶風蕭瑟含煙葱蒨西臨天井北距五臺川谷苞異山林育材蘇秦說反樂毅奔來鄒魯媿俗汝潁慙能惟此大城瓌異所踐疎鐘響度層磬露泫八聖四禪五通七辯戒香恒馥法輪常轉開皇六年十二月五日題寫齊開府長兼行叅軍九門張公􅭄之缺劉馮涇陽人隋翻經學士内外旁通比校數法序馮學通𤣥素偏上數術每以前代翻度至於數法例頗涉不同故演斯致其叙略云世之道藝有淺有深人之稟學有疎有密故尋籌之用也則兼該大衍其不思也則致惑三隅然東夏數法自有三等之差西天所陳何無異端之例然則先譯諸經並以大千稱爲百億言一由旬爲四十里依諸算計悉不相符竊疑翻傳之日彼此異音指撝之際於斯取失故衆經算數之法與東夏相參十十變之旁通對衍度擬翻譯之次執而辯惑既叅隸經誥故即而叙之續高僧傳合符一作東作華趙絢摩訶般若經序周建徳滅法之後有金城公任民部徃東宫府道經園土北見重墻有黄書横拖㯥上乃摩訶般若經第十九巻問云從天而下飛揚墮此乃緘篋笥隋初轉牧冀州命從事趙絢叙之有清信大士具官身嬰俗累恕崇法理精感明靈神化斯應遂使羣經騰翥等扶搖之上昇隻巻飄返若丹烏之下降其去也明惡世之不居其來也知善人之可集應瑞乎如彼聖著乎如此我皇出震乘乾更張琴瑟親臨九服躬總八荒知三寶之可崇體四生之不固遂頒海内修淨伽藍是使像法氤氳同諸舍衛僧尼隱軫還類提河特以此經像明靈著自非積善焉能致斯敢事旌表傳芳後葉續高僧傳費長房成都人房本出家周廢法及隋興仍襲白衣叅傳筆受爲翻經學士上開皇三寶錄表長房以厯代羣錄多唯編經至于佛僧紀述葢寡乃撰自周至開皇末歲首列甲子傍列衆經翻譯爲三寶錄表奏臣房言臣聞有功於國史錄其勲有政於民碑傳其徳况如來大聖化洽無窮而不垂美百王流芳千載者也臣竊尋覽自漢魏來代有翻譯而錄目星散經多失源世罕綴修時致間絶緣此佛以正法付囑國王是知教興寄在帝主伏惟陛下應運秉圖受如來記紹輪王業統閣浮提愍世間昬開慧日照廣緝經像大啓伽藍闡解脫之門導天人之路建善舟檝濟拔蒼生斯實曠古一代盛歟豈臣庸微輒敢妄述但昔毁廢臣在染衣今日興隆還叅法侶時事所接頗預見聞因綱厯世佛法緣起始自姬周莊王甲午佛誕西域後漢明皇永平丁卯經度東歲迄今開皇太歲丁巳厯一千二百八十一載其間靈瑞帝主名僧代别顯彰名開皇三寶錄凡十五巻庶法無隱冀經有𢎞不任下情惶悚戰懼輕冒奉表上錄以聞伏願天慈垂神降省謹言開皇十七年十二月二十三日大興善寺翻經學士臣費長房上開皇三寶錄總目序竊惟三寶所資四生咸潤而世有興毁致人自昇沉興則福業恒感天堂輪王人主毁則罪報常受地獄餓鬼畜生論益物深無過於法何者法是佛母佛從法生三世如來皆供養法故勝天王般若經云若供養法即供養佛是知法教津流乃傳萬代佛僧開導止利一時故賢劫之興千佛同其化脩短之壽四聖異其年雖復住世延促有殊取其宣揚𢎞法無别莫不煎熬愛海濟含識以趣湼槃鏨鑿慢山度蒼生以㑹般若然般若𤣥寂非因聲難以通聲必託形不藉相無由顯所以境稱忍刹總百億之須彌世號娑婆統三千之國土區分三界五濁之穢土沙形别六道二乘之鄙羊鹿大乘慈愍俯降迦毗丈六金容應王宫之裏三十二相炳太子之身十九出家三十成道四十九載處在世間假以言音方便演暢無染之法金口自宣一音敷揚萬類各解機緣匪一教有塵沙阿難總持滴無遺失譬别器水㵼之異瓶雙樹入般湼槃迦葉王城結集一千羅漢迭察送書著之葉皮布乎天竺五百中國各共奉持十六大王皆同擁護後漢之始方届脂那帝世交叅十有六代翻彼域語作此方言相承迄今五百餘祀古舊二錄條目殘亡士行道安創維其缺爾來間有祖述不同各紀一方互存所見三隅致隔故多失疑又齊周陳並皆翻譯弗刋錄目靡所遵承兼値毁焚絶無依據頼我皇帝維地柱天澄靜二儀廓清六合庭來萬國化攝九州異出遺文莫不皆粹臣幸有遇屬此休時忝預譯經禀受佛語執筆暇隙寢食敢忘十餘年來詢訪舊老搜討方獲雖粗緝綴猶慮未周廣博尋求敬俟來俊今所撰集略准三書以爲指南顯兹三寶佛生年瑞依周夜明經度時祥承漢宵夢僧之元始城塹棟梁毗贊光輝崇於慧皎其外傍採隱居厯年國誌典墳僧佑集記諸史傳等僅數十家摘彼翠翎成斯紀翮扇之千載風於百王共秉智炬之光照時昬暗同傳法流之潤洽世燋枯闡我皇猷導開厥始昔結集之首並指在其國城今宣譯之功理須各宗時代故此錄體率舉號稱爲漢魏呉及大隋錄也失譯疑僞依舊注之人以年爲先經隨人而次有重列者猶約世分總其華梵黑白道俗合有一百九十七人都所出經律戒論傳二千一百四十六部六千二百三十五巻位而分之爲十五軸一巻總目兩巻入藏三巻帝年九巻代錄代錄編鑒經翻譯之少多帝年攷知佛在世之遐邇入藏别識教小大之淺深昔姬潛之鼎出現彰漢室之將隆近周毁之法重興顯大隋之永泰佛日再照起自大興之初經論冥歸發乎開皇之始事符理契合此㑹昌述紀所由因斯而作所以外題稱曰開皇三寶錄云其巻内甄爲厯代紀並大藏云字函翻經沙門及學士等附衆經目錄序隋仁壽年撰佛法東行年代巳逺梵經西至流布漸多舊來正典並由翻出近遭亂世頗失原起前寫後譯質文不同一經數本增減亦異致使凡人得容妄造或私採要事更立别名或輒搆餘辭仍取眞號或論作經稱疏爲論目大小交雜是非共混流濫不歸因循未定將恐陵遲聖説動壞信心義闕紹隆理乖付囑皇帝深崇三寶洞明五乘降勑所司請興善寺大徳與翻經沙門及學士等披檢法藏詳定經錄隨類區辨總爲五分單本第一重翻第二别生第三賢聖集傳第四疑僞第五别生疑僞不須抄寫巳外三分入藏見錄至如法寶集之流淨住子之類還同略抄例入别生自餘高僧傳等詞叅文史體非淳正事雖可尋義無在錄又勘古目猶有闕本昔海内未平諸處遺落今天下既一請皆訪取所願仁壽長延法門具足羣生有幸方益無窮合成五巻顯之於左大藏百字函鄭辨志宣州稽亭山妙顯寺碑銘伏聞慧日巳圓西方顯其尊相恒星既隕東界感其神光身迹雖殊慈悲靡隔逮乎紫金寫蓮開之貌香林圖月滿之容夢感漢王之心齊發呉君之善權實濟度莫狀于斯雖復犧農之世分爻嘗藥之功軒昊之年結宇垂裳之徳化腥變苦詎曉法味之深棄穴除巢寧知淨土之貴耆闍山側説法之處猶存菴蘿園中㑹聖之基尚在深矣妙乎無得而名焉大法之興其由尚矣然此妙顯寺者即隋開皇十一年高祖文皇帝奉爲國師之所置也禪師諱智琰俗姓范氏扶風人也祖世晉主夏盟功高士㑹漢臣莅宰名重萊蕪師少爲儒生博尋内典名掛僧錄先住京師濟福道塲因神武滅法遂遊于江左權上戴山南朝陳元帝二年召爲内道塲供養禪師見國祚不安遂拂衣南遊稽嶺其山乃衆峯雜遝邃谷崢嶸洞穴朦朧檉蘿貫日百獸羣集民絶登臨大師居之猛獸藏伏開皇九年十月勅遣晉王廣平陳即禎明三年也禪師迹紹四衣神逾八極雖潛形丘壑而譽徹神都匿相巖阿而名傳上國若珠沉北海皎潔之性彌彰桂隱深叢芬芳之風更逺高祖聞之開皇十年召入仁壽院殿供養十一年秋八月帝降墨勑遣大將軍楊榮送師歸山所居處可立伽藍度弟子七人扶持賜錢五千貫絹二千疋充乳藥又賜落脂米二百斛一切經大藏玉石象一十五軀鵲尾香爐四十九隻永充供養至十二年勅榮爲宣州刺史專監造寺以妙顯爲名謂豅垂寶乳卉葉難名異獸靈禽晨翔暮顯故名妙顯也親書題額勑賜水田二頃五十畝將充永業近寺側封五十戶民以充灑掃帝每歲起居送種種香藥供養至仁壽元年秋八月告弟子曰吾欲去矣恬然坐滅春秋八十有六于時山地震動林木萎悴百獸悲鳴泉池枯涸勅遣有司以國師禮殯于此山之陽去寺一百步墳塔存焉按宣城記云縣南東六十里有山曰稽亭是古僊住處嘗有僊人五百來徃遊止商旅住步稽遲忘返故云稽亭也皇帝俯膺金輪拯提億兆八方大定十善遐𢎞拱默巖廊咸從仁壽而宣條布政寄乎良牧使君諱榮金州安吉人也本姓陽氏系承幽州陽平公之後因王莽簒位南徙魏興公以開皇七年蒙召入内勞問功業詔賜姓楊氏昔人乘車改俗吹律移化未有胄襲皇源名歸帝譜預班磐石斯恩罕倫𢎞農之美洋乎史籍楊秉臨于衮鄀三域顯其亷貞之聲羊祜鎭于荆藩一方稱其太平之化以公清白愛惠還迹曩業威略有道别邁前修何止澤漸貧孤恩霑老幼而巳長史崔公諱士昇淄水人也位隆上佐任重元寮共闡和風讚揚回向罄懷勸道毗我皈依其寺東南有石洞幽隱玲瓏仰眺或漏曦光俯窺乍挹清澗故老傳述所進尤深逺徹秦峯湘水之流近通禹井巴山之穴隴首夾鑿金剛獅子以爲侍衛揮拳揚目可怖衆魔奮爪張牙足驚羣象其内别有石龕即大師舊安禪之所也後則經臺砌漢寶塔凌煙堦墀任石勢以高低欄棟接山形而宛轉兼復飛流遶殿激水循房散入中厨分澆南畝實棲心之勝境悟道之良域者矣公褰幃八稔撫育四民風雨調和農桑鬱暢蒼黎荷施無答天慈遂將帥叅寮及諸令佐等以今二十年歲次涒灘月維南呂創成洪業莊嚴帝祚雕竒宏麗難悉名言福地長存略刋梗槩敢爲銘曰大哉佛日實我舟航慈悲普濟度脱無疆深仁睿后壽命𤣥蒼功超造化徳被遐荒粤我國師徳高窮昊身居帝里心悲六道保安社稷示同魔惱三國鼎治長宣清寶帝王再召詔璽無忒幢車曳路瓊花滿裓親侍几筵諮受遺則度人表志置寺旌徳洪矣州牧簡在惟良葳蕤美俗蔽芾甘棠聖主𢎞護賢臣棟梁伽藍肇立輪奐煒煌石洞幽邃通源逺長俯受泉脈仰漏曦光夾圖獅子對寫金剛勢讋狂象威振魔王瑤臺聳路重閣迴廊檐虬欲起表鳳疑翔激水環砌飛流遶房殿朗宵月鐘鳴樹霜自心雲萃芳郁爲香依松結宇憩石爲牀以斯上善永福人皇山崩幽壤海涸生桑翛然靈岫劫數傳芳宣城總集嚴徳盛呉郡横山頂舍利靈塔銘今楞伽山上方寺竊以至理無言非言無以寄理𤣥蹤無體非體無以明蹤然則八十種好呈應身之妙三十二相表化質之妍至如獻土童兒聚沙稚子尚獲無窮之報猶成莫盡之因况撒身命重財崇諸聖業者矣但樹因之最無過起塔崇福之重詎甚建幢而銀青光祿大夫呉郡太守李顯者乃華陽杞梓江漢芳蘭夙布素誠少匡王國吐納風雷之際出處朱紫之庭縻爵峻於其身隆基茂於徃葉溫良治于郡國孝友睦于閨門建節贊治張振化風門雖望族世載公卿安仁樂智之心無違終食謙明厚惠之徳造次必存伊共奬勸郡部官人奉爲皇帝皇后齊王六宫眷屬各捨七珍同崇八福在郡城之西山頂上營起七層之寶塔以九舍利置其中金瓶外重石槨周護留諸弗朽遇劫火而不燒守諸不移漂劫水而不易時有龍華道塲比丘法首者歲居齠齔即起踰城之心年將志學仍持航海之操自離親捨俗三十許年洞識苦空明閑法要誠心内發㝠夢外酬時聞此山是古之佛殿乃共於此所成斯勝業願寶鐸常搖法輪恒轉含生迴向歸心上通有頂之天傍及無邊之地同離生死之苦俱成湼槃之樂其辭曰相焉是滅法矣非生葢纒虛萃渇愛徒盈不無不有何體何名業風既息法水便清以兹勝地令徳來持功施合矩化動成規如雲出岫狀月臨池清流不倦貽銘無疲䖍心局體同歸共慕施彼七珍崇斯六度下被羣品上資天祚萬福莊嚴千靈輔護少宣令問特秀苗藂輪轉三有馳流六通獨善非徳兼濟爲功俱成法雨用息塵籠大業四年歲次戊辰九月辛未朔八日戊寅立銘呉郡司戸嚴徳盛製文司倉魏瑗書禇亮字希明錢塘人仕隋入唐終散騎常侍釋慧淨金剛般若註序慧淨姓房常山眞定人大業初來長安槐里學士穎川庾初孫請註金剛般若釋文舉義遐邇流布太常博士禇亮爲之序若夫大塊均形役智從物情因習改性與慮遷然則達鑒窮覽皎乎先覺炳慧炬以出重昬拔愛河而昇彼岸與夫輪轉萬劫葢染六塵流遁以循無涯踳駮而趨㨗徑不同日而言也潁川庾初孫早𢎞篤信以爲般若所明歸於正道顯大乘之名相標不住之宗極出乎心慮之表絶於言像之外是以結髪受持多厯年所雖妙音演説成誦不虧而靈源邃湛或有未悟嗟迷方之弗逺睠砥途而太息屬有慧淨法師博通奥義辯同炙輠理究連環庾生入室研幾伏膺善誘乘此誓願仍求註述法師懸鏡忘疲衢罇自滿上憑神應之道傍盡心機之用敷暢微言宣揚至理曩日舊疑渙焉冰釋今兹妙義朗若霞開爲像法之梁棟變羣生之耳目辭峯秀上映鷲岳而相高言泉激壯赴龍宫而競逺且夫釋教西興道源東注世閲賢智才兼優洽精該睿旨罕見其人今則妙門重闡籍甚當世相此𤣥宗鬱爲稱首歲維閹茂始創懷袖月躔仲呂爰兹絶筆緇俗攸仰軒葢成陰扣鐘隨其大小鳴劒發其光彩一時學侶專門受業同涉波瀾遞相傳授方且顧蔑林逺俯視安生獨步高衢對揚正法遼東眞本望懸金而不刋指南所寄藏羣玉而無朽豈不盛哉豈不盛哉續高僧傳作炳廣𢎞明集照釋文紀巻四十
