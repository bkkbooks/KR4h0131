body:
  text: 釋文紀巻九明梅鼎祚輯晉七趙以下僭國前燕後前秦南燕後秦後趙主石勒字世龍上黨羯人始事劉淵篡位稱趙王居鄴尊佛圖澄書澄見後和尚國之大寶榮爵不加髙禄不受榮禄匪顧何以旌徳從此巳往宜衣以綾錦乗以雕輦朝㑹之日和尚升殿常侍以下悉助舉輿太子諸公扶翼而上主者唱大和尚衆坐皆起以彰其尊髙僧傳石虎字季龍勒從子弑勒子自立稱帝下中書料簡沙門書虎僭號建武時百姓因佛圖澄率多奉佛皆營造寺廟削髪出家虎乃下書問中書令中書著作郎王度等奏中書令王波亦同度議虎以澄故復下書于是慢戒之徒因之以厲佛號世尊國家所奉里閭小人無爵秩者為得應事佛與不又沙門皆應髙潔貞正行能精進然後可為道士今沙門甚衆或有姦宄避役多非其人可料簡詳議真偽中書著作郎王度奏夫王者郊祀天地祭奉百神載在祀典禮有常饗佛出西域外國之神功不施民非天子諸華所應祀奉往漢明感夢初傳其道唯聴西域人得立寺都邑以奉其神其漢人皆不得出家魏承漢制亦循前軌今大趙受命率由舊章華戎制異人神流别外不同内饗祭殊禮華夏服禮不宜雜錯國家可斷趙人悉不聴詣寺燒香禮拜以遵典禮其百辟卿士下逮衆𨽻例皆禁之其有犯者與淫祀同罪其趙人為沙門者還從四民之服復下書度議云佛是外國之神非天子諸華所可宜奉朕生自邊壤忝當期運君臨諸夏至於饗祀應兼從本俗佛是戎神正所應奉夫制由上行永世作則茍事允無虧何拘前代其夷趙百蠻有捨於淫祀樂事佛者悉聴為道士並髙僧傳竺佛圖澄天竺人本姓帛氏少學道妙通𤣥術晉永嘉初來洛陽已從石氏終鄴宫寺謝石虎勞問書澄從石勒甚見篤信號大和尚及虎僭位傾心事澄澄稱疾虎勤遣勞問澄謝虎陽月和煖願御膳順宜貧道先嬰重疾年衰益甚邈䝉慈詔曲垂光慰感懼之至十百于懷幸過慶會而形不自運此情此慨良無以喻辭石虎書澄自啟塋墓於鄴西紫陌謂弟子法祚曰禍亂漸萌吾先從化矣臨化遣人辭虎物理必遷身命非保貧道燄幻之軀化期巳及既荷恩殊重故逆以仰聞並髙僧傳然按此雖不明言書非面語前秦主苻堅字永固畧陽氐人為秦龍驤将軍弑主自立稱大秦天王居長安與朗灋師書朗以秦皇始元年移卜太山頃乃於金輿谷崑崙山中别立精舎堅欽其徳素遣使䞋遺皇帝敬問太山朗和尚大聖膺期靈權超逸䕃盖十方化融無外若山海之養羣生等天地之育萬物養存生死澄神寂妙朕以虗薄生與聖㑹而隔萬機不獲輦駕今遣使人安車相請庻冀靈光迴盖京邑今并送紫金數斤供鍍形像絹綾三十疋奴子三人可備灑掃至人無違幸望納受想必𤣥鑒見朕意竺僧朗答秦主苻堅書僧朗頓首頓首如來永世道風潜淪忝在出家栖心山嶺精誠微薄未能𢎞匠不悟陛下遠問山川詔命慇懃實感恩㫖氣力虗微未堪跋涉願廣開灋輪顯保天祚䝉重恵賜即為施設福力之功無不䝉賴貧道才劣不勝所重僧朗頓首頓首廣𢎞明集尊朗灋師詔堅沙汰衆僧欽太山僧朗徳素乃别詔朗灋師戒徳冰霜學徒清秀崑崙一山不在搜例髙僧傳趙整字文業一名正畧陽清水人仕苻堅秘書侍郎釋迦頌整因關中法盛欲出家堅未許及堅死遂更名道整作頌專精經律終于襄陽我生何以晚泥洹一何早歸命釋迦文今來受大道髙僧傳前燕主慕容垂字道明鮮卑人皝子封吳王奔苻堅後叛秦自稱燕王居中山與朗灋師書皇帝敬問太山朗和尚澄神靈緒慈隂百國凡在含生孰不䝉潤朕承藉纂統方夏是膺㫺蜀不恭魏武含慨今二賊不平朕豈獲安又元戎剋興征掃暴亂至人通靈随權指化願兵不血刃四海混伏委心歸誠久敬何已今遣使者送官絹百疋袈裟三領綿五十斤幸為咒願僧朗答燕主慕容垂書僧朗頓首頓首能仁御世英規遐邈光敷道化融濟四海貧道忝服道味習教山林仰惟詔㫖諮及國難王者膺期統有六合大能并小自是常倫若葵藿之傾太陽飛歩之宗麟鳳皇澤載融羣生繫仰陛下髙明何思不服貧道窮林䝉賜過分僧朗頓首廣𢎞明集南燕主慕容徳字𤣥明皝少子初為後燕主慕容寶丞相據廣固自稱燕王與朗灋師書皇帝敬問太山朗和尚遭家多難菑禍屢臻昔在建興王室西傾頼武王中興神武御世大啟東夏拯拔區域遐邇䝉蘇天下幸甚天未忘菑武王即晏永康之始西傾東蕩京華播越每思靈闕屏營飲淚朕以寡徳生在亂兵遺民未㡬繼承天統幸和尚大恩神祗盖䕶今使使者送絹百疋并假東齊王奉髙山荏二縣封給書不盡意稱朕心焉建興乃後燕主慕容垂廣𢎞明作建煕誤武王為垂孫盛廣𢎞明寡作無統作禄僧朗答南燕主慕容徳書僧朗頓首陛下龍飛統御百國天地融溢皇澤載頼善逢髙鑒恵濟黔首蕩平之期何憂不一陛下信向三寶恩㫖殊隆貧道味静深山豈臨此位且領民戸興造靈刹所崇像福㝠報有歸僧朗頓首頓首又報慕容徳徳初僭位都滑䑓尋為魏所據議欲先取一方為關中之基中書令張華議主彭城北地王鍾等勸復攻滑臺尚書潘聰以滑䑓四通八達非帝王之居彭城土曠人稀非久安之計青齊沃壌固山負徳海號曰東秦當進討叛臣辟閭渾而據廣固未决僧朗素善占候使牙門蘓撫訪其所適朗報徳徳引師而南徐兖歸附渾奔魏追斬之以廣固都焉是年為朗建神通寺于齊州仍遺書朗撫常問燕年世朗筮之曰燕衰庚戌年則一紀世則及子言皆驗此報在前山野絶俗之士不應預聞朝議但有待之累非有託無以立陛下今即聞之檀越敬覽三策潘尚書之議可謂興邦之策矣且今嵗之初彗星起於奎婁遂掃虛危彗者除舊更新之象奎婁為魯之分野虚危為齊之分野宜先定兖州廵撫琅邪待秋風戒莭然後北轉臨齊此天道也並十六國春秋南燕録後秦主姚興字子畧本赤亭羌萇子襲位去帝號稱秦王居長安與安成矦姚嵩述佛義書興少崇三寳鋭意講集什既入關多所傳譯興惟佛道唯善信為出苦之長津御世之洪則乃著通三世論朂示因果以諮什仆答書復與嵩述之後嵩見吾曽以已所懷疏條摩訶衍諸義圖與什公評詳厥衷遂有哀故不復能斷理未久什公尋復致變自爾喪戎相尋無後意事遂忘棄之近以當遣使送像欲與卿作疏箱篋中忽得前所條本末今送示卿徐徐尋撫若於卿有所不足者便可致難也見卿來日並可以當言笑吾前試通聖人三達觀以諮什公公尋有答今並送往諸此事皆是昔日之意如今都無情懐如何矣通三世論諮什法師曽問諸法師明三世或有或無莫適所定此亦是大法中一叚處所而有無不泮情每慨之是以忽疏野懐聊試孟浪言之誠知孟浪之言不足以㑹理然胷襟之中欲有少許意了不能黙已輒疏條相呈匠者可為折衷余以為三世一統循環為用過去雖滅其理常在所以在者非如阿毗曇注言五隂塊然喻若足之履地真足雖往厥跡猶存常來如火之在木木中欲言有火耶視之不可見欲言無耶縁合火出經又云聖人見三世若其無也聖無所見若言有耶則犯常嫌明過去未來雖無眼對理恒相因茍因理不絶聖見三世無所疑矣鳩摩羅什答後秦主姚興書雅論大通甚佳去來定無此作不通佛説色隂三世和合總明為色五隂皆爾又云從心生心如從榖生榖以是故知必有過去無無因之咎又云六識之意識依已滅之意為本而生意識又正見名過去業未來中果法也又十方中第二力知三世諸業又云若無過去業則無三塗報又云學人若在有漏心中則不應名為聖人以此諸比固知不應無過去若無過去未來則非通理經法所不許又十二因縁是佛法之深者若定有過去未來則與此法相違所以者何如有榖子地水時莭芽根得生若先已定有則無所待有若先有則不名從縁而生又若先有則是常倒是故不得定有不得定無有無之説唯時所宜耳以過去法起行業不得言無又云今不與昔對不得言有雅論之通甚有佳致又大品所明過去如不離未來現在如未來現在如亦不離過去如此亦不言無也此實是經中之大要俟得髙對通復盡之通不住法住般若衆生之所以不階道者有著故也是以聖人之教恒以去著為事故言以不住般若雖復大聖𤣥鑒應照無際亦不可著著亦成患欲使行人忘彼我遺所寄汎若不繫之舟無所倚薄則當於理矣通聖人放大光明普照十方聖人之教𤣥通無涯致感多方不可作一途求不可以一理推故應粗以粗應細以細應理固然矣所以放大光明現諸神變者此應十方諸大菩薩将紹尊位者耳若處俗接粗復容此事耶阿含經云釋氏之處天竺四十餘載衣服飲食受諸患痛與人不别經又云聖人亦入鹿馬而度脱之當在鹿馬豈異於鹿馬哉若不異鹿馬應世常流不待此神變明矣每事要須自同於前物然後得行其化耳通三世衆生歴涉三世其猶循環過去未來雖無眼對其理常在是以聖人尋往以知往逆數以知來通一切諸法空大道者以無為為宗若其無為復何所有耶姚嵩上後秦主姚興佛義表臣言奉陛下所通諸義理味淵𤣥詞致清勝間詣􅦇於二篇妙盡侔乎中觀詠之翫之紙巳致勞而心猶無厭真可謂當時之髙唱累劫之宗範也但臣頑闇思不參𤣥然披尋之日真復詠歌弗暇不悟𢎞慈善誘乃欲令參致問難敢忘愚鈍輒位敘所懐豈曰存難直欲諮所未悟耳臣言上通三世甚有深致既已逺契聖心兼復抑正衆説宗塗亹亹超絶常境欣悟之至益令賞味増深加為什公研覈該備實非愚臣所能稱盡正當銘之懐抱以為心要耳臣言上通不住法住般若義云衆生所以不階道者有著故也聖心𤣥詣誠無不盡然至乎標位六度而以無著為宗取之於心誠如明誨即之于事脱有未極夫無著雖妙似若有不即真兩㝠有不即真兩㝠恐是心忘之謂耳竊尋𤣥教如更有以謹牒成言以攄愚見故經云以無所捨法具足檀波羅蜜以此三事不可得故三者既㝠有無無當無當之理即同幻化以此而推恐不住之致非直忘彼我遺所寄而已詔云放大光明諸神變者此自應十方諸大菩薩将紹尊位者耳斯理之𤣥固非庸近所參然不得已之情猶欲言所未達夫萬有不同精麤亦異應彼雖殊而聖心恒一恒一故圓以應之不同故權以濟之雖鹿馬而未始乖其大雖現神變而未始遺其細故浄名經云如來或以光明而作佛事或以寂寞而作佛事顯黙雖異而終致不二然則於小大之間恐是時互説耳如華手經初佛為徳藏放大光明令諸衆生普䝉其潤又思益經中網明所問如來三十三種光明一切遇者皆得利益法華經云佛放睂間相光亦使四衆八部咸皆生疑又云處闇衆生各得相見茍有其緣雖小必益茍無其因雖大或乖故般若經云若有衆生遇斯光者必得無上道又以神變令三惡衆生皆生天上以此而言至於光明神變之事似存平等敢縁慈顧輒竭愚思若復哀矜重開導者豈直微臣獨受其賜詔云大道者以無為為宗若其無為復何所有耶至理淵淡誠不容言然處在涉求之地不得不尋本以致悟不審明道之無為為當以何為體若以妙為宗者雖在帝先而非極若以無有為妙者必當有不無之因因稱俱未㝠詎是不二之道乎故論云無於無者必當有於有有無之相譬猶修短之相形耳無理雖𤣥将恐同彼斷常常猶不可況復斷耶然則有無之津乃是邉見之所存故中論云不破世諦故則不破真諦又論云諸法若實則無二諦諸法若空則無罪福若無罪福凡聖無泮二茍無泮道何所益由臣闇昧未悟宗極唯願仁慈重加誨諭答安成侯姚嵩卿所難問引喻兼富理極深致實非庸淺所能具答今為當都格以相酬耳卿引般若經云若有衆生遇斯光者必得無上道即經所言未聞有凡流而得見光明者如釋迦放大光明普照十方當斯之時經不言有羣品而得見其怪而異之者皆是普明之徒以斯言之定不為羣小也卿若以衆生為疑者百億菩薩豈非衆生之謂耶然經復云普明之詣釋迦皆與善男子善女人持諸華香來供養釋迦及致供養之徒自應普䝉其潤也但光明之作本不為善男子善女人所以得䝉餘波者其猶蠅附驥尾得至千里之舉耳卿又引神變令三惡衆生得生人天若在鹿為鹿在馬為馬而度脱之豈非神變之謂耶華手思益法華諸經所言若云放大光明自應與大品無異也若一一光明以應適前物此作非人天所通夫光明之與寂寞此直發意有叅差其揆一也卿引經言施者受者財物不可得與不住法不住般若未有異二者直是始終之教也統而言之俱是破著之語耳何者罪不罪施者受者及財物都不可得若都不可得復何所著是勸無所著明矣卿又問明道之無為為當同諸法之自空為妙空無以成極耶又引論中二諦之間言意所不及道之無為所寄耶吾意以謂為道止無為未詳所以宗也何者夫衆生之所以流轉生死者皆著欲故也若欲止於心即不復生死既不生死潜神𤣥漠與空合其體是名湼槃耳既曰湼槃復容有名於其間哉夫道以無寄為宗若求寄所在恐乃惑之大者也吾所明無為不可為有者意事如隠尋求或當小難今更重伸前義卿所引中論即吾義宗諸法若不空則無二諦若不有亦無二諦此定明有無不相離何者若定言有則無以拔髙士若定言無則無以濟常流是以聖人有無兼抱而不捨者此之謂也然諸家通苐一義廓然空寂無有聖人吾常以為殊太逕廷不近人情若無聖人知無者誰也姚嵩重上後秦主姚興表臣言奉賜還詔誨喻周備伏尋之日欣踊無量陛下爰發徳音光闡幽極拓道義之門演如來之奥㝠宗隠而復彰𤣥扉掩而再敞文外之㫖可謂朗然幽燭矣夫理𤣥者不可以言稱事妙者固非常詞之所讃雖欲心口仰詠亦罔知所盡由臣愚鈍而猥䝉陛下襃餙之美誠復欣戴殊眷實赦比仰味微言研詠彌至其為䝉悟豈唯過半之益但臣仍充外役無由親承音㫖每望雲遐慨實在㒺極不勝延係謹以申聞臣嵩言重答安成侯姚嵩得表具一二吾常近之才加多事昬塞觸事面牆不知道理安在為復以卿好樂𤣥法是以聊復孟浪以言之耳而來喻過美益以不安姚嵩謝後秦主姚興珠像表臣言奉珠像承是皇后遺囑所建禮覲之日永慕罔極伏惟感往增懐臣言先承陛下親營像事每注心延望遲冀暫一禮敬不悟聖恩垂及乃復與臣供養此像既功寶並重且於制作之理擬若神造中來所見珠像誠當竒妙然方之於此信復有間瞻奉踊躍實在無量夫受乾施者無報䝉恩隆者無謝雖欲仰陳愚誠亦復莫知所盡臣言並廣𢎞明集僧䂮為國内僧主詔䂮姓傅北地泥陽人博通經律為興所重及羅什入關僧尼廣集興慮有愆漏宜立僧主因下書給車輿吏力䂮資侍中秩傳詔羊車各二人遷等並有厚給供事純儉凡愜時望大法東遷於今為盛僧尼巳多應須網領宣授逺規以濟頽緒僧䂮法師學優早年徳芳暮齒可為國内僧主僧遷法師禪慧兼修即為悦衆法欽慧斌共掌僧録髙僧傳與恒標二公勸罷道書姚興以恒標二人有經國之量勑尚書令姚顯敦逼罷道又下書恒標等閤境救之殆而得免於是竄影巖壑畢命幽藪𢎞明集作姚畧書以興字子畧也卿等樂道體閒服膺法門皦然之操義誠在可嘉但朕臨四海治必須才方欲招肥遁於山林搜陸沈於屠肆況卿等周旋篤舊朕所知盡各挹幹時之能而潜獨善之地此豈朕求賢之至情卿等兼𢎞深趣邪昔人有言國有驥而不乗方惶惶而更索是之謂也今勅尚書令顯便奪卿等二乗之福心由卿清名之容室讃時益世豈不大哉茍心存道味寧繋白黑望體此懐不以守節為辭誠歴代三寳紀作實朕臨作君臨治必作治急讃時益世作翼賛時世釋道恒道標答秦主書奉去月二十八日詔勅尚書令奪道恒標等法服承命悲懼五情失守俯仰慙惶無地自厝恒等誠才質闇短染法未久所存既重眷慕亦深猥䝉優詔襃飾過美開諭誨勵言理備至但情之所安實懐㒺已法服之下誓畢身命兼少習佛法不閑世事徒發非常之舉終無殊異之功雖有拔能之名而無益時之用未見機毫之補将有山岳之損竊為陛下不取也光武尚能縱嚴陵之心魏文全管寧之操折至尊之髙懐遂匹夫之微志在宥羣方靡不自盡況陛下以道御物兼𢎞三寶使四方義學之士萃於京師新異經典流乎遐邇大法之隆於茲為盛方将闡揚洪化助明振暉嗣祗洹之遺響扇靈鷲之餘風建千載之軌模為後生之津塗而恒等豈可獨屈於明時不得伸其志願伏願鑒其元元之情特垂曠蕩通物之理更賜明詔聴遂微心則銜恩九泉感徳累劫不勝戰悚謹奏以聞徒發非常之舉一作徒廢非常之業詔恒標二公省所奏具意今所以相屈者時所須也不復相推本心以及於此煩慇懃廣自料理吾之情趣想卿等體之在素不復煩言便可奉承時命勉菩薩之蹤耳道恒道標重答秦主表道恒等近自陳寫冀悟聖鑒重奉明詔不䝉矜恕伏讀悲惶若無神守陛下仁𢎞覆載使物悦其性恒等少習法化愚情所樂誓以微命與法服俱盡而過恩垂及眷忘其陋勸𢎞菩薩兼濟之道然志力有限寔所不堪非徒餘年茍自求免直愚懐所存私悃必守伏願鑒恕一往之誠不責偏執之咎特賜恩㫖聴遂㣲心屢延明詔随用悚息不勝元元之至謹重奏以聞詔恒標二公得重奏一二具之情事具如前詔但當開意以從時命無復煩於鄭重也道恒道標重答秦主表道恒等愚意所執具如前表精誠微薄不能感悟聖心累䝉還詔未䝉慈恕俯仰憂怖無復心情陛下道懐虚納養物無際願開天地之恩得遂一介之志愚守之誠畢命無辜分受違詔之愆甘引無恨屢紆聖聴追用悚息不任㒺極之情謹奏以聞與鳩摩羅耆婆書鳩摩羅什初一名鳩摩羅耆婆外國製名多以父母為本什父鳩摩炎母字耆婆故兼取為名答髙僧傳作致書什䂮二法師什䂮書别已數旬旋有思想漸暖比日何如小虜逺舉更無處分正有憒然耳頃萬事之殷須才以理之近詔道恒等令釋羅漢之服尋菩薩之蹟想當盤桓耳然道無不在法師可勸進之茍廢其尋道之心亦何必須爾也致意遷上人别來何似不審䂮統復何如多事不能一一為書恒等亦可煩諸上人勸其令造菩薩之行並𢎞明集僧䂮等奏興復命僧䂮等勉諭必遂其心䂮䓁奏略興又下書與䂮等廣𢎞明作與遷等書而無前奏見十六國春秋惟聖人能通天下之志恒標業已毁除鬚髪著不正之衣今使處縉紳之朝非其志也且大秦龍興異才輩出如恒標等未為卓異何足拘以文網也又報僧䂮等書省疏所引一二具之朕以謂獨善之美不如兼濟之功自守之節未若拯物之大雖子陵頡頑於光武君平慠岸於蜀肆周黨辭禄於漢朝杜微稱聾於諸葛此皆偏尚取介之士耳何足以關嘿語之要領髙勝之趣哉今九有未乂黔黎荼蓼朕以寡徳獨當其弊思得羣才共康至治法師等雖潜心法門亦毗世宣教蹤不能導物化時勉人為治而逺美辭世之許由近髙散髪於謝敷若九河横流人盡為魚法師等雖毗世宣教亦安施乎而道恒等伏膺法訓為日久矣然其才用足以成務故欲枉奪其志以輔暗政耳若福報有徵佛不虚言拯世急病之功濟時寧治之勲功福在此而不在彼可相誨諭時副所望釋僧䂮僧遷法服法支鳩摩羅耆婆等答秦主書盖聞太上以道養民而物自是其須有徳而天下治是以古之明主審違性之難御悟任物之易因故堯放許由於箕山陵譲放杖於魏國髙祖縱四皓於終南叔度辭蒲輪於漢世晉國戴逵被褐於剡縣謝敷㒿髪於若耶盖以適賢之性為得賢也故上有明君下有韋帶逸民之風垂訓於今矣今道標恒等徳非圓達分在守節且少習𤣥化伏膺佛道一往之誠必志匪席至於敷演妙典研究幽微足以啟悟童稚助化功徳使物識罪福則有濟苦之益茍佛不虛言標等有𢎞毗邪之訓矣竊聞近日猥蒙優詔使釋法服将擢翠翹於寒條之上曜扶渠於重冰之下斯誠陛下仁愛愷悌寛不世之恩然䂮等眷眷竊有愚心以陛下振道徳之綱以維六合恢九徳之網以羅四海使𤣥風扇千載之前仁義陶萬世之後宇宙之外感純徳以化寛九域之内肆𤣥津以逍遥匹夫無溝壑之怨嫠婦無停緯之歎此實所以垂化海内所以仰頼愚謂恒標雖區區一介守所見為小異然故在羅網之内即是陛下道化之一臣昔孛佐治十二年未聞釋奪法衣形服世議茍於時有補袈裟之中亦有𢎞益何足復奪道與俗違其適性昔巢由抗節堯許俱髙四皓匪降上下同契斯乃今古之一揆百代之同風且徳非管仲不足華軒堂阜智非孔明豈足三顧草廬願陛下放既往之恩從其微志使上不過恵下不失分則皇唐之化於斯而在箕潁之賔復見今日矣䂮等庸近獻愚直言懼觸天威追用悚息僧䂮等言並𢎞明集有物自是一作物自足其須有徳而天下治一作其復徳而治天下易因一作多因漢世一作漢岳敷演一作敷析脱此書字有誤與朗法師書皇帝敬問太山朗和尚懃神履道飛聲映世休聞逺振常無巳已朕京西夏思濟大猷今關闕未平事惟左右已命元戎剋寧伊洛冀因斯㑹東封廵省慿靈仗威須見指授今遣使者送金浮圖三級經一部寳䑓一區庶望𤣥鑒照朕意焉廣𢎞明集姚嵩興之弟仕鎮西将軍秦州刺史歴司空封安成矦留心經典專精釋道屡請什講説新經後為氐王楊盛所害遺慧逺書興欽逺名徳歎其才思致書殷勤信餉連接贈以龜茲國細縷雜變像以伸欵心又令姚嵩獻其珠像釋論新出送論并遺書逺逺謂大智論文句繫廣初學難尋乃抄其要文序致淵雅以書答之大智度論新譯訖此既龍樹所作又是方等㫖歸宜為一序以宣作者之意然此諸道士咸相推謝無敢動手法師可為作序以遺後之學者慧逺答姚嵩書尺牘作逺答鳩摩羅什誤欲令作大智論序以伸作者之意貧道聞懐大非小楮所容汲深非短綆所測披省之日有愧髙命又體羸多疾觸事有廢不復屬意巳來其日亦乆縁來告之重輒麤綴所懐至於研究之美當復寄諸明徳出三藏記集髙僧傳鳩摩羅什此云童夀一名羅耆婆天竺人家世國相随母出家傳覽五明諸論善達吉凶留住龜茲轉停涼土涼主呂隆表降姚興什方入關以後秦𢎞始十一年終于長安妖異奏仆在龜茲呂光破龜茲得什僭號凉土至庶子纂立二年有猪生龍出之異什奏不省纂竟被殺仆乃入關比日潜龍出遊豕妖表異龍者隂類出入有時而今屡見則為菑眚必有下人謀上之變宜克已修徳以答天威西方辭體論沙門慧叡才識髙明常随什傳寫什毎為叡論西方辭體商畧同異天竺國俗甚重文製其宫商體韻以入絃為善凡覲國王必有讃徳見佛之儀以歌歎為貴經中偈頌皆其式也但改梵為秦失其藻蔚雖得大意殊隔文體有似嚼飯與人非徒失味乃令嘔噦也贈沙門法和頌心山育明徳流薰萬由延哀鸞孤桐上清音徹九天並髙僧傳竺佛念涼州人諷習衆經華梵兼釋苻姚二代為譯人之宗王子法益壊目因緣經序此序乃前秦苻堅建初時作原夫善惡之運契猶形影之相顧受對明驗凡三差焉現世中世後世播九色之深恩以悦天妃之耳目孤禽投王而全命形受五刖之切酷斯現報也羣徒潜淪於幽壑神陟輪漂而不段身酸歴世之殃舋不曉王子之喪目斯中報也阿蘭從禍於無想嬰佩永惑於始終為著翅之暴狸飛沈受困而難計斯後報也故聖人降靈必有所由非務不務清白明矣𤣥鑒三世弱䘮之流深記來變壊形之累趣使引入百練之室自如來逝後阿育登位綱維閻浮光被六合圖形神寺八萬四千羅漢御世汎濟億數國主師宗𤣥化滂沛萬民仰戴而不已神祗欽頼而愈深然王子法益宿植洪業生在王宫容貌殊特復受此對靡知緣起㑹秦尚書令輔國将軍宗正卿領城門校尉使者司𨽻校尉姚旻者南安郡人也親姚韶之次兄字景嶷文為儒表則列勲於千載武為邈羣則皎然而獨標亢音通寔則辯機而曠逺執素縱情則翺翔而無倫徳也純懿範也難模赫逸翰於羣才震龍威於昆鋒然愍永惑之叵救傷愚黨之不窹欲紹先勝之遺迹竪𤣥宗於末俗故請天竺沙門曇摩難提出斯縁本秦建初六年歲在辛夘於安定城三月十八日出至二十五日乃訖梵本三百四十三首盧傳為漢文一萬八千言佛念譯音情義寔難或離文而就義或正滯而傍通或取解於誦人或事略而曲備兾将來之學士令鑒罪福之不朽設有毫釐潤色者盡銘之於萌兆故序之焉出三藏記作大藏所字函明驗作朗驗現世中世後世現也中也後也五刖作五杌不務作不預釋道恒藍田人學該内外才思清敏從什譯出衆絰多助詳定後與道標並入瑯邪山終世不出釋駮論并序晉義熙之年如聞江左袁何二賢並商略治道諷刺時政雖未覩其文意者似依傍韓非五蠧之篇遂譏世之闕發五横之論而沙門無事猥落其例余恐眩曜時情永淪邪惑不勝憤惋之至故設賔主之論以釋之有東京束教君子詰於西鄙慠散野人曰僕曽預聞佛法沖邃非名教所議道風𤣥逺非器象所擬清虚簡勝非近識所關妙絶羣有非常情所測故毎為時君之所遵崇貴達之所欽仰於是衆庶朋契雷同奔向咸共嗟詠稱述其美云若染漬風流則精義入微研究理味則妙契神用澡塵垢於胸心脱桎梏於形表超俗累於籠樊邈世務而髙蹈論真素則夷齊無以踰其操遺榮寵則巢許無以過其志味𤣥㫖則顔冉無以參其風去紛穢則松喬無以比其潔信如所談則義無間然矣但今觀諸沙門通非其才羣居猥雜未見秀異混若涇渭渾波泯若薰蕕同篋若源清則津流應鮮根深則條頴必茂考其言行而始終不倫究其本末幾有無校僕之所以致怪良由於此如皇帝之忘智據梁之失力皆在罏錘之間陶鑄以成聖者茍道不虛行才必應器然沙門既出家離俗髙尚其志違天屬之親捨榮華之重毁形好之飾守清節之禁研心唯理屬已唯法投足而安蔬食而已使徳行卓然為時宗仰儀容邕肅為物軌則然觸事蔑然無一可採何其栖託髙逺而業尚鄙近至於營求孜伋無暫寧息或懇殖田圃與農夫齊流或商旅博易與衆人競利或矜恃醫道輕作寒暑或機巧異端以濟生業或占相孤虚妄論吉凶或詭道假權要射時意或聚畜委積頤養有餘或指掌空談坐食百姓斯皆徳不稱服行多違法雖暫有一善亦何足以標髙勝之美哉自可廢之以一風俗此皆無益於時政有損於治道是執法者之所深疾有國者之所大患且世有五横而沙門處其一焉何以明之乃大設方便鼓動愚俗一則誘喻一則迫愶云行惡必有累劫之殃修善便有無窮之慶論罪則有幽㝠之伺語福則有神明之祐敦厲引𨗳勸行人所不能行逼强切勒勉為人所不能為上減父母之養下損妻孥之分㑹同盡餚饍之甘寺廟極壯麗之美割生民之珍玩崇無用之虚費罄私家之年儲闕軍國之資實張空聲於将來圖無象於未兆聽其言則洋洋而盈耳觀其容則落落而滿目考現事以求徵並未見其驗真所謂擊影捕風莫知端緒亮僕情之所未安有識者之所巨惑若有嘉信請承下風脱有暫悟永去其滯矣主人憮然有間慨爾長嘆咄異哉子之所陳何其陋也夫鄙俗不可以語大道者滯於形也曲士不可以辯宗極者局於名也今将為子略舉一隅自可思反其宗矣盖聖人設教應器投法受量有限故化之以漸録善心於毫端忘鄙吝於丘壑片行之善永為身資一念之福終為神用始覆一簣不可責以為山之功方趨絶境不中窮以括囊之實然海之所以稱大者由無皦潔之清道之所以稱晦跡者以無赫然之觀夫怨親婉孌有心之所滯而沙門遺之如脱屣名位財色世情之所重而沙門視之如秕穅可謂忍人所不能去斯乃標尚之雅趣𢎞道之勝事而云蔑然豈非妙賞之謂乎又且志業不同歸向塗乖岐逕分轍不相領悟未見秀異故其宜耳古人毎歎才之為難信矣周號多士亂臣十人唐虞之盛元凱二八孔門三千並海内翹秀簡充四科數不盈十於中伯牛廢疾囘也六極商也慳悋賜也貨殖予也難雕由也凶愎求也聚歛任不稱職仲弓雖騂出於犁色而舉世推徳為人倫之宗欽尚髙軌為榗紳之表百代詠其遺風千載仰其景行至於沙門乃苦共剝節酷相瓦礫斯豈君子𢎞通之道雅正之論哉此由或人入班輸之作坊不稱指南之巧妙但譏拙者之傷手真可謂服膺下流志存鄙劣昔丞相問客俗言鴟梟食母寧有是乎客答但聞慈烏反哺耳相乃悵然自愧失言今子處心将無似相之問也君子遏惡揚善反是謂何又云投足而安且林野蕭條毎有寇盜之患城傍入出動嬰交逰之譏處身非所則招風塵之累婆娑田里則犯人間之論二三無可進退唯谷宇宙雖曠莫知所厝又云蔬餐而巳夫人間有不贍之匱山澤無委積之儲方宜取給復乘之以法所向九折於何得立若堂堂聖世而有首陽之餓夫明明時雍而有赴海之死客於雅懐何如然體無毛羽不可袒而無衣月亦匏瓜不可繫而不食自未造極要有所資年豐則取足於百姓時儉則肆力以自供誠非所宜事不得巳故蝮蛇螫手斬以求全推其輕重盖所存者大雖營一巳不求無獲求之不必一塗但令濟之有理亦何嫌多方以為煩穢其欲役使不得妄動何固執之甚乎昔伯成躬耕以墾殖沮溺耦作以修農陶朱商賈以營生於陵灌蔬以自供崔文賣藥以繼乏君平卜筮以補空張衡術數以馳名馬鈞竒巧以騁功此等直是違俗遁世之人耳未正見有邈然絶塵與物天隔而咸共嗟詠不輟於口然沙門之中迹超諸乏恥與流輩動有萬數至於體道神化超落人封非可算計而未曽致言何其黨乎宜共思校事實不可古今殊論衆寡異辭希簡為貴猥多致賤恐非求精覈理之談也云自可廢之以一風俗是何言歟聖人不誣十室三人必有師資芳蘭並茂而欲蘊崇焚之不亦暴乎其中自有徳宇淵邃器標時望或翹楚皦潔栖寄清逺或殫思入微澄神絶境或敷演微言散幽釋滯或精勤福業勸化崇善凡出家之本落髪抽簮之日皆心口獨誓情到懇至雖生死彌綸𤣥塗長逺要自驅策必階於道金輪之榮忽若塵垢帝釋之重蔑若秕穅始者精誠乃有所感自非一舉頓詣體備圓足其間何能不有小失且當録其真素略舉𤣥黄安得渾舉一概無復甄别不可以管蔡之釁姬宗盡誅四凶之暴合朝流放此無異人苦頭虱因欲并首俱焚患在足刺遂欲通股全解不亦濫乎云無益於時政有損於治道夫𢎞道者之益世物有日用而不知故老氏云無為之化百姓皆曰我自然斯言當矣是以干木髙枕而魏國大治庚桑善誨而畏壘歸仁沙門在世誠無目前考課之功名教之外實有㝠益近取五戒訓物非六經之疇逺以八難幽嶮非刑法之匹請以三藏銓罪非律令之流畼以般若辯惑非老荘之謂道品無漏拔苦因縁則存而不論周孔之教理盡刑器至法之極兼練神明精麤升降不可同日而語其優劣矣昔孛助化以道佐治國境晏然民知其義年豐委積物無疵厲非益謂何云世有五横沙門處其一焉凡言横者以其志無業尚散誕莫名或博奕放蕩而傾竭家財或名挂編戸而浮游卒歲或尸禄素餐而莫肯用心或執政居勢而漁食百姓或馳競進趣而公私並損或肆暴姦虐而動造不軌斯皆傷教亂正大敗風俗由是荀悦奮筆而逰俠之論興韓非弹毫而五蠧之文作以之為横理故宜然施之沙門不亦誣乎國家方上與唐虞競巍巍之美下與殷周齊郁郁之化不使箕頴專有慠世之賔商洛獨標嘉遁之客甫欲大扇逸民之風崇肅方外之士觀子處懐經略時政乃欲踵亡秦虎狼之嶮術襲商韓剋薄之弊法坑焚儒典治無綱紀制太半之税家無㳺財設三五之禁備民如賊天下熬然人無聊生使嬴氏之族不訖於三世二子之禍即戮於當時臨刑之日方乃追恨始者立法之謬本欲寧國静民不意隄防太峻反不容已事既往矣何嗟之及云一則誘喻一則廹愶且衆生緣有濃薄才有利鈍解有難易行有淺深是以啟誨之道不一悟發之由不同抑揚頓挫務使從善斯乃權謀之警䇿妙濟之津梁殊非誘廹之謂也云罪則㝠伺福則神祐夫含徳至淳則衆善歸焉易曰履信思順自天祐之吉無不利又曰為不善於幽昧之中鬼得而誅之豈非㝠伺神明之祐哉善惡之報經有誠證不復具列云㑹盡餚饍寺極壮麗此修福之家傾竭以儲将來之資殫盡自為身之大計耳殆非神明歆其壮麗衆僧貪其滋味猶農夫之播殖匠者之構室将擇楨材以求堂宇之飾精簡種子以規嘉榖之實故稼穡必樹於沃壌之地卜居要選於爽塏之處是以知三尊為衆生福田供養自脩已之功徳耳云割生民之珍玩崇無用之虚費夫博施兼愛仁者之厚徳崇飾宗廟孝敬之至心世教若此道亦如之物有損之而益為之必獲且浮財糞土施恵為神用譬朽木之為舟乃濟度之津要何虚費之有哉欲端坐而望自然拱嘿以希安樂猶無柯而求伐不食而徇飽焉可得乎茍身之不脩已為困矣何必乃蔽百姓之耳目擁天下之大善既自飲毒復欲鴆人何酷如之可謂亡我陷彼相與俱禍是以盲聾瘖瘂之對經幽處彌劫之殃調達之報歴地獄無間之苦云罄私家之年儲闕軍國之資實聖王御世淳風遐被震道綱以維六合布徳網以籠羣儁川無扣浪之夫谷無含歎之士四民咸安其業百官各盡其分海内融通九州同貫戎車於是寝駕甲士却走以糞嘉榖委於中田食儲積而成朽童稚進徳日新黄髪盡於眉夀當共擊壤以頌太平鼓腹以觀盛化子何多慮之深横憂時之不足不亦過乎云悋大官而腫口臨滄海而攝腹真子之謂也云繫影捕風莫知端緒夫偽辯亂真大聖之所悲嗟時不識寶卞和所慟哭然妙㫖希夷而體之者道沖虚簡詣而㑹之者徳用逺能津梁頹溺拔幽拯滯美濟當時化流無外故神暉一震則感動大千睿澤蹔灑則九州䝉潤是以釋梵悟幽㫖而歸誠帝王望𤣥宗而委質八部挹靈化而洗心士庶觀真儀而奔至落落焉故非域中之名教肅肅焉殆是方外之㝠軌然恒牆峭峻罕得其門器宇幽邃稀入其室是以道濟彌綸而理與之乖徳包無際而事與之隔子執迷自畢沒齒不悟盖有以也夫日月麗天而瞽者莫覩其明雷電震地而聾者不聞其響是誰之過與而方欲議宫商之音蔑文章之觀真過之甚者昔文鱗改視於初曜須㧞開聴於後緣子何辜之不幸獨懐疑以終年比衆人之所悲最可悲之所先於是逡廵退席悵然自失良久曰聞大道之説彌貫古今大判因緣窮理盡性立理不為當年𢎞道不期一世可謂原始㑹終歸於命矣僕寔滯寝長夜未達其㫖故毎造有封今幸聞大夫之餘論結解疑散豁然醒覺若披重霄以覩朗日發䝉盖而悟真慧僕誠不敏敬奉嘉誨矣𢎞明集釋道標與恒同學雅有才力當時擅名舎利弗阿毗曇序十六國春秋𢎞始十六年太子泓親管理味道標為序阿毗曇秦言無比法出自八音亞聖所述作之雖簡成命曲備重徽曠濟神要莫比真祗洹之微風反衆流之宏趣然佛後闇昧競執異津或有我有法或無我有法乖忤淳風虧蒙聖道有舎利弗𤣥哲髙悟神貫翼從徳備左面智㕘照來其人以為是非之越大猷将隠既曰像法任之益滯是以敢於佛前所聞經法親承即集先廵隄防摭抑邪流助宣法化故其為經也先立章以崇本後廣演以明義明義之體四焉問分也非問分也攝相應分也緒分也問分者寄信扣擊明夫應㑹非問分者假韻黙通唯宣法相攝相應分者總括自他釋非相無緒分者逺述因縁以彰性空性空彰則反迷至矣非相無則相與用矣法相宣則邪觀息矣應㑹明則極無遺矣四體圓足二諦義備故稱無比法也此經於先出阿毗曇雖文言融通而㫖格各異制又載自空以明宗極故能取貴於當時而垂軌於千載明典振於逺維四衆率尒同仰是使狥有者袪妄見之惑向化者起即隆之動迢迢焉故㝠宗之遺緒也亹亹焉故歸輪之所契也此經標明曩代靈液西畛淳教彌於閬風𤣥問扇於東嶺雖秦天王沖姿叡聖㝠根樹於既往實相結於皇極王徳應符闡揚三寳聞茲典誥夢想思覽雖曰悠邈感之愈勤㑹天竺沙門曇摩崛多曇摩耶舎等義學來遊秦主既契宿心相與辯明經理趣起清言於名教之域散衆微於自無之境超超然誠韻外之致愔愔然覆美稱之實於是詔令傳譯然承華天哲道嗣聖躬𤣥味逺流妙度淵極特體明旨遂讃其事經師本闇誦誠宜謹備以秦𢎞始九年命書梵文至十年尋應令出但以經趣微逺非徒關言所契茍彼此不相領悟直委之譯人者恐津梁之要未盡於善停至十六年經師漸閒秦語令自宣譯皇儲親管理味言意兼了復所向盡然後筆受即復内呈上討其煩重領其指歸故令文之者修飾義之者綴潤并校至十七年訖若乃文外之功勝契之妙誠非所階未之能詳並求之衆經考之諸論新異之美自宣之文惟法住之實如有表裏然原其大體有無兼用微文淵富義㫖顯灼斯誠有部之永塗大乘之靡趣先達之所宗後進之可仰標以近質綜不及逺情未能已猥叅斯典希感之誠脱復微序庶望賢哲以恕其鄙出三藏記集大藏羣字函曇影此人秦主勅住逍遙園助仆譯經著法華義疏并中論中論序夫萬化非無宗而宗之者無相虚宗非無契而契之者無心故至人以無心之妙慧而契彼無相之虚宗内外並𡨕緣智俱寂豈容名數於其間哉但以悕𤣥之質趣必有由非名無以領數非數無以擬宗故遂設名而召之立數而辯之然則名數之生生於累者可以造極而非其極茍曰非極復何常之有也是故如來始逮真覺應物接粗啟之以有後為大乗乃説空法化適當時所悟不二流至末葉像教之中人根膚淺道識不明遂廢魚守筌存指忘月覩空教便謂罪福俱冺聞説相則謂之為真是使有無交興生滅迭爭斷常諸邉紛然競起時有大士厥号龍樹爰託海宫逮無生忍意在傍宗載隆遺教故作論以折中其立意也則無言不窮無法不盡然統其要歸則㑹通二諦以真諦故無有俗諦故無無真故無有則雖無而有俗故無無則雖有而無雖有而無則不累於有雖無而有則不滯於無不滯於無則斷㓕見息不存於有則常等冰消寂此諸邊故名曰中問答㭊徵所以為論是作者之大意也亦云中觀直以觀辨於心論宣於口耳出三藏記集釋文紀巻九
