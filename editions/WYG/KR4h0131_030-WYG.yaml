body:
  text: 釋文紀巻三十明梅鼎祚輯陳一文帝姓陳氏諱蒨字子蕐吴興長城人武帝兄始興王長子妙法蓮蕐經懺文菩薩戒弟子皇帝稽􅈡和南十方諸佛無量尊法一切賢聖竊以前佛後佛種種因縁巳説當説各各方便莫非真語悉為妙法理無二極起必同歸但因業因心禀萬類之識隨見隨著異羣生之相品位分淺深覺悟有遲速法雨一味得之者參差法雷一音聞之者差别是以小乘頓敎由此各名聲聞菩薩因斯分路至如鹿苑初説羊車小乘灰斷湼槃分段解脱以諸佛之善巧㑹衆庶之根機是曰半字未稱三㸃及夫㑹三歸一反本還源説大乘經名無量義滅化城於中路駕寶車於四衢衣裏明珠隱而還見髻中真寶於焉始得出寶塔於虚空踊菩薩於大地見希有事證微妙法最勝最尊難逢難值弟子以因地凡夫屬符負荷方欲憲章古昔用拯黎元竊以羲皇結網㴱失大慈成湯解羅猶非妙善揚旌丹水異道樹而降魔執玉塗山非寶坊之大集所以憑心七覺繫念四勤住菩薩乗顯無三之敎學如來行開不二之門汲引羣迷導示衆惑今謹於某處建如干僧如干日法蕐懺見前大衆至心敬禮釋迦如來多寶世尊禮妙法蕐大乘經典禮暜賢菩薩妙灮法師願多寶如來從地湧出暜賢菩薩乘象空來竝入道場證明功徳擊大法鼔轉妙法輪震動世間覺悟凡品令使盡空法界無量聲聞無邊衆生皆為菩薩總持性相同到無生稽􅈡敬禮常住三寶金灮明懺文菩薩戒弟子皇帝稽􅈡和南十方諸佛無量尊法一切賢聖尋夫靈鷲山間自有常住之相白鶴林處本無變易之法故知眞解脱者誰辨去來實智慧者非有生滅而顛倒迷愚不曉三㸃之理無明覆蔽空有八十之疑於是四佛世尊百千菩薩俱㑹信相之室顯説釋迦之夀明稱歎之妙偈出懺悔之法音是曰經王微妙苐一以種智為根本以功徳爲莊嚴能照諸天宫殿能與衆生快樂能銷變異惡星能除榖貴饑饉能遣怖畏能滅憂惱能却怨敵能愈疾病如法修行功徳巳甚弟子以兹寡昧纂承洪業常恐王領之冝不符正論御世之道有乖天律庻績未康黎民弗乂方願歸依三寶憑藉冥空䕶念衆生扶助國土今謹於某處建如干僧如干日金灮明懺見前大衆至心敬禮釋迦如來四佛世尊金灮明經信相菩薩願諸菩薩久住世間諸天善神不離土境方便利益增廣福田映慈悲雲開智慧日作眼目導為依止所成就菩提之道場安住不動之境國稽首敬禮常住三寶大通方廣懺文菩薩戒弟子稽首和南十方三寶竊以諸佛刹土不可言説如來稱號無有限量或過去見在共取頗羅之姓或同時異世俱有釋迦之名或明王十億或燃燈三萬去來三界遍滿十方聞名者離塵受持者得道其為功徳難用思議釋迦如來以無礙力遊娑羅之淨道止吉祥之福地寶池化生金花自踊説大通方廣出三寶名號譬如六天總歸一乘弟子用慈悲之心修平等之業常以萬邦有罪責自一人四生未安理為重任所以薰修在巳日昃㤀勞精進為心夜分未息菩薩行處皆願受持諸佛法門悉令如説欲使暜天率土無復怖畏之塵蠕動蜎飛永得歸依之地今謹依經教於某處建如干僧如干日行方廣懺悔讀誦百遍右遶七帀塗香末香盡莊嚴之相正念止觀罄精懇之心見前大衆至心敬禮本師釋迦如來禮方廣經中所説三寶名字願諸佛菩薩尋聲赴響放淨灮明照諸暗濁施清涼水滅兹渴愛登六度舟入三昧海總萬有而㑹真如齊三界而登寶法稽首敬禮常住三寶虛空藏菩薩懺文竊以菩薩之於衆生是大依止觀察性相隨機濟拔一人未度不證道果徃古今來行願如一而虚空藏菩薩最為勝上為衆中之幢王為大明之尊主具諸佛之智慧得如來之秘宻至因夢見形隨縁示相一聞稱號水火不能焚溺一心稱名刀杖不能傷害壽命財產之願念而必諧色聲味觸之須求而皆遂身心疾惱憐愍療治牢獄怖畏方便解釋此盖隨從世法安樂衆生及夫動神變相去香集之境放淨灮明來閻浮之界入三昧定除煩惱熱説陀羅尼破惡業障五濁惡世一時清涼五根本罪竝皆觧脱此則開世間之眼示湼槃之路弟子承如來之敎禀諸佛之慈國被菩薩之功家行大士之業方願十方刹土悉有一乘十方衆生皆修十地今謹於某䖏建如干僧如干日虚空藏菩薩懺見前大衆至心敬禮本師釋迦文佛禮勝花敷藏如來禮陀羅尼神呪禮虚空藏菩薩尋聲應赴現神通力開智慧灮以種種身遊諸國土度脱衆生不乖誓願稽首敬禮常住三寶方等陀羅尼齋懺文竊以三世諸佛以誓願因縁十方如來以智慧方便縱無礙之辯開無盡之門法流派别宗源無限法本分散枝條不極非直摩訶般若獨有八萬四千至於陀羅尼門亦有九十二億䖏䖏宣説種種名稱功徳無量威神不測至如婆藪之拔地獄波旬之發菩提蕐聚之獲神通雷音之脱掩蔽莫不因斯章句承兹業力亦有四部弟子十方衆生聞一句而發心聽一説而悟道故知一切諸法無非眞妙弟子側身修行所學者菩提旰食夙興所行者濟度一心之力攝取衆生一念之頃遍諸法相如來種智皆願總持諸佛功徳悉欲流布今謹於法典本之經敎見前大衆至心敬禮釋迦牟尼佛禮陀羅尼章句禮雷音比丘禮蕐聚菩薩願承此功徳調伏衆生滅三毒心破十惡業四百之煩惱自然清淨八萬四千塵勞一時觧脱得神呪之力具法印之善入陀羅尼門觀諸佛境界頓銷獄火永盡無餘稽首敬禮常住三寶藥師齋懺文竊以諸行無常悉為累法萬有顛倒皆成苦本熱燄鏡像知變易之不停漂草爨茅見生滅之奔迅隨業風而入苦海逐報障而趣幽途去來三界未見可安之所輪廻五道終無暫息之期藥師如來有大誓願接引萬物救䕶衆生導諸有之百川歸法海之一味亦能施與花林隨從世俗使得安樂令無怖畏至如八難九横五濁三災水火盗賊疾疫饑饉怨家債主王法縣官憑陵之勢萬端䖍劉之法千變悉能轉禍為福改危成安復有求富貴須禄位延壽命多子息生民之大欲世間之切要莫不隨心應念自然滿足故知諸佛方便事絶思量弟子司牧寡方庶績未乂方憑藥師本願成就衆生今謹依經教於某䖏建如干僧如干日藥師齋懺現前大衆至心敬禮本師釋迦如來禮藥師如來慈悲廣覆不乖本願不棄世間興四等雲降六度雨滅生死火除煩惱箭十方世界若輪燈而明朗七百鬼神尋結縷而應赴障逐香燃災無復有命隨幡續漸登常住遊甚深之法性入無等之正覺行願圓滿如藥師如來娑羅齋懺文尋夫真觧脱者本自不生實智慧者今亦無滅故知鶴林變色非變易之文鷲山常在實常住之法但世界不一應赴所以不窮衆生無邊方便所以無際隨念隨著種種法門因業因心各各示見或八十小劫端坐之相未移方八十年無餘之機已及熈連河側晨朝之色忽明娑羅樹間中夜之聲便寂最後功徳是曰兹辰弟子有縁閻浮囑當重任愍羣生之顛倒嗟庶類之愚迷常願造六度之舟濟之於彼岸駕一乘之御驅之於中道今謹於太極殿設無礙大㑹首僧一夕娑羅大齋願法雨法雲清凉三界之火慧燈慧炬照朗百年之室常住二字人天共聞伊字三㸃凡聖並悟無勞迦葉之問不待須跋之疑一切種智而為根本無量功徳以自莊嚴意樹開解脱之花身田含定慧之水居處吉祥之地枕藉福徳之場與二氣而俱貞隨四時而納祐日月天子照合璧於大千星辰宮殿散連珠於百億慈悲輕雨與祥風而竝飛菩提寶雲共飛煙而合彩六合四海無復塵勞六道四生俱䝉淸淨無礙㑹捨身懺文竊觀雅誥奥義皇王興在予之言禮經令典聖人揚罪已之説故亡身濟物仁者之恒心克已利人君子之常徳況復菩薩大士法本行處應赴三界攝受四生運無量之四心修平等之六度國城妻子僶俛哀荒承祖宗之大業扶曳喘息當天下之重任黎民弗乂庶績未熈御朽履冰無忘兢業又以世相泡影有為露電愛河奔迅欲海飛騰禀識同焚含靈共溺垂瑱憑玉還覺萬乘非尊當宁負扆飜以萬幾成累夕惕若厲思𢎞汲引昧旦丕顯奉爲七廟聖靈奉爲皇太后聖御奉為天龍鬼神幽冥空有三界四生五道六趣若色若想若怨若親若非怨親遍虚空滿法界窮過去盡未來無量名識一切種類平等大捨弟子自身及乘輿法服五服鑾輅六冕龍章玉几𤣥裘金輪紺馬珠交纓絡寶飾莊嚴給用之所資待生平之所玩好並爾檀那咸施三寶今謹於前殿設無礙大㑹奉行所願并諸功徳具列于前願諸菩薩冥空幽顯俱到證明開智慧日映慈悲雲樹寶幢於大千擊法鼔於百億震動世界覺悟羣生放三昧之淨灮流一味之法雨引愚癡於火穽拔煩惱於棘林出輪轉河到無生岸竝廣𢎞明集宣帝諱頊字紹世小字師利文帝弟勝天王般若懺文菩薩戒弟子皇帝稽首十方諸佛無量尊法一切賢聖自鶴林滅跡鷲嶺凝神瓶冩總持遺文不墜傳燈流布法輪踰廣方軌𢎞宣既昭著於西域分鑣顯説亦漸移於東土而周朝徴應止見夜明漢帝感通不過宵夢香象所載虎觀寂而未聞龍宮所藏麟閣閴其無取山海為隔傳授葢微蕐夷不同翻譯何幾天王所問止得經名金剛之經纔見一品歴魏晋而未僃經宋齊而恒闕我皇帝承家建國灮前絶後道格天地通被幽微大啓慈悲廣開智慧施造化以仁壽濟蒼生於觧脱異世界而承風殊刹土而響應真人間出法寶傳通粤以天嘉六年外國王子月婆首那來遊匡嶺慧觧深妙靡測聖凡奉持勝天王般若經一部於彼翻譯表獻京師某校彼前名冥合符契總三乘之通教貫六度之淵海如開暗室以照優曇十方衆生若貧人之獲寶四部弟子等力士之得珠金牒寶印始兹辰而一啓智慧實法洎爾時而方具故知如來付囑必俟仁王般若興隆期於聖運弟子纂承洪緒思𢎞大業願此法門遍諸幽顯今謹於某䖏建如干僧如干日勝天王般若懺見前大衆至心敬禮本師釋迦如來禮般若波羅蜜禮勝天王願一切衆生勤求般若不避寒暑如薩陀波崙不愛身命如精進力菩薩得般若之性相與般若而相應攝諸萬有住安隐地含靈有識悉獲歸依稽首敬禮常住三寶廣𢎞明集從釋智顗受法文智顗移居灮宅帝后以下並崇戒範其受道文云顗見隋仰惟化導無方随機濟物衛護國土汲引天人照燭灮輝託迹師友比丘入夢符契之像久彰和上來儀髙座之徳斯炳是以翹心十地渴仰四依大小二乘内外兩敎尊師重道由來尚矣伏希俯提所謂世世結縁遂其本願日日増長今奉請為菩薩戒師續髙僧傳留智顗禪師勅顗陳灮大元年至金陵太建中止瓦官寺前後八載謝遣門人曰吾聞天台幽勝将息縁兹嶺帝勅留遂勉度夏京師三藏雖𢎞皆一途偏顯兼之者寡朕聞瓦官濟濟深用慰懐宜停訓物豈遑獨善一二曹義逹口具得朕意也四月一日臣景歴施物勅太建九年智顗禪師佛法䧺傑時匠所宗訓兼道俗國之望也宜割始豐縣調以充衆費蠲兩戸民用供薪水主者施行二月六日臣景歴給寺名勅顗入天台於佛壟北峯建立伽藍徐陵啓聞太建十年下勅具左僕射徐陵啓智顗禪師創立天台宴坐名嶽宜號修禪寺也五月一日臣景歴禁海際捕魚滬業勅天台海民漁捕為業陳太建中計尚兒為臨海内史請顗講金灮明經顗乃雙明誡勸廣逹殃福尚兒仍里奬諭滬主嚴續祖羊公賀等合境湍潮三百餘江溪滬梁六十三所同時永捨表聞宣帝降勅至隋時復開海禁顗與臨海鎮将書述其事止之智禪師請禁海際捕魚滬業此江苦無烏賊珍味宜依所請永為福地並釋灌頂國清百録曇瑗監檢戒場詔瑗住揚都灮宅寺恒當講席宣帝下詔瑗見梁國内初受戒者夏未滿五皆叅律肆可於都邑大寺廣置聽場仍勅瑗公總知監檢明示科舉有司准給衣食勿使經營形累致虧功績釋靖嵩等供給勅嵩姓張涿郡固安人周武滅法與同學三百餘僧逹于江左宣帝使駙馬蔡凝宣勅仍令推薦義學長者即𢎞像敎至人為法以身許道法師等善明治亂歸寄有敘可謂懐道正士深可嘉之宜於都郭大寺安置所司供給務令周洽北伐勅太建五年伐齊卜龜腹裂灮宅釋慧明以為千里路通後果獲勝下勅今歲出師薄伐邊服所獲梁土則江淮二百許城東西五千餘里然龜腹長文號千里也遠驗明言宛同符契並續髙僧傳少主諱叔寶字元秀宣帝長子勅迎智顗顗至徳二年為永陽王請徃東陽少主三遣勅使並辭以疾既届金陵暫安靈曜詔赴太極殿開大智度論仁王般若經題春寒猶厲道體何如宴坐經行無乃為弊都下法事恒興希相助𢎞闡今遣宣傳左右趙君卿迎接遲能即出也正月十一日臣徴神筆一二君卿口具便望相見在促象教皮編云春寒猶厲道體何如宴坐經行無乃為惫今貺闞實縷􅀈案一面山羊鬄塵尾一柄㯽榔二千子此陳氏近所編按國清百録載智顗在靈曜寺主書羅闡宣口勅送真金像一軀釋論一部闞寶縷􅀈案一面山羊鬄麈尾一柄虎面香爐一面又羅闡宣口勅施檳榔二千子節子一百枚䓉席一領今合前勅之半為一又勅得使人趙君卿啓幷省來答表志存林野兼有疾病願停山寺不欲出都不具一二巖壑髙深乃幽人之節佛法示現未必如此且京師甚有醫藥在疾彌是所宜故遣前主書朱宙迎接想便相隨出都惟遲法流不滯㑹言在近二月八日臣徴神筆朱宙口述一二又勅前雖遣兩使殊未委悉意存三寶故有相迎今復遣龍宮寺道昇竝令面陳一二也二月二十八日臣徴勅東陽州刺史永陽王伯智聞王在州迎顗禪師大𢎞法事甚會朕心今迎出都王宜敦諭申朕意也正月十日臣徴路次迎候勅書近得永陽王啟知禪師遂能屈德隨朕使出都甚有欣遲當稍次近路渉險道殊足為勞今遣勅左右黄吉寶迎候但未知欲安止何寺想示使人仍令前還即勒所由料理房舍也遲近㑹言此未委悉三月二十四日臣徴並國清百録揚都興皇寺釋法朗墓銘朗姓周沛人祖父貴仕朗少習軍旅假節寧逺將軍於青州入道遊學揚都初有居士杜法粲夢興皇寺内幡花充牣洎朗來寺創㑹齋講又帳下解齋失曉朗夜扣閣洪鐘自響陳太建中終後主時在春宮為之銘洪源遠采傳芳馥蕙君子哲人英芬是繼朱旄既杖青組仍曵紉虎戎卸貳貎狄制功可冠軍業非出世揖彼聲色超此津濟津濟伊何裂斷網羅忍衣早記乘樓夜過航斯苦海涸此愛河若非智士孰寄宣揚法雲廣被慧日舒灮既摧衝櫓自闢金湯夢齊鼔説應異鐘霜識機知命同彼現病夙心栖遁度脱難竟化縁已矣乃宅丘穽智炬寂滅頹巖遼夐遼夐空岑搖落寒侵弦餘月暗霧下松深香滅窮壟旛横宿林切切管清遙遙鼓聲野煙四合孤禽一鳴風悽唄斷流急寒生神之淨土形沉終古勒此方墳用旌蘭杜續高僧傳少主后沈氏字婺蕐儀同三司君理女陳亡隨後主入隋於毗陵天靜寺為尼與智顗手書后請立法名顗答令名海慧菩薩妙覺和南今遣内師許大梵徃稽首乞傳香火願賜菩薩名庶藉熏修菩提眷屬謹和南沈后扶月供熏陸沉檀各十觔黄屑一斗細紙五百張燭十挺赤松澗米五石錢一千文右件月月供灮宅寺三月十二日少主皇太子淵字承源後主第四子陳亡入隋為枹罕太守請智顗授菩薩戒疏至徳四年正月皇太子請授菩薩戒顗于時傳香在手淚下垂臉既字為善萌反言成晚後隋呑陳方悟前㫖淵和南仰惟化道無方隨機濟物衛護國土汲引天人昭燭灮輝託迹朋友比丘入夢符契之像久彰和上來儀髙座之徳斯炳是以翹心七淨渴仰四依庻三自之歸可𢎞五戒之法永固竊尋内外兩教大小二乘重道尊師由來尚矣伏希俯從所請世世結縁遂其本願日日増長今月十五日於崇正殿設千僧法㑹奉請為菩薩戒師謹遣主書劉璿略申誠欵殊未宣悉弟子淵和南正月十三日一皇太子扶月供熏陸香一合檀香三十觔中藤紙垜乳酥一斗錢二千文朋友别傳作師友七淨作十地伏希俯從所請作伏希俯提從其所請日日作日夜國清百録續髙僧傳陳宣帝受法文與此大同永陽王伯智字䇿之文帝子入隋歴國子司業與智顗手書王出鎮東陽致書三請與家人咸秉淨戒秋氣淒冷願安樂行耳弟子寡末未能治道願欲延屈方憑開導今遣左右陳文强徃悉其一二弟子陳伯智和南八月十日又弟子少奉正真長而彌篤州中事隙時得用心但至止以來實有欽睠前書要師出鎮講説未辱還告良以鬰陶佇聽之情不忘瞬息重遣今信必望翻然學徒多少竝希攜帶故前有白尋勒人船所遲來儀㑹言在促弟子陳伯智和南又使人山返仰具高懷域誠不果更深為恨本知山水得性為物忘懐復須安忍今遣迎接佇望灮臨弟子陳伯智和南高麗昆布人參等送去是物陋返仄屬真觀恵裴二法師手書裴梁湘東王門師觀為永陽王師事靜惠和南更雪寒重願禮懺不廼仰疲弟子眩怳無理真觀法師願得入山攝慮禪寂今以彼書仰呈裴公又正束裝待小晴適便當就路但觀公非惟義解又誦法華既朗慧燈方澄定水仰惟闍黎徳侔安遠道邁灮猷遐邇傾心振錫雲聚紹像法於將墜以救昏䝉顯慧日之餘灮用拯澆俗兼孔山隂捨良田以供耕墾姚寶安捨淨財以給葅菜禪堂行就修緝糧廩不慮闕無諸善因縁亦各随喜弟子劣薄竭誠供養願勿以資待繼意徒衆為憂憑兹福業庻遣煩勞藉此熏修冀荷冥祐弟子陳靜惠和南解講疏菩薩戒弟子陳靜智稽首和南十方常住三寶幽顯冥空現前凡聖伏惟法王法力憫三界之顓愚無漏無爲開一乘之奥典深宗絶稱仰蓮蕐以立名實智難思借寶珠而喻理慇懃𢎞接始則大事因縁指掌言提終令小乘解悟接須彌擲世界未是為難開秘密導蒼生斯為弗易天台顗闍黎遊浪法門貫通禪苑有為之結巳離無生之忍現前仰屈來儀闡揚極敎高軒層殿廣闢齋宮聖衆雲集僊羣霧委俱奉傳燈之曜共挹懸河之流法侶忻慶神祇踊躍弟子飄蕩業風沈淪愛水雖餐法喜弗袪䝉蔽之心徒仰禪悦終懐散動之慮但日輪馳騖羲和之轡不畱月鏡廻軒嫦娥之影難駐適啓金函便收寶軸法輪輟軫鷲嶺之説何期清梵停音魚山之唱方息有離有㑹歎息奚言愛法敬法潺湲無巳謹於今月十三日解講功徳仰設法會幷度人出家又觀音菩薩法身大士拯危拔難利益人天奉造靈儀即日鎔鑄用斯福善上資清廟聖靈又奉為即日至尊願御膳勝常安徳宮太后菩薩寝興納豫皇太子起居萬福諸王諸主咸保嘉慶末及弟子自身幷息諶等内外眷屬一切因縁夀命長遠身心快樂惟願顯揚三寶通逹五乘戒與秋月俱明禪與春池共潔生生世世與闍黎及講衆黑白見聞覺知恒結善友恒將濟度還同智積奉智勝如來便似藥王覲雷音種覺或見生安樂世界或䖏兜率天宮俱蕩三乗行俱向一乘道恒沙菩薩為等侶恒沙國土為佛事得法自在得心自在同修七覺分同趣三菩提虚空有邉此願無盡仰希幽顯證明法界怨親同入願海廻向薩雲若為無所得故並國清百録發願文王出撫吳興就智顗請戒出獵墮馬作觀音懺法見梵僧一人擎爐繞王一帀翕然痛止仍躬著願文語案此見續高僧傳即前文􅂾又前所無仰惟天台闍黎徳侔安遠道邁灮猷遐邇傾心振錫雲聚紹像法之墜緒以救昬䝉顯慧日之重灮用拯澆俗加以遊浪法門貫通禪苑有為之結巳離無生之忍見前弟子飄颺業風沈淪愛水雖餐法喜弗袪䝉蔽之心徒仰禪悦終懐散動之慮日輪馳騖羲和之轡不停月鏡廻斡嫦娥之景難駐有離有㑹歎息何言愛法敬法潺湲無已願生生世世值天台闍黎恒修供養如智積奉智勝如來若藥王覲雷音正覺安養兜率俱蕩一乘天台智者别傳墜緒作将墜飄颺作飄蕩廻斡作廻軒毛喜字伯武滎陽陽武人領左驍騎将軍與智顗書顗為喜出六妙門即不定止觀也累年仰系不易可言承今夏在石像行道欣羡無極又聞欲於天台營道場當在夏竟耳學徒遠近歸依者理應轉多安心林野法喜自娱禪講不輟耳四十二字門令附雖留多時讀竟不觧無因諮訪為恨轉積南嶽亦時有信照禪師在嶽嶺徒衆不異大師在時善公於山講釋論彼亦邑遲望還綱維大法不者歸鍾嶺攝山亦是棲心之處何必遠適方詣道塲希勿忘京師邊地之人豈知廻向傾心無時不積未因接顔色東望欷懣敬徳信人今返白書不具弟子毛喜和南又弟子諸弟及兒等悉䝉平安第二任鄱陽郡第三為豫章王司馬第四大廷卿第五入閣任度支郎大兒由在東宮為中書舍人仰䝉垂顧以大善知識大同學輒復逺諮又秋色尚熱道體何如禪禮無乃損徳弟子老病相仍湯藥無效兼不得自閒轉有困爾仰承移徃佛隴永恐不復接顔色悲慨俱深仰惟本以曠濟為業獨守空巖更恐違菩薩普被之㫖近與徐丹陽諸善知識共詳量等是一山鍾嶺天台亦何分别必希善加三思不滯於彼我京師彌可言師一二因㧞師口具其間願敬道徳弟子毛喜和南又適奉南嶽信山衆平安弟子有答具述甲乙後信來當有音外也今奉寄牋香二斤熏陸香二斤檳榔三百子不能得多示表心勿責也弟子毛喜和南又書慶講今者仰餐敷説訓徃綽然道俗嗟味般若照明豈是拙辭所能稱述弟子毛喜和南並國清百録徐陵字孝穆東海剡人歴太子少傅與智顗書陵和南昨預沈儀同法席餐奉甘露無畏之吼衆咸歸伏然正法炬朗諸未悟自慶餘年得逢妙説尋事諮展此不申心謹和南又陵和南注仰之心難可敷具拔公至蒙三月二十日㫖用慰積嵗傾心麥冷體中何如願一日康勝山中春夏無餘障惱耳遲復存㫖弟子二三年來溘然老至眼耳聾闇心氣昏塞故非復在人兼去嵗第六兒夭喪痛苦成疾猶未除愈適今月中又有哀故頻嵗如此窮慮轉深自念餘生無復能幾無由禮接係仰何言敬重璪公今還白書不次弟子徐陵和南又陵和南放生星聞公家極相隨喜事是拔公口具謹不多諮惟遲拔公廷出数百里水全其命根如此功徳算數無盡隨喜無量此不委諮弟子徐陵和南五願上智者禪師書陵和南弟子思出樊籠無由羽化既善根微弱冀願力莊嚴一願臨終正念成就二願不更地獄三途三願即還人中不高不下䖏託生四願童真出家如法奉戒五願不墮流俗之僧憑此誓心以䇿西暮今書丹款仰乞證明陵和南並國清百録諌仁山深法師罷道書竊聞出家閒曠猶若虚空在俗籠樊比於牢獄非但經有明文亦自世間共見瞥聞法師覆彼舟航趣返緇衣之務此為目下之英竒非久長之㴱計何以知然從苦入樂未知樂中之樂從樂入苦方知苦中之苦弟子素與法師雖無曩舊相知巳來亦復不踈夫良藥必自無甘忠諫者決乎逆耳倚見其僻是以不忍不言且三十年中造莫大之業如何一旦捨巳成之功深為可惜敬度髙懐未觧深意將非帷帳之䇿欲集劉侯形類卧龍擬求葛氏黄石兵法寧可再逢三倂茅廬無由兩遇封爵五等惟見不逢中閣外門難朱易白鳴笳鳯管非有或聞儛女歌姬空勞反翫覓之者等若牛毛得之者譬猶麟角以此之外何所窺窬法師今若退轉未必有一稱心交失現前十種大利何者佛法不簡細流入者則尊歸依則貴上不朝天子下不讓諸侯獨翫世間無為自在其利一也身無執作之勞口餐香積之飯心不妻妾之務身飾芻摩之衣朝無踐境之憂夕不千里之苦俯仰優游寧不樂哉其利二也躬無任重居必方域白壁朱門理然致敬夜琴晝瑟是自娱懐曉筆暮詩論情頓足其利三也假使棘生王路橋化長溝巷吏門兒何因仰喚寸絹不輸官庫升米不進公倉庫部倉司豈須求及其利四也門前擾擾我且安眠巷裏云云余無驚色家休小大之調門停強弱之丁入出隨心徃還自在其利五也出家無當之僧猶勝在俗之士假使心存殺戮手無斷命之愆密裏通情決勝灼然矯俗如斯煩垢萬倍勝於白衣一入愛河永沈無出其利六也聽鐘聲而致敬尋香馥以生心朝覩尊儀暮披寶軸刹那之善逐此而生水滴微功漸盈大噐未知因縁果報善惡皎然就此而言其利難陳矣假使逹相白衣猶有埃塵之務縱令遙寄彈指遠近低頭形去心留身移意徃閒有者得如此貧苦者永無因近在目前不言可見其利七也山間樹下故自難期枕石漱流實為希有猶斯之類不可思議如此者難逢一心人悕遇法師未能不學交習聽勝之因一旦退心於理邈矣其利八也開織成之帙見過去之因摛璢璃之巻驗當來之果識因識果不以為愆知福知報何由作罪上無舟檝交見沒溺之悲下失浮囊則有沈身之患其利九也曠濟羣品為天人之師水陸空行皆所尊貴言必闍黎和上書輒致敬和南逺近嗟詠貴賤顒仰法師今必退轉立成可驗纔脱袈裟逢人輒稱汝我始解偏袒姓名便亦可呼平交者故自不論下劣者亦恐不譲薄言稱已榻席懸異從來小得自在便以君為題封若不屈膝斂手自逹無因俯仰承迎未閑合度如此專專何由可與其利十也略言十事空失此機其間深道寧容具述仰度仁者心居魔境為魔所迷意附邪途受邪易性假使睂如細栁何足關懐頰似紅桃詎能長久同衾分枕猶有長信之悲坐臥㤀時不免秋胡之怨洛川神女尚復不惑東阿世上班姬何關君事夫心者面焉若論繾綣則共氣共心一遇纒綿則連宵厭起法師未通返照安悟賣花未得他心那知彼意嗚呼桂樹遂為豆火所焚可惜明珠乃受淤泥埋没弟子今日横諮必為法師所哂世上白衣何訾何限且一人退道而不安危推此而言實成難解譬如瓦礫盈路人所不驚片子黄金萬夫息歩正言法師入道之功巳備染俗之法未加何異金搏赤銅銀換鉛錫可悲可惜猶可優量能忍難忍方知其最願棄俗事務息塵勞正念相應行志兩全薄加詳慮更可思惟悔之在前無勞後恨如弟子算遠即十􅂾年中決知惻惻近即三五嵗内空唱如何萬恨萬悲寧知逺及自誤自錯永棄一生乃知斷絃可續情去難留或若火裏生花可稱希有迷人知返去道不遥幸速推排急登正路法師非是無智遂為愚者所迷類似阿難更為魔之所嬈猶須承三寶之力制彼羣凶豎般若之幢天魔自款若此言旨當即便冀棄芻蕘若不㑹高懐幸停深怪耳廣𢎞明集孝義寺碑臣聞道階八地猶見后妃願生千佛無匪賢聖汲引之義雖同隨機之感非一至如媯汭有禮皇源所以前興周女斯歸陳宗所以流慶大矣哉神基帝系淑聖重灮者也慈訓太后德佐初九道暉上六居天上天中之極䖏太任太姒之尊蘋藻之化斯㴱葛覃之風彌遠皇帝膺兹上聖契彼援神愛敬在乎一人徳敎形乎四海是以明星皎皎流半月之灮甘露團團灑如飴之味嘉禾自秀浪井恒清天降徴祥日聞書府自大明紹運神武應期至道傍通無思不格戊巳校尉西關玉門伏波將軍南表銅柱方使三千世界百億須彌同望飛輪共禀𤣥徳天嘉三年正月二十一日詔㫖仰惟聖徳方被兆民乃勅有司改東成里為孝義里昔岱山徙號重蕐著其受終徳水移名秦人表其嘉運豈若盡在輿地書兹里門仰述天經灮臨父母臣陵稽首乃作銘曰願此良因宜資貴親三乗並策四梵為賓紺殿安坐蓮花養神燈前禮佛地後邊身並濟含識咸歸至真國家隆盛同饗遐慶謹勒豐碑陳其舞詠長干寺衆食碑昔炎皇肇訓稷正修官信矣民天之言誠哉國寶之義自非道登正覺安住於大般湼槃行在真空深入於無為般若則菩薩應化咸同色身諸佛淨土皆為揣食證常住者爰訖乳麋補尊位者猶假香飯亦有三心未滅七反餘生應㑹天宮就齋龍海况復纔居地轉咸憩珠庭固以皆種仙禾並資靈粟者矣法師常願以智慧火燒煩惱薪暜施衆生同餐甘露况復安居自恣碩學高年或次第於王城猶栖遑於貧里迦留乞䴵苦用神通須提請飯致貽詞責於是思營衆業願造坊厨庶使應供之僧皆同自然之食升堂濟濟無勞四輩之類高廪峨峨恒有千食之僃其外鐵市銅街青樓紫陌辛家黑白之里甲第王侯之門莫不供施相高資儲轉衆法師善巧方便漚和舍羅敎授滋生隨年増長假使桑林不雨瓠水揚波猶厭稲梁永無饑乏加以五鹽俱足七菜芳軟䴵類天厨果同香樹羮鼎之大殷王未逢糜鑊之深齊都非擬昆吾在次皆鳴鷲嶺之鐘暘谷初升同洗龍池之鉢東陽䨇林寺傅大士碑自修禪遠壑絶粒長齋非服流霞若食朝沆姜嫄所履天歩可以為儔河流大屐神足宜其相比夫以連城之寶照廡之珍野老怪而相捐工人迷而不識昔漢皇受道欒大不臣魏祖優賢楊叟如客河上之老輕舉臨於孝文臺下之人高尚加於灮武五胡内贔蒼鵞之兆未萌四海横流夷羊之牧匪見滴海未盡其辭懸河不窮其義伯陽之徳貞柏紀於瀨鄉仲尼之道高碑書於魯縣亦有揚雄弟子鄭𤣥門人俱述清猷載刋𤣥石銘曰來儀上國抗禮承明妙辯無相深言不生撞鐘比説擊鼔慙英樂論天口誰其與京乍見仙掌爰標神足色艶沉檀香踰薝蔔噭噭門人承師若親寜焚軟疊弗燎香薪合窟為窆方墳以堙須彌巨海變灰揚塵淨土無壊靈儀自真何時踊塔復覩金身齊國宋司徒寺碑無色之外方為化城非想之中猶稱火宅若夫衆生無盡世界無窮芬若披蓮逺如散墨善才童子南行未窺目連沙門北遊不見一一刹土皆由業縁萬萬僧祇終非常樂天宮蹇產猶傾四大之風魔殿崔嵬終懼三災之火朱樓寶塔輝煥争蕐既義暢中土道流遐域顯默同歸蕐夷俱慕自枕石漱流始終一槩悟智交養三十餘年春秋八十三古人云道存人亡法師之謂凡我門徒感風徽之緬邈傷􅖴悟之永滅敢以淺見揚徳金石銘曰九流依真三乗歸佛道往絶跡慈還接物孰是發䝉昭我慧日攝亂以定闢邪以律秦皇雄感蔽理通情王孫徧解逺􅂮滯生夫子之悟萬刼獨明寒暑遞易悲欣臯壤秋蓬四轉春鴻五響孤松獨秀徳音長徃節有推遷情無遺想遞一作迭四無畏寺刹下銘皇帝升乾行於九五闢世界於三千神人開錦石之山小國獻栴檀之柱乃命将作修成梵宮複殿重軒凌霄負漢慈訓宮朝文母協道方祇鍾愛東平更踰燕后若夫外家問訊遙疑綠褠御者衣服曽無綵繡咸傾寶飾用構支提僧若檀林寺同祇苑辭曰寶盖王子金輪託生皇家茂戚抑有齊名業水餘潤災風所驚徒悲馬角孰獻鷄鳴奈苑初築菴園重成金臺日麗玉殿雲平梵衆朝禮天歌夜清蜂疑畵壁雀避雕楹福履斯大皇基永禎衆生不盡寶刹無傾報徳寺刹下銘昔者明王大孝感動神祇助月致景星之祥非煙流慶雲之色然而嚴敬之道惟事盡於配天明發之懐誠不過於饗帝豈如以梵宮之樂資乎廟堂淨土之因歸於園寝雖復青雲譙郡之境碧泉舂陵之鄉上㓜懐凝重未曽遊陟年将志學即事登庸宣力淮潯屬有嘉夢其夢也畢陌𢎞敞橋山屈盤氣象靈長風煙騰溥使隊雙表其高百尋左則青龍蟠蜿右則白虎蹲踞軒轅之駕譬婉婉而多慙吴王之墳状眈眈而非擬有人指其地云此是國陵自爾迄永定初其間二十有餘年至嵗紀頻移崇塋乃作觀其山川形勢王相徴圖瞻拜髙巒宛如前夢大矣哉孝弟之至通於神明者與銘曰壯矣金表傍依壖垣高連綵霓極睇翔鶤梵偈宵唱雲花晝飜三心斷縛六道除怨趙夢天樂秦遊帝閽王靈在上巨勝奚論福被羣品俱排大昏皇家七百於萬維孫並藝文類聚徐孝克陵從弟國子祭酒天台山修禪寺智顗禪師放生碑夫大易無體品類所以咸亨太一無名至人於是設教仰觀俯法遠取旁求兼三以才吹萬惟物建官台鉉則五嶽作鎮辨方伯牧故四瀆分流闢伊闕覧八紘鑿龍門陂九澤播厥習險因之以利民相土卜洛樹之以君長坎之時用大矣哉我皇帝作聖凝神乘圖御籙無為無欲道契汾陽垂拱垂衣徳隆至治辰象貞明管灰合序方外無虞海内有截被風雅於華戎盛雍熈於曩代巍巍乎難得而稱者也至如灮啓法式榮敷道樹化章十善𢎞濟四生天台修禪寺智顗禪師蔬練自居苦節行矣奉揚皇風總持像季禪師俗姓陳氏潁川人也乃有媯之後焉四友驚座逖聽多美六竒􅍌爵世載其賢祖詮早世父起祖梁使持節散騎常侍益陽縣開國侯禪師童真出家聰敏易悟寓居荆陜遊化幽并自北徂南兼行禪智禹穴將探台山是卜白鷄路出青髓巖開攀桂結宇蕭然憩止林交五栁既馥栴檀之氛塔現三層終縣水精之色雲崖天樂不鼔自鳴石室金容無形畱影秀嶺嶔崟浪波浩瀚洪濤蜃氣冐逺包空巨壑喬松干雲翳日翔集飛走叢育珍怪地中藏玉觀曲枝而易辨淵内沈珠見圓流而可别神通開士如意桑門振錫呪泉騰空舞鉢受丹仙客汎急水而時來避官眞人乘廻風而迥至厥土宏麗靈讖斯在禪師福慧鎡基聲灮利益宣猛将軍臨海内史計尚兒子勳之胄世顯方術賣藥登􅋖聞于昔漢剖符作守即此明時請轉法輪講金灮明經一部前雲騎將軍臨海内史陳思展及其猶子陳要卿等即土人也戎章衣繡優秩家邦奉屈禪師次講法蕐經典白牙團扇初開律藏之門玉柄麈尾旁闡經王之偈繫珠始訓親友醉除夢鼔將鳴梵魔疑遣因廼雙明誡勸廣辯殃福尚兒仍奨諭簄主嚴續祖羊公賀等羣賢凡百君子信誓斯立丹誠恪勤白業諧辯嗟如棠之徃累歎釣濮之來縁各捨簄業及魚梁等合六十三所二縁樹下懸唱善哉五旬座上遙聞彈指巨海無際一時清謐衆生無邊同荷安快掌擎世界未粤難思手把虚空非名希有桂陽王殿下皇枝之貴思懋間平情崇孔釋吐懸河之㫖擊節證明示半月之形深心隨喜五侯三傑曾不間然黄髪青衿咸同踊躍藏諸篆素青編落簡樹以貞碑芳聲靡絶假令山止海運惠施之美猶傳龜吉筮凶鐫勒之功無毁孝克才慙十倍學惰三餘春蒐秋獮久捐染截書紳畵地曾何圖冩雖復張池竝黑寧擬妙辭峴石徒刋非能墮淚仰熏心之上善羨山水之清音寸志片言乃為銘曰設位觀像剖極開渾蕩蕩為大蒼蒼以尊膏川淚瀆地脉河源導疏咨禹葢取維軒嗟乎坎德至矣坤元淳風樂土君臨御㝢明明孝治穆穆聖主道冠當今功高前古慶協嘉瑞美均擊拊仁沾動植澤及遐宇釋種高族身資瓢蓛匪慕分圭歸心染服辭彼縁慮言旋幽谷志託松筠形隨槁木七覺善誘五禪清肅無逺弗届無思不服將軍邦宰肩印銷罪淑女良夫民業珍賄靡宏十明寧追百倍不見所欲忘懐無待各捨貨泉同成佛海泱漭冥䝉瞻眺唯空屛師送雨列子揚風鯤鱗以北極外之東遠水日曾波駕蓬地上之比山下之䝉涇清渭濁朝宗㑹同天台維節林泉搔屑頂列三辰峯危九折􅓬布高㵼神状殊潔響若奔雷皎如素雪隆冬不凝炎旱無竭石橋杳邈晨暉映徹仰止青霄俯臨丹穴鳥路雲通人途徑絶渤澥難邊含情沂沿嗷嗷岌岌萬萬千千鼔鰓掉尾相望自然壁網無挂任鈎不牽歌舼靜拽饗俎停羶行滿業大𢎞生為最斷樹誠規翳樊斯誡噲參靈鶴敬康神蔡隨感明珠于期軒葢嘉㑹信徵潛騰是賴逝矣虞淵波瀾易遷髙岸深谷蓬海桑田石餘幾拂芥盡何年大地将隕須彌洞然風傾今際火及初禪猗與水性報轉常圓國清百録秋春蒐秋獮南藏作莬春蒱營湼槃懺詩序詩紀作江總禎明二年仲冬攝山棲霞寺布法師只爾待終余以此月十七日宿昔入山仰為師氏營湼槃懺還途有此作廣𢎞明集沈君理字仲倫吴興人歴尚書右僕射請智顗講法蕐疏太建元年君理請顗居瓦官開法蕐經題儀同公菩薩戒弟子吴興沈君理和南竊聞大乘者大士之所乗也高廣暜運直至道場復作四依周旋六道仰惟德厚深㑹經文於五誓之初請開法蕐題一夏内仍就剖釋道俗咸瞻延佇嘉唱慈悲利益不違本誓耳謹和南國清百録陳暄義興國山人通直散騎常侍徵智顗奏宣帝問羣臣釋門名勝暄奏自天台徵入都瓦官禪師徳邁風霜禪鏡淵海昔在京邑羣賢所宗今髙歩天台法雲東藹願陛下詔之還都使道俗咸荷續高僧傳虞荔字山披會稽餘姚人東揚州大中正梁同泰寺刹下銘戒香芬馥氣勝懐蘭智過陸離威逾交軋敞慧日於重雲浚法流於巨海嚴此三駕用拔畏塗漾彼六舟拯諸淪溺但以一人入道波旬之宮巳震十地𢎞心毒龍之菑競起重欒布濩積栱峻嶒神山嶽嶽俯雕檻於霞外寶鐸鏘鏘韻鈞天於雲表雷雨杳冥而未半扶桑灮胐而先明迢亭峻極特立千仞灼爍峥嶸灮鏡八表若日殿之燭太空似星宮之搆辰極辭曰層䑓複陸廣殿穹崇塗金鈿玉映日疏風藝文類聚傅縡字冝事北地靈州人右衛将軍明道論縡篤信佛教從興皇惠朗法師受三論盡通其學時有大心暠法師著無諍論以詆之縡乃為明道論用釋其難其略曰無諍論言比有𢎞三論者雷同訶詆恣言罪狀歴毁諸師非斥衆學論中道而執偏心語忘懐而競獨勝方學數論更為讎敵讎敵既構諍鬬大生以此之心而成罪業罪業不止豈不重増生􅂮大苦聚集答曰三論之興為日久矣龍樹創其源除内學之偏見提婆揚其㫖蕩外道之邪執欲使大化流而不壅𤣥風闡而無墜其言曠其意逺其道博其流深斯固龍象之騰驤鯤鵬之摶運蹇乘決羽豈能觖望其間哉頃代澆薄時無曠士茍習小學以化䝉心漸染成俗遂迷正路唯競穿鑿各肆營造枝葉徒繁本源日翳一師觧釋復異一師更改舊宗各立新意同學之中取寤復别如是㞡轉添糅倍多總而用之心無的准擇而行之何者為正豈不渾沌傷竅嘉樹弊牙雖復人説非馬家握靈虵以無當之巵同畵地之餅矣其於失道不亦冝乎攝山之學則不如是守一遵本無改作之過約文申意杜臆斷之情言無預説理非宿搆覩縁尒乃應見敵然後動縱横絡繹忽怳杳冥或彌綸而不窮或消散而無所煥乎有文章蹤朕不可得深乎不可量即事而非逺凡相酬對隨理詳覈有何嫉詐干犯諸師且諸師所説為是可毁為不可毁若可毁者毁固為衰若不可毁毁自不及法師何獨蔽護不聽毁乎且教有大小備在聖誥大乗之文則指斥小道今𢎞大法寧得不言大乘之意邪斯則褒貶之事從𢎞放學與奪之辭依經議論何得見佛説而信順在我語而忤逆無諍平等心如是邪且忿恚煩惱凡夫恒性失理之徒率皆有此豈可以三修未愜六師懐恨而藴湼槃妙法永不宣揚但冀其忿憤之心既極恬淡之寤自成耳人面不同其心亦異或有辭意相反或有心口相符豈得必謂他人説中道而心偏執巳行無諍外不違而内平等讎敵鬬訟豈我事焉罪業聚集鬬諍者所畏耳無諍論言攝山大師誘進化導則不如此即習行於無諍者也導悟之德既徃淳一之風已澆競勝之心呵毁之曲盛於茲矣吾願息諍以通道譲勝以忘徳何必排拂異家生其恚怒者乎若以中道之心行於成實亦不能諍若以偏著之心説於中論亦得有諍固知諍與不諍偏在一法答曰攝山大師實無諍矣但法師所賞未衷其節彼靜守幽谷寂爾無為凡有訓勉莫匪同志從容語嘿物無間然故其意雖深其言甚約今之敷暢地勢不然處王城之隅居聚落之内呼吸顧望之客脣吻縱横之士奮鋒穎勵羽翼明目張膽被堅執鋭騁異家衒别解窺伺間隙邀冀長短與相酬對捔其輕重豈得默默無言唯唯應命必須掎摭同異發擿玼瑕忘身而𢎞道忤俗而通教以此為病益知未逹若令大師當此之地亦何必默巳而為法師所貴耶法師又言吾願息諍以通道譲勝以忘德道徳之事不止在諍與不諍譲與不譲也此語直是人間所重法師慕而言之竟未知勝若為可譲也若他人道高則自勝不勞譲矣他人道劣則雖譲而無益矣欲譲之辭将非虚設中道之心無䖏不可成實三論何事致乖但須息守株之觧除膠柱之意是事皆中也來㫖言諍與不諍偏在一法何為獨褒無諍耶詎非矛楯無諍論言耶邪正得失勝負是非必生於心矣非謂所説之法而有定相論勝劣也若異論是非以偏著為失言無是無非消彼得失以此論為勝妙者他論所不及此亦為失也何者凡心所破豈無心於能破則勝負之心不忘寧不存勝者乎斯則矜我為得棄他之失即有取舍大生是非便是増諍答曰言為心使心受言詮和合根塵鼔動風氣故成語也事必由心實如來説至于心造偽以使口口行詐以應心外和而内險言隨而意逆求利養引聲名入道之人在家之士斯輩非一聖人所以曲陳敎誡深致防杜説現在之殃咎敘將來之患害此文明著甚於日月猶有忘愛軀冒峻制蹈湯炭甘虀粉必行而不顧也豈能悦無諍之作而囘首革音耶若𢎞道之人宣化之士心知勝也口言勝也心知劣也口言劣也亦無所苞藏亦無所忌憚但直心而行之耳他道雖劣聖人之教也已德雖優亦聖人之教也我勝則聖人勝他劣則聖人劣聖人之優劣葢根縁所冝爾於彼於此何所厚薄哉雖復終日按劒極夜擊柝瞋目以諍得失作氣以求勝負在誰處乎有心之與無心徒欲分别虚空耳何意不許我論説而使我謙退此謂鷦鵬已翔於寥廓而虞者猶窺藪澤而求之嗟乎丈夫當𢎞斯道矣無諍論言無諍之道通於内外子所言須諍者此用末而救本失本而營末者也今為子言之何則若依外典尋書契之前至淳之世朴質其心行不言之教當於此時民至老死不相徃來而各得其所復有何諍乎固知本來不諍是物之真矣答曰諍與無諍不可偏執本之與末又安可知由來不諍寧知非末於今而諍何騐非本夫居後而望前則為前居前而望後則為後而前後之事猶如彼此彼呼此為彼此呼彼為彼彼此之名的居誰處以此言之萬事可知矣本末前後是非善惡可恒守邪何得自信聰明廢他耳目夫水泡生滅火輪旋轉入牢穽受覊紲生憂畏起煩惱其失何哉不與道相應而起諸見故也相應者則不然無為也無不為也善惡不能偕而未曾離善惡生死不能至亦終然在生死故得永離而任放焉是以聖人念繞桎之不脱愍黏膠之難離故慇懃教示僃諸便巧希向之徒渉求有類雖驎角難成象形易失寧得不髣髴遐路勉勵短晨且當念已身之善惡莫揣他物而欲分别而言我聰明我知見我計校我思惟以此而言亦為踈矣他人者實難測或可是凡夫真爾亦可是聖人俯同時俗所冝見果報所應覩安得肆胷衿盡情性而生譏誚乎正應虚已而遊乎世俛仰于電露之間耳明月在天衆水咸見清風在林羣籟畢響吾豈逆物哉不入鮑魚不甘腐䑕吾豈同物哉誰能知我共行斯路浩浩堂堂乎豈復見有諍為非無諍為是此則諍者自諍無諍者自無諍吾俱取而用之寧勞法師費功夫㸃筆紙但申于無諍弟子疲脣舌消晷漏唯對於明道戲論於糟粕哉必欲且考真偽蹔觀得失無過依賢聖之言檢行藏之理始終硏究表裏綜覈使浮辭無所用詐道自然消請待後筵以觀其妙矣陳書釋文紀巻三十
