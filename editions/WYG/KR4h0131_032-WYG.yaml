body:
  text: 釋文紀巻三十二明梅鼎祚輯後魏一道武帝本索頭虜姓拓跋氏諱珪獻明帝子與朗法師書僧朗與其徒隐于泰山帝致書以繒素氊毯鉢錫為禮皇帝敬問太山朗和尚承妙聖靈要須經略已命元戎上人德同海嶽神算遐長冀助威謀克寧荒服今遣使者送素二十端白氊五十領銀鉢二枚到願納受廣𢎞明集天興元年興佛法詔是歳始作五級浮圖闍崛須彌山殿禪講堂座莫不嚴具焉夫佛法之興其來逺矣濟益之功冥及存沒神踪遺軌信可依憑其敇有司於京城建飾容範修整官舍令信向之徒有所居止魏書釋老志作佛道論衡濟益作拯濟城邑官作宮太武帝諱燾字佛狸明元帝子禁養沙門詔世祖鋭志武功雖歸宗佛法而未覽經教深求縁報之意且以司徒崔浩言信用冦謙之道術㑹蓋吳反世祖西征至長安從官見沙門室有弓矢矛楯奏聞疑與吴通謀案閲財産及諸非法詔誅長安沙門焚破佛像勑下四方時㳟宗為太子素敬佛再三表諌不許復下嚴詔是嵗真君七年三月也恭宗猶濳緩宣詔故沙門經像大得祕匿而土木宫塔則畢毁矣愚民無識信偽惑妖私養師巫挾藏讖記沙門之徒假西域虚誕坐致妖孽非所以一齊政化布淳徳於天下也自王公已下至於庻人有私養沙門者皆送官曹不得隱匿限今年二月十五日過期不出沙門身死容止者誅一門魏書廣𢎞明集合書魏書首句彼沙門者坐致作妄生又詔昔後漢荒君信惑邪僞妄假睡夢事胡妖鬼以亂天常自古九州之中無此也夸誕大言不本人情叔季之世闇君亂主莫不眩焉由是政教不行禮義大壞鬼道熾盛視王者之法蔑如也自此以來代經亂禍天罰亟行生民死盡五服之内鞠爲丘墟千里蕭條不見人迹皆由於此朕承天緒屬當窮運之弊欲除僞定真復羲農之治其一切盪除胡神滅其蹤迹庶無謝於風氏矣自今以後敢有事胡神及造形像泥人銅人者門誅雖言胡神問今胡人共云無有皆是前世漢人無賴子弟劉元真呂伯彊之徒乞胡之誕言用老莊之虚假附而益之皆非真實至使王法廢而不行葢大姦之魁也有非常之人然後能行非常之事非朕孰能去此歴代之僞物有司宣告征鎮諸軍刺史諸有佛圖形像及胡經盡皆擊破焚燒沙門無少長悉坑之魏書文成帝諱濬字烏雷直勤景穆帝子興復佛敎詔高宗踐極下詔夫為帝王者必祗奉明靈顯彰仁道其能惠著生民濟益羣品者雖在古昔猶序其風烈是以春秋嘉崇明之禮祭典載功施之族況釋迦如來功濟大千惠流塵境等生死者歎其達觀覽文義者䝿其妙明助王政之禁律益仁智之善性排斥羣邪開演正覺故前代已來莫不崇尚亦我國家常所尊事也世祖太武皇帝開廣邊荒徳澤遐及沙門道士善行純誠惠始之倫無逺不至風義相感徃徃如林夫山海之深怪物多有姦滛之徒得容假託講寺之中致有凶黨是以先朝因其瑕釁戮其有罪有司失旨一切禁斷景穆皇帝每為慨然值軍國多事未遑修復朕承鴻緒君臨萬邦思述先志以隆斯道今制諸州郡縣於衆居之所各聽建佛圖一區任其財用不制會限其好樂道法欲為沙門不問長㓜出於良家性行素篤無諸嫌穢鄉里所明者聽其出家率大州五十小州四十人其郡遙逺臺者十人各當局分皆足以化惡就善播揚道敎也魏書獻文帝諱𢎞字萬民文成帝子禁游僧詔獻文帝信佛猶深禪位太子是為孝文帝改元延興二年下詔是時孝文帝數歲帝仍總政比丘不在寺舍游渉村落交通姦猾經歴年歳令民間五五相保不得容止無籍之僧精加隱括有者送付州鎮其在畿郡送付本曹若為三寶廵民敎化者在外齎州鎮維那文移在臺者齎都維那等印牒然後聽行違者加罪又禁造圖寺詔内外之人興建福業造立圖寺高敞顯博亦足以輝隆至教矣然無知之徒各相高尚貧富相競費竭財産務存高廣傷殺昆蟲含生之類茍能精致累土聚沙福鍾不朽欲建為福之因未知傷生之業朕為民父母慈養是務自今一切斷之東平靈像詔夫信誠則應逺行篤則感深歴觀先世靈瑞乃有禽獸易色草木移性濟州東平郡靈像發輝變成金銅之色殊常之事絶於徃古熈隆妙法理在當今有司與沙門統曇曜令州送像達都使道俗咸覩實相之容暜告天下皆使聞知並魏書孝文帝諱宏獻文帝子改姓元氏徙都洛文明太皇太后靈塔詔太和四年詔罷鷹師曹地為報德佛寺朕以虚寡㓜纂寶厯仰恃慈明緝寧四海欲報之徳正覺是憑諸鷙鳥傷生之類宜放之山林其以此地為太皇太后經始靈塔鼎按唐法琳辯正論道宣續髙僧法上傳載齊文宣帝天保二年詔云仰惟慈明緝寧四海欲報之德正覺是馮諸鷙鳥傷生之類宜放于山林即以此地為太皇太后經始寶塔廢鷹師曹為報徳寺與此全同又按北齊書天保初尊母婁后為皇太后濟南王即位始尊為太皇太后文宣時安有此稱當以魏書為正登法師喪詔沙門道登有義業為孝文帝眷賞恒侍講論及卒施帛設齋又下詔朕師登法師奄至徂背痛怛摧慟不能巳巳比藥治慎喪未容即赴便准師義哭諸門外追褒羅什法師詔帝常幸徐州白塔寺謂諸王公曰此寺有嵩法師受成實論於羅什後授淵法師又授登紀二法師朕每翫可以釋人深意羅什法師可謂神出五才志入四行者也今常住寺猶有􅔪蹤欽悅修迹情深遐邇可於舊堂所為建三級浮圖又見逼昏虐為道殄軀既暫同俗禮應有子𦙍可推訪以聞當加敘接竝魏書書有誤此詔監刻魏邇書作逺僧顯爲沙門都統詔門下近得録公等表知欲早定沙門都統比考徳選賢寤寐勤心繼佛之任莫知誰寄或有道高年尊理無勞紆或有器𤣥識邈高挹塵務今以思逺寺主法師僧顯仁雅欽韻澄風柔鏡深敏潛明道心清亮固堪兹任式和妙衆近已口白可勑令為沙門都統又副儀貳事緇素攸同頃因曜統獨濟遂廢兹任今欲毗徳贊善固須其人皇舅寺法師僧義行恭神暢溫聰謹正業茂道優用膺副翼可都維那以灮賢徒立僧尼制詔門下凝覺澄沖事超俗外淵模崇賾理寄忘言然非言何以釋教非世何能表真是以三藏舒風必資誡典六度摛化固憑尸波自像敎東流千齡已半秦漢革俗制禁彌宻故前世英人隨宜興引世輕世重以禆𤣥奥先朝之世嘗為僧禁心有未詳宜其修立近見沙門統僧顯等白云欲更一刋定朕聊以淺識共詳至典事起忽忽觸未詳究且可設法一時麤救世敎須𤣥白一同更釐厥衷禆初學記作闡至典作正典世教作習俗凡世字竝改避唐諱也聽諸法師一月三入殿詔門下崇因贊業莫若宗𤣥禆神染志誰先英哲故周旦著其朋之誥釋迦唱善知之文然則位尊者以納賢為貴德優者以親仁為尚朕雖寡昧能無庶幾也先朝之世經營六合未遑内範遂令皇庭闕高邈之容紫闥簡超俗之儀於欽善之理福田之資良為未足將欲令懿徳法師時來相見進可餐稟道味退可飾灮朝庭其勑殿中聽一月三入人數法諱别當牒付令諸州衆僧安居講説詔門下憑𤣥歸妙固資㝠風餐慧習慈實鍾果智故三炎檢攝道之恒規九夏溫詮法之嘉猷可勑諸州令此夏安居清衆大州三百人中州二百人小州一百人任其數䖏講説皆僧祗粟供僃若粟尠徒寡不充此數者可令昭𤣥量減還聞其各欽旌賢匠良推叡徳勿致濫濁惰兹後進贈徐州僧統幷設齋詔門下徐州道人統僧逞風識淹通器尚倫雅道業明博理味淵澄清聲茂譽早彰於徐沛英懷𤣥致夙流于譙宋比唱法北京德芬道俗應供皇筵美敷宸宇仁叡之良朕所嘉重依因既終致兹異世近忽知聞悲怛于懷今路次兖濮青泗豈遙愴然念德又增厥心可下徐州施帛三百疋以供追福又可為設齋五千人歳施道人應統帛詔門下應統仰紹前哲繼軌道門徽佇𤣥範沖猷是託今既譲俗名理冝别供可取八解之義歳施帛八百疋准四輩之貺隨四時而給又修善之本實依力命施食之因内典所美可依朝官上秩當月而施所以逺譬深理者匪獨開崇俗心抑亦奬勵道意耳爲慧紀法師亡施帛設齋詔此即授成實論紀法師門下徐州法師慧紀凝量貞逺道識淳虚英素之操超然世外綜渉之功斯焉罕倫灮法彭方聲茂蕐裔硏論宋壤宗徳逺邇爰於徃辰唱諦鹿苑作匠京緇延賞賢叢倐矣死魔忽殲良器聞之悲哽傷慟于懷可勑徐州施帛三百疋并設五百人齋以崇追益竝廣𢎞明集宣武帝諱恪孝文帝子僧律詔太和中立僧制四十七條先是立監福曹又改為昭𤣥僃官屬以斷僧務至宣武永平元年下詔緇素既殊法律亦異故道敎彰於互顯禁勸各有所宜自今巳後衆僧犯殺人已上罪者仍依俗斷餘犯悉付昭𤣥以内律僧制之僧祗榖詔永平四年詔於是尚書令髙肇奏詔復報僧祗之粟本期濟施儉年出貸豐則收入山林僧尼隨以給施民有窘敝亦即賑之但主司冒利規取贏息及其徵責不計水旱或償利過本或翻改券契侵蠧貧下莫知紀極細民嗟毒歳月滋深非所以矜此窮乏宗尚慈拯之本意也自今已後不得傳委維那都尉可令刺史共加監括尙書檢諸有僧祗榖之處州别􅍌其元數出入贏息賑給多少幷貸償歳月見在未收上臺録記若收利過本及翻改初劵依律免之勿復徵責或有私債轉施償僧即以丐民不聽收檢後有出貸先盡貧窮徴債之科一準舊格富有之家不聽輒貸脱仍冒濫依法治罪尙書令高肇奏謹案故沙門統曇曜昔於承明元年奏涼州軍户趙茍子等二百家為僧祗戸立課積粟擬濟飢年不限道俗皆以拯施又依内律僧祗户不得别屬一寺而都維那僧暹僧頻等進違成旨退乖内法肆意任情奏求逼召致使吁嗟之怨盈於行道棄子傷生自縊溺死五十餘人豈是仰贊聖明慈育之意深失陛下歸依之心遂令此等行號巷哭呌訴無所至乃白羽貫耳􅍌訟宮闕悠悠之人尚為哀痛況慈悲之士而可安之請聽茍子等還鄉課輸儉乏之年周給貧寡若有不虞以擬邊捍其暹等違㫖背律謬奏之愆請付昭𤣥依僧律推處宣武帝詔報暹等特可原之餘如奏竝魏書靈太后胡氏安定臨涇人宣武帝后生孝明帝制度僧令神龜二年令時法禁寛褫不能改肅年常度僧依限大州應百人者州郡於前十日觧送三百人其中州二百人小州一百人州統維那與官及精練簡取充數若無精行不得濫採若取非人刺史為首以違旨論太守縣令綱寮節級連坐統及維那移五百里外異州為僧自今奴婢悉不聽出家諸王及親䝿亦不得輒啓請有犯者以違旨論其僧尼輒度他人奴婢者亦移五百里外為僧僧尼多養親識及他人奴婢子年大私度為弟子自今斷之有犯還俗被飬者歸本等寺主聽容一人出寺五百里二人千里私度之僧皆由三長罪不及巳容多隱濫自今有一人私度皆以違旨論隣長爲首里黨各相降一等縣滿十五人郡滿三十人州鎮滿三十人免官寮吏節級連坐私度之身配當州下役魏書孝靜帝諱善見清河王亶子徙都鄴為東魏檢括寺宅詔神龜中任城王澄奏檢僧衆河隂之難令不復行至元象元年下詔梵境幽𤣥義歸清曠伽藍淨土理絶囂塵前朝城内先有禁斷自聿來遷鄴率由舊章而百辟士民届都之始城外新城竝皆給宅舊城中暫時暜借更擬後須非為永久如聞諸人多以二處得地或捨舊城所借之宅擅立為寺知非已有假此一名終恐因習滋甚有虧恒式宜付有司精加隱括且城中舊寺及宅竝有定帳其新立之徒悉從毁廢又詔天下牧守令長悉不聽造寺若有違者不問財之所出幷計所營功庸悉以枉法論竝魏書任城王元澄字道鎮景穆帝孫條制營寺奏孝明神龜元年為尚書令奏未幾河隂之難朝士死者多捨居宅以施僧尼京邑第舍略為寺矣仰惟高祖定鼎嵩瀍卜世悠逺慮括終始制洽天人造物開符垂之萬葉故都城制云城内唯擬一永寧寺地郭内唯擬尼寺一所餘悉城郭之外欲令永遵此制無敢踰矩逮景明之初微有犯禁故世宗仰修先制爰發明旨城内不造立浮圖僧尼寺舍亦欲絶其希覬文武二帝豈不愛尙佛法葢以道俗殊歸理無相亂故也但俗眩虚聲僧貪厚潤雖有顯禁猶自冒營至正始三年沙門統惠深有違景明之禁便云營就之寺不忍移毁求自今已後更不聽立先旨含寛抑典從請前班之詔仍巻不行後來私謁彌以奔競永平二年深等復立條制啓云自今已後欲造寺者限僧五十已上聞輒聽造若有輒營置者依俗違敕之罪其寺僧衆擯出外州邇來十年私營轉盛罪擯之事寂爾無聞豈非朝格雖明恃福共毁僧制徒立顧利莫從者也不俗不道務為損法人而無厭其可極乎夫學迹沖妙非浮識所辯𤣥門曠寂豈短辭能究然淨居塵外道家所先功縁㝠深匪尙蕐遁茍能誠信童子聚沙可邁於道場純陁儉設足薦於雙樹何必縱其盗竊資營寺觀此乃民之多幸非國之福也然比日私造動盈百數或乘請公地輒樹私福或啓得造寺限外廣制如此欺罔非可稍計臣以才劣誠忝工務奉遵成規裁量是總所以披尋舊旨硏究圖格輒遣府司馬陸昶屬崔孝芬都城之中及郭邑之内檢括寺舍數乘五百空地表刹未立塔宇不在其數民不畏法乃至於斯自遷都已來年踰二紀寺奪民居三分且一高祖立制非徒欲使緇素殊途抑亦防微深慮世宗述之亦不錮禁營福當在杜塞未萌今之僧寺無處不有或比滿城邑之中或連溢屠沽之肆或三五少僧共為一寺梵唱屠音連簷接響像塔纒於腥臊性靈沒於嗜慾真偽混居徃來紛雜所司因習而莫非僧曹對制而不問其於汙染真行塵穢練僧薰蕕同器不亦甚歟徃在北代有法秀之謀近日冀州遭大乘之變皆初假神敎以惑衆心終設姦誑用逞私悖太和之制因法秀而杜逺景明之禁慮大乘之將亂始知祖宗叡聖防遏處深履霜堅冰不可不慎昔如來闡敎多依山林今此僧徒戀著城邑豈湫隘是經行所宜浮諠必栖禪之宅當由利引其心莫能自止處者既失其真造者必損其福乃釋氏之糟糠法門之社鼠内戒所不容王典所應棄矣非但京邑如此天下州鎮僧寺亦然侵奪細民廣占田宅有傷慈矜用長嗟苦且人心不同善惡亦異或有栖心真趣道業清逺者或外假法服内懐悖徳者如此之徒宜辨涇渭若雷同一貫何以勸善然覩法贊善凡人所知矯俗避嫌物情同趣臣獨何為孤議獨發誠以國典一廢追理至難法網暫失條綱將亂是以冒陳愚見兩願其益臣聞設令在於必行立罰䝿能肅物令而不行不如無令罰不能肅孰與亡罰頃明詔屢下而造者更滋嚴限驟施而違犯不息者豈不以假福託善幸罪不加人殉其私吏難茍劾前制無追徃之辜後旨開自今之恕悠悠世情遂忽成法今宜加以嚴科特設重禁糾其來違懲其徃失脱不峻檢方垂容借恐今旨雖明復如徃日又旨令所斷標榜禮拜之處悉聽不禁愚以為樹榜無常禮處難驗欲云有造立榜證公須營之辭指言常禮如此則徒有禁名實通造路且徙御已後斷詔四行而私造之徒不懼制旨豈是百官有司怠於奉法將由網漏禁寛容託有他故耳如臣愚意都城之中雖有標榜營造粗功事可改立者請依先制在於郭外任擇所便其地若買得券證分明者聽其轉之若官地盗作即令還官若靈像既成不可移撤請依今勅如舊不禁悉令坊内行止不聽毁坊開門以妨里内通巷若被旨者不在斷限郭内準此商量其廟像嚴立而逼近屠沽請斷㫄屠殺以潔靈居雖有僧數而事在可移者令就閒敞以避隘陋如今年正月赦後造者求依僧制案法科治若僧不滿五十者共相通容小就大寺必令充限其地賣還一如上式自今外州若欲造寺僧滿五十巳上先令本州表列昭𤣥量審奏聽乃立若有違犯悉依前科州郡已下容而不禁罪同違旨庶仰遵先皇不朽之業俯奉今旨慈悲之令則繩墨可全聖道不墜矣魏書裴延儁字平子河東聞喜人兼侍中吏部尚書諫宣武帝請兼覽經書䟽世宗專心釋典不事典籍延儁為中書侍郎疏諫從之臣聞有堯文思欽明稽古嬀舜體道慎典作聖漢灮神叡軍中讀書魏武英規馬上翫籍先帝天縱多能充文克武營遷謀伐手不釋巻良以經史義深補益䖏廣雖則劬勞不可暫輟斯乃前王之美實後王之水鏡善足以遵惡足以誡也陛下道悟自深淵鑒獨得昇法座於宸闈釋覺善於日宇凡在聽矚塵蔽俱開然五經治世之模六籍軌俗之本葢以訓物有漸應時匪妙必須先麤後精乘近即逺伏願經書互覽孔釋兼存則内外俱周真俗斯暢魏書崔灮字長仁東清河鄃人歴司徒太保諫靈太后登永寜寺九層浮圖表神龜二年八月伏見親昇上級佇蹕表刹之下祗心圖搆誠爲福善聖躬玉趾非所踐陟臣庶恇惶竊謂未可按禮記為人子者不登高不臨深古賢有言䇿畫失於廟堂大人蹷於中野漢書上欲西馳下峻坂爰盎攬轡停輿曰臣聞千金之子不垂堂百金之子不倚衡如有車敗馬驚奈高廟太后何又云上酎祭廟出欲御樓船薛廣德免冠頓首曰宜從橋陛下不聽臣臣以血汙車輪樂正子春曽參弟子亦稱至孝固自謹愼堂基不過一尺猶有傷足之愧永寧累級閣道囘隘以柔懦之寶體乘至峻之重峭萬一差跌千悔何追禮將祭宗廟必散齋七日致齋三日然後入祀神明可得而通今雖容像未建已為神明之宅方加雕繢飾麗丹青人心所祗鋭觀滋甚登者既衆異懐若面縱一人之身恒盡誠潔豈左右侍妾各竭䖍仰不可獨昇必有扈侍懼或㤀愼非飲酒茹暈而已昨風霾暴興紅塵四塞白日晝昬特可驚畏春秋宋衛陳鄭同日而菑伯姬待姆致焚如之禍去皇興中青州七級亦號崇壯夜為上火所焚雖梓慎禆竈之明尚不能逆尅端兆變起倉卒預僃不虞天道幽逺自昔深誡墟墓必哀廟社致敬望塋悽慟入門聳懐適墓不登隴未有昇陟之事傳云公既視朔遂登觀臺其下無天地先祖之神故可得而乘也内經寶塔髙蕐堪室千萬唯盛言香花禮拜豈有登上之義獨稱三寶階從上而下人天交接兩得相見超世竒絶莫可而擬恭敬拜跽悉在下級逺存矚眺周見山河因其所眄増發嬉笑未能級級加䖍歩歩崇慎徒使京邑士女公私湊集上行下從理勢以然迄於無窮豈長世競慕一登而可抑斷哉葢心信為本形敬乃末重實輕根靖實躁君恭已正南面者豈月乘峻極旬御層階今經始既就子來自勸基構已興雕絢漸起紫山蕐臺即其宫也伏願息躬親之勞廣風靡之化因立制防班之條限以遏囂汙永歸清寂下竭肅穆之誠上㞡瞻仰之敬勿踐勿履顯固億齡融敎闡悟不其博歟魏書十地經論序十地經者葢是神覺之𤣥苑靈慧之妙宅億善之基輿萬度之綱統理苞羣藏之秘義冠衆典之奥積漸心行窮忍學之源崇廣住德極道慧之府所以厚集肇慮朗成圓種離怖有念赫為雷威其爲敎也微密精逺究淨照之宗融冶瑩練盡性靈之妙自寂場啓旭固林輟暉雖復聖訓充感金言滿世而淵猷沖頤莫不網羅於其中矣至于灮宣眞軌融暢𤣥門始自信仁終泯空寂因果既周化業彌顯嘿耀大方影煥八極豈直日月麗天洞燭千象溟壑帯地混納百川而已哉既理富瀛岳局言靡測廓明洪旨是係淵儒北天竺大士婆藪槃豆魏云天親挺高悟於像運拔英規於季俗故能徽蹤馬鳴繼迹龍樹每恨此經文約而義豐言邇而旨逺乃超然遐慨邈爾悠想慕釋迦之餘範追剛藏之􅔪軌誠復歳踰五百䖏非六天人梵乖遼正像差迥而妙契環中神協靡外通法貫𤣥莫愧徃列遂乃准傍大宗爰製兹論發趣精微根由睿哲旨奥音殊宣譯俟賢固以義囑中興時憑聖代大魏皇帝儁神天凝𤣥情漢逺揚治風於宇縣之外敷道化於千載之下每以佛經為遊心之場釋典為栖照之囿搜隱訪缺務乎照揚有敎必申無籍不僃以永平元年歳次𤣥枵四月上日命三藏法師北天竺菩提畱支魏云道希中天竺勒那摩提魏云寶意及傳譯沙門北天竺伏陀扇多并義學緇儒一十餘人在太極紫庭譯出斯論十有餘巻所二三藏竝以邁俗之量高歩道門羣藏淵部罔不硏攬善㑹地情妙盡論旨皆手執梵文口自敷唱片辭隻説辯詣懱遺于時皇上親紆𤣥藻飛翰輪􅈡臣僚僧徒毗贊下風四年􅈡夏飜譯周訖洋洋斖斖莫得其門義富趣𤣥孰云窺測剛藏妙説更興于像世天親𤣥旨再灮于季運沗厠末筵敢竊祗記耳大藏惻字函李場字琚羅趙郡人中書侍郎論沙門奏高陽王雍表薦瑒為其友正主簿于時民多絶户而為沙門瑒上言都統僧暹等忿瑒鬼敎之言以謗佛訴靈太后太后責之仍復自理罰金一兩禮以敎世法導將來跡用既殊區流亦别故三千之罪莫大不孝不孝之大無過於絶祀然則絶祀之罪重莫甚焉安得輕縱背禮之情而肆其向法之意也正使佛道亦不應然假令聽然猶須裁之以禮一身親老棄家絶養既非人理尤乖禮情堙滅大倫且闕王貫交缺當世之禮而求將來之益孔子云未知生焉知死斯言之至亦為僃矣安有棄堂堂之政而從鬼敎乎又今南服未靜衆役仍煩百姓之情方多避役若復聽之恐捐棄孝慈比屋而是上靈太后自理竊欲清明佛法使道俗兼通非敢排棄真學妄為訾毁且鬼神之名皆通靈達稱自百代正典叙三皇五帝皆號爲鬼天地曰神祇人死曰鬼易曰知鬼神之情狀周公自美亦云能事鬼神禮曰明則有禮樂幽則有鬼神是以明者為堂堂幽者為鬼敎佛非天非地本出於人應世導俗其道幽隱名之為鬼愚謂非謗且心無不善以佛道爲敎者正可未達衆妙之門耳竝魏書張暜恵字洪賑常山九門人東豫州刺史諌孝明帝崇佛疏普恵為諫議大夫以帝不親視朝過崇佛法郊廟之事多委有司上疏敕付外議臣聞明徳卹祀成湯灮六百之祚嚴父配天孔子稱周公其人也故能馨香上聞福傳遐世伏惟陛下重暉纂統欽明文思天地屬心百神佇望故宜敦崇祀禮咸秩無文而告朔朝廟不親於明堂嘗禘郊社多委於有司觀射遊苑躍馬騁中危而非典豈清蹕之意殖不思之㝠業捐巨費於生民減禄削力近供無事之僧崇飾雲殿逺邀未然之報昧爽之臣稽􅈡於外𤣥寂之衆遨遊於内愆禮忤時人靈未穆愚謂從朝夕之因求秪劫之果未若先萬國之忻心以事其親使天下和平菑害不生者也伏願淑慎威儀萬邦作式躬致郊廟之䖍親紆朔望之禮釋奠成均竭心千畞明發不寐潔誠禋祼孝悌可以通神明徳教可以灮四海則一人有喜兆民賴之然後精進三寶信心如來道由化深故諸漏可盡法隨禮積故彼岸可登量撤僧寺不急之蕐還復百官久折之秩已興之構務從簡成將來之造權令停息仍舊亦可何必改作庶節用愛人法俗俱賴臣學不經逺言多孟浪忝職其憂不敢黙爾魏書溫子昇字鵬舉太原人齊文㐮諮議叅軍寒陵山寺碑序昔晉文尊周績宣於踐土齊桓覇世威著於召陵竝道冠諸侯勲高天下衣裳㑹同之所兵車交合之䖏寂寞消沈荒凉磨滅言談者空知其名遙遇者不識其地然則樹銅表跡刋石記功有道存焉可不尚與永安之季數鍾百六天菑流行人倫交喪尒朱氏既絶彼天綱斷兹地紐禄去王室政出私門銅馬競馳金虎亂噬九嬰㬥起十日竝出破璧毁珪人物既盡頭會箕斂杼軸其空大丞相渤海王命世作宰惟機成務標格千仞崖岸萬里運鼎阿於襟抱納山岳於胸懷擁𤣥雲以上騰負青天而高引鐘鼔嘈囋上聞於天旌旗繽紛下盤於地壯士懔以爭先義夫憤而競起兵接刃於斯場車錯轂於此地轟轟隱隱若轉石之墜高崖硠硠礚礚如激水之投深谷俄而霧捲雲除冰離葉散靡旗蔽日亂轍滿野楚師之敗於柏舉新兵之退自昆陽以此方之未可同日既攷兹沃壌建此精廬砥石礪金瑩珠琢玉經始等於佛功制作同於造化息心是歸淨行攸處神異畢臻靈僊總萃鳴玉鸞以來遊帶霓裳而至止翔鳯紛以相嚾飛龍蜿而俱躍雖復高天銷於猛炭大地淪於積水固以傳之不朽終亦記此無忘印山寺碑序自結繩運徃觀象代興禮樂相因詩書間出喻是非於一指論道德於二篇九流之義遂開百家之言竝作皆以賦命有遭隨攝養致夭壽愛惡起於吉凶情偽動於利害雖改張羅之祝未易釁鐘之牲因果之業未申感應之途猶蔽是以脩短有命子夏論之而未詳報施在天史遷言之而未悟大丞相渤海王膺岳瀆之靈感辰象之氣直置與蘭桂齊芳自然共珪璋比潔加以體備百行智周萬象道兼語嘿思極天人固以兆云非虎自懐公輔之徳世稱臥龍實任王佐之器道足以濟天下行足以通神明表立人之上才含廣途之大量永安之末時多異謀蜂薑有毒豺狼反噬彀弩臨城抽戈犯蹕世道交喪海水羣飛既而蒼龍入隱白虎出見命世有期匡時作宰拯沈溺以援手渉波瀾而濡足懸皦日於胷懐起大風於衿袖動之以仁義行之以忠貞附之者影從應之者響起大覺寺碑序維天地開闢陰陽轉運明則有日月幽則有鬼神初地遼逺末路悠長自始及終從凡至聖積骨成山祗劫莫數垂衣拂石恒河難計及冠日示夢䝉羅見謁應世降神感物開化顔如滿月心若盈泉體道獨悟含靈自曉居三殿以長想出四門而永慮聲色莫之畱榮位不能屈道成樹下灮燭天上變化靡窮神通無及置須彌於葶藶納世界於微塵闢慈悲之門開仁壽之路拯煩惱於三塗濟苦難於五濁非但化及天龍敎被人鬼固亦福霑行鴈道洽遊魚但羣生無感獨尊罷應雜色照爛諸山搖動布金沙而弗受建寶葢而未畱遂上微妙之臺永升智慧之殿而天人慕徳象法興靈圖影西山承灮東壁主上乃據地圖攬天鏡乘六龍朝萬國牢籠宇宙襟帶江山道濟横流徳昌頹厯四門穆穆百僚師師乘法船以徑度駕天輪而高舉神功寶業既被無邉鴻名懋實方在不朽抵掌措言雖不盡意執筆書事其能巳乎定國寺碑序葢兩儀交運萬物竝生始自苦空終於常樂而縁障未開業塵猶壅漂淪欲海顛墜邪山雖復灮蕐竝於日月術數窮於天地有扶危定傾之力爲濟世夷難之功登塗山而未歸遊建水而不反竝馳於苦樂之境皆入於生死之門幽隱長夜未覩山北之燭沈迷逺路詎見司南之機昔日先民雖云善誘尚習葢纒未能解脱至如八卦成象示之以吉凶百藥為醫道之以利害衣食有業民免饑寒之憂水土既平人無墊溺之患斯誠事周於世用功濟於生民不論過去之因縁詎辯未來之果報惟無上大覺均悟𤣥機應現託生方便開敎聖靈之至無復等級威神之力不可思議動三乘之駕汎八解之流引諸子於火宅渡羣生於海岸自一音輟響雙樹潛神智慧雖徂象法猶在灮照金盤言畱石室徧諸世界咸用歸仰竝藝文類聚楊衒之東魏撫軍府司馬期城太守洛陽伽藍記序三墳五典之説九流百代之言竝理在人區而義兼天外至於一乘二諦之原三明六通之旨西域僃詳東土靡記自頂日感夢滿月流灮陽門飾毫睂之像夜臺圖紺髮之形邇來奔競其風遂廣至晉永嘉惟有寺四十二所逮皇魏受圖灮宅嵩洛篤信彌繁法敎逾盛王矦䝿臣棄象馬如脱履庶士豪家捨資財若遺跡於是招提櫛比寶塔駢羅爭寫天上之姿競模山中之影金刹與靈臺比高宮殿共阿房等壯豈直木衣綈繡土被朱紫而已哉暨永熈多難皇輿遷鄴諸寺僧尼亦與時徙至武定五年歳在丁夘余因行役重覽洛陽城郭崩毁宮室傾覆寺觀灰燼廟塔丘墟墻被蒿艾巷羅荆棘野獸穴於荒階山鳥巢於庭樹遊兒牧豎躑躅於九逵農夫耕老藝黍於雙闕始知麥秀之感非獨殷墟黍離之悲信哉周室京城表裏凡有一千餘寺今日寥廓鐘聲罕聞恐後世無傳故撰斯記然寺數最多不可遍寫今之所録止大伽藍其中小者取其祥異世諦事因而出之先以城内為始次及城外表列門名以記逺近凡為五篇余才非著述多有遺漏後之君子詳其闕焉洛陽伽藍記歴代三寶紀叅校年百代紀作百氏悲作哀最作衆五作元年誤上魏主述釋書釋敎虚誕有為徒費無執戈以衛國有饑寒於色養逃役之流僕𨽻之類避苦就樂非修道者又佛言有為虚妄皆是妄想道人深知佛理故違虚其罪啓又廣引財事乞貸貪積無厭又云讀佛經者尊同帝王寫佛畵師全無恭敬請沙門等同孔老拜俗班之國史行多浮險者乞立嚴勤知其真僞然後佛法可遵師徒無濫則逃兵之徒還歸本役國富兵多天下幸甚廣𢎞明集李顒大乘賦序大乘者葢如來之道場也故縁覺聲聞謂之小乘言法駕之通馳如舟車之致逺也夫合抱興於毫末九層作於累土從淺以高大理妙在於不有迹麤由乎不無舉有以希無則無無以暢忘無以統有則有有以通無無以暢則乘斯小矣有有以通則乘斯大矣夫總福祐之㑹者莫尚於法身宣一切之知者莫䝿乎如來故神稟靈照以觀三達之權思周深妙以入四持之門知色之空任而不敗起滅無崖終始無際形寄於宇宙之中而心包乎一象之外目察於芥子之細而識鑒乎須彌之大美哉淵乎其源固不量也嗟嗼不足遂作賦廣𢎞明集釋文紀巻三十二
