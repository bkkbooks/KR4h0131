body:
  text: 釋文紀卷十一明梅鼎祚輯晉九秦後北涼釋僧睿魏郡長樂人博通經論從羅什受業參正所譯與相賞契大品經序摩訶般若波羅蜜者出八地之由路登十階之龍津也夫淵府不足以盡其深美故寄大以目之水鏡未可以喻其澄朗故假慧以稱之造盡不足以得其涯極故借度以明之然則功訖有無度名所以立照本靜末慧日以之生曠兼無外大稱由以起斯三名者雖義涉有流而詣得非心跡寄有用而功實非待非心故以不住為宗非待故以無照為本本以無照則凝知於化始宗以非心則忘功於行地故啓章𤣥門以不住為始妙歸三慧以無得為終假號照其真應行顯其明無生沖其用功德旌其深大明要終以驗始漚和即始以悟終蕩蕩焉真可謂大業者之通塗佛乘者之要軌也夫寶重故防深功髙故挍廣囑纍之所以殷勤功德之所以屢增良有以也而經來兹土乃以秦言譯之典謨乖於殊制名實喪於不謹致使求之彌至而失之彌逺頓轡重關而窮路轉廣不遇淵匠殆將墜矣亡師安和尚鑿荒塗以開轍標𤣥指於性空落乖蹤而直達殆不以謬文為閡也亹亹之功思過其半邁之逺矣鳩摩羅什法師慧心夙悟超拔特詣天魔干而不能回淵識難而不能屈扇龍樹之遺風震慧響於此世秦王感其來儀時運開其凝滯以𢎞始三年歲次星紀冬十二月二十日至長安秦王扣其虛關匠伯陶其淵致虛關既開乃正此文言淵致既宣而出其釋論渭濵流祇洹之化西明啓如來之心逍遙集德義之僧京城溢道詠之音末法中興將始於此乎子既知命遇此真化敢竭微誠屬當譯任執筆之際三惟亡師五失及三不易之誨則憂懼交懷惕焉若厲雖復履薄臨深未足喻也幸兾宗匠通鑒文雖左右而㫖不違中遂謹受案譯敢當此任以𢎞始五年嵗在癸卯四月二十三日於京城之北逍遙園中出此經法師手執梵本口宣秦言兩釋異音交辨文㫖秦王躬覽舊經驗其得失咨其通途坦其宗致與諸宿舊義業沙門釋慧恭僧䂮僧遷寶度慧精法欽道流僧睿道恢道標道恆道悰等五百餘人詳其義㫖審其文中然後書之以其年十二月十五日出盡挍正檢括明年四月二十三日乃訖文雖粗定以釋論檢之猶多不盡是以隨出其論隨而正之釋論既訖爾乃文定定之未已已有寫而傳者又有以意增損私以般若波羅蜜為題者致使文言舛錯前後不同良由後生虛己懷薄信我情篤故也梵本唯序品阿鞞跋致品魔事品有名餘者直第其品數而巳法師以名非佛制唯存序品略其二目其事數之名與舊不同者皆是法師以義正之者也如隂入持等名與義乖故隨義改之隂為衆入為處持為性解脫為皆捨除入為勝處意止為念處意斷為正勤覺意為菩提直行為聖道諸如此比改之甚衆梵音失者正之以天竺秦言謬者定之以字義不可變者即而書之是以異名斌然梵音殆半斯實匠者之公謹筆受之重慎也幸兾遵實崇本之賢推而體之不以文朴見咎煩異見情也小品般若波羅蜜經序般若波羅蜜經者窮理盡性之格言菩薩成佛之𢎞軌也軌不𢎞則不足以𡨕羣異指其歸性不盡則物何以登道埸成正覺正覺之所以成羣異之所以一何莫由斯道也是以纍教殷勤三撫以之頻發功德疊挍九增以之屢至如問相標𤣥而𤣥其𤣥幻品忘寄而忘其忘道行坦其津難問窮其源隨喜忘趣以要終照明不化以即𤣥章雖三十貫之者道言雖十萬佩之者行行凝然後無生道足然後補處及此而變一切智也法華鏡本以凝照般若冥末以解懸解懸理趣菩薩道也凝照鏡本告其終也終而不泯則歸途扶疏有三實之跡權應不夷則亂緒紛綸有惑趣之異是以法華般若相待以期終方便實化冥一以俟盡論其窮理盡性夷明萬行則實不如照取其大明真化解本無三則照不如實是故歎深則般若之功重美實則法華之用徵此經之尊三撫三囑未足惑也有秦太子者寓跡儲宫擬韻區外玩味斯經夢想增至准悟大品深知譯者之失㑹聞鳩摩羅法師神授其文真本猶存以𢎞始十年二月六日請令出之至四月三十日校正都訖考之舊譯真若荒田之稼藝過其半未詎多也斯經正文凡有四種是佛異時適化廣略之說也其多者云有十萬偈少者六百偈此之大品乃是天竺之中品也隨宜之言復何必計其多少議其煩簡也梵文雅質案本譯之於麗巧不足朴正有餘矣幸冀文悟之賢略其華而幾其實也大藏鱗字函亦録梵作胡法華經後序法華經者諸佛之祕藏衆經之實體也以華為名者照其本也稱分陀利者美其盛也所興既𤣥其㫖甚婉自非達識傳之罕有得其門者夫百卉藥木之英萬物實之本也八萬四千法藏者道果之源也故以喻焉諸華之中蓮華最勝華而未敷名屈摩羅敷而將落名迦摩羅處中盛時名分陀利未敷喻二道將落譬泥洹榮曜獨足以喻斯典至如般若諸經深無不極故道者以之而歸大無不該故乘者以之而濟然其大略皆以適化為本應務之門不得不以善權為用權之為化悟物雖𢎞於實體不足皆屬法華固其宜矣尋其幽㫖恢廓宏邃所該甚逺豈徒說實歸本畢定殊途而已耶乃實大明覺理囊括古今云佛夀無量永劫未足以明其久也分身無數萬形不足以異其體也然則夀量定其非數分身明其無實普賢顯其無成多寶昭其不滅夫邁𤣥古以超今則萬世同一日即百化以悟𤣥則千途無異轍夫如是者則生生未足以言其在永寂亦未可言其滅矣尋幽宗以絶往則喪功於本無控心轡於三昧則忘期於二地經流兹土雖復垂及百年譯者昧其虛津靈關莫之或啓談者乖其准格幽跡罕得而履徒復搜研皓首並未有窺其門者秦司𨽻挍尉左將軍安城矦姚嵩擬韻𤣥門宅心世表注誠斯典信詣彌至每思尋其文深識譯者之失既遇鳩摩羅法師為之傳寫指其大歸真若披重霄而髙蹈登崑崙而俯盻矣于時聽受領悟之僧八百餘人皆是諸方英秀一時之傑也是歲𢎞始八年歲次鶉火思益經序此經天竺正音名毗絁沙真諦是他方梵天殊特妙意菩薩之號也詳聽什公傳譯其名翻覆展轉意似未盡良由未備秦言名實之變故也察其語意㑹其名㫖當是持意非思益也直以未喻持義遂用益耳其言益者超絶殊異妙拔之稱也思者進業髙勝自强不息之名也舊名持心最得其實又其義㫖舊名等御諸法梵天坦其津塗世尊照其所明普華奬其非心文殊泯以無生落落焉真可謂法輪再轉於閻浮法鼓重聲於宇內甘露流津於季末靈液沾潤於遐裔者矣而恭明前譯頗麗其辭仍迷其㫖是使宏標乖於謬文至味淡於華豔雖復研尋彌稔而幽㫖莫啓幸遇鳩摩羅什法師於關右既得更譯梵音正文言於竹帛又䝉披釋𤣥㫖曉大歸於句下于時咨悟之僧二千餘人大齊法集之衆欣遇難遭之慶近是講肆之來未有其比于時豫與道恆謬當傳寫之任輒復疏其言記其事以貽後來之賢豈期必勝其辭必盡其意耶庶以所録之言粗可髣佛其心耳不同時事之賢儻欲全見其髙座所說之㫖故具載之于文不自加其意也毗摩羅詰提經義疏序此經以毗摩羅詰所說為名者尊其人重其法也五百應真之所稱述一切菩薩之所歎伏文殊師利對揚之所明答普現色身之要言皆其說也借座於燈王致飯於香積接大衆於右掌內妙藥於忍界阿難之所絶塵皆其不可思議也髙格邁於十地故彌勒屈之而虛已崇墉超於學境故文殊已還並未有窺其庭者法言恢廓指𤣥門以忘期觀品夷照總化本以冥想落落焉聲法鼓於維耶而十方世界無不悟其希音恢恢焉感諸佛於一室而恆沙正覺無不應其虛求豫始發心啓蒙於此諷詠研求以為喉襟稟𤣥指於先匠亦復未識其絶往之通塞也既䝉鳩摩羅什法師正𤣥文擲幽㫖始悟前譯之傷本謬文之乖趣耳至如以不來相為辱來不見相為相見未緣法為始神緣合法為止心諸如此比無品不有無章不爾然後知邉情譣詖難可以參契真言厠懷𤣥悟矣自慧風東扇法言流詠已來雖曰講肆格義迂而乖本六家偏而不即性空之宗以今驗之最得其實然罏冶之功微恨不盡當是無法可尋非尋之不得也何以知之此土先出諸經於神識性空明言處少存神之文其處甚多中百二論文未及此又無通鑒誰與正之先匠所以輟章於遐慨思決言於彌勒者良在此也自提婆以前天竺義學之僧並無來者於今始聞宏宗髙唱敢預希味之流無不竭其聰而注其心然領受之用易存憶識之功難掌自非般若朗其聞慧總持銘其思府焉能使機過而不遺神㑹而不昧者哉故因紙墨以記其文外之言借衆聽以集其成事之說煩而不簡者貴其事也質而不麗者重其意也其指微而婉其辭博而晦自非筆受胡可勝哉是以即於講次疏以為記冀通方之言不咎其煩而不要也自在王經後序此經以菩提名號為題者蓋是思益無盡意密迹諸經之流也以其圓用無方故名自在勢無與等故稱為王標准宏廓故非思之所及幽㫖𤣥凝尋者莫之髣佛此土先出方等諸經皆是菩薩道行之式也般若指其虛標勇伏明其必制法華泯一衆流大哀旌其拯濟雖各有其美而未備此之所載秦大將軍尚書令常山公姚顯真懷簡到徹悟轉詣聞其名而悅之考其㫖而虛襟思𢎞斯化廣其流津以為斯文既布便若菩薩常住不去此世奔誠發自大心欣躍不能自替遂請鳩摩羅法師譯而出之得此二卷於菩薩希蹤卓犖之事朗然昭列矣是歲𢎞始九年歲鶉首關中出禪經序禪法者向道之初門泥洹之津徑也此土先出修行大小十二門大小安般雖是其事既不根悉又無受法學者之戒蓋闕如也鳩摩羅法師以辛丑之年十二月二十日自姑臧至長安豫即以其月二十六日從受禪法既䝉啓授乃知學准法有成修首楞嚴經云人在山中學道無師道終不成是其事也尋䝉抄撰衆家禪要得此三卷初四十三偈是鳩摩羅羅陀法師所造後二十偈是馬鳴菩薩之所造也其中五門是婆須蜜僧迦羅叉漚波崛僧伽斯那勒比丘馬鳴羅陀禪要之中抄集之所出也六覺中偈是馬鳴菩薩修習之以釋六覺也初觀淫恚癡相及其三門皆僧伽羅叉之所撰也息門六事諸論師說也菩薩習禪法中後更依持世經益十二因緣一卷要解二卷别時撰出夬馳心縱想則情愈滯而惑愈深繫意念明則澄鑒朗照而造極彌密心如水火擁之聚之則其用彌全波之散之則其勢彌薄故論云質微則勢重質重則勢微如地質重故勢不如水水性重故力不如火火不如風風不如心心無形故力無上神通變化入不思議心之力也心力既全乃能轉昏八明明雖愈於不明而明未全也明全在于忘照照忘然後無明非明無明非明爾乃幾乎息矣慧之功也故經云無禪不智無智不禪然則禪非智不照照非禪不成大哉禪智之業可不務乎出此經後至𢎞始九年閏月五日重求檢挍懼初受之不審差之一毫將有千里之失詳而定之輒復多有所正既備無間然矣大智釋論序夫萬有本於生生而生生者無生變化兆於物始而始始者無始然則無生無始物之性也生始不動於性而萬有陳於外悔吝生於內者其唯邪思乎正覺有以見邪思之自起故阿含為之作知滯有之由惑故般若為之照然而照本希夷津涯浩汗理超文表趣絶思境以言求之則乖其深以智測之則失其㫖二乘所以顛沛於三藏新學所以曝鱗於龍門者不其然乎是以馬鳴起於正法之餘龍樹生於像法之末正餘易𢎞故直振其遺風瑩拂而已像末多端故乃寄􅀈凡夫示悟物以漸又假照龍宫以朗搜𤣥之慧託聞幽祕以窮微言之妙爾乃憲章智典作兹釋論其開夷路也則令大乘之駕方軌而直入其辨實相也則使妄見之惑不逺而自復其為論也初辭擬之必標衆異以盡美卒成之終則舉無執以盡善釋所不盡則立論以明之論其未辨則寄折中以定之使靈篇無難喻之章千載悟作者之㫖信若人之功矣有鳩摩羅耆婆法師者少播聰慧之聞長集竒拔之譽才舉則亢標萬里言發則英辨榮枮常杖兹論為淵鏡慿髙致以明宗以秦𢎞始三年嵗次星紀十二月二十日自姑臧至長安秦王虛襟既己蘊在昔見之心豈徒則悅而已語言相對則掩留終日研微造盡則窮年忘倦又以晤言之功雖深而恨獨得之心不曠造盡之要雖𤣥而惜津梁之勢未普遂以莫逆之懷相與𢎞兼忘之惠乃集京師義業沙門命公卿賞契之士五百餘人集於渭濵逍遙園堂鸞輿佇駕於洪涘禁禦息警於林間躬覽𤣥章考正名於梵本咨通津要坦夷路於來踐經本既定乃出此釋論論之略本有十萬偈偈有三十二字并三百二十萬言梵夏既乖又有煩簡之異三分除二得此百卷於大智三十萬言𤣥章婉㫖朗然可見歸途直達無復惑趣之疑以文求之無間然矣故天竺傳云像正之末微馬鳴龍樹道學之門其淪湑弱喪矣其故何耶實由道未契微邪法用盛虛言與實教並興嶮徑與夷路爭轍始進者化之而流離向道者惑之而播越非二匠其孰與正之是以天竺諸國為之立廟宗之若佛又稱而詠之曰智慧日已頽斯人令再曜世昏寢已久斯人悟令覺若然者真可謂功格十地道侔補處者矣傳而稱之不亦宜乎幸哉此中鄙之外忽得全有此論梵文委曲皆如初品法師以秦人好簡故裁而略之若備譯其文將近千有餘卷法師於秦語大格唯譯一往方言殊好猶隔而未通茍言不相喻則情無由比不比之情則不可以託悟懷於文表不喻之言亦何得委殊塗於一致理因然矣進欲停筆爭是則挍競終日卒無所成退欲簡而便之則負傷手穿鑿之譏以二三唯案譯而書鄙不備飾幸冀明悟之賢略其文而挹其𤣥也大藏友字函亦録鄙作都中論序中論有五百偈龍樹菩薩之所造也以中為名者照其實也以論為稱者盡其言也實非名不悟故寄中以宣之言非釋不盡故假論以明之其實既宣其言既明於菩薩之行道埸之照朗然懸解矣夫滯惑生於倒見三界以之而淪溺偏悟起於獨智耿介以之而致乖故知大覺在乎曠照小智纒乎隘心照之不曠則不足以夷有無一道俗知之不盡則未可以涉中途泯二際道俗之不夷二際之不泯菩薩之憂也是以龍樹大士折之以中道使惑趣之徒望𤣥指而一變恬之以即化令𤣥悟之賔喪咨詢於朝徹蕩蕩焉真可謂理夷路於沖階敞𤣥門於宇內扇慧風於陳枚流甘露於枯悴者矣夫百梁之構興則鄙茅茨之側陋覩斯論之宏曠則知偏悟之鄙倍幸哉此區之赤縣忽得移靈鷲以作鎮譣詖之邊情乃䝉流光之餘惠而今而後談道之賢始可與論實矣云天竺諸國敢豫學者之流無不玩味斯論以為喉襟其染翰申釋者甚亦不少所出者是天竺梵志名賔羅伽秦言青目之所釋也其人雖信解深法而辭不雅中其中乖闕煩重者法師皆裁而禆之於經通之理盡矣文或左右未盡善也百論治外以間邪斯文袪內以流滯大智釋論之淵博十二門觀之精詣尋斯四者真若日月入懷無不朗然鑒徹矣豫玩之味之不能釋手遂復忘其鄙拙托悟懷於一序并目品義題之於首豈期能釋耶蓋是欣自同之懷耳大藏神字函亦録十二門論序十二門論者蓋是實相之折中道埸之要軌也十二門者總衆枝之大數也門者開通無滯之稱也論之者欲以窮其源盡其理也若一理之不盡則衆異紛然有惑趣之乖一源之不窮則衆塗扶疏有殊致之不夷乖趣不泯大士之憂也是以龍樹菩薩開出者之由路作十二門以正之正之以十二則有無兼暢事無不盡事盡於有無則忘功於造化理極於虛位則喪我於二際然則喪我在乎落筌筌忘存乎遺寄筌我兼忘始可以幾乎實矣幾乎實則虛實兩冥得失無際冥而無際則能忘造次於兩𤣥泯顛沛於一致整歸駕於道埸畢趣心於佛地恢恢焉真可謂運虛刃於無間奏希聲於宇內濟弱喪於𤣥津出有無於域外者矣遇哉後之學者夷路既坦幽途既開真得振和鸞於北𡨕馳白牛以南迥悟大覺於夢境即百化以安歸夫如是者惡復知曜靈之方盛𤣥陸之未希也哉睿以鄙倍之淺識猶敢明識虛關希懷宗極庶日用之有宜兾嵗計之能殖況才之美者乎不勝景仰之至敢以鈍辭短思序而申之并目品義題之於首豈其能益也庶以此微開疾進之路耳並出三藏記集自大藏守字函疾作出曜經序此序不似僧睿撰因末有僧睿造首姑附其云豫自武當則嘗南遊者也出曜經者婆須密舅法救菩薩之所撰也集比一千章立為三十三品名曰法句録其本起繫而為釋名曰出曜出曜之言舊名譬喻即十二部經第六部也有罽賔沙門僧伽跋澄以前秦建元十九年陟蔥嶺涉流沙不逺萬里來至長安其所暗識富博絶倫先師器之既重其人吐誠亦深數四年中上聞異要竒雜盈耳俄而三秦覆墜避地東周後秦皇初四年還轅伊洛將返舊鄉佇駕京師望路致慨恨法句之不全出曜之未具緬邈長懷蘊情盈抱太尉姚旻篤誠深樂聞不俟駕五年秋請令出之六年春訖澄執梵本佛念宣譯道嶷筆受和䂮二師師法括而正之時有不怗從本而巳舊有四卷所益已多得此具解覽之畫然矣豫自武當軒襟華領咨詢觀化預參檢挍聊復序之𢎞始元年八月十二日寫訖僧睿造首大藏定字函凉州釋道朗北凉主沮渠䝉遜時人大涅槃經序大般涅槃者蓋是法身之𤣥堂正覺之實稱衆經之淵鏡萬流之宗極其為體也妙存有物之表周流無窮之內任運而動見機而赴任運而動則乘虛照以御物寄言蹄以通化見機而赴則應萬形而為像即羣情而設教至乃形充十方而心不易慮教彌天下情不在巳厠流塵蟻而弗下彌蓋羣聖而不髙功濟萬化而不恃明踰萬日而不居渾然與太虛同量泯然與法性為一夫法性以至極為體至極則歸於無變所以生滅不能遷其常生滅不能遷其常故其常不動非樂不能虧其樂故其樂無窮惑我生於謬想非我起於因假因假存於名數故至我越名數而非無越名數而非無故能居自在之聖位而非我不能變非淨生於虛淨故真淨水鏡於萬法水鏡於萬法故非淨不能渝是以斯經解章叙常樂我淨為宗義之林間究𤣥致為涅槃之源用能闡祕藏於未聞啓靈管以通照拯四重之瘭疽拔無間之疣贅闡祕藏則羣識之情暢審妙義之在已啓靈管則悟𤣥光之潜映神珠之在體然四重無間誹謗方等斯乃衆患之􅂒痟瘡疣之甚者故大涅槃以無瘡疣為義名斯經以大涅槃為宗目宗目舉則明統攝於衆妙言約而義備義名立則照三乘之優劣至極之有在然𡨕化無朕妙契無言任之沖境則理不虛運是以此經開誠言為教本廣衆喻以㑹義建護法以涉初覩袐藏以窮源暢千載之固滯散靈鷲之餘疑至於理微幽蟠微于微者則諸菩薩𢎞郢匠之功曠舟船之濟清難雲構翻覆周密由使幽途融坦宗歸豁然是故誦其文而不疲語其義而不倦甘其味而無足餐其音而不厭始可謂微言興詠於真丹髙韻初唱于赤縣梵音震響於聾俗真俗巨曜於今日而寡聞之士偏執之流不量愚見敢評大聖無涯之典遂使是非興於諍論譏謗生于快心先覺不能返其迷衆聖莫能移其志方將沈弊入邪之網長淪九流之淵不亦哀哉不亦哀哉天竺沙門曇摩䜟者中天竺人婆羅門種天懷秀拔領鑒明邃機辨清勝內外兼綜將乘運流化先至燉煌停止數載大沮渠河西王者至德潜著建隆王業雖形處萬機每思𢎞大道為法城塹㑹開定西夏斯經與䜟自逺而至自非至感先期孰有若兹之遇哉識既達此以𤣥始十年歲次大梁十月二十三日河西王勸請令譯䜟手執梵文口宣秦言其人神情既鋭而為法殷重臨譯敬慎殆無遺隱搜研本正務存經㫖唯恨梵本分離殘缺未備耳余以庸淺預遭斯運夙夜感戢欣遇良深聊試標位叙其宗格豈謂必然窺其宏要者哉此經梵本正文三萬五千偈於此方言數減百萬言今數出者一萬餘偈如來去世後人不量愚淺抄略此經分作數分隨意增損雜以世語緣使違失本正如乳之投水下章言雖然猶勝餘經足滿千倍佛涅槃後初四十年此經於閻浮提宣通流布大明於世四十年後隱沒於地至正法欲滅餘八十年乃得行世雨大法雨自是已後尋復隱沒至于千載像數之末雖有此經人情薄淡無心敬信遂使羣邪競辨曠塞𤣥路當知遺法將滅之相出三藏記集釋文紀卷十一
