body:
  text: 釋文紀巻二十四明梅鼎祚輯梁五武帝勅答臣下神滅論法雲與諸王公往答位現致論要當有體欲譚無佛應設賔主標其宗㫖辨其短長來就佛理以屈佛理則有佛之義既躓神滅之論自行豈有不求他意妄作異端運其隔心鼓其騰口虚畵瘡痏空致詆訶篤時之蟲驚疑於往來滯甃之鼃河漢於逺大其故何也淪䝉怠而爭一息抱孤陋而守井榦豈知天地之長久溟海之壯闊孟軻有云人之所知不如人之所不知信哉觀三聖設教皆云不滅其文浩博難可具載止舉二事試以為言祭義云惟孝子為能饗親禮運云三日齊必見所祭若謂饗非所饗見非所見違經背親言語可息神滅之論朕所未詳莊嚴寺釋法雲與王公朝貴書法雲姓周氏義興陽羨人機辨俊發講經之妙獨步當時勅為大僧正大通初終續髙僧傳作與沈約主人答臣下審神滅論今遣相呈夫神妙寂寥可知而不可說義經丘而未曉理涉旦而猶昬主上凝天照本襲道赴機垂答臣下㫖訓周密孝享之禮既彰桀懐曽史之慕三世之言復闡紂協波崙之情預非草木誰不歌歎希同挹風猷共加𢎞讚也釋法雲呈主人續髙僧作主上主上凝天照本作至人凝照有本垂答作垂審禮作祀紂協波崙作紂惙彼論歌歎作歔欷臨川王宏答以下六十二人答得所送勅答神滅論伏覽淵㫖理精辭詣二教道叶於當年三世棟梁於今日足使迷途自反妙趣愈灮遲近寫對更具披析蕭宏和南建安王偉答辱告惠示勅答臣下審神滅論天識昭逺聖情淵察伏覽𤣥徽實曉庸昧猥能存示深承篤顧蕭偉和南長沙王業答惠示勅答臣下審神滅論睿㫖淵凝機照深邈可以筌蹄惑見訓誘䝉心鑽仰周環洗滌塵慮遂能存示戢眷良深蕭淵業和南尚書令沈約答此下吳刻並無􅍌爵今遵藏本神本不滅久所服膺神滅之談良用駭惕近約法師殿内出亦蒙勅答臣下一本歡受頂戴尋覽忘疲豈徒伏斯外道可以永摧魔衆孔釋兼𢎞於是乎在實不刋之妙㫖萬代之舟航弟子亦即彼論徵厝疑覈比展具以呈也沈約呈慧約字徳素姓婁東陽鳥傷人約啓請入省懽續髙僧作懼永摧魔衆作永離衆魔萬代作百代厝𢎞明作歴誤光祿領太子右率范岫答岫和南伏見詔㫖所答臣下審神滅論睿照淵深動鑒機初敷引外典𢎞兹内教發䝉啓滯訓誘未悟方使四海稟仰十方讚抃異見杜口道俗同欣謹加習誦寤寐書紳惠以逮示深承眷憶范岫和南丹陽尹王瑩答辱告伏覽勅㫖神不滅義睿思機深天情雲發標理明例渙若冰消指事造言赫如日照用啓蒙愚載移瞽蔽凡厥含識莫不挹佩謹以書紳奉之没齒弟子王瑩和南中書令王志答辱告伏覽勅答臣下神滅論㫖髙義博照若發蒙弟子夙奉釋教練服舊聞有自來矣非惟雷同逺大贊激天㫖而己且垂答二解厭伏心靈藻燭聞見更不知何以闡掦𤣥猷灮彰聖述且得罔象不溷於真内外無紛如之滯實懐嘉抃猥惠來示佩眷惟深王志和南右僕射袁昻答辱告幷伏見勅答臣下審神滅論奉讀循環頓醒昏縳夫識神冥漠其理難窮粤在庸愚豈能探索近取諸骸内尚日用不知況乎幽昧理歸惑解仰尋聖典既顯言不無但應宗教歸依其有就有談有猶未能盡性遂於不無論無斯可逺矣自非神解獨脫機鑒絶倫何能妙測不斷之言深悟相續之㫖兼引喻二證方見神在皦然求之三世不滅之理彌著可謂鑽之彌堅仰之彌髙者也方使衆惑塵開羣迷反路伏誦無斁舞蹈不勝弟子袁昂和南衞尉卿蕭昺答辱告并伏見詔答臣下審神滅論夫三世雖明一乘教逺或有偏蔽猶執異端聖上探隠索微凝神繫表窮理盡性包括天人内外辨析辭㫖典奥豈直羣生靡惑實亦闡提即曉方宣揚四海垂範來世惠使聞見惟深佩服孤子蕭昺頓首和南吏部尚書徐勉答天㫖所答臣下神滅論一日麤蒙垂示辱告重送伏加硏讀窮理盡寂精義入神文義兼明超深俗表詳求三世皎若發蒙非直謹加誦持輒令班之未悟惠示承眷至弟子徐勉和南太子中庶陸杲答杲和南伏覽勅㫖答臣下審神滅論夫從無住本在默阻思伏如來藏窅絶難言故使仲初建薪火之執宣逺廣然滅之難傳疑衆談蹖淪曠稔宸聰天縱聖照生知了根墜藥隨方運便遂乃辨禮矯枉指孝示隅良由迷發俗學使俗以洗況道惑資外文即就外以明内任言出以出竒因所據理固以城壍三世負荷羣生現在破闇當來摑網一牘之間于何不利片言之益豈可覼縷生因曩慶至徳同時預奉餘論頂戴踊躍惠示不遺深抱篤念陸杲和南況道至出竒有脫誤散騎常侍蕭琛答弟子琛和南辱告伏見勅㫖所答臣下審神滅論妙測機神發揮禮教實足使淨法増灮儒門敬業物悟縁覺民思孝道人倫之本於兹益明詭經亂俗不撝自壊誦讀藻抃頂戴不勝家弟闇短招愆今在北理公私煎懼情慮震越無以仰讚洪謨對揚精義奉化聞道伏用竦怍眷奬覃示銘佩仁誘弟子蕭琛和南侍中王彬王緘答辱告伏見勅㫖答臣下審神滅論聖思淵凝天理孤絶辯三世則釋義明舉二事則孝道暢塞鑽鑿之路杜異途之口足使魔堞永淪正峯長峻弟子伏膺至道預奉天則喜躍之心寧復恒準王彬緘頓首和南太子庶子陸煦答猥辱逮告伏見至尊答臣下審神滅論俯仰膜拜裵徊空首竊聞聖惟一揆唐虞未有前言知幾其神今日獨奉梁詔道載則萬有濟其淪迷徳壽則九服揚其照筮方㫖振民育徳百年均其攝受勞民動物千古咸其折伏法師智深決定受持之持僉允志洽通敏承神之神諧克陸煦和南黄門郎徐緄答緄和南辱告并逮示勅答神滅論伏覽淵㫖疏心蕩累竊惟希夷之本難尋妙密之源莫覩自非上聖無以談其宗非夫至睿焉能導其極皇上窮神體寂鑒道居微發徳音則三世自彰布善言而千里承響誠叶禮敬義感人祇理扇𤣥風徳被幽顯悠悠巨夜長昏倐曉蠢蠢愚生一朝獨悟勵鹿苑之潛功澍法流於日用鴻名永播懋實方馳迷滯知反淪疑自息弟子歸向早深倍兼抃悅輒奉以周旋弗敢云墜但蠡測管窺終懐如失耳徐緄和南侍中王暕答枉告并奉覽勅答臣下審神滅論聖㫖𤣥照啓寤羣蒙義顯幽微理宣寂昧夫經述故身之義繫叙游魂之談愚淺所辯詳已為非滅況復睿思𢎞逺盡理窮微引文證典渙然氷釋肉眼之人䖍恭迴向惑累之衆悛改浮心發明既往訓導將來伏奉淵教欣蹈罔已王暕和南侍中柳惲答辱告惠示勅所答臣下神滅論夫指歸無二宗致本一續故不斷釋訓之𢎞規入室容聲孔經之深㫖中外兩聖影響相符雖理在固然而疑執相半伏奉淵㫖照若發蒙顧㑹𤣥趣窮神知寂測情盡狀天地相似千載闕疑從春冰而俱泮一世顛倒與浮雲而俱開祗誦環徊永用懸解存及之顧良以悲戢弟子柳惲頓首白常侍柳憕答辱告惠示勅答臣下審神滅論淵㫖沖邈理窮幾奥竊以修因趣果神無兩識由道得滅佛惟一性殷人示民有知孔子祭則神在或理傳妙覺或義闡生知而楊墨紛綸徒然穿鑿凝滯逐往將掩名教聖情𤣥鑒理證無間振領持綱舒張毛目抑揚三代汲引同歸實假雙袪朗然無礙伏奉循環疑吝俱盡來告存及悲抱惟深柳憕頓首白太子詹事王茂答茂和南辱吿伏見勅㫖答神滅論頂戴欣懽不及抃舞神理悠曠雖非建言所極列聖遺文炳然昭著莫不撫祍䖍襟式遵彞典豈可妄陳虚矯厚誣前誥謂來緣之不期棄享薦之至禮迷路茫茫歸塗靡薄若空一到有悔無追主上含明體聖妙窮真假發義照辭舟航淪溺豈惟天人讚仰信亦諸佛迴灮弟子夙昔棲心本憑淨土數延休幸預逢昌世方當積累來因永陶慈誘藻悅之誠非止今日未獲祗敘常深翹眷比故循詣此白無伸王茂和南太常卿庾詠答辱告惠示至尊答臣下神滅論伏覽未周煙雲再廓竊惟蠕動有知草木無識神滅瞽論欲以有知同此無識乃謂種智亦與形骸俱盡此實理之可悲自非徳合天地均大域中屬反流之日值飲化之幾則二諦之言無以得被三世之談幾乎息矣聖上愍此四生方淪六道研校孔釋共相提證使窮陸知海幽都見日至言與秋陽同朗羣疑與春冰俱釋雖發論𢎞道徳感沖襟而預聞訓誘俯欣前業法師服膺法門深同此慶謹當讚味吟誦始終無斁弟子庾詠和南豫章王行事蕭昂答辱告宣示勅答臣下審神滅論聖㫖披折使惑者渙然神之不滅著於通誥理既渺默故致有迷主上識照知來鑒踰藏往摛機外之妙思攻異端之妄說又引禮經取驗虚實孝敬之道於此方𢎞孤子蕭昂頓首和南太中大夫庾曇隆答辱告伏見主上答臣下審神滅論昏蒙啓悟煥爾照朗夫至理虚寂道趣空微上聖極智乃當窮其妙實步浮生自不辨深達𤣥淵如聞立論者經典垂訓皆是教跡至於在佛胡書詭怪難以理期此則言語道斷仰勞聖思為臣下剖釋羣情豈不欣讚銘挹明指抱用始終法師曲誨彌増慙戢弟子庾曇隆和南太子洗馬蕭靡答惠示勅答臣下審神滅論披覽未周情以抃悅主上凝神天縱將聖多能文奥不刋辭溢繫表義證周經孝治之情爰著㫖該釋典大慈之心彌篤謹置之座隅陳之机枕寢興鑽閲永用書紳班示不遺戢眷良厚弟子蕭靡和南御史中丞王僧孺答辱告惠示送主上所答羣臣仰諮神滅論伏覽循環載深鑽奉發蒙袪蔽朗若披雲竊以事藴難形非聖莫闡理寂區位在愚成惑若非神超繫表思越機前豈能燭此微言若開金石洞兹妙境曾靡榛蹊喻之以必薦示之以如在使夫持論者不終泥於遥轍專謬者無永沈於惑海預奉淵謩孰不懽肅裁此酬白不申擊舞王僧孺呈擊舞南北藏並作繫舞黄門侍郎王揖答辱告惠示勅答臣下審神滅論夫昊蒼𤣥默本絶言議性與天道固亦難聞而愛育之仁依方感動開誘之教沿事降設矜局蛙於井谷哀危蟪於寸隂思發神衷言微理鏡引據前經文約㫖逺凝神杳翳一理能貫墳典紛綸一言以蔽顯列聖之潛㫖決終古之滯惑存滅由斯而曉孝敬因兹而隆信足以警誡重昏儀範百代所謂聖謨揚揚嘉言孔彰者也弟子既慙辨理彌懵知音遂得預聞道訓頒覿妙藻式抃下陳永佩聖則弟子王揖和南吏部侍郎王泰答一日曲蒙讌私預聞范中書有神形偕滅之論斯人逕侹不近人情直以下才未能折五鹿之角耳辱告垂示聖㫖徵引孝道發揚冥致謹當尋誦永袪蒙惑弟子王泰頓首和南侍中蔡僔答僔梁書作撙辱告奉宣勅㫖答諮神滅論夫神理𤣥妙良難該辨雖復前聖眷言後英猶惑睿㫖爰釋皎若發蒙固以陵萬古而擅竒悟方來以不朽伏奉朝聞載深抃躍謹以書紳永袪迷滯蔡僔和南建康令王仲欣答仲欣白辱告惠示詔所答臣下神滅論伏讀淵麗抃不勝躍皇帝睿性自天機神獨逺五體外照三明内映金輪徐轉則道濟八紘玉瓚既陳則孝隆七廟開慧日於清漢垂法雲於大千如在之義重闡兹晨常住之明永證來劫故以徳冠百王聲高萬古弟子棲心法門崇信大典舞蹈之誠獨深鳬藻王仲欣和南建安王外兵叅軍沈績答弟子績和南垂示勅答臣下神滅論伏深欣躍弟子竊惟道不自𢎞𢎞實由人人須其識識須其位周易所稱聖人大寳曰位豈其意乎然或位而不人或人而不位三者云僃其理至難故宣尼絶筆於獲麟孟軻反身於天爵誠無其位也嗚呼真化殆將淪没今天子以仁聖盛明據至尊之位葢層山可以衆煦飄其和不可移也鐘鼔可以雞㹠亂其鳴不可聞也將使惵惵黔首濟其長夜自非徳合天地誰能若斯弟子早沐虚風既聞之矣然而燕雀之集猶或相昬飛蓬之門尚自交構聖㫖爰降辭高理愜敦以人天之善誡以莫大之刑一言作訓内外俱闡夫以孺子入井凡民猶或傷之況乃聖慈御物必以惻隠為心邪能指白馬之非白猶見屈於巾庸至於神享機外志存𢎞化魍魎摧其頰舌焉足道哉神牘天䝿本非窺觀遂能存示用慙寡徳弟子沈績和南刑部郎巾司馬筠答辱告幷垂示勅答臣下審神滅義伏讀周流式歌且舞夫識慮沈隠精靈幽妙近步無以追凡情不能測外聖知其若此所以抑而不談故渉孔父其尚昏經姬公其未曙而碌碌之徒忘理信目錐畫管窺異見鋒起茍狥離賢之名遂迷霜露之實愚惑到此深可矜傷我皇道貫幽顯明踰日月窮天地之極以盡始終之奥忌蕕紫之妨薰朱惡雉珉之亂鳳玉爰發聖衷降慈雅義信之以灮揚妙覺拯厥沈泥近照性靈之極逺明孝徳之本實使異學剪其邪心四方篤其羨慕謬以多幸預奉陶均沐澤飲和有兼慶躍流通曲被佩荷彌深司馬筠呈惡二藏作器誤豫章王功曹叅軍沈緄答緄和南弟子竊以為交求之道必取與為濟至於瀆蒙不告則空致憧憧儵魚之觀殆將可息所以自絶諮受崇深莫窺誠自愧也徒以闇識因果循循局誡冀履霜不退堅冰可至耳而法師𢎞心山藪幸能藏疾雖未升堂遂招以法流杜夷云召渴馬於滮泉不待鞭策而至矣垂示上答臣下神滅論晨宵伏讀用忘疲寢構斯法棟導彼迷流天屬既伸三世又辨鬼神情狀於焉可求然謂海實廣廣孰能知謂天葢高高不可測聖論鉤深㫖超繫表蒙情易駘恧能是空銘末示終愧鑽仰弟子沈緄和南䝉情至末示有脫誤建安王功曹王緝答惠示勅答臣下審神滅論竊以神一冥默歴聖未傳宣尼猶稱不言莊生空構其語求之方策歎昧交深謬覿今論天思淵發妙㫖凝深至理既𢎞孝機兼極信足超軼萬古照燭來今弟子生屬昌辰預覯聖藻既冰渙於懐抱信曉惑於隨便凡厥靈知孰不鑽仰矧伊蒙蔽激抃實深王緝和南右衞將軍韋叡答至理虚寂冥晦難辨言有似無言無實有妙於老談精於釋教辭炳金書文稽玉牒者由來尚矣主上道括宇宙明並日月隠顯之機必照有無之要已覽遂垂以明論詶折臣下導誘既深訓義方洽凡在有心孰不慶幸蒙示天製謹加讀誦垢吝雲消特兼懽抃法師果深昔縁因㑹今法離五慾而入八解去三界而就一乘復得預聞徳音彌足欣讚惠告沾及戢佩實深韋叡和南王云史稱韋公不事佛此書當由畏梁主耳廷尉卿謝綽答綽和南辱告蒙示勅答臣下審神滅論伏覽淵謨用清魂府既排短說實啓羣疑竊惟人生最靈神用不極上則知來藏徃次乃鄰庶入幾以此觀之理無可滅是以巨儒伸其祀事大慈照其生縁内外發明已足袪滯況復天誨諄諄引諭彌博𢎞資始於黔黎導識業於精爽固令開蒙出障坐測重𤣥異端既絶正路斯反論者慙其墨守范氏悟其膏肓預在有識孰不擊讚但弟子徒懐游聖終懵管窺頂奉戴躍永懽廕誘謝綽和南司徒祭酒范孝才答弟子孝才和南辱告逮示勅㫖答臣下審神滅論竊以彭生豕立名現齊公元伯纓垂事高漢史且斬籌為喻義在必存神之不滅法俗同貫欲滅其神内外成失所謂管闚窮極寜辨西東蠡度滄溟安知髣髴天㫖𢎞深慇懃於妙象聖情隠惻流連於饗祭豈直經教増隆實使蒙愚悟道眷逮所覃曲垂頒及銘兹訓誘方溢寸心弟子范孝才和南常侍王琳答辱告惠示至尊答臣下審神滅論謹罄庸管恭覽聖製聲溢金石理洞淵泉義貫六爻言該三世足使僻學知宗迷途識反弟子生幸休明身叨渥澤復得傾耳天上拭目神薻鳧抃之誠良無紀極猥惠頒逮銘躍惟重弟子王琳答庫部郎中何炯答炯和南辱所賜書并垂示答臣下審神滅論竊聞神其如在求前王而未測住常住其不移徙伏膺而曉鑽仰淵秘渙爾氷開故知紛綸聖跡不由一道參差動應本自因時今澆流已息無明將啓物有其機教惟斯發篤孝治之義明覺者之㫖預有靈識誰不知慶豈炎昊所謂爭衡非軒唐所能競爽巍巍至徳莫或可名昭然大道於斯為極何炯和南求前王至而曉有脫誤豫章王主簿王筠答筠和南辱告垂示上答臣下審神滅論竊聞僾然有見禮典之格言今則不滅法教之𢎞㫖但妙相虚𤣥神功凝靜自非體道者豈能默領其宗不有知機者無由冥應其㑹聖主迹同萬機心游七淨哀愍羣生嫗煦庶物滌彼葢纒勗以解慧袪其蒙惑躋之仁壽信大哉為君善於智度者也弟子世奉法言家傳道訓而學淺行疎封累猶軫既得餐稟聖教預聞𢎞誘一音得解萬善可偕抃躍之情無以譬說弟子王筠和南倉部郎中孫挹答辱告惠示勅答臣下審神滅論伏奉欣仰喜不自支夫江海淵曠非井蛙所達泊然入定豈外道能干故一毛不動則衆邪退散舟航既濟而彼岸斯登聖后體藴二儀徳兼三代撫靈機而總極秉上智以調民發號施令則風行草偃臨朝尊默而化動如神隆五帝以比蹤超萬劫其方永猶復震金聲於指掌降妙思以發蒙理既仰而方深趣彌鑽而踰逺均寳珠於無價齊蓮蕐之不塵孝敬被乎羣黎訓範侔於先聖跂行喙息同識斯懽翾飛蠕動共陶兹慶班告來臨用深榮荷謹頂受書紳永啓庸惑弟子孫挹和南丹陽丞蕭眕素答辱告并伏見勅答臣下審神滅論性與天道稱謂理絶曠劫多幸猥班妙訓接足頂受歡敬載懐竊謂神道寂寞法海難邊是以智積麻葦而未測識了色塵而猶昧豈其庸末所能激仰然自慧雲東漸寳舟南濟歲序綿長法音流逺明君良宰雖世能宗服至於躬挹𤣥源親體妙極者竟未聞焉是使兩諦八解獨闕皇言九部三藏徧蕪國學嗚呼可為歎息者也竊尋神滅之起則人出樓伽經名衛世雖義屈提婆而餘俗未弭故使羣疑異學習以成見若不稟於先覺實終累於後生聖上道濟天下機洞無方虎觀與龍宫并閱至徳與實相齊導故能符俗教而諦真道即孝享以𢎞覺性照此困蒙拔兹疑網雖復牟尼之柔軟巧說孔文之博約善誘曷以喻斯巍巍乎十善己行金輪何逺法師稟空慧於曠生習多聞於此運法輪轉而八部雲㑹微言發而天人攝受故能播誡香於鳳闈藻覺蕐於宸側信矣哉能以佛道聲令一切聞者也弟子無記釋藏不逮孔門雖願朝聞終慙吝薄庶縁無盡之法兼利人我耳疾塞甫爾心慮惛悸謹力裁白不識詮次傾遲諮展親承至教也弟子蕭眕素頓首和南中書郎伏暅答猥垂班示至尊所答臣下審神滅論伏奉淵㫖頓袪羣疑天情獨照妙鑒懸覽故非凡愚所可鑽仰然常師管見亦竊懐往求今復稟承教義逺尋經㫖重規疊矩信若符契法師宣揚睿理𢎞讚聖言方使二教同歸真俗一致預得餐沐誨誘陶染至化抃擊下風實兼舞蹈遲比諮覿乃盡襟誠臨白欣佩不知裁述伏暅呈五經博士賀瑒答辱告垂示勅答臣下審神滅論鑽仰反復誦味循環故知妙藴機初事隔凡識神凝繫表義絶庸情皇上睿覽通幽性與天道所以機見英逺獨悟超深述三聖以導未曉標二事以洗偏惑故係孝之㫖愈明因果之宗彌暢崛山粹典即此重彰洙水清教於兹再朗譬諸日月無得踰焉弟子雖冥頑多蔽謬奉格言研求妙趣猶知蹈舞法師宣揚至道灮闡大猷猥惠末及益増銘荷弟子賀瑒呈太子中舍劉洽答辱告奉覿勅㫖所答臣下審神滅論伏披素札仰瞻𤣥談文貫韶夏義測爻繫囊括典經牢籠述作𢎞彼正教垂之方簡希夷卓爾難得而聞斟酌賢聖剖破毫髮兼通内外之塗語過天人之際矣自非體兹至徳思與神㑹豈能深明要道人知企及謹書諸紳永以為珮泠乎既入照若發蒙比故修詣共伸講復也弟子劉洽頓首呈五經博士嚴植之答辱告伏見勅㫖答臣下審神滅論夫形分涉麤或微隠難悟況識理精密豈庸見能曉所以斷常交騖一異競奔若中道居懐則欲流可反二邊滯意彼岸長乖神滅之論斯障實重仰賴聖主棟梁至教明詔爰發朗若披雲非直冥符訓典俯𢎞孝義葢妙達生源幽窮行本使執禮之性踐霜露而彌篤研神之識仰禪悅而増心皆當習忍慧途翻流惑海弟子早標素心未知津濟伏讀懽欣充遍身識猥惠存勗荷眷惟㴱嚴植之呈東宫舍人曹思文答辱送勅書弟子適近亦親奉此㫖范中書遂迷滯若斯良為可慨聖上㴱懼黔黎致惑故垂折衷之詔此㫖一行雖復愚暗之識了知神不滅矣弟子近聊就周孔以為難今附相簡願惠為一覽之折其詭經不尋故束展此不多白弟子曹思文和南祕書丞謝舉答辱告惠示勅答臣下審神滅論竊聞語曰萬物紛糺則懸諸天象立言淆舛則折乎聖理昭昭自古事蔚在兹伏尋睿訓垂文義深陶鑄稱象匪臻希微孰識論幽至極盡性窮神愍斯六蔽哀此四執黜小言之亂道拯經行於夷路㫖肆而隠義宛而彰博約載𢎞廣大悉僃一音半偈顯兹悟拔慧日心水蕩此塵迷俾宗奥有歸教思攸在異端自杜誣善知息凝繫表於繩初導禪流於苦海豈伊含孕三藏冠冕七籍而已哉弟子幸邀至運側承格誘沐泳歡撃奉以書紳謝舉和南司農郎馬元和答辱告頒示勅㫖垂答臣下審神滅論竊聞標機之㫖非凡所窺符神之契惟仁是極故衆教裵徊理詣於惇善羣經委曲事盡於開濟伏惟至尊先天製物體道裁化理絶言初思包象外攻塞異端闡道歸一萬有知宗人天仰式信滄海之舟梁𤣥霄之日月也神滅之論宜所未安何者前聖摛教抑引不同括而言之理實無二易云積善之家必有餘慶積不善之家必有餘殃孝經云生則親安之祭則鬼享之雖未顯論三世其㫖巳著薪盡火滅小乘權教妙有湛然究竟通說因情即理理實可依且慎終追逺民徳歸厚禮有國有家歴代由之三才之寳不同降清神滅之為論妨政實多非聖人者無法非孝悌者無親二者俱違難以行於聖世矣弟子庸乏懵於至道濫蒙頒訪所據凡淺荷惕之誠追以無厝弟子馬元和和南公論郎王靖答垂示聖㫖答臣下審神滅論伏惟至尊垂拱巖廊游心萬古居無棄日道勝惟機爰訪羣下恢𢎞孝義睿藻淵𤣥理深樞極自非聰明狥齊之君就日望雲之主豈有剖判冥寂明章雅論闡大聖於須臾定俗疑於俄頃非惟理測宸衷亦乃義切臣子含和飲憓之邦衣裳道素之域莫不傾首仁澤沐浴唐風弟子江淮孤身不學無術雖復從師北靣一經不明縱憶舊文豈伊髣髴五經紛綸事類𢎞博神明之㫖其義多端至如金石絲竹之響公旦代武之說寧非聖㫖且祭義所談尤為顯據若論無神亦可無聖許其有聖便應有神理且炳然豈容寂絶弟子所見庸淺無以宣揚至澤既涉訪逮輒率所懐弟子王靖和南太子中舍陸倕散騎常侍陸任答辱告惠示至尊所答臣下審神滅論昔者異學爭途孟子抗周公之法小乘亂道龍樹陳釋迦之教於是楊墨之黨舌舉口張六師之徒轍亂旗靡言神滅者可謂學僻而堅南路求燕北轅首楚以斯適道千里而遥聖上愍其迷途爰奮天藻鉤深致逺盡化知神俾此困䝉均斯冰釋陳兹要道同彼月照弟子並以凡薄沾竊恩紀纓冕則天之朝餐捉稽古之論贊幸之誠獨知踴躍猥頒告逮謹用書紳陸倕呈領軍將軍王僧恕答將軍一作司馬辱告惠示勅㫖答臣下審神滅論甚哉理之大也斯寧寸管之所見言性之可聞而隨類儻遇怡然蒙釋奉戴周旋以次以誦法師徳邁當今聲標萬古知十之談每㑹起予之富必酬想闡𢎞聖㫖煥然雲消邪弟子學慙聚螢識非通見何能仰贊洪輝宣猷妙範者歟但論者執一惑之情循一往之轍固不可以語大方焉知致逺恐必泥哉夫幽明之理皎然不差因果相起義無獨立形滅自可以草木為籌神明常隨縁而在所以左氏有彭生豕見尚書則祖考來格禮云若樂九變人鬼可得禮矣結草之報豈其遂滅元規所夢何得無神神明不滅著之金口孔聖所說彌有多據若文雖五千詩乃三百得其理者自可一言而以蔽故不復煩求廣證夫三聖雖有明教百家常置𢎞理而尚使狂簡斐然成章攻乎屢作今皇明體照幽寂識周内外以前聖之久逺感異端之妄興霈然爰發乃垂眷翰使闡提一悟遂獲果通閻浮執惑豁然洗滯況復縉紳之士為益固其𢎞哉弟子餐道無紀法師許其一簣遂能班逮神藻使得預沐清風頂戴懽舞無以自譬戢銘兼深彌其多矣弟子王僧恕頓首和南五經博士明山賔答辱告惠示勅㫖答臣下審神滅論源深趣逺豈鹿兎所測隨類得解或亦各欣其所見奉以周旋不勝舞躍法師學冠一時道叶千載起予之寄允在明徳想𢎞宣妙㫖無復遺藴邪弟子業謝專經智非通識豈能仰述淵猷讚掦風教論者限以視聽豈達曠逺目覩百年心惑三世謂形魄既亡神魂俱滅斯則既違釋典復乖孔教矣焉可與言至道語妙理者哉夫明則有禮樂幽則有鬼神是以孔宣垂範以知死酬問周文立教以多才代終詩稱三后在天書云祖考來格且濠上英華著方生之論柱下睿哲稱其鬼不神為薪而火傳交臂而生謝此皆陳之載籍彰彰甚明者也夫縁假故有滅業造故無常是以五隂合成終同煙盡四微虚構㑹均火滅竊謂神明之道非業非縁非業非縁故雖遷不滅能縁能業故苦樂殊報此能仁之妙唱縉紳之所仰也雖教有殊途理還一致今棄周孔之正文背釋氏之真說未知以此將欲何歸正法住世尚有斷常之說況像法末流而無異端之論有神不滅乃三聖同風雖典籍著明多歴年所通儒碩學並未能值皇上智周空有照極神源爰發聖衷親染神翰𢎞奬至教啓悟重昏令夫學者永袪疑惑眷逮不遺使得預餐風訓沐浴頂戴良兼欣戢明山賔和南通直郎庾黔婁答孝經云生則親安之祭則鬼饗之樂記云明則有禮樂幽則有鬼神詩云肅雍和鳴先祖是聽周官宗伯職云樂九變人鬼可得而禮祭義云入戸愾然必有聞乎其歎息之聲尚書云若示三王有太子之責左傳云鯀神化為黄能伯有為妖彭生豕見右七條弟子生此百年早聞三世驗以衆經求諸故實神鬼之證既布中國之書菩提之果又表西方之學聖教相符性靈無泯致言或異其揆惟一但以聖人之化因物通感抑引從急與奪隨機非㑹不言言必成務非時不感感惟濟物而參差業報取捨之塗遂分往還縁集淪悟之情相舛狎其小識晦兹大㫖滯親聞見莫辯幽微此榆枋所以笑九萬赤縣所以駭大千故其宜也若斯之倫遂復構穿鑿駕危辯鼓偽言煽非學是謂異端故宣尼之所害也我皇繼三五而臨萬機紹七百以御六辯勳格無稱道還淳粹經天緯地之徳左日右月之明皇王之所未曉羣聖之所不備億兆之所宜通將來之所必至莫不鬯其𤣥波而達其幽致者也伏覽神論該冠真俗三才載朗九服移心跂行蠢蠕猶知舞蹈況在生靈誰不撫節弟子少缺下帷尤蔽名理既符夙志竊深踴躍至如百家恢怪所述良多搜神靈鬼顯驗非一且般若之書本明斯義既魔從所排輒無兼引自非格言孰能取正略說七條皆承經典譬猶秋毫之憑五嶽觸氏之附六軍敢瀝微塵秪増悚汗弟子庾黔婁和南太子家令殷鈞答近辱告惠示主上所答臣下審神滅論性與天道誠不得聞徒觀二諦兼通三聖俱闡片言析妙半字合靈辭存五禮之中㫖該六合之外譬河海之紀地猶日月之麗天伏讀歡愉魂影相慶何者弟子夙陶𤣥化及長不虧常恐識業未𢎞中塗迴枉或端然靜念心翔翔而靡薄或吐言設論時見屈於辯聰夫大道甚夷而黎元好徑咸用此也今猥奉神㫖昭若發蒙且服且誦永為身寳數日來公私牽挽還輒頓卧未即白答銜眷彌深殷鈞和南秘書郎張緬答尋三世昞然二果昭著安可惑六塵而不曉迷五塗而長没以為形謝神滅骸亡識朽此外道之邪見豈可御瞿曇之正法所謂輕陳一旅敵堂堂之鋒輒馳駑駘與騏驥而並行恐長劫有盡領蟲方至一身死壊復受一身精神無異人畜隨縁湼槃明文瑞應高說主上聖照幽深鏡察潭逺譬兩祭而知不滅喻妄作於背親義隨八引而舛入言比性道而難聞弟子少游弱水受戒樊鄧師白馬寺期法師屢為設生死之深趣亟說精神之妙言爾來歸心絶此疑想復覩斯判益破魔徒非但聞覿於今方欲結縁於後徒知歸信闇比求名猥惠沾示深承眷篤弟子張緬和南五經博士陸璉答璉白逮告垂示勅答臣下審神滅論伏讀天㫖照鏡塵蒙弟子門宗三寳少奉道訓雖誠歸至教識暗𤣥津謹尋内外羣聖開引殊文如來說三乗以標一致言二諦以悟滯方先王詮五禮以通愛敬宣六樂以導性靈或顯三世以徵因果或明神感以驗應實豈可頓排神源永絶縁識者哉若則善惡之報虚陳祭敬之設為妄求之情理其可安乎而昧惑之徒尚多偏執是以聖明𤣥覽游神妙門動言出理皎若朝暉發文顯證朗如宵燭頓足開建愚昏㥾信凡鄙者也伏習詔㫖綜檢心源謹裁還白不宣抃舞弟子陸璉呈揚州别駕張翻答辱告伏見勅答臣下審神滅論盛㫖窮機微言合道生知出六儒之首自然該十聖之外至如感果之規理照三世孝饗之範義貫百王妙㑹與春冰等釋至趣若秋旻共朗足使調闡變情桀跖移志反澆風於遂古振淳波乎方册英聲茂實粤不可尚法師精理之秀擅高日下俱沐聖化獨游神明深鑒道藴洞識宗塗弟子昔聞師說悟太傅之㫖今偶昌時奉不滅之訓信以照晳希䝉紓洗塵葢足蹈手舞言象豈能勝張翻和南旻一作昊太子左率王珍國答辱告伏見勅答臣下神滅論神之不滅經典明文即心語事皎然在理論有神滅實所駭歎天照淵凝妙㫖周博折彼異端𢎞兹教範信可以朗悟冥塗棟梁千載矣伏覽懽戴竊深罔極比故詣展遲獲咨伸王珍國呈領軍將軍曹景宗答枉告所宣答神滅勅理周萬古㫖包三世六趣長迷於此永悟五道恒疑曉若發蒙自非鑒窮八解照侔十號排罔逸俗安得如此奉佩書紳敢違寢食法師識踰有境學詣無生揄揚之善煥如東里披翫周環用忘所疾曹景宗白答光禄勲顔繕答猥枉明誥頒述勅㫖審神不滅以答臣下理據昞然表裏該妙所以慧現獨宣舟梁含氣夫目所不覩帷屏為隔耳所不聞遐邇致壅不得以不聞不見便謂無聲無物今欲詰内教當仗外書外書不殊内教兹現書云魂氣無所不之佛經又曰而神不滅既内外符同神在之事無所多疑疑其滅者即蜉蝣不知晦朔蟪蛄之非春秋寧識大椿之永久日月之無窮主上聖明超古微妙通神三世之㫖有證孝饗之理斯光蒼生管見以晦而復曉晩俗淪冥既迷而更悟弟子宿植逢幸預從餐道投心慈氏歸敬誠深惟孱來縁可期載懐鳧藻而已弟子顔繕呈五經博士沈宏答弟子宏稽首和南辱告伏覽勅答臣下審神滅論夫惟機難曉用晦易昏自非凝神斯鑒探賾斯朗豈能拯重雰於有惑豈能運獨見於無明竊惟大聖御宇上徳表物垂法雲以湛潤開慧日而増暉逺比溟海近譬井幹粤今遂古孰能識乎此焉至如經喻雀飛瓶在火滅字存禮云非類弗歆祭乃降祉且夢蘭以授鄭穆結草以抗杜囘凡此羣列不可悉紀又五道遞往六度同歸皆神之顯驗不滅之幽㫖但郄克躧足豈從邯鄲比蹤盧敖㨗至寧與若士齊跡今仰墜五藻俯逮闡提所謂若披重霧以攀合璧出幽夜而眄燭龍短綆爰汲望瀾覘海實歡喜頂戴若無價寳珠沈宏頓首和南建康平司馬褧答辱告惠示勅難滅性論竊以慈波洪被道冠衆靈智照淵凝理絶羣古七禪八慧之辨三空四諦之微故以煥乎載籍炳於通誥也所以優陀云喻如百首齊音同讚妙覺尚不能言萬分之一矣夫業生則報起因往則果來雖義微而事著亦理幽而證顯自近可以知逺尋邇可以探遐譬如日月懸天無假離朱之目鳴鐘在耳不勞子期之聽而議者自昏迷塗難曉茍狥所懐坐顛坑穽伏覽皇上令㫖理妙辭縟致極鉤深究至寂而更闡啓幽途以還晰雖復列聖齊鑣羣經聮奥靈山金口禪氷玉舌終不能捨此以求通違兹而得正信哉澡江漢之波塵滓以滌導徳齊禮還風反化法俗兼通於是乎在付此言展方盡述讚弟子司馬褧呈禪氷疑誤左丞丘仲孚答伏覽勅㫖答臣下審神滅論聖照淵深句括真俗理超繫表義貫羣識鑽奉神猷伏深舞蹈惠示銜戢存眷丘仲孚白並𢎞明集銜字衍文釋文紀巻二十四
