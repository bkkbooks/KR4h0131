body:
  text: 釋文紀巻二十二明梅鼎祚輯梁三元帝諱繹字世誠小字法車武帝第七子謝勅送齊王瑞像還啓臣聞非晦非明法身凝寂有感有見渇仰赴幾伏惟陛下百姓為心宜觀衆覺十方皆見普照王畿將使化行南國乃睠西顧江水安流大川利涉鮮雲靉靆暫掩晨離甘雨霏微猶藏宿霧髙明可仰與天花而俱落清梵騰空雜塤篪以相韻頂禮最勝敬謁法王瞻彼堵牆不足為喻立處鍼鋒弗云易擬臣身持浄戒心抃法流接足道周膜拜路左得未曽有喜躍充遍藝文類聚謝賜功徳浄饌一頭啓瑶器自滿金鼎流味漿含都蔗味資石蜜又謝賚功徳食一頭啓天厨浄饌菴羅法果並北户録注與蕭諮議等書盖聞圓灮七尺上映真珠之雲面門五色旁臨珊瑚之地化為金案奪麗水之珍變同珂雪髙𤣥霜之彩豈不有機則感感而遂通有神則智智而必斷故碧玉之樓升堂未易紫紺之殿入室為難必須五根之信以信為首六度之檀以檀為上故能捨財從信去有即空率斯而談良可知矣竊以瑞像放灮倐將旬日蹈舞之深形於寤寐抃躍之誠結於興寢稍覺十字之蒸嗤何曾之饌五鼎之味笑主偃之辭黿羮麟脯空聞其說羊酪猩脣曷足云也困於酒食未若過中不餐螺蚳登俎豈及春蔬為浄欲吾子三日潔齊自寅至戍一中而巳自有米如玉鋭鹽類虎形雲夢之芹遼東之藻十斤之梨千樹之橘青筍紫薑固栗霜棗適口充腸無索弗獲八功徳水並入法流四王俱至偕讓𢎞道同志為友豈不盛歟蕭繹疏與劉智藏書智藏見後菩薩蕭法車置郵大士劉智藏侍者自林宗遄反𤣥度言歸以結元禮之心彌益真長之歎故以臨風望美對月懐賢有勞寤寐無忘興寢方今𤣥冥在節歲聿云遒日似青緹雲浮紅蘂清臺炭重北宫井溢想禪説為娛稍符九次成誦之功轉探三宻山間芳杜自有松竹之娛巖穴鳴琴非無薜蘿之致修徳之暇差足樂也昔韓梅兩福求羊二仲鄭林騰名於馮翊周黨傳芳於太原或有百鎰可捐千金非貴松子為餐蒲根是服未有髙蹈真如歸宗法海梵王四鶴集林籞而相鳴帝釋千馬經丘園而跼步有一於此猶或稱竒兼而總之何其盛也故知南臨之水已類吕梁之川北眺之山彌同武安之嶺豈復還思溆浦尚想彊臺睠彼漢池載懐荒谷以此相求心可知矣僕久厭塵邦本懐人外加以服膺常住諷味了因彌用思齊每增求友常欲登却月之嶺䕃偃盖之松挹璇玉之源解蓮華之劒藩維有限脱屣無由每坐向詡之牀恒思管寜之榻夢匡山而太息想桓亭而延佇白雲間之蒼江不極未因抵掌我勞如何想無金玉數在郵示弱水難航猶致書於青鳥流川弗逺佇芳音於赤玉鶴望還信以代萱蘓得志忘言此寜多述法車叩頭叩頭並廣𢎞明集荆州長沙寺阿育王像碑盖聞璇璣玉衡穹昊所以紀物金版玉文淳精所以播氣何則咸秩社首義盡於寰中鑄鼎馮翊未窮於系表况復道冠萬靈理超千聖智周十地行圓四等變海成蘇移山入芥針鋒廣說藕絲見道惠音八種面門五色組鉢生華入青樓而吐曜金牀照采出紫殿而相輝纔度蓮河即處天冠之寺始逰羅衛便居堅固之林斯盖俯應閻浮未臻常樂降情誘接豈窮妄相若乃境無引汲智生淺深明同一體惑起十重七地初刃方稱變易三達後心因窮智種然俱冥四徳脱屣雙林示表金棺現焚檀槨浩浩焉不可知巳却望五津距青蓮之洞傍臨三峽帶明月之流善覺寺碑金盤上疏非求承露玉􅀈前臨寧資潤礎飛軒絳屏若丹氣之為霞綺井緑泉如青雲之入吕寳繩交映無慙紫紺之宫花臺照日有跡白林之地銘曰聿遵勝業代彼天工四園枝翠八水池紅花疑鳳翼殿若龍宫銀城映沼金鈴響風露臺含月珠幡拂空􅀈金陵梵刹志作舄鍾山飛流寺碑清梵夜聞風傳百常之觀寳鈴朝響聲揚千秋之宫同符上隴望長安之城闕有類偃師瞻洛陽之臺殿瞰連甍而如綺雜卉木而成帷銘曰雲聚峯髙風清鐘徹月如秋扇花疑春雪極目千里平原迢􅂒曠野寺碑雲楣膠葛桂棟隂崇刻虬龍如洞房倒蓮花於綺井月殿朗而相暉雪宫穆以華壯䡾䡾璇題虹梁生於暮雨嶫嶫銀牓飛觀入乎雲中銘曰圓璫旦暉方諸夜朗金盤曜色寳鈴成響崇藝文作峯郢州晉安寺碑鳳凰之嶺芊綿映色蓮花之洞照曜增輝山云黄鶴疑聞天之夜響城稱却月似輕雲之霄蔽銘曰虹梁紫柱螭桷丹墻綺井飛棟華榱璧璫應龍若動威鳳疑翔玉舄霄潤金池夕灮朱城却棁紫陌潛通壍柳朝緑江暉暝紅落霞將暮鮮雲夕布峯下陽烏林生隂分珮隔浦皇檣隱霧俱聽法鐘同觀寳聚揚州梁安寺碑竊以陽之有宗者莫擬於靈烏夜之有灮者孰踰於隂故以日門見羲和之色月殿望奔娥之象而合璧迢􅂒丈尺猶且莫量朗鏡悠逺積空之所不算復有紫川青龍之水却月朝霞之山白珪𤣥璧餞瑶池之上銀闕金宫出瀛洲之下空臺四柱隨仙衣而俱颺寳壍三重映瑞園而涵影旃檀散馥無復圓覺之風地涌神龕皆成多寳之塔攝山棲霞寺碑金池無底已通寳壍之側玉樹生風傍臨綵船之上七重欄楯七寳蓮花通風承露含香映日銘曰苔衣翠屋樹隱丹楹澗浮山影山傳澗聲風來露歇日度霞輕三災不毁得一而貞歸來寺碑幡影颺於絳臺梵聲依於應塔三相不留蕭蠶終壞八苦遐長燈蛾未已銘曰鈴隨風振盤依露泫丹桂無枝朱揚自翦九苑萌枯三昧葉巻疏樹揺落翻流清淺荆州放生亭碑魚從流水本在桃花之源龍處大林恒捻浮雲之路豈謂陵陽垂釣失雲失水莊子懸竿吞鉤吞餌雖復𤣥龜夜夢終見取於宋王朱鷺晨飛尚張羅於漢后譬如黄雀伺蟬不知隨彈應至青鸇逐免詎識扛鼎方前北海之餐鸚鵡未始非人西王之使傳信誰云賤鳥故知魚鳥一觀俱在好生欲使金牀之鴈更及衡陽之侣雪山之鹿不充食苹之宴莊嚴寺僧旻法師碑夫宏才妙物雲液之所降生獨振孤標倫類之所逺絶是故隨灮燭魏非折水之恒珍和璧入秦豈潤山之常寳僧旻法師盖天地之淳精宇宙之瓌器本姓孫氏有吳開國大皇帝其先也法師道藹二儀徳充四海含春夏之長生抱日月之貞明辭旨清新置言閒逺千門萬户必臻其奥九部五時若指諸掌坦然夷易豁爾洞開故緇素結轍華戎延道晨風之鬱北林龍魚之趣深澤哲人云逝指南誰屬銘曰永離百非聞之寂滅茍云未樹共歸今轍方墳結構伽藍罷設朱火一潛青松長列灮宅寺大僧正法師碑昂昂千里孰辨麒麟之蹤汪汪萬頃誰測波瀾之際望之若披雲霧覩之如觀日月至乃耆年宿望蓄思搆疑懸鍾無盡短兵有倦猶若分旦望景履氷待日莫不傾河注燭虚往實歸皇帝革命受圖補天紉地轉金輪於忍土策紺馬於閻浮逸翮方超圖南輟軌豈直盡兹相府署彼義年方當髙歩仙階永編金牒繁霜凝而旦委松風淒而暮來悲馬鳴之不反望龍樹而心哀銘曰澄月夜虧清氛旦巻曾巒逺岸蒼江傍緬梁安寺刹下銘阿閣峞􅳽洞房䆗窱似靈灮之金扇類景福之銀鋪垂琬琰之文璫飾琅玕之仙寳神童戾止亟連翩於威風薩埵來遊屢徘徊於紺馬有識之所䖍仰無著之所招提觀慧樓而下拜望天街而興善辭曰塵沙無始造色無先飛蛾不息縈蠶自纒篋蛇未斷藤䑕方縁苦流長汎愛火恒然髻珠孰曉懐寳詎宣挺兹靈覺時惟天仙真籍表聖化乳稱權寳刹千道髙旛四懸鳳樓含日龍臺吐煙紫山翠羽紅水青蓮雪官月殿晨暉夜圓宵長梵響風逺鐘傳仙衣有拂靈刹無邊香罏銘蘇合氤氲非煙似雲時穠更薄乍聚還分火微難盡風長易聞孰云道力慈悲所薫並藝文類聚内典碑銘集林序夫法性空寂心行處斷感而遂通隨方引接故鵲園善誘馬苑𢎞宣白林將謝青樹已列是宣金牒方寄銀身自像教東流化行南國呉主至誠歴七霄而灮曜晉王畵像經五帝而彌新次道孝伯嘉賓𤣥度斯數子者亦一代名人或修理止於伽藍或歸心盡於談論銘頌所稱興公而已夫披文相質博約温潤吾聞斯語未見其人班固碩學尚云讚頌相似陸機鉤深猶聞碑賦如一唯伯喈作銘林宗無愧徳祖能誦元常善書一時之盛莫得係踵况般若𤣥淵真如妙宻觸言成累係境非真金石何書銘頌誰闡然建塔紀功招提立寺或興造有由或誓願所記故鐫之𤣥石傳諸不朽亦有息心應供是曰桑門或謂智囊或稱印手髙座擅名預師尹之席道林見重陪飛龍之座峩眉廬阜之賢鄴中宛鄧之哲昭哉史冊可得而詳故碑文之興斯焉尚矣夫世道亟改論文之理非一時事推移屬詞之體或異但繁則傷弱率則恨省存華則失體從實則無味或引事雖博其意猶同或新意雖竒無所倚約或首尾倫帖事似牽課或復博涉體製不工能使豔而不華質而不野博而不繁省而不率文而有質約而能潤事隨意轉理逐言深所謂菁華無以間也予幼好雕蟲長而彌篤遊心釋典寓目詞林頃常搜聚有懐著述譬諸法海無讓波瀾亦等須彌歸同一色故不擇髙卑唯能是與儻未詳悉隨而足之名為内典碑銘集林合三十巻庶將來君子或裨觀見焉簡文帝法寳聨璧序竊以觀乎天文日月所以貞麗觀乎人文藻火所以昭發况復玉毫朗照出天人之表金牒空解生文章之外雖境智㝠焉言語斯絶詠歌作焉可略談矣粤乃書稱湯誥篇陳夢説昔則王畿居亳今則帝業維揚功施天下我之自出豈與姚墟石紐譙城温縣御龍居夏唐杜入周而巳哉皇帝垂衣負扆辨方正位車書之所㑹同南暨交阯風雲之所沾被西漸流沙武實止戈秉宜生之劒樂彰治定減庖犧之瑟相兼二八知微知彰將稱四七如貔如虎寜俟容成翠屋之遊廣成石室之㑹故以宗心者忘相歸憑者常樂昔轉輪護法南宫有金龍之瑞梵天請道東朝開寳盖之祥盡善盡美獨髙皇代古者所以出師入保冬羽秋籥實以周頌㓜冲用資端士漢盈末學取憑通議大傳之論孟侯小戴之談司業山川珍異俟郊迎而可知帷幄後言籍懇田而求驗以今方昔事則不然我副君業邁宣尼道髙啓筮之作聲超姬發寜假卞蘭之頌譬衡華之峻極如渤澥之波瀾顯忠立孝行修言道博施尚仁動微成務智察舞雞爻分封蟻爰初登仕明試以功徳加三輔威行九流董師虎據操鈹蟬冕津鄉濟沈物仰平分之恩沂岱卭岷民思後來之政陳蒼畱反裘之化淮海髙墨幘之聲威漸黄支化行赤谷南通舜玉北平堯栁朝鮮航海夜郎款塞然後體道方震雨施雲行漢用戊申晉維庚午增暉前曜獨擅元貞恩若春風惠如冬日履道為輿䇿賢成駟降意韋編畱神緗帙許商算術王圍射譜南龜異說東馳雜賦任良奕棊門式法箴興琴劒銘自盤盂無不若指諸掌尋涇辨渭重以鳳艷風飛鸞文飇竪纎者入無倫大者含元氣韻調律吕藻震𤣥黄豈俟取讚彦先詢聞雅主至於鹿園深義龍宫奥說逺命學徒親登講肆詞為憲章言成楷式徃復王粲事軼魏儲酬答蔡謨道髙晉兩似懸鐘之應響猶衢罇之待酌率爾者踵武逖聴者風聲是使金堅祕法寳㝠夕夢無懐不滅華胥夜感自非建慧橋明智劒薫戒香沐定水何以空積忽微歴賢刼而終現黍累迴斡藴珠藏而方傳加以大秦之籍非符八體康居之篆有異六爻二乘始闢譬馬傳兎一體同歸棄犀崇象潤業滋多見思平積本有凝邈了正相因雖談假績不攝單影即此後心還蹤初熖俱宗出倒蓮華起乎淤泥並㑹集藏明珠曜於貧女性相常空般若無五時之說不生煩惱湼盤為萬徳之宗無不酌其菁華撮其㫖要採彼玳鱗拾兹翠羽潤珠隋水抵玉崑山每至鶴闗旦啓黄綺之儔朝集魚燈夕朗陳吳之徒晚侍皆仰稟神規躬承睿㫖爰賜嘉名謂之聨璧聨含珠而可擬璧與日而方升以今歲次攝提星在監徳百法明門於兹總備千金不刋獨髙斯典合二百二十巻號法寳聨璧雖玉杯繁露若倚蒹葭金臺鑿楹似吞雲夢繹自伏櫪西河攝官南國十迴鳳琯一奉龍灮筆削未勤徒榮卜商之序稽古盛則文慙安國之製謹抄纂爵位陳諸左方使持節平西將軍荆州刺史湘東王繹年二十七字世誠侍中國子祭酒南蘭陵蕭子顯年四十八字景暢散騎常侍御史中丞彭城劉溉年五十八字茂灌散騎常侍步兵校尉東官侍南琅邪王修年四十二字彦逺吳郡太守前中庶子南瑯邪王規年四十三字威明都官尚書領右軍將軍彭城劉孺年五十五字孝穉太府卿步兵校尉河南褚球年六十三字仲寳中軍長史前中庶子陳郡謝僑年四十五字國美中庶子彭城劉遵年四十七字孝陵中庶子南瑯邪王穉年四十五字孺通宣城王友前僕東海徐喈年四十二字彦邕前御史中丞河南褚澐年六十字士洋北中郎長史南蘭陵太守陳郡袁君正年四十六字世忠中散大夫金華宫家令吳郡陸襄年五十四字師卿中散大夫瑯邪王藉年五十五字文海新安太守前家令東海徐摛年六十四字士繢前尚書左丞沛國劉顯年五十三字嗣芳中書侍郎南蘭陵蕭幾年四十四字徳𤣥雲麾長史尋陽太守前僕京兆韋稜年五十五字威直前國子博士范陽張綰年四十三字孝卿輕車長史南蘭陵蕭子範年四十九字景則庶子吳郡陸罩年四十八字洞元庶子南蘭陵蕭瑱年四十字文容祕書丞前中舍人南瑯邪王許年二十五字㓜仁宣城王文學南瑯邪王訓年二十五字懐範洗馬權兼太府卿彭城劉孝儀年四十九字子儀洗馬陳郡謝禧年二十六字休度中軍録前洗馬彭城劉藴年三十三字懐芬前洗馬吳郡張孝總年四十二字孝總南徐州治中南蘭陵蕭子開年四十四字景發平西中録事㕘軍典書通事舍人南郡庾肩吾年四十八字子慎北中記室㕘軍潁川庾仲容年五十七字仲容宣惠記室㕘軍南蘭陵蕭滂年三十二字希傳舍人南蘭陵蕭清年二十七字元専宣惠主簿前舍人陳郡謝嘏年二十五字茂範尚書都官郎陳郡殷勸年三十字𢎞善安北外兵㕘軍彭城劉孝威年三十九字孝威前尚書殿中郎南蘭陵蕭愷年二十九字元才並廣𢎞明集昭明太子蕭統字徳施小字維摩武帝長子答雲法師請開講書太子畱情内典選十僧入𤣥圃雲為上首既雲請開講令㫖解二諦法身義統覽近示知欲見令道義夫釋教凝深至理淵粹一相之道杳然難測不二之門寂焉無響自非深達𤣥宗精解妙義若斯之處豈易輕辨至於宣揚正教在乎利物耳弟子之於内義誠自好之樂之然鉤深致逺多所未悉為利之理盖何足論諸僧並入法門游道日廣至於法師彌不俟說云欲見餐禀良所未喻想得此意不復多云統和南法雲重請昭明太子開講啓釋法雲啓殿下以生知上識精義入神自然勝辨妙譚出俗每一徃復闔筵心醉真令諸天讚善實使釋梵雨華貧道雖幼知向方而長無成業簉之濫吹聖明而識慙無退者豈不願餐幽致敢祈仰者誠在希聞妙説今猥蒙啓㫖未許羣情退思輕脱用深悚懼渇仰有實饑虚非假循思檢願重以祈聞惟希甘露當開用得永袪鄙吝伏願四𢎞本誓曲允三請慇懃謹啟重答雲法師書重覽來示知猶欲令述義不辨為利具如前言甘露之開彌慙來説若止是略標義宗無為不爾但愧以魚目擬法師之夜灮耳統和南謝勅賚看講啓臣統啓主書管萬安奉宣勅㫖以臣今講竟曲垂勞問伏以正言深奥總一羣經均斗杓以命四時等太陽而照萬國臣不涯庸淺輕敢奉宣莫測天文徒觀玉府慙悚交并寢興無寘仰降中使俯賚灮臨榮荷殊慈靡知啓處不任下情謹附啓事謝聞謹啓謝勅參解講啓臣統啓主書周昂奉宣勅㫖垂㕘臣今解講伏以至理希夷微言淵奥非所能鑽仰遂以無庸叨兹宣釋將應讓齒反降教胄之㤙允宜尚學翻荷説經之詔竊以挾八威之䇿則神物莫干服九丹之華則仙徒可役臣仰承皇威訓兹學侣奉揚聖㫖洞曉羣儒鼓冶異師陶鈞久滯方使惠施恧其短長公孫罷其堅白王生挫辯既盡神氣法開受屈永隠東峯中使曲臨彌灮函席仰戴殊恩不知啓處不任下情謹奉啓事謝聞謹啓謝勅賚制㫖大湼盤經講疏啓臣統啓後閣應勅木佛子奉宣勅㫖垂賚制㫖大般湼槃經講疏一部十袠合目百一巻寒鄉覩日未足稱竒採藥逢仙曽何譬喜臣伏以六爻所明至邃窮於幾象四書所總施命止於域中豈有牢籠因果辨斯寳城之教網羅真俗開兹月滿之文方當道洽大千化均百億雲彌識種雨遍身田豈復論唐帝龜書周王䇿府何待刋寢孟津屏黜丘索甘露妙典先降殊恩揣已循愚不勝慶荷不任頂戴之至謹奉啓謝勅賚制㫖大集經講疏啓臣統啓宣詔王慧寳奉宣勅㫖垂賚制㫖大集經講疏二袠十六巻甘露入頂慧水灌心似闇遇明如饑獲飽伏以非色非欲二界同坊匪文匪理三詮雲集四辯言而未極八聲闡而莫窮俯應天機垂兹聖作同真如而無盡與日月而俱懸但觀寳舂山獲珠大海臣實何能恒䝉誘被張奏谷筆豈足陳心抗袖長言未伸歌舞不任喜荷之至謹奉啓謝聞謹啓謝勅賚水犀如意啓藝文作簡文誤臣統啓應勅左右伯佛掌奉宣勅㫖垂賚水犀如意一柄式是道義所須白玉照彩方斯非貴珊瑚挺質匹此末珍雕剞既成先被庸薄如䝉漢帝之簪似獲趙堯之印謹仰承威神陳諸講席方使歡喜羅漢懐棄鉢之嗟王式碩儒忻驪駒之辯熊飾寳刀子桓恧其大賚犛牛輕拂張敞慙其舊儀殊恩特降伏深荷躍不任下情謹啓事以聞謹啓並廣𢎞明集碩藝文作儒東宫上掘得慈覺寺鐘啟一作簡文竊以白亭舊室絶顯禎祥之氣闕里故堂暫聞鐘石之響猶復存諸良史汗彼篆素豈如杏梁遺飾迴成紺殿椒墀昔處仍構寳階啓彛鐘於殊里記靈文於福地雖魏廟出璽魯祠現璧固以推兹孝感恧此禎契將郭令鄙其開金羊田陋其産玉豈直季武庭樹愧韓起之譽蜀相宅基慙孝安之碣伏惟覽啓増思撫瑞深悲慟切視奩哀喻封篋藝文類聚令㫖解二諦義并問答二諦理實深𤣥自非虚懐無以通其𢎞逺明道之方其由非一舉要論之不出境智或時以境明義或時以智顯行至於二諦即是就境明義若迷其方三有不絶若達其致萬累斯遣所言二諦者一是真諦一名俗諦真諦亦名第一義諦俗諦亦名世諦真諦俗諦以定體立名第一義諦世諦以襃貶立目若以次第言說應云一真諦二俗諦一與二合數則為三非直數過於二亦名有前後於義非便真既不因俗而有俗亦不由真而生正可得言一真一俗真者是實義即是平等更無異法能為雜間俗者即是集義此法得生浮偽起作第一義者就無生境中别立美名言此法最勝最妙無能及者世者以隔别為義生滅流動無有住相湼槃經言出世人所知名第一義諦世人所知名為世諦此即文證襃貶之理二諦立名差别不同真俗世等以一義說第一義諦以二義說正言此理徳既第一義亦第一世既浮偽更無有義所以但立世名諦者以審實為義真諦審實是真俗諦審實是俗真諦離有離無俗諦即有即無即有即無斯是假名離有離無此為中道真是中道以不生為體俗既假名以生法為體南澗寺慧超諮曰浮偽起作名之為俗離於有無名之為真末審浮偽為當與真一體為當有異令㫖答曰世人所知生法為體出世人所知不生為體依人作論應如是說若論真即有是空俗指空為有依此義明不得别異又諮真俗既云一體未審真諦亦有起動為當起動自動不闗真諦令㫖又答真諦寂然無起動相凡夫惑識自横見起動諦一作理又諮未審有起動而凡夫横見無起動而凡夫横見令㫖又答若有起動則不名横見以無動而見動所以是横又諮若法無起動則唯應一諦令㫖又答此理常寂此自一諦横見起動復是一諦唯應有兩不得言一又諮為有横見為無横見令㫖又答依人為語有此横見又諮若依人語故有横見依法為談不應見動令㫖又答法乃無動不妨横者自見其動丹陽尹晉安王蕭綱諮曰解㫖依人為辯有生不生未審浮虚之與不生只是一體為當有異令㫖答曰凡情所見見其起動聖人所見見其不生依人為論乃是異體若語相即則不成異具如向釋不復多論又諮若真不異俗俗不異真豈得俗人所見生法為體聖人所見不生為體令㫖答即俗知真即真見俗就此為談自成無異約人人辨見自有生不生殊殊下舊有辯字當衍又諮未審俗諦之體既云浮幻何得於真實之中見此浮幻令㫖答真實之體自無浮㓜惑者横構謂之為有無傷真實體自𤣥虗又諮聖人所見見不流動凡夫所見自見流動既流不流異愚謂不得為一令㫖答不謂流不流各是一體正言凡夫於不流之中横見此流以是為論可得成一又諮真寂之體本自不流凡夫見流不離真體然則但有一真不成二諦令㫖答體恒相即理不得異但凡見浮虚聖覩真寂約彼凡聖可得立二諦名招提寺慧琰諮曰凡夫見俗以生法為體聖人見真以不生為體未審生與不生但見其異復依何義而得辨一令㫖答曰凡夫於無稱有聖人即有辨無有無相即此談一體稱一作構又諮未審此得談一一何所名令㫖答曰正以有不異無無不異有故名為一更無異名又諮若無不異有有不異無但見其一云何為二令㫖答凡夫見有聖人見無兩見既分所以成二又諮聖人見無無可稱諦凡夫見有何得稱諦得一作能令㫖答聖人見無在聖為諦凡夫審謂為有故於凡為諦棲𤣥寺曇宗諮曰聖人為見世諦為不見世諦令㫖答曰聖知凡人見有世諦若論聖人不復見此又諮聖人既不見世諦云何以世諦教化衆生令㫖答聖人無惑自不見世諦無妨聖人知凡夫所見故曲隨物情説有二諦又諮聖人知凡見世諦即此凡夫不令㫖答此凡即是世諦聖人亦不見此凡又諮聖既不見凡焉知凡見世諦令㫖答聖雖自無凡亦能知有凡自謂為有故曲赴其情為說世諦司徒從事中郎王規諮曰未審真俗既不同豈得相即之義令㫖答聖人所得自見其無凡人所得自見其有見自不同無妨俗不出真外又諮未審既無異質而有二義為當義離於體為當即義即體令㫖答更不相出名為一體愚聖見殊自成異義又諮凡夫為但見俗亦得見真不令㫖答止得見俗不得見真又諮體既相即寜不覩真令㫖答凡若見真不應覩俗覩俗既妄焉得見真靈根寺僧遷諮曰若第一以無過為義此是讚歎之名真離於俗亦應是讚歎之名令㫖答曰即此體真不得言歎第一義諦既更立美名所以是歎又諮無勝我者既得稱讚歎我體即真何故非歎令㫖答無勝我者所以得稱讚歎我體即真亦是我真故非讚歎又諮我無過者所以得稱讚歎我是不偽何得非讚令㫖答不偽直是當體之名如人體義謂之解義正足稽其實體豈成讚歎稽一作稱又諮此法無能出者焉能即是讚歎焉能一作焉得令㫖既云無出非讚如何羅平侯蕭正立諮曰未審俗諦是生法以不令㫖答曰俗諦之體正是生法又諮俗既横見何得有生令㫖答横見為有所以有生又諮横見為有實自無法實既無法說何為生令㫖答即此生法名為横見亦即此横見名為生法又諮若是横見不應有生若必有生何名横見不應有生一作實自無生令㫖答既云横見實自無生但横見為有有此横生實自無生一作不應有生衡山侯蕭恭諮曰未審第一義諦既有義目何故世諦獨無義名令㫖答曰世既浮俗無義可辨又諮若無義可辨何以稱諦令㫖答凡俗審見故立諦名又諮若凡俗見有得受諦名亦應凡俗見有得安義字令㫖答凡俗審見故諦名可立浮俗無義何得强字為義又諮浮俗雖無實義不無浮俗之義既有此浮俗何得不受義名令㫖答正以浮俗故無義可辨若有義可辨何名浮俗中興寺僧懐諮曰令㫖解言真不離俗俗不離真未審真是無相俗是有相有無相殊何得同體令㫖答曰相與無相此處不同但凡所見有即是聖所見無以此為論可得無别又諮既是一法云何得見為兩見既有兩豈是一法令㫖答理乃不兩隨物所見故得有兩又諮見既有兩豈不相違令㫖答法若實兩可得相違法實不兩人見自兩就此作論焉得相乖又諮人見有兩可説兩人理既是一豈得有兩令㫖答理雖不兩而約人成兩約一作令始興王第四男蕭映諮曰第一義諦其義第一徳亦第一不令㫖答曰義既第一徳亦第一又諮直言第一巳包徳義何得復加義字以致繁複令㫖答直言第一在義猶昧第一見義可得盡美又諮若加以義字可得盡美何不加以徳字可得盡美令㫖答第一是徳豈待復加但加義字則徳義雙美又諮直稱第一足見其美偏加義字似有所局令㫖答第一表徳復加義字二美俱陳豈有所局吳平世子蕭勵諮曰通㫖云第一義諦世諦襃貶立名真俗二諦定體立名尋真諦之理既妙絶言慮未審云何有定體之㫖令㫖答曰談其無相無真不真寄名相說以真定體又諮若真無諦無體今寄言辨體未審真諦無相何不寄言辨相令㫖答寄言辨體猶恐貶徳若復寄言辨相則有累虚𤣥又諮真諦𤣥虚離於言說今既稱有真豈非寄言辨相令㫖答寄有此名名自是相無傷此理無相虚寂又諮未審此寄言辯體為是當理為不當理令㫖答無名而説名不合當理又諮若寄言辨名名不當理未審此寄將何所説一作將作何説令㫖答雖不當理為接引衆生須名相説宋熙寺慧令諮曰真諦以不生為體俗諦以生法為體而言不生即生生即不生為當體中相即為當義中相即令㫖答云體中相即義不相即又諮義既不即體云何即令㫖答凡見其有聖覩其無約見成異就體恒即又諮體既無兩何事須即令㫖答若無體無别兩縁見有兩見既兩異須明體即又諮若如解㫖果是就人明即令㫖答約人見為二二諦所以名生就人見明即此亦何妨始興王第五男蕭曄諮曰真諦稱真是實真不令㫖答曰得是實真又諮菩薩㑹真之時為忘俗忘真不令㫖答忘俗忘真故説㑹真又諮若忘俗忘真故説㑹真忘俗忘真何謂實真令㫖答若存俗存真何謂實真正由兩遣故謂實真又諮若忘俗忘真而是實真亦應忘真忘俗而是實俗令㫖答忘俗忘真所以見真忘真忘俗彌見非俗又諮菩薩㑹真既忘俗忘真今呼實真便成乖理令㫖答假呼實真終自忘真兩忘稱實何謂乖理興皇寺法宣諮曰義㫖云俗諦是有是無故以生法為體未審有法有體可得稱生既是無法而云何得有生義既一作無令㫖答俗諦有無相待而立既是相待故並得稱生又諮若有無兩法並稱為生生義既一則有無無異令㫖答俱是凡夫所見故生義得同是有是無焉得不異又諮若有無果别應有生不生令㫖答既相待立名故同一生義程鄉侯蕭祗諮曰未審第一之名是形待以不令㫖答正是形待又諮第一無相有何形待令㫖答既云第一豈得非待又諮第一是待既稱第一世諦待於第一何不名為第二若俗諦是待而不稱第二亦應真諦是待不名第一令㫖答若稱第一是待於義巳足無假説俗第二方成相待又諮若世諦之名不稱第二則第一之稱無所形待令㫖答第一襃真既云相待世名是待直置可知灮宅寺法雲諮曰聖人所知之境此是真諦未審能知之智為是真諦為是俗諦令㫖答曰能知是智所知是境智來㝠境得言即真又諮有智之人為是真諦為是俗諦令㫖答若呼有智之人即是俗諦又諮未審俗諦之人何得有真諦之智令㫖答聖人能忘於俗所以得有真智又諮此人既㝠無生亦應不得稱人令㫖答㝠於無生不得言人寄名相説常自有人靈根寺慧令諮曰為於真諦中見有為俗諦中見有令㫖答曰於真諦中横見有有又諮俗諦之有為實為虚令㫖答是虚妄之有又諮為當見妄為當見有令㫖答見於妄有又諮無名相中何得見有名相令㫖答於無名相見有名相所以妄有又諮於無名相妄見為有譬如火熱惑者言冷得就熱中有冷相不若於無相而有名相亦於火中應有此冷令㫖答火自常熱妄見有冷此自惑冷熱未嘗異湘宫寺慧興諮曰凡夫之惑為當但於真有迷於俗亦迷令㫖答曰於真見有此是迷真既見有俗不成迷俗又諮若使解俗便成解真若不解真豈得解俗令㫖答真理虚寂惑心不解雖不解真何妨解俗又諮此心不解真於真可是惑此心既解俗於惑應非惑令㫖答實而為語通自是惑辨俗森羅於俗中各解莊嚴寺僧旻諮曰世俗心中所得空解為是真解為是俗解令㫖答可名相似解又諮未審相似為真為俗令㫖答習觀無生不名俗解未見無生不名真解又諮若能照之智非真非俗亦應所照之境非真非俗若是非真非俗則有三諦令㫖答所照之境既即無生無生是真豈有三諦又諮若境即真境何不智即真智令㫖答未見無生故非真智何妨此智未真而習觀真境豈得以智未真智而使境非真境宣武寺法寵諮曰真諦不生不滅俗諦有生有滅真俗兩義得言有異談其法體只得是一未審體從於義亦得有二不令㫖答曰體亦不得合從於義又諮未審就凡聖兩見得言兩義亦就凡聖兩見得言兩體令㫖答理不相異所以云一就凡聖兩見得有二體之殊又諮若使凡者見有聖人見無便應凡夫但見世諦有聖人應見太虚無令㫖答太虚亦非聖人所見太虚得名由於相待既由待生並凡所見又諮凡夫所見空有得言是一不令㫖答就凡為語有實異無約聖作談無不異有建業寺僧愍諮曰俗人解俗為當解俗參差而言解俗為當見俗虚假而言解俗令㫖答只是見俗參差而言解俗又諮俗諦不但參差亦是虚妄何故解參差而不解虚妄令㫖答若使凡夫解虚妄即是解真不解虚妄所以名為解俗灮宅寺敬脱諮曰未審聖人見真為當漸見為當頓見令㫖答漸見又諮無相虚懐一見此理萬相並寂未審何故見真得有由漸令㫖答自凡之聖解有淺深真自虚寂不妨見有由漸又諮未審一得無相並忘萬有為不悉忘令㫖答一得無相萬有悉忘又諮一得無相忘萬有者亦可一得虚懐窮彼真境不應漸見令㫖答如來㑹寂自是窮真淺行聖人恒自漸見又諮若見真有漸不可頓㑹亦應漸忘萬有不可頓忘令㫖答解有優劣故有漸見忘懐無偏故萬有並寂令㫖解法身義并問答法身虚寂逺離有無之境獨脱因果之外不可以知知不可以識識豈是稱謂所能論辨將欲顯理不容嘿然故隨從言説致有法身之稱天竺云達磨舍利此土謂之法身若以當體則是自性之目若以言説則是相待立名法者軌則為㫖身者有體之義軌則之體故曰法身略就言説粗陳其體是常住身是金鋼身重加研覈其則不爾若定是金鋼即為名相定是常住便成方所所謂常住本是寄名稱名金鋼本是譬説及談實體則性同無生故云佛身無為不墮諸法故湼槃經説如來之身非身是身無量無邊無有足跡無知無形畢竟清浄無知清静而不可為無稱曰妙有而復非有離無離有所謂法身稱名一作稱曰招提寺慧琰諮曰未審法身無相不應有體何得用體以釋身義令㫖答曰無名無相乃無體可論寄以名相不無妙體妙一作妨又諮若寄以名相不無妙體則寄以名相不成無相令㫖答既云寄以名相足明理實無相又諮若寄以名相而理實無相理既無相云何有體令㫖答寄言軌物何得無體又諮亦應寄言軌物非復無相令㫖答軌物義邉理非無相所言無相本談妙體又諮真實本來無相正應以此軌物何得隠斯真實强生言相令㫖答真實無相非近學所窺是故接諸庸淺必須寄以言相灮宅寺法雲諮曰未審法身常住是萬行得不令㫖答曰名相道中萬行所得又諮既為萬行所得豈是無相若必無相豈為萬行所得令㫖答無名無相何曽有得寄以名相假言有得又諮寔有萬行實得佛果安可以無相全無所得令㫖答問者住心謂實有萬行今謂萬行自空豈有實果可得又諮見有衆生修習萬行未審何故全謂為無令㫖答凡俗所見謂之為有理而檢之實無萬行又諮經說常住以為妙有如其假說何謂妙有令㫖答寄以名相故説妙有理絶名相何妙何有莊嚴寺僧旻諮曰未審法身絶相智不能知絶相絶知何得猶有身稱令㫖答曰無名無相曽有何身假名相説故曰法身又諮亦應假名相説是智所照何得不可以知知不可以識識令㫖答亦得寄名相慧眼所見又諮若慧眼能見則可以知知若智不能知則慧眼無見令㫖答慧眼無見亦無法可見又諮若云無見有何法身令㫖答理絶聞見實無法身又諮若無法身則無正覺正覺既有法身豈無令㫖答恒是寄言故有正覺正覺既在寄言法身何得定有宣武寺法寵諮曰未審法身之稱為正在妙體金姿丈六亦是法身體一作本令㫖答曰通而為論本跡皆是别而為語止在常住又諮若止在常住不應有身若通取丈六丈六何謂法身令㫖答常住既有妙體何得無身丈六亦能軌物故可通稱法身又諮若常住無累方稱法身丈六有累何謂法身令㫖答衆生注仰妄見丈六丈六非有有何實累又諮若丈六非有指何為身令㫖答隨物見有謂有應身又諮既曰應身何謂法身令㫖答通相為辨故兼本跡覈求實義不在金姿靈根寺慧令諮曰未審為以極智名曰法身為以全相故曰法身全一作絶令㫖答無名無相是集藏法身圓極智慧是實智法身又諮無名無相則無身不身既有法身何謂無相令㫖答正以無相故曰法身又諮若以無相故曰法身則智慧名相非復法身令㫖答既是無相智慧豈非法身又諮如其有身何名無相若是無相何得有身令㫖答於無名相假説法身又諮若假説法身正存名相云何直指無相而謂法身令㫖答既於無相假立名相豈得異此無相而説法身靈味寺静安諮曰未審法身乗應以不令㫖答法身無應又諮本以應化故稱法身若無應化何謂法身令㫖答本以軌則之體名為法身應化之談非今所軌又諮若無應化云何可軌既為物軌豈無應化令旨答衆生注仰䝉益故云能為物軌化縁巳畢何所應化又諮若能益衆生便成應化若無應化何以益物令㫖答能生注仰軌則自成何勞至人俯應塵俗又諮既生注仰豈無應化若無應化注仰何益令㫖答正由世尊至極神妙特深但令注仰自然䝉祐若應而後益何謂至神不應而益故成窮美若必令實應與菩薩豈殊並廣𢎞明集昭明集㕘校同泰僧正講詩序大正以貞俗兼解鬱為善歌璡師以行有餘力縁情繼響余自法席既䦨便思和寂杼軸二年濡翰兩器大正今春復為同泰建講法輪將半此作方成所以物色不同序事或異昭明集祭達磨大師文達磨以梁大通二年終于元魏以其䘮告梁武帝即賵寳玉詔以祭禮供養太子為文其略曰洪惟聖胄大師荷十力之智印乘六通而泛海運悲智於梵方拯顛危於華土佛法正宗記邵陵王蕭綸字世調武帝第六子答皇太子示大法頌啓簡文慈鋒鬱壯妙辯縱横慧捨兩闕智包三藏故五時之説既陳七處之禮斯聚㭊般若之妙源顯無生之真諦心注八流意舍五忍能使六地震動四花普雨折木盖鱗開羅散翮香烏步花訓遊於雲圃瑞雀飛環翔舞於風前髙門洞啓不同銅馬之飾寳殿霞開寜假鳳凰之瑞雖復長卿壯辭曾何足數子雲妙句比此蔑如揚州僧正智寂法師墓誌銘縁城虚假欲海漂深三相難久八風易侵寔惟上徳為龍為灮凝情内瑩被采外揚微言折角精義解頥有同商生譬彼名醫妙法方永慧水停滋五通軫慕四衆增悲並藝文類聚設無礙福㑹教僚紀大士廣濟義非為巳導𢎞羣生種種方便所以虚已樂静表之内經確乎難拔著自外典又加獨徃斯意足論隠不隔真乃為菩薩廬山東林寺禪房智表法師徳稱僧傑實號人龍懐道守素多歴年所不為事屈不為時伸上下無常一相無相遂能捨彼耆闍來遊垢濁興言一面定交杵臼余以薄徳謬臨大邦教義未聞貴賢總至昔綺季之出漢年巢許之興唐日兹迺聖主流慈天澤滂被異人間出復在此辰不勝舞蹈帝之恩普也剋今月十日於栖賢寺設無礙㑹并致敬開士躬諮勝福下筵餐道凡厥民𨽻爰及庶士罔不率從咸皆請業上答乾慈永同彼岸外依事宣行廣𢎞明集釋文紀巻二十二
