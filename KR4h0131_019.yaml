body:
  text: 釋文紀卷十九明梅鼎祚輯南齊三明僧紹字承烈平原鬲人宋元嘉中渡江齊永明中徴國子祭酒不就捨宅為攝山棲霞寺正二教論道士有為夷夏論者故作此以正之及聞殊論鋭言置家有懼誣聖將明其歸故先詳正所證二經之句庶可兩悟幽津論稱道經云老子入關之西天竺維衛國國王夫人名曰清妙老子因其晝寢乘日之精入清妙口中後年四月八日夜半時剖右腋而生墮地即行七步舉手指天曰天上天下唯我為尊三界皆苦何可樂者於是佛道興焉事在𤣥妙內篇此是漢中真典非穿鑿之書正曰道家之旨其在老氏二經敷𤣥之妙備乎莊生七章而得一盡靈無聞形變之竒彭殤均壽未覩無死之唱故恬其天和者不務變常安時處順夫何取長生若乘日之精入口剖腋年事不符託異合說稱非其有誕議神化秦漢之妄妖延魏晉言不經聖何云真典乎論稱佛經云釋迦成佛巳有塵劫之數或為儒林之宗國師道士此皆成實正經非方便之說也正曰佛經之宗根明極教而三世無得俗證覺道非可事顯然精深所㑹定慧有徴於內緣感所應因果無妄於外夫釋迦發窮源之真唱以明神道之所通也故其練精研照非飬正之功微善階極異殆庶自崖道濟在亡形而所貴非全生生生不貴存存何功忘功而功著寂滅而道常出乎無始入乎無終靡應非身塵劫非遐此其所以為教也論曰二經之㫖若合符契正曰夫佛開三世故圓應無窮老止生形則教極澆淳所以在形之教不議殊生圓應之化爰盡物類是周孔老莊誠帝王之師而非前說之證既關塞異教又違符合之驗矣論曰道則佛也佛則道也正曰既教有方圓豈覩其同夫由佛者固可以權老學老者安取同佛茍挾競慕髙撰㑹雜妄欲因其同樹邪去正是乃學非其學自漏道蠹祇多不量見耻守器矣論曰其入不同其為必異各成其性不易其事又曰或照五典或布三乘教在華而華言化夷而夷語又曰佛道齊乎達化而有夷夏之别正曰寂感遂通在物必暢佛以一音隨類受悟在夷之化豈必三乘教華之道何拘五教冲用因感既夷華未殊而俗之所異孰乖聖則雖其人不同然其教自均也論曰端委搢紳諸華之容也剪髮緇衣羣夷之服也正曰將求理之所貴宜無本禮俗㳂襲異道唯其時物故君子豹變民文先革顓孫膺訓喪志學殷夫致德韶武則禪代異典後聖有作豈限夷華况由之極教必拘國服哉是以繫其恆方而迷深動躓矣水陸既變致逺有節舟車之譬得無偏乎而刻船守株固以兩見所歸論曰下棄妻孥上廢宗祀嗜欲之物咸以禮伸孝敬三典獨以法屈悖德犯順曽莫之覺又曰全形守祀繼善之教也毁貌易姓絶惡之學也理之可貴者道事之可賤者俗正曰今以廢宗祀為犯順存嗜欲以申禮則是孝敬三典在我為得俗無必賤矣毁貌絶惡自彼為鄙道無必貴矣愛俗拘奮崇華尚禮貴賤迭置義成獨說徒欲蠹粥於凡觀豈期本理於聖言邪論曰泥洹仙化各是一術佛號正真道稱正一一歸無死真㑹無生正曰侯王得一而天下貞莫議仙化死而不亡者壽不論無死臆說誣濫辭非而澤大道既隱小成互起誠哉是言其諸誣詭謗慢欲以茍濟其違求之聖言固不容譏矣今之道家所教唯以長生為宗不死為主其練映金丹餐霞餌玉靈升羽蛻尸解形化是其託術驗而竟無覩其然也又稱其不登仙死則為鬼或召補天曹隨其本福雖大乖老莊立言本理然猶可無違世教損欲趣善乘化任往忘生生存存之㫖實理歸於妄而未為亂常也至若張葛之徒又皆離以神變化俗怪誕惑世符呪章劾咸託老君所傳而隨稍增廣遂復逺引佛教證成其僞立言舛雜師學無依考之典義不然可知將令真妄渾流希悟者永惑莫之能辨誣亂巳甚矣客既悉於佛老之正猶未涉其津今將更粗言其隅而使自反焉夫理照研心二教兩得乃可動靜兼盡所遇斯乘也老子之教蓋修身治國絶棄貴尚事止其分虛無為本柔弱為用內視反聽深根寧極渾思天元恬髙人世浩氣飬和失得無變窮不謀通致命而俟達不謀巳以公為度此學者之所以詢仰餘流而其道若存者也安取乎神化無方濟世不死哉其在調霞羽蛻精變窮靈此自繕積前成生甄異氣故雖記竒之者有之而言理者弗由矣稽之神功爰及物類大若麟鳳怪瑞小則雀雉之化夫既一受其形而希學可致乎至乃顔孔道鄰親資納之極固將仰靈塵而止欲從末由則分命之不妄有推之可明矣故仲尼貴知命而必有所不言伯陽去竒尚而固守以無為皆將以抑其誕妄之所自來也然則窮神盡教固由之有宗矣道成事得各㑹之有元矣夫行業著於前生而强學以求致其功積習成於素孱而橫慕以妄易其為首燕求越其希至何由哉故學得所學而學以誠也為其可為而為可致也則夫學鏡生靈中天設教觀象測變存而不論經世之深孔老之極也為於未有盡照窮緣殊生共理練僞歸真神功之正佛教之𢎞也是乃神明其宗老全其生守生者蔽明宗者通然靜止大方乃雖蔽而非妄動由其宗則理通而照極故必德貴天全自求其道崇本資通功歸四大不謀非然守教保常孔老之純得所學也超宗極覽尋流討源以有生為塵毒故息敬於君親不敬議其化異不執方而駭竒妙寂觀以祐思功積見而要來則佛教之粹明於為也故夫學得所學則可以資全生靈而教尊域中矣明為於為將乃滅習反流而邈天人矣過此以往未之或知洗慮之得其將在茲𢎞明集王融字元長琅邪臨沂人中書郎謝竟陵王示法制啓翔慧燭於昏塗灑法水於塵路至夫澄心洗纍之規莊情束影之制解網出界之訓滅惑淨照之㫖固以行首霜威字端風厲信可以糟滓五書糠氛百氏升罩聃周筲竽尼旦所謂窺七澤而狹潢汙登太山而小天下法門頌啓伏以迦文啓聖道冠百靈常住置言理髙萬乘神儀挺發非望雲就日所追睿識獨尊豈生明弱言能企鹿苑金輪𢎞汲引以濟俗鶴林雙樹顯究竟以開氓惜乎祇園滅影鷲嶽淪光微辭既遙大義如綴自不宣游十地擁接九區豈有導覺水之塞源拯法雲於落仞明公覽四諦之必空悟三業之暫有應務屈巳則仁兼旦奭隨方申道則慧一淨名驅率土於福林入蒼黔於正術並藝文類聚張融字思光暢之子司徒左長史門論致諸賢書齊書融𤣥義無師法而神解過人白黑談論鮮能抗拒吾門世供佛舅氏奉道道也與佛逗極無二寂然不動致本則同感而遂通逹迹成異其猶樂之不沿五帝之祕禮之不襲三皇之聖豈三與此皆殊時故不同其風異世故不一其義安可輒駕庸愚誣誷神極吾見道士與道人戰儒墨道人與道士獄是非昔有鴻飛天道積逺難亮越人以為鳬楚人以為乙人自楚越耳鴻常一鴻乎夫澄本雖一吾自俱宗其本鴻迹既分吾巳翔其所集汝可專遵於佛迹而無侮於道本書與二何兩孔周剡山茨少子致書諸遊生者曰張融白鳥哀鳴於將死人善言於就暮頃既病盛生衰此亦魂留幾氣况驚舟失柂於空壑山足無絆於澤中故視隂之間雖寸每遽不縫不徙也欲使魄後餘意繩墨弟姪故為門律數感其一章通源二道今奏諸賢以為何若融著通源之論其名少子周顒難張長史門論書并問舍顒於鍾山立山茨精與張融遇輒以𤣥言相滯彌日不解周剡山茨歸書少子曰周顒頓首懋製來班承復峻其門則參子無踞誠不待奬敬尋同本有測髙心雖神道所歸吾知其主然自釋之外儒綱為𢎞過此而能與仲尼相若者黃老實雄也其教流漸非無邪弊素朴之本義有可崇吾取捨舊懷粗有涇渭與奪之際不至朱紫但蓄積懷抱未及厝言耳途軌乖順不可謬同異之聞文宜有歸辨來㫖謂致本則同似非吾所謂同時殊風異又非吾所謂異也久欲此中微舉條裁幸因雅趣試共極言且略如左遲聞深况通源曰道也與佛逗極無二寂然不動致本則同感而遂通達迹誠異周之問曰論云致本則同請問何義是其所謂本乎言道家者豈不以二篇為主言佛教者亦應以般若為宗二篇所貴義極虛無般若所觀照窮法性虛無法性其寂雖同住寂之方其㫖則别論所謂逗極無二者為逗極極於虛無當無二於法性邪將二塗之外更有異本儻虛無法性其趣不殊乎若有異本思告異本之情如其不殊願聞不殊之說通源曰殊時故不同其風異世故不一其義吾見道士與道人戰儒墨道人與道士獄是非昔有鴻飛天道積逺難亮越人以為鳬楚人以為乙人自楚越耳鴻常一鴻乎夫澄本雖一吾自俱宗其本鴻跡既分吾巳翔其所集周之問曰論云時殊故不同其風是佛教之異於道也世異故不一其義是道言之乖於佛也道佛兩殊非鳬則乙唯足下所宗之本一物為鴻耳驅馳佛道無免二乖未知髙鍳緣何識本輕而宗之其有㫖乎若猶取二教以位其本恐戰獄方興未能聽訟也若雖因二教同測教源者則此教之源每沿教而見矣自應鹿巾環杖悠然目擊儒墨誾誾從來何諍茍合源共是分跡雙非則二跡之用宜均去取奚為翔集所向勤務唯佛專氣抱一無謹於道乎言精㫖逺企聞後要通源曰汝可專遵於佛跡而無侮於道本周之問曰足下專遵佛跡無侮道本吾則心持釋訓業愛儒言未知足下雅意佛儒安在為當本一末殊為本末俱異邪既欲精探彼我方相究涉理類所關不得無請答周顒書并答所問張融白吾末能忘身故有情身分外既化極魂首復為子弟留地不欲使方寸舊都日夜荒沒平生所困橫馗而草所以製是門律以律其門非佛與道門將何律故告氣緩命憑魄申隂數感十應通源定本實欲足下發豫竒意果能翔牘起情妙見正析既赴所志今為子言周之問曰論云致本則同請問何義是其所謂本乎答彼周曰夫性靈之為性能知者也道德之為道可知者也能知而不知所可知非能知之義可知而不為能知所知非夫可知矣故知能知必赴於道可知必知所赴而下士雷情波照鼓欲噪神精明驅動識用沈藹所以倒心下灌昭隔於道至若伯陽專氣致柔停虛任魄載營抱一居凝通靜靜唯通也則照無所沒魄緒停虛故融然自道足下欲使伯陽不靜道寧可得乎使靜而不怕道亦于何而可得今既靜而兩神神靜而道二吾未之前聞也故逗極所以一為性遊簡且韻猖狂曠不能復行次戰思定霸宇內但敷生靈以竦志庶足下罔象以捫珠是以則帝屬五而神常一皇有三而道無二鳬乙之交定者鴻乎吾所以直其繩矣周之問曰言道家者豈不以二篇為主言佛教者亦應以般若為宗二篇所貴義極虛無般若所觀照窮法性虛無法性其寂雖同住寂之方其㫖則别答彼周曰法性雖以即色圖空虛無誠乃有外張義然環㑹其所中足下當加以半思也至夫遊無蕩思心塵自拂思以無蕩一舉形上是雖忘有老如騫釋然而有忘釋不伐老當其神地悠悠精和坐廢寂然以湛其神遂通以冲其用登其此地吾不見釋家之與老氏陟其此意吾孰識老氏之與釋家逗極之所以無二親情故妙得其一矣直以物感既分應物難合令萬象與視聽交錯視聽與萬象相橫著之既巳深却之必方淺所以苦下之翁且藏即色順其所有不震其情尊其所無漸情其順及物有潛去人時欲無既可西風晝舉而致南精夕夢漢魂中寐不其可乎若卿謂老氏不盡乎無則非期於得意若卿謂盡無而不盡有得意復爽吾所期卿若疑老氏盡有而不亮以教則釋家有盡何以峻迹斯時卿若以釋家時冝迹峻其猶老氏時峻此迹逗極之同茲焉余意周之問曰論云時殊故不同其風是佛教之異於道也世異故不一其義是道言之乖於佛也道佛兩殊非鳬則乙答彼周曰非鳬則乙迹固然矣迹固其然吾不復答但得其世異時殊不冝異其所以之異周之問曰未知髙鑒緣何識本答彼周曰綜識於本巳吐前牘吾與老釋相識正如此正復是目擊道斯存卿欲必曲鞠其辭吾不知更所以自訟周之問曰若猶取二教以位其本恐戰獄方興未能聽訟也答彼周曰得意有本何至取教周之問曰若雖因二教同測教源者則此教之源每沿教而見矣答彼周曰誠哉有是言吾所以見道未一於佛但吾之即此言别有竒即耳周之問曰自應鹿巾環杖悠然目擊儒墨誾誾從來何諍答彼周曰虞芮二國之鬬田非文王所知也碎白玉以泯鬬其别有尊者乎况夜戰一鴻妄稱鳬乙斯自鹿巾之空負頭上環杖之自誣掌中吾安得了之哉周之問曰茍合源共是分迹雙非則二跡之用宜均去取奚為翔集所向勤務唯佛專氣抱一無謹於道乎答彼周曰應感多端神情數廣吾不翔翮於四果卿尚無疑其集佛吾不翔翮於五通而於集道復何晦且寶聖冝本迹匪情急矧吾巳有所集方復移其翔者邪卿得其無二於兩楹故不峻督其去取周之問曰吾則心持釋訓業愛儒言未知足下雅意佛儒安在為當本一末殊為本末俱異耶答彼周曰吾乃自元混百聖同投一極而近論通源儒不在議足下今極其儒當欲列儒圍道故無屬垣耳隙思潛師夜以遂圖掩天城恐難升之險非子所躋則吾見師之出不見其入也吾巳謂百聖同所投何容本末俱其異更以瀝勢倒兵恣卿智勇吾之勇智自縱橫湊出周顒重答張長史書并重問周顒頓首夫可以運寄情抱非理何師中外聲訓登塗所奉而使此中介分然去留無薄是則怏怏失路在我奚難足下善欲言之吾亦言之未巳也輒復往研遲承來析通源曰法性雖以即色圖空虛無誠乃有外張義所以苦下之翁且藏即色順其所有不震其情尊其所無漸情其順周之問曰苦下之藏即色信矣斯言也更恐有不及於即色容自託以能藏則能藏者廣或不獨出於厲鄉耳夫有之為有物知其有無之為無人識其無老氏之署有題無無出斯域是吾三宗鄙論所謂取捨驅馳無有能越其度者也佛教所以義奪情靈言詭聲律蓋謂即色非有故擅絶於羣家耳此塗未明在老何績但紛紛橫沸皆由著有之家因俗茲焉是患既患由有滯而有性未明矯有之家因崇無術有性不明雖則巨蔽然違誰尚靜涉纍實微是道家之所以有埤𢎞教前白所謂黃老實雄者也正何舊說皆云老不及聖若如斯論不得影響於釋宗矣吾之位老不至乃然夫大士應世其體無方或為儒林之宗或為國師道士斯經教之成說也乃至宰官長者咸託身相何為老生獨非一跡但未知涉觀淺深品位髙下耳此皆大明未啓權接一方日月出矣爝火宜廢無餘既說衆權自寢足下猶欲抗遺燎於日月之下明此火與日月通源既情崇於日月又無侮於火本未知此火本者將為名乎將或實哉名而巳邪道本安在若言欲實之日月為實矣斯則事盡於一佛不知其道也通源之㫖源與誰通通源曰當其神地悠悠精和坐廢登其此地吾不見釋家之與老氏陟其此意吾孰識老氏之興釋家又曰今既靜而兩神神靜而道二吾未之前聞也又曰伯陽專氣致柔停虛任魄魄緒停虛故融然自道也又曰心塵自拂一舉形上周之問曰足下法性雖以即色圖空虛無誠乃有外張義竊謂老釋重出對分區野其所境域無過斯言然則老氏之神地悠悠自悠悠於有外釋家之精和坐廢每坐廢於色空登老氏之地則老異於釋涉釋氏之意則釋氏殊於老神既靜而不兩靜既兩而道二足下未之前聞吾則前聞之矣茍然則魄緒停虛是自虛其所謂虛融然自道亦非吾所聞道若夫心塵自拂一舉形上皆或未涉於大方不敢以通源相和也通源曰足下欲使伯陽不靜道寧可得乎使靜而不怕道亦于何而可得周之問曰甚如來言吾亦慮其未極也此所謂得在於神靜失在於物虛若謂靜於其靜非曰窮靜魄於其魄不云盡魄吾所許也無所間然通源曰若卿謂老氏不盡乎無則非想期於得意若卿謂盡無而不盡有得意復爽吾所期周之問曰盡有盡無非極莫備知無知有吾許其道家唯非有非無之一地道言不及耳非有非無三家所藴儻贍餘慮惟足下其眄之念不使得意之相爽移失於有歸耳通源曰非鳬則乙迹固然矣迹固其然吾不復答又曰吾與老釋相識正如此正復是目擊道斯存又曰得意有本何至取教又曰誠哉有是言吾所以見道未一於佛周之問曰足下之所目擊道存得意有本想法性之真義是其此地乎佛教有之足下所取非所以何至取教也目擊之本即在教跡謂之鳬乙則其鴻安漸哉諸法真性老無其㫖目擊髙情無存老蹟㫖蹟兩亡索宗無所論所謂無侮於道本當無侮於何地哉若謂探道家之跡見其未一於佛者則是真諦實義沿文可見矣將沿於道章而得之乎為沿於德篇而遇之也若兩無所沿而𤣥德於方寸者此自足下懷抱與老釋而為三耳或可獨樹一家非老情之所敢逮也通源曰虞芮二國之鬬田非文王所知也斯自鹿巾之空負頭上環杖之自誣掌中吾安能了之哉周之問曰足下謂苦下之且藏即色則虛空有闕矣足下謂法性以即色圖空則法性為備矣今有人於此操環杖而言法性鹿巾之士執虛無而來誚曰爾不同我吾與爾闕足下從容倚棘聽斷於其間曰皆不可也謂其鹿巾空負於頭上環杖自誣於掌中以足下之精明特逹而判訟若斯良虞芮之所以於邑也通源曰吾不翔翮於四果卿尚無疑其集佛吾翮不翔於五通而於集道復何晦周之問曰足下不翔翮於四果猶勤集於佛教翮不翔於五通何獨棄於道跡乎理例不通方為彼訴通源曰當欲列儒圍道故先屬垣隙周之問曰足下通源唯道源不及儒吾因疑其闕是以相訪但未知融然自道唯道能融將道之融然修儒可㑹邪雖非義本縱言冝及想釋本多暇幸惠餘音𢎞明集難釋僧祐云余尋周張問雖往復積卷然兩家立意理在初番故略其後文㫖存義本與周顒論釋法寵書法寵姓馮南陽冠軍人寓海鹽納妻半年捨家住興皇寺從道猛曇濟學成實論融與顒書稱之古人遺族故留兒女法寵法師絶塵如棄唾若斯之志大矣逺矣續髙僧傳周顒字彥倫汝南安成人厯國子博士兼著作未廣𢎞眀集梁普通年中顒遺𦙍書誤顒卒齊嘗入梁齊書明載抄成實論序尋夫數論之為作也雖製興於晚集非出于一音然其所以開家命部莫不各有𢎞統皆足以該領名數隆讚方等契闊顯益不可訾言至如成實論者總三乘之祕數窮心色之微闡標因位果解惑相馳凡聖心樞罔不畢見乎其中矣又其設書之本位論為家抑揚含吐咸有憲章則優柔窺探動開奬利自發聚之初首至道聚之本章其中二百二品鱗綵相綜莫不言出於奧典義溺於邪門故必曠引條繩碎陳規墨料同洗異峻植明塗禆濟之功實此為著者也既效宣於正經無染乎異學雖則近泒小流實乃有變方教是以今之學者皆云志存大典而發跡之日無不寄濟此塗乘津騖永本期長路其書言精理贍思味易耽頃遂赴蹈爭流重趼相躡又卷廣義繁致功難盡故敻往不旋終妨正務頃泥洹法華雖或時講維摩勝鬘頗參餘席至於大品精義師匠蓋踈十住淵𢎞世學將殄皆由寢處於論家永均于弱喪是使大典榛蕪義種行輟興言悵悼側寐忘安成實既有功於正篆事不可闕學者又遂流於所赴此患冝裁今欲內全成實之功外蠲學士之慮故銓引論才備詳切緩刋文在約降為九卷刪賖採要取效本根則方等之助無虧學者之煩半遣得使功歸至典其道彌傳波若諸經無墜於地矣業在心源庶無裁削之纍令典故全豈有妨於好學相得意於道心可不謀而隨喜也出三藏記集與何𦙍勸止殺書顒清貧寡欲終日蔬食雖有妻子獨處山舍王儉嘗謂顒曰卿山中何所食顒曰赤米白鹽緑葵紫蓼文惠太子問顒菜食何味最勝顒曰春初早韭秋末晚菘時何𦙍亦精信佛法無妻妾太子又問顒卿精進何如何𦙍顒曰三塗八難共所未免然各有其纍周妻何肉後𦙍亦斷食肉猶欲食白魚鱔脯糖蟹以為非見生物疑食蚶蠣使學生議之竟陵王見學生鍾岏議謂可食大怒顒與書勸令菜食𦙍納之遂絶血味丈人之所以末及遐蹈者或在不近全菜耶脫灑離析之討鼎俎網罟之興載䇿其來實逺誰敢干議觀聖人之設膳羞仍復為之品節蓋以茹毛飲血與生民共始縱而勿裁將無崖畔善為士者豈不以恕已為懷是以各靜封疆罔相陵軼况乃變之大者莫過死生生之所重無踰性命性命之於彼極切滋味之在我可賖而終身朝晡資之以味彼就寃殘莫能自列我業久長吁哉可畏且區區微卵脆薄易矜歂彼弱麑顧步冝愍觀其飲啄飛行人應憐悼况可心心撲褫加復恣忍吞嚼至乃野牧盛羣閉豢重圈量肉揣毛以俟枝剝如土委地僉謂常理百為愴息事豈一塗若云三世理誣則幸矣良快如使此道果然而受形未息則一往一來一生一死輪回是常事雜報如家人天如客遇客日鮮在家日多吾儕信業未足長免則傷心之慘行亦息念丈人於血氣之類雖無身踐至於晨鳬夜鯉不能不取備屠門財貝之經盜手猶為亷士所棄生性之一啓鸞刀寧復慈心所忍騶虞雖飢非自死之草不食聞其風者豈不使人多愧衆生之禀此形質以畜肌膋皆由其積壅癡迷沈流莫反報受穢濁厯苦酸長此甘與肥皆無明之報聚也何至復引此滋腴自汙腸胃丈人得此有素聊復寸言發起耳南齊書於或在不近全菜耶廣𢎞明集作惑在不全菜耶脫灑離析之討鼎俎作挫折之升鼎俎陵軼作陵轢無踰作無過以味作以永嵗寃殘作怨酷列作申飛行作飛沈人應作使人心心作甘心恣忍作恣意盛羣作成羣閉圈作閒圈百為作可為受形未恩一無受字生死二句作生死常事遇客日鮮作過客日少吾儕作吾修自及作自念雖無身踐作雖不身殘晨鳬夜鯉作升鳬沈鯉經盜手作一經盜手寸言南史作片言廣𢎞明集多愧恥止鍾岏車螯蚶蠣議鱔之就脯驟於屈伸蟹之將糖躁擾彌甚仁人用意深懷如怛至於車螯蚶蠣睂目內闕慙渾沌之竒礦殼外緘非金人之慎不悴不榮曽草木之不若無馨無臭與瓦礫其何算故冝長充庖廚永為口實王琰冥祥記自序琰太原人幼於交址賢法師所受戒以觀音金像令供飬奉還揚都寄南澗寺琰晝夢像立座隅即馳迎還其夕南澗失像十餘盜毁鑄錢至宋大明中以此像寄多寶寺琰適荆楚十餘年及還揚都夢在殿束衆小像內詰旦造寺如夢便獲建元元年七月十三日也琰為冥祥記自序其略云此像常自供飬庶必永作津梁修復其事有感深懷沿此徴覿綴成斯記夫鏡接近情莫踰儀像瑞驗之發多自是興經云鎔斫圖繢類形相者爰能行動及放光明今西域釋迦彌勒二像輝用若真蓋得相乎今東夏景模神應亟著亦或當年羣生因㑹所感假憑木石以見幽異不必尅由容好而能然也故沉石浮深實闡閩吳之化塵金瀉液用舒彭宋之禍其餘銓示繁方雖難曲辨率其大扺允歸自從若夫經塔顯效㫖證亦同事非殊貫故繼其末法苑珠林瀉集神州塔寺三寶感通録塵作瘞作寫舒作綿禍作福劉虬字靈預南陽涅陽人禮誦長齊研精佛理仕南郡丞免歸纍徴不就無量義經序無量義經者取其無相一法廣生衆教含義不資故曰無量夫三界羣生隨業而轉一極正覺任機而通流轉起滅者必在苦而希樂此叩聖之感也順通示現者亦施悲而用慈即救世之應也根異教殊其階成七先為波利等說五戒所謂人天善根一也次為拘鄰等轉四諦所謂授聲聞乘二也次為中根演十二因緣所謂授緣覺乘三也次為上根舉六波羅蜜所謂授以大乘四也衆教冝融羣疑須導次說無量義經既稱得道差品復云未顯真實使發求實之冥機用開一極之由緒五也故法華接唱顯一除三順彼求實之心去此施權之名六也雖權開而實現猶掩常住之正義在雙樹而臨崖乃易我淨之𤣥音七也過此以往法門雖多撮其大歸數盡於此亦由衆聲不出五音之表百氏竝在六家之內其無量義經雖法華首載其目而中夏末覩其說每臨講肄未嘗不廢談而歎想見斯文忽有武當山比丘慧表生自羌胄僞帝姚略從子國破之日為晉軍何淡之所得數歲聰黠淡之字曰螟蛉飬為假子俄放出家便勤苦求道南北遊尋不擇夷險以齊建元三年復訪竒搜祕逺至嶺南於廣州朝亭寺寓中天竺沙門曇摩伽陀耶舍手能𨽻書口解齊言欲傳此經未知所授表便殷勤致請心形俱至淹厯旬朔僅得一本仍還嶠北齎入武當以今永明三年九月十八日頂戴出山見校𢎞通奉覿真文欣敬兼誠詠歌不足手舞莫宣輒䖍訪宿解抽刷庸思謹立序注云自極教應世與俗而差神道救物稱感成異𤣥圃巳東號曰太一罽賔以西字為正學東國明殃慶於百年西域辨休咎於三世希無之與修空其揆一也有欲於無者既無得無之分施心於空者豈有入空之照而講求釋教者或謂㑹理可漸或謂入空必頓請試言之以筌幽寄立漸者以萬事之成莫不有漸堅氷基於履霜九仞成於纍土學人之入空也雖未圓符譬如斬木去寸無寸去尺無尺三空稍登寧非漸耶立頓者以希善之功莫過觀法性法性從緣非有非無忘慮於非有非無理照斯一者乃曰解空存心於非有非無境智猶二者未免於有有中伏結非無日損之驗空上論心未有入理之效而言納羅漢於一聽判無生於終朝是接誘之言非稱實之說妙得非漸理固必然既二談分路兩意爭途一去一取莫之或正尋得㫖之匠起自支安支公之論無生以七住為道慧隂足十住則羣方與能在迹斯異語照則一安公之辨異觀三乘者始簣之日稱定慧者終成之實録此謂始求可隨根而三入解則其慧不二譬喻亦云大難既夷乃無有三險路既息其化即亡此則名一為三非有三悟明矣生公云道品可以泥洹非羅漢之名六度可以至佛非樹王之謂斬木之喻木存故尺寸可漸無生之證生盡故其照必頓案三乘名教皆以生盡照息去有入空以此為道不得取像於形器也今無量義亦以無相為本若所證實異豈曰無相若入照必同寧曰有漸非漸而云漸密筌之虛教耳如來亦云空拳誑小兒以此度衆生微文接粗漸說或允忘象得意頓義為長聊舉大較談者擇焉大藏草字函九仞句出三藏記云九成作於纍土王屮字簡栖琅邪臨沂人齊朝起家郢州從事為輔國録事參軍頭陀寺碑文姓氏英賢録屮為頭陀寺碑文詞巧麗為世所重碑在鄂州題云齊國録事參軍琅邪王屮製蓋聞挹朝夕之池者無以測其淺深仰蒼蒼之色者不足知其逺近况視聽之外若存若亡心行之表不生不滅者哉是以掩室摩竭用啓息言之津杜口毗邪以通得意之路然語彝倫者必求宗於九疇談隂陽者亦研幾於六位是故三才既辨識妙物之功萬象巳陳悟太極之致言之不可以巳其在茲乎然爻繫所荃窮於此域則稱謂所絶形乎彼岸矣彼岸者引之於有則高謝四流推之於無則俯𢎞六度名言不得其性相隨迎不見其終始不可以學地知不可以意生及其涅槃之藴也夫幽谷無私有至斯響洪鐘虛受無來不應况法身圓對規矩冥立一音稱物宫商濳運是以如來利見迦維託生王室憑五衍之軾拯溺逝川開八正之門大庇交喪於是𤣥關幽鍵感而遂通遙源濬波酌而不竭行不捨之檀而施洽羣有唱無緣之慈而澤周萬物演勿照之明而鍳窮沙界導亡機之權而功濟塵劫時義逺矣能事畢矣然後拂衣雙樹脫屣金沙惟恍惟惚不皎不昧莫繫於去來復歸於無物因斯而談則棲遑大千無為之寂不撓焚燎堅林不盡之靈無歇大矣哉正法既沒象教陵夷穿鑿異端者以違方為得一順非辨僞者比微言於目論於是馬鳴幽讚龍樹虛求並振頽綱俱維絶紐䕃法雲於真際則火宅晨凉躍慧日於康衢則重昏夜曉故能使三十七品有樽俎之師九十六種無藩蘺之固既而方廣東被教肄南移周魯二莊親昭夜景之鍳漢晉兩明並勒丹青之飾然後遺文間出列剎相望澄什結轍於山西林逺肩隨乎江左矣頭陀寺者沙門釋慧宗之所立也南則大川浩汗雲霞之所沃蕩北則層峯削成日月之所回薄西眺城邑百雉紆餘東望平臯千里超忽信楚都之勝地也宗法師行潔圭璧擁錫來游以為宅生者緣業空則緣廢存軀者惑理勝則惑亡遂欲捨百齡於中身狥肌膚於猛鷙班荆䕃松者久之宋大明五年始立方丈茅茨以庇經象後軍長史江夏內史㑹稽孔府君諱覬為之剃草開林置經行之室安西將軍郢州刺史江安伯濟陽蔡使君諱興宗復為崇基表剎立禪誦之堂焉以法師景行大迦葉故以頭陀為稱首後有僧勤法師真節苦心求仁養志纂修堂宇未就而沒髙軌難追藏舟易逺僧徒閴其無人榱椽毁而莫構可為長太息矣惟齊繼五帝洪名紐三王絶業祖武宗文之德昭升嚴配格天灮表之功𢎞啓興復是以惟新舊物康濟多難步中雅頌驟合韶濩炎區九譯沙場一候粵在於建武焉乃詔西中郎將郢州刺史江夏王觀政藩維樹風江漢擇方城之令典酌龜蒙之故實政肅刑清於是乎在寧逺將軍長史江夏內史行事彭城劉府君諱暄智刃所遊日新月故道勝之韻虛往實歸以此寺業廢於己安功墜於幾立慨深覆簣悲同棄井因百姓之有餘間天下之無事庀徒揆日各有司存於是民以悅來工以心競亘丘被陵因髙就逺層軒延袤上出雲霓飛閣逶迤下臨無地夕露為珠網朝霞為丹艧九衢之草千計四照之花萬品崖谷共清風泉相渙金姿寶相永藉閒安息心了義終焉游集法師釋曇珍業行淳修理懷淵逺今屈知寺任永奉神居夫民勞事功既鏤文於鐘鼎言時稱伐亦樹碑於宗廟世彌積而功宣身逾逺而名劭敢寓言於雕篆庶髣佛乎衆妙其辭曰質判𤣥黃氣分清濁涉器千名含靈萬族淳源上派澆風下黷愛流成海情塵為嶽皇矣能仁撫期命世乃眷中土聿來迦衛奄有大千遂荒三界殷鑒四門幽求六歲亦既成德妙盡無為帝獻方石天開淥池祥河輟水寶樹低枝通莊九折安步三危川靜波澄龍翔雲起耆山廣運給園多士金粟來儀文殊戾止應乾動寂順民終始法本不然今則無滅象正雖闌希夷未缺於昭有齊式揚洪烈釋網更維𤣥津重枻惟此名區禪慧攸託倚據崇巖臨晲通壑溝池湘漢堆阜衡霍膴膴亭臯幽幽林薄媚兹邦后法流是挹氣茂三明情超六入眷言靈宇載懷興葺丹刻翬飛輪奐離立象設既闢睟容巳安桂深冬燠松疏夏寒神足游息靈心往還勝幡西振貞石南刋文選藴地一作識其涅槃之也作藴乎濬作浚伐作代倚作傍虞羲字子陽㑹稽人建安王記室參軍廬山香罏峯寺景法師行狀法師諱僧景本姓歐陽衡陽湘鄉人也資無始之良因得今生之逺悟黃中通理幼而自然好誦經善持操行止有方身口無擇十嵗而孤事母盡孝母為請室良家非其好也辭不獲命弱冠以世役見羈于時戎馬生郊羽檄日至躬擐甲胄跋履山川且十年矣雖外當艱棘而內結慈悲故未離人羣已具息心之行後行經彭蠡見廬嶽而悅之於是有終焉之志復反湘川稍棄身非所味道忘食日一菜蔬後得出壘門便離妻室忽夢廬山之神稽首致敬曰廬山維嶽峻極于天是曰三宫壁立萬仭欲屈真人居之真人若不見從則此山永廢矣又夢受請而行至香罏峯石門頂見銀閣金樓丹泉碧樹峥嶸刻削希世而有於是雞鳴戒旦便飄爾晨征于時江陵僧徒多有行業或告法師曰荆州法事大盛乃因此東枻自夏首西浮遇僧淨道人深解禪定乃曰真吾師也遂落髮從之住竹林禪房始斷粒食默然思道或明發不寐刺史聞風而悅欲相招延或曰此公乃可就見不可屈致也於是纍詣草廬遂服膺請戒江漢人士亦回向如雲先是神山廟靈驗如響侵忤見災且以十數法師考室其㫄神遂見形為禮使兩神童朝夕立侍有女巫見而問之法師不答廬山神復來固請以永明十年七月振錫登峯行履所見宛如夢中乃即石為基倚巖結構匡坐端念虎豹為羣先德曇隆慧逺之徒亦卜居于此既人蹟罕至遂不堪其憂且山氣氲令人頭痛身熱曽未幾時莫不來下唯法師獨往一去不歸既却禾黍之資不避霜露之氣時捫蘿越險行動若飛或有羣魔不喜法師來者能使雷風為變以試法師既見神用確然羣魔乃止久之復隨險幽尋造石梁石室靈山祕地百神之所遨遊也法師說戒行香神皆頭面禮足昔神人吳猛得入此遊觀自兹厥後唯法師復至焉羲皇已來二人而已矣初法師入山二年禪味始具每斂心入寂偏見彌勒如來常云宿植之緣也建武四年春忽語弟子曰吾壽當九十但餘年無益於世而四大有纍於人思拯助衆生不得久留此矣七月二十一日標極嶺西頭為安尸之處人莫之知也後七日而疾疾後七日而終春秋五十八臨終合掌曰願即生三途救一切衆生苦又曰吾以身施烏鳥慎勿埋之初法師喚下寺數人安居講授或謂法師曰今欲出山尋醫又勸進飲食法師曰吾纍在此身及吾無身吾有何纍勿多言也遷化旬有六日容貌如生兩指屈握伸之隨復如故宿德比丘皆曰夫得道人多以七為數法師自疾至歿不其然歟兩指不伸亦良有以也初罏峯孤絶羽翼所不至自法師經始常有雙烏來巢及法師即化烏亦永逝矣唯法師宿藉幽源久素淨業故慈悲喜捨習與性成微妙𤣥通因心則有入山林而不出絶榮觀而超然若乃八珍强骨之資九轉延年之術皆如脫屣矣唯直心定志在無價寶舟愛護化城期為彼岸鑽仰不測故未得而名焉廣𢎞明集年一作華釋𤣥暢姓趙河西金城人涼州出家宋元嘉中達揚州齊永明初終京師訶梨跋摩傳序僧祐云余尋訶梨跋摩述論明經樞機義奧後進所馳荆州暢公製傳頗徵事蹟故復兼録附之序末雖於類為乖而顯證是同焉訶梨跋摩者宋稱師子鎧佛泥洹後九百年出在中天竺婆羅門子也若人之生也固亦命世而誕幼則神期秀拔長則思周變通至若世典圍陀竝是隂陽竒術提舍髙論又亦外誥情辨皆經耳而究其幽遇心而盡其妙直以世訓承習弗為心要也遇見梵志導以真軌遂抽簮革服為薩婆多部達摩沙門究摩羅陀弟子其師既器而非凡即訓以名典迦旃延所造大阿毗曇乃有數千偈而授之曰此論蓋是衆經之統例三藏之要目也若能專精尋究則悟道不逺於是跋摩敬承鑽習功不踰月皆精其文義乃慨焉而歎曰吾聞佛㫖虛寂非名相所議神澄妙絶罕常情攸測故為先達之所遵崇我亦注心歸仰如今之所禀唯見浮繁妨情支離害志紛紜名相竟無妙異若以為先聖應期適時之漸斯則教之流非化之源矣遂乃數載之中窮三藏之㫖考九流之源方知五部創流蕩之基迦旃啓偏競之始紛綸遺蹤謀方百轍由使歸宗者昧其繁文尋教者惑其殊軌夫源同末異乃將衰之徵然頽綱不振亦𢎞道者之憂也遂抗言五異辨正衆師務遵洪範當而不讓至乃敏捷鋒起苞籠羣達辨若懸河清對無滯于時衆師雷動相視闕如後以他日集而議曰此子恃明凌轢舊德據言有本未易可傾邁年值此運也如何或有論者曰豈唯此子才明過人抑亦吾等經論易窮耳意謂學無自足暗則咨明明昧之分已自可知何為茍守偏識不師廣見耶諸耆德曰相與誠復慕明情深而忝世宗仰于兹久矣當不能忽廢舊業問道少年明矣何者夫根同葉散像數自然五部之興有自來矣但常敦其素業祗而行之既生屬千載之末孰能逺軌正法之初哉且跋摩抽簮之始受道吾黨中參異學已自離羣夫師祖不同所以五部不雜㸃異之制蓋先師舊典幸可述其獨見之明以免雷同之衆跋摩既宏才放達廣心逺度雖衆誚交喧慠然容豫深體忘懷明遊常趣神用閒邃擇木改步時有僧祗部僧住巴連弗邑竝遵奉大乘云是五部之本久聞跋摩才超羣彥為衆師所忌相與慨然要以同止遂得研心方等鋭意九部採訪微言搜簡幽㫖於是博𢎞百家衆流之談以檢經奧通塞之辨澄汰五部商略異端考核迦旃延斥其偏謬除繁棄末慕存歸本造述明論厥號成實崇附三藏准列四真大明筌極為二百二品志在㑹宗先隆遺軌庶廢乖競共遵通濟斯論既宣淵懿嚮萃旬日之間傾震摩竭于時天竺有外道論師云是優樓佉弟子明鑒縱達每述譏正之辨厯國命酬莫能制者聞華氏王崇敬三寶將阻其信情又欲振名殊方遂杖䇿恆南直至摩竭王聞不悅即宣募境內有能辨屈之者當奉為國師闔境豪彥皆憚其髙名咸曰才非跋摩孰堪斯舉王聞甚悅即敕奉迎跋摩既至王便請升論堂令與外道決其兩正于時外道志氣干雲乃慠然而詠曰吾大宗樓迦偉藉世師繁文則六諦同貫簡㫖則知異于神神為知主唯斷為宗敢有抗者斬首謝焉跋摩既宏才邈世覩之杪然神期凌霄容無改顔乃慨然對曰異哉子之談也子所以跨遊殊方將欲崇其神而長其知也又以斷為宗而自誣其㫖子無知乎神可亡乎神既非知為神知知知神乎若神知知知神者誰知若知神知亦神乎外道乃退自疑曰理必若斷我無知矣知若知神神非宗矣於是沉惟謝屈心形俱伏王及臣民慶快非恆即與率土奉為國師王乃譴其舊衆㫺忌名賢本衆相視懷愧闕然咸共追遜固請舊居王又曰夫制邪歸正其德𢎞矣但𢎞教之賢業尚殊背乖忤遺筌濁亂像軌請以檢一令謬昧欽明王即宣告號為像教大宗由使八方論士淵異之徒感思舊決明契而萃跋摩以絶倫之才超羣之辨每欲師聖附經藉同黜異遂博舉三藏開塞之塗大杜五部乖競之路難其所執釋其所難明辨恢廓苞羅衆說理亂叩機神王若無於是羣方名傑莫能異見咸廢殊謀受道真軌淳化以之而隆邪藹以之再騫非夫神契實津道參沖㫖孰能蕩定羣異令廢我求通者哉所以粗述始末埀諸好事云爾出三藏記集致傅琰書暢以宋升明三年於岷山郡廣陽縣界齊后山立寺名曰齊興正齊太祖受錫命之辰時琰西鎮成都暢乃致書表聞敕蠲百户以充俸給貧道栖荆纍稔年衰疹積厭毒人喧所以逺託岷界卜居斯阜在廣陽之東去城千步逶迤長亘連壘疊嶺嶺開四澗亘列五峯抱郭懷邑回望三方負巒背嶽逺矚九流以去年四月二十三日創功覆簣前冬至此訪承爾日正是陛下龍飛之辰蓋聞道配太極者嘉瑞自顯德同二儀者神應必彰所以河洛昞有周之兆靈石表大晉之徵伏謂兹山之符驗豈非齊帝之靈應耶檀越奉國情深至使運屬時徵不能忘心豈能遺事輒疏山讃一篇以露愚抱讃曰峩峩齊山誕自幽冥潜瑞幾㫺帝號乃明岑戴聖宇兆祚休名巒根雲坦峯嶽霞平規巖擬剎度嶺締經創工之日龍飛紫庭道侔二儀四海均清終天之祚嶽德表靈髙僧傳釋道盛姓朱沛國人宋末始住湘州入齊終金陵天保寺啓髙帝論撿試僧事啓盛以宋明時下京憩天保寺齊髙帝敕為僧主升明元年丹陽尹沈文季建議責僧屬籍欲行沙汰由盛綱領事得寧寢𢎞明集作啓武帝誤是時髙帝亦未受禪天保寺釋道盛啓㫺者仲尼養徒三千學天文者則戴圓冠學地理者則履方屨楚莊周詣哀公曰蓋聞此國有知天文地理者不少請試之哀公即宣令國內知天文者著圓冠知地理者著方屨來詣門惟有孔丘一人到問無不對故知餘者皆為竊服矣釋迦興世說四諦六度制戒威儀舍利佛等皆得羅漢故知大法非為無宗但自爾已來人根轉鈍去道懸逺習惑纒心若能隔意則合律科不爾皆是竊服者伏願陛下聖明深恕此理弗就凡夫求聖人之道昔鄭子産稱曰大賢尚不能收失為申徒嘉所譏況今末法比丘寧能收失若不收失每起惡心寺之三官何以堪命國有典刑願敕在所依罪治戮幸可不亂聖聽盛雖老病逺慕謗木敢以陳聞伏紙流汗謹啓𢎞明集釋僧巖南史云趙僧巖北海人寥廓無常人不能測與劉善明友善明為青州欲舉為秀才大驚拂衣而去後忽為沙門栖遲山谷𢎞按此謂僧巖舉秀才在為沙門前也據三書明為正辭青州刺史劉善明舉秀才書貧道弱齡出家早違俗務游心釋風志乖孔教雖復道場未即故亦洙訓緬矣方將委質餒獸庶超九劫之功分肌哺鴿情存乘雲之馭寧能垂翼中田反跡籠樊捨夫途中之適嬰兹廟堂之纍哉且夫官人以器位必須才未有叨越分之舉終能保其榮也今輒奉還板命願收過恩無令曹公重歎王舟再慙補秀之召非所克堪釋僧巖呈劉善明答僧巖道人書善明平原人厯宣城太守𢎞明集不考劉刺史為善明以末有劉君白答遂作劉君白誤莊篇有弱喪之謬釋典有窮子之迷每讀其書為之長慨敬慎髮膚揚名後史仰顯既重俯𢎞為大逺尋聖言斯教為最近取諸身實迷情理瞿曇見此亦當莫逆於心況君辨破秋毫識洞今古裂冠不疑拔本不悟幽冥相駭遐邇致驚昔吕尚抱竿於八十之年志釣由時未遇君沈淪未及冀能有美若人耳如其不爾豈不悲哉僕忝蒞梓藩庶在明仄觀貢帝庭必盡才懿故欲通所未通屈所未屈如來告紛紜有乖真唱茍為誕說豈所期邪昔王祥樵採沂側耳順始應州命公孫𢎞牧豕海上白首方充鄉舉終能致位元台朝天變地道暢當年聲流萬載君意何如敬布腹心想更圖之劉君白答志釣上下疑有脫字重與劉刺史書紆辱還誨優㫖仍降徵莊援釋理據皎然徒欲伏義辨情末由也已雖髙義出象微言入神鄙懷所執猶或可曉何者夫知人者哲自審者明忘分昧進良所未安昔成直應命終獲減名之慙遵祖騁能卒招揚鵠之恥若我欲效彼追蹤王吕恐曝鰓龍津㸃額衆矣盜所盜器與盜同罪舉失其才亦賔主交鄙可不慎乎又禮云非指玉帛孝乎豈止保膚故割肌無譏於前代斷髮有加於曩辰斯蓋斬手全軀所存者大夫何怪哉願貸愚執賜遂陋襟釋僧巖呈劉善明重答僧巖書重獲來簡始見𤣥解皎然之悟可謂相視而笑矣君識鑒衆流智該理奧每撿感應之源窮尋分石之說何常不句句破的洞盡義宗而茍自謙光乖其側席仍踵覆車無誨敗非知之難行之不易也夫去國三年見似家人者喜作客日久寧不悲心今誓捨重擔而安坐棄羈旅如還家對孔懷之好敦九族之美趙門欣欣為樂已甚況復文明御運姬召協政思賢讃道日昃忘餐以君之才𢎞君之德帶玉聲朝披錦振逺功濟世猷名揚身後與夫髠剪之辱鰥絶之苦豈可同年而語哉相與契濶久要頗練深志若隱展禽之賢恐招臧氏不忠之責故力疾題心重敷往白嵗云暮矣時不相待君其勉之勿有噬臍之悔劉君白答三與劉刺史書比日之事為可聊作一樂不謂恩㫖綢繆芳音驟届勞誨之厚一至於斯伏讀未周愧汗交集然鄙志區區已備前欵且巖之壯也猶後於人今既老矣豈能有為夫以耄耋之年指麾成務此自蒼靈特授假手天功協佐龍飛之英翼贊革命之主今欲以東畝之農夫西園之杼叟側景前光參蹤古烈無異策駑足以均驊騮繫澤雉以雙鸞鶴斯之不倫寧俟深察昔子泰伏命撫節公孫豫報智伯漆身靡悔今日過賞德粹兩賢正恨年逼崦嵫命急濛汜吞炭倒戈永與願隔臨紙惻愴罔識所陳幸收過眷不復翻覆釋僧巖呈劉善明三答僧巖書君談天語地神情如鏡抽毫拂簡智思入淵而幼失理根蹭蹬皓髮惜君之才恆用歎息君雖心在雲上而形居坎下既與黃雀為羣恐沒鸞鷟之美故率弓帛之禮屈應賔主之舉徽牘三枉陋札再酬茍自謙沖固辭年耄度君齒德方亨元吉未能俯志者正當遊翔擇木待椅桐竹實耳鄙命輕召曷足降哉敬揖清風肅從所尚本圖既乖裁還慙憫劉君白答竝𢎞明集釋智林髙昌人後自都辭還髙昌齊永明中卒與汝南周顒書林以宋明帝初下京止靈基寺申明二諦義有三宗時顒長於佛理著三宗論立空假名立不空假名設不空假名難空假名設空假名難不空假名假名空難二宗又立假名空既與林意相符林致書顒顒因出論焉南齊書載此書林在齊時與顒顒方為正員郎直侍殿省近聞檀越叙二諦之新意陳三宗之取捨聲殊恆律雖進物不速如貧道鄙懷謂天下之理惟此為得焉不如此非理也是以相勸速著紙筆比見往來者聞作論巳成隨喜充遍物非常重又承檀越恐立異當時干犯學衆製論雖成定不必出聞之戄然不覺興悲此義㫖趣似非初開妙音中絶六七十載理髙常韻莫有能傳貧道年二十時便參得此義常謂藉此微悟可以得道竊每歡喜無與共之年少見長安耆老多云關中髙勝乃舊有此義當法集盛時能深得斯趣者本無多人既犯越常情後進聽受便自甚寡傳過江東略無其人貧道捉麈尾已來四十餘年東西講說謬重一時其餘義統頗見宗録惟有此途白黑無一人得者貧道積年乃為之發病既衰痾末命加復旦夕西旋顧惟此道從今永絶不言檀越天機發緒獨創方寸非意此音猥來入耳且欣且慰實無以況建明斯義使法燈有種始是真實行道第一功德雖復國城妻子施佛及僧其為福利無以相過既幸已詮述想便宜廣宣使賞音者見也論明法理當仁不讓豈得顧惜衆心以夭竒趣耶若此論已成遂復中寖恐檀越方來或以此為法障往之懇也然非戲論矣想便寫一本為惠貧道齎以還西使處處𢎞通也比小可牽曳故入山取叙深企付之髙僧傳明流過廣𢎞集作流通末命作未愈夭作失天機發緒作機法無緒方寸作方外寖作覆往之懇也作往意理然略無其人齊書略是無一隱佛祖通載智林以書抵顒略曰切聞三宗論鈎深索盡衆生之情廓而通之盡諸佛之意使法燈有種勝利無窮借使國城妻子之施何以逮此哉傳者以為公畏譏評故欲中輟詎可特纒疑障自廢現行乎釋慧琳宋劉慧琳徙交州卒廣𢎞明云南齊釋慧琳新安寺釋𤣥運法師誄并序維建武四年五月八日甲午沙門𤣥運右卧不興神去危城嗚呼哀哉法師本譙邦右族寓于燉煌幼禀端明仁和之性長樹𢎞懿沖閒之德真粹天挺夙鑒道勝乃遺擯俗纒超出塵礙濯景𤣥津栖習法道率由儀律之絶精學體微之妙潜仁晦名之行散畜忘相之施無得而稱者日夜而茂焉敷說駕乎當時理思冠乎中世鑽仰之徒自逺而來虛至實歸遍于轍跡帝后儲二之尊藩英鼎宰之重莫不揖道宗師瞻猷結敬而宏量邃奧不以貴賤舛其顧眄夷整淵深不以寒暑品其懷抱所以總綜像末崇振頽流者法師其人矣啓訓之緣有限負手之歌㑹終風火告徵愈恬明於危識靈聖滅現屢恭悅於告漸春秋六十九嗚呼哀哉外禀哽識內咨慟魂慕題往迹行實浮言乃作誄曰世滯悠曠苦海遐長欲善修掩愛網宏張法燈不曜慧日霾光朽宅燔仆炎火浮揚二儀構毁算其有歲三轉廓遼空劫誰計從冥詎曉淪川莫濟接踵既疏實資命世日誕明哲降靈自緣涵徽藴器有表孩年神機幼徹凝鑒早宣猶玉初瑩若珠啓泉疵厭塵濁超悟𤣥微訣捨愚縛澄翦情違齠年植節丱嵗從師承規檢敬肅範儀威秉躬淳潔淑慎心行學辨祕源問窮理敻前隱用昭往疑斯鏡匠佚功倍思髙業盛爰洎中嵗綽奧宏廣輪演法空雲滌日朗乘衢若夷擁開似敞悠悠品類式是宗仰右河振聞左江標秀聲因德宣稱緣道富提奬詢求悅懌研授仁厚猶地志髙如岫輟餐赴嗛捨纊矜寒蓄無停日財以施殫寧賤傲色匪䝿愈顔湛兹懿慶均彼藉蘭教之所洽晦識斯明智之所誘務以心成接昏茂貨撫迷諒情憑微請要莫不咸亨險路恆逺開引有極生滅相揮念念匪息徂年寡留西光遽逼雲變豈停將運淨域嗚呼哀哉體深病苦慮達四疾針石醫巫分劑貶失端情法旅正想慈律不捨界勤誓拯羣物嗚呼哀哉合既終離假㑹應謝同悲素林寂然中夜談人勗善瞻天儼駕即彼紺宫去此塵舍嗚呼哀哉絶微言於永沒毁舟航於遐澨埃崇臺之嚴華蕪峻堂之雕麗捨形有其若遺遷情靈其何界資訓仰兮眷徒空血淚兮感逝嗚呼哀哉廣𢎞明集扶南國王僑陳如闍耶跋摩上齊武帝表永明二年扶南國王臣僑陳如闍耶跋摩叩頭啓曰天化撫育感動靈祇四氣調適伏願聖主尊體起居康豫皇太子萬福六宫清休諸王妃主內外朝臣普同和睦鄰境士庶萬國歸心五榖豐熟菑害不生土清民泰一切安穩臣及人民國土豐樂四氣調和道俗濟濟竝蒙陛下光化所被咸荷安泰又臣前遣使齎雜物行廣州貨易天竺道人釋那伽仙於廣州因附臣舶欲來扶南海中風漂到林邑國王奪臣貨易竝那伽仙私財具陳其從中國來此仰序陛下聖德仁治詳議風化佛法興顯衆僧殷集法事日盛王威嚴整朝望國軌慈愍蒼生八方六合莫不歸伏如聽其所說則化鄰諸天非可為喻臣聞之下情踊悅若暫奉見尊足仰慕慈恩澤流小國天垂所感率土之民竝得皆蒙恩祐是以臣今遣此道人釋那伽仙為使上表問訊奉貢微獻呈臣等赤心竝别陳下情但所獻輕陋愧懼唯深伏願天慈曲照鑒其丹欵賜不垂責又臣有奴名鳩酬羅委臣逃走别在餘處構結凶逆遂破林邑仍自立為王永不恭從違恩負義叛主之愆天不容載伏尋林邑昔為檀和之所破久已歸化天威所被四海彌伏而今鳩酬羅守執奴凶自專狠彊且林邑扶南鄰界相接親人是臣奴猶尚逆去朝廷遙逺豈復遵舉此國屬陛下故謹具上啓伏聞林邑頃年表獻簡絶便欲永隔朝廷豈有師子坐而安大鼠伏願遣軍將伐凶逆臣亦自效微誠助朝廷剪撲使邉海諸國一時歸伏陛下若欲立餘人為彼王者伏聽敕㫖脫未欲灼然興兵伐林邑者伏願特賜敕在所隨宜以少軍助臣乘天之威殄滅小賊伐惡從善平蕩之日上表獻金五婆羅今輕此使逆臣丹誠表所陳啓不盡下情謹附那伽仙并其伴口具啓聞伏願愍所啓並獻金鏤龍王坐像一軀白檀像一軀牙塔二軀古貝二雙琉璃蘇鉝二口玳瑁檳榔柈一枚釋那伽仙上武帝書那伽仙詣京師言其國俗事摩䤈首羅天神常降於摩耽山土氣恆暖草木不落其上書曰吉祥利世間感攝於羣生所以其然者天感化緣明仙山名摩耽吉樹敷嘉榮摩䤈首羅天依此降尊靈國土悉蒙祐人民皆安寧由斯恩被故是以臣歸情苦薩行忍慈本迹起凡基一發菩提心二乘非所期歷生積功業六度行大悲勇猛超劫數財命捨無遺生死不為厭六道化有緣具修於十地遺果度人天功業既已定行滿登正覺萬善智圓備惠日照塵俗衆生感緣應隨機授法藥佛化遍十方無不蒙濟擢皇帝聖𢎞道興隆於三寶垂心覽萬機威恩振八表國土及城邑仁風化清皎亦如釋提洹衆天中最超陛下臨萬民四海共歸心聖慈流無疆被臣小國深此似頌偈武帝詔報具摩䤈降靈流施彼土雖殊俗異化遙深欣讚知鳩酬羅於彼背叛竊據林邑聚凶肆掠殊宜剪討彼雖介遐陬舊修蕃貢自宋季多難海譯致壅皇化惟新習迷未革朕方以文德來逺人未欲便興干戈王既欵列忠到逺請軍威今詔交部隨宜應接伐叛柔服實惟國典勉立殊效以副所期竝南齊書釋文紀卷十九
