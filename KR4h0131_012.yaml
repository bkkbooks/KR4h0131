body:
  text: 釋文紀巻十二明梅鼎祚輯宋一文帝姓劉氏諱義隆彭城人武帝子報師子國王詔宋元嘉起居注師子國王遣使奉獻詔報宋書元嘉五年師子國王奉文帝表見後不載此詔此小乗經甚少彼國所有皆可悉為寫送之聞彼隣多有師子此獻未覩可悉致之慧嚴法師喪事詔嚴姓范豫州人從羅什受學還建業大宏經典元嘉中卒嚴法師器識淵逺學道之匠奄爾遷神痛悼于懐可給錢五萬布五十疋髙僧傳孝武帝諱駿字休能文帝子沙汰僧徒詔大明二年有曇標道人與羌人髙闍謀反世祖下詔設諸條禁非戒行精苦並使還俗而諸尼出入宫掖制竟不行門下佛法訛替沙門混雜未足扶濟鴻教而專成逋藪加頃姦心頻發凶状屢聞欺道亂俗人神交忿可付所在與寺耆長精加沙汰後有違犯嚴其誅坐主者詳為條格速施行廣𢎞明集風欺道二句宋書作敗亂俗人神交怨明帝諱彧字休炳文帝子修復中興諸寺令前廢帝毁中興天寳及新安諸寺太宗定亂下令先帝建中興及新安諸寺所以長世垂範𢎞宣盛化頃遇昬虐法像殘毁師徒奔迸甚以矜懐妙訓淵謨有扶名教可招集舊僧普各還本並使材官隨宜修復宋書賔禮道猛法師詔髙僧傳猛西凉州人東逰建業上東安寺續開講席明帝深相崇接猛法師風道多濟朕素賔友可月給錢三萬令史四人白簿吏二十人車及步轝各一乗乗轝至客省南譙王劉義宣武帝子譙𢎞明止作王與張新安論孔釋書佛教以罪福因果有若影響聖言明審令人寒心然自上古帝皇文武周孔典謨訓誥靡不周備未有述三世顯敘報應者也彼衆聖皆窮理盡性照曉物縁何得忍視陷溺莫肯援接曽無一言示其津逕且釣而不綱弋不射宿博碩肥腯上帝是享以此觀之盖所難了想二三子揚㩁而陳使劃然有證袪其惑焉張鏡吳人仕新安太守名𢎞明作張新安失答譙王論孔釋書仰復淵㫖匪邇伊教俯惟末造鞠躬汎對竊以為遂通資感涉悟藉縁誠微良因則河漢滋惑故待問擬乎撞鐘啟發俟於悱憤矣夫妙學窮理乃聖乃神光景燭八維頫仰觀九有然而運值百齡窅均萬刼者豈非嘉縁未構故業化莫孚哉是以聖靈輟軌斯文莫載靡得明徴理歸指斥宗致祗以微顯婉而成潜徙𡨕逺之生導三世之源積善啟報應之轍網宿昭仁蒐苗𢎞信既以漸漬習成吝滯日袪然後道暢皇漢之朝訓敷永平之祀物無䵐熒人斯草偃寔知放華猶昬文宣未旭非㫖暌以異逋諒理均而俱躓者附㑹𤣥逺孰夷冒言謬犯不韙輕率狂簡苗北藏作畋䵐作韗並𢎞明集傅亮字季友靈州人左光禄大夫文殊師利菩薩讃在昔龍種今也童真業化游方㒺識厥津髙㑹維那研微盡神發揮幽賾導達天人彌勒菩薩讃時無並后道不二司龍潜兠率按轡候時翳翳長夜懐而慕思思樂朗旦屬想靈期並初學記鄭鮮之字道子滎陽開封人右光禄大夫𢎞明用字神不滅論道子著神不滅論稟正逺公多以形神同滅照識俱盡夫所以然其可言乎十世既以周孔為極矣仁義禮教先結其心神明之本絶而莫言故感之所體自形以還佛唱至言悠悠弗信余墜弱喪思拔淪溺仰尋𤣥㫖研求神要悟夫理精於形神妙於理寄象傳心粗舉其證庻鑒諸将悟遂有功於滯惑焉夫形神混㑹雖與生俱存至於麤妙分源則有無區異何以言之夫形也五藏六腑四肢七竅相與為一故所以為生當其受生則五常殊授是以肢體偏病耳目互缺無奪其為生一形之内其猶如兹況神體靈照妙統衆形形與氣息俱運神與妙覺同流雖動静相資而精麤異源豈非各有其本相因為用者邪近取諸身即明其理庶可悟矣一體所資肌骨則痛癢所知爪髪則知之所絶其何故哉豈非肌骨所以為生爪髮非生之本也生在本則知存生在末則知滅一形之用猶以本末為興廢況神為生本其源至妙豈得與七尺同枯戸牖俱盡者哉推此理也則神之不滅居可知矣南藏生之本也下有生在本邪生之所本八字客難曰子之辨神形盡矣即取一形之内知與不知精矣然形神雖麤妙異源俱以有為分夫所以為有則生為其本既孰有本已盡而資乎本者獨得存乎出生之表則廓然𡨕盡既𡨕盡矣非但無所立言亦無所立其識矣識不立則神将安寄既無所寄安得不滅乎答曰子之難辯則辨矣未本諸心故有若斯之難乎夫萬化皆有也榮枮盛衰死生代乎一形盡一形生此有生之始終也至於水火則彌貫羣生贍而不匱豈非火體因物水理虛順生不自生而爲衆生所資因即為功故物莫能竭乎同在生域其妙如此況神理獨絶器所不隣而限以生表𡨕盡神無所寄哉因斯而談太極為兩儀之母兩儀為萬物之本彼太極者渾元之氣而已猶能總此化根不變其一矧神明靈極有無兼盡者邪其為不滅可以悟乎難曰子推神照於形表指太極於物先誠有其義然理貴厭心然後談可究也夫神形未嘗一時相違相違則無神矣草木之無神無識故也此形盡矣神将安附而謂之不滅哉茍能不滅則自乖其靈不資形矣既不資形何理與形為生終不相違不能相違則生本是同㫁可知矣答曰有斯難也形神有源請為子循本而釋之夫火因薪則有火無薪則無火薪雖所以生火而非火之本火本自在因薪為用耳若待薪然後有火則燧人之前其無火理乎火本至陽陽為火極故薪是火所寄非其本也神形相資亦猶此矣相資相因生塗所由耳安在有形則神存無形則神盡其本惚怳不可言矣請為吾子廣其類以明之當薪之在水則火盡出水則火生一薪未改而火前期神不賴形又如兹矣神不待形可以悟乎難曰神不待形未可頓辨就如子言茍不待形則資形之與獨照其理常一雖曰相資而本不相關佛理所明而必陶鑄此神以濟彼形何哉答曰子之問有心矣此悠悠之所惑而未暨其本者也神雖不待形然彼形必生必生之形此神必宅必宅必生則照感為一自然相濟自然相濟則理極於陶鑄陶鑄則功存功存則道行如四時之於萬物豈有心於相濟哉理之所順自然之所至耳難曰形神雖異自然相濟則敬聞矣子既譬神之於形如火之在薪薪無意於有火火無情於寄薪故能合用無窮自與化永非此薪之火移於彼薪然後為火而佛理以此形既盡更宅彼形形神去來由於罪福請問此形為罪為是形邪為是神邪若形也則大冶之一物耳若神也則神不自濟繫於異形則子形神不相資之論於此而躓矣答曰宜有斯問然後理可盡也所謂形神不相資明其異本耳既以為生生生之内各周其用茍用斯生以成罪福神豈自妙其照不為此形之用邪若其然也則有意於賢愚非忘照而𤣥㑹順理𤣥㑹順理彼形盡化神宅此形子不疑於其始彼此一理而信於其終邪難曰神即形為照形因神為用斯則然矣悟既由神惑亦在神神随此形故有賢愚賢愚非神而神為形用三世周迴萬劫無算賢愚靡始而功顯中路無始之理𤣥而中路之功未孰有在未之功而拔無始之初者邪若有嘉通則請從後塵答曰子責其始有是言矣非理無始終𤣥極無涯既生既化罪福往復自然所生耳所謂聰明誠由耳目耳目之本非聰明也所謂賢愚誠應有始既為賢愚無始可知矣夫有物也則不能管物唯無物然後能為物所歸若有始也則不能為終唯無始也然後終始無窮此自是理所必然不可徵事之有始而責神同於事神道𤣥逺至理無言髣髴其宗相與為悟而自末徵本動失其統所以守此一觀庶階其峯若肆辯競辭余知其息矣洪範説生之本與佛同矣至乎佛之所演則多河漢此溺於日用耳商臣極逆後嗣隆業顔冉徳行早夭無聞周孔之教自為方内推此理也其可知矣請廣其證以究其詳夫稟靈乗和體極淳粹堯生丹朱頑㓙無章不識仁義瞽瞍誕舜原生則非所育求理則應傳美其事若兹而謂佛理為迂可不悟哉與禪師論踞食書夫聖人之訓脩本袪末即心為教因事成用未有反性違形而篤大化者也雖復形與俗乖事髙世表至於拜敬之節揖讓之禮由申所至道俗不殊也故齋講肄業則備其法服禮拜有序先後有倫敬心内充而形肅於外稽首至地不容企踞之禮斂袵十拜事非偏坐所預而以踞食為心用遺儀為斂麤事理相違未見其通者也夫有為之教義各有之至若般舟苦形以存道道親而形疎行之有理用之有本踞食之教義無所𢎞進非苦形退貽慢易見形而不及道者失其恭肅之情而啟駭慢之言豈聖人因事為教章甫不適越之義邪原其所起或出於殊方之性或於矯枉之中指有所救如病急則藥速非服御長久之法也夫形教相稱事義有倫既制其三服行其禮拜節以法鼔列以次序安得企踞其間整慢相背者哉在昔宜然則適事所至一日之用不可為永年之訓理可知也故問仁者衆而復禮為本今禪念化心而守莭不變在理既末於用又麤茍所未達敢不布懐鄭君頓首范泰字伯倫順陽山隂人左光禄大夫與王司徒諸公論道人倨食書司徒王𢎞范泰敬白公卿諸賢今之沙門坐有二法昔之祗洹似當不然據今外國言語不同用舎亦異聖人随俗制法因方𢎞教尚不變其言何必苦同其制但一國不宜有二一堂寜可不同而今各信偏見自是非彼不尋制作之意惟此雷同為美鎮之無主遂至於此無虚於受人有同於必執不求魚兔之實競攻筌蹄之末此風不革難乎取道樹王六年以致正覺始明𤣥宗自敷髙座皆結跏跌坐不偏踞也坐禪取定義不夷俟據之食美在乎食不求飽此皆一國偏法非天下通制亦由寒鄉無絺絺巾之禮日南絶氊裘之律不可見大禹解裳之初便為無復章甫請各兩捨以付折衷君子范泰區區正望今集一食之同過此已往未之或知禮以和貴僧法尚同今升齋堂對聖像堂如神在像中四雙八輩義無云異自矜之情寧可試暫不我釋公往在襄陽偏法已來思而不變當有其㫖是以投錫乘車義存同衆近禪師道場天㑹亦方其坐豈非存大略小禮不兼舉故耶方坐無時而偏踞有時自方以恒適異為難嘗變取同為易且主人降已敬賔有自來矣更諮義公了不見酬是以敬白同異以求厥中願恵咳嚏之餘以蔽怯弱之情釋慧義等答范伯倫諸檀越書慧義姓梁北地人范泰立祗洹寺以義徳為物宗固請經始元嘉末終烏衣寺祗洹寺釋慧義等五十人敬白諸檀越夫沙門之法正應謹守經律以信順為本若欲違經反律師心自是此則大法之深患穢道之首也如來制戒有開有閉開則行之無疑閉則莫之敢犯戒防沙門不得身手觸近女人凡持戒之徒見所親漂溺深水視其死亡無敢救者於是世人謂沙門無慈此何道之有是以如來為世譏嫌開此一戒有難聴救如來立戒是畫一之制正可謹守而行豈容以意專輒改作俗儒猶尚謹守夏五莫敢益其月者将欲深防穿鑿之徒杜絶好新樂異之客而況三達制戒豈敢妄有通塞范檀越欲令此衆改偏從方求不異之和雖貪和之為美然和不以道則是求同非求和也祗洹自有衆巳來至於法集未嘗不有方偏二衆既無經律為證而忽欲改易佛法此非小事實未敢髙同此寺受持僧祗律為日已久且律有明文説偏食法凡八議若無偏食之制則無二百五十矣云食不得置於牀上所棄之食置於右足邊又云不得懸足累脛此豈非偏食之明證哉戒律是沙門之秘法自非國主不得預聞今諸檀越疑惑方偏欲生興廢貧道不得不㩁其輕重略舉數條示其有本甘受宣戒之辠佛法通塞繫諸檀越通則共獲䕶法之功塞必相與有滅法之辠幸願三思令幽顯無恨重答慧義等書前論已包此通上人意强氣猛弗之尋耳戒以防非無非何戒故愚惑之夫其戒随俗變律華夏本不偏企則聚骨交脛之律故可得而略手食之戒無用匙筯之文何重偏坐而輕手食律不得手近女人尋復許親溺可援是為凡夫之疑果足以改聖人之律益知二百五十非自然定法如此則固守不為全得師心未足多怪夏五闕文固守不為疑明慎所見茍了何得顧衆而動企之為義意在宜進欲速則事不得行端坐則不安其居時有踞慠之夫故非理法所許一堂兩制上人之同泯焉莫逆弟子之和子然单獨何敢當五十大陣是用畏敵而黙庶乎上善之救與生觀二法師論倨食書道生慧觀見後止生傳云生自闗還都青園寺王𢎞范泰顔延之並挹敬風猷從之問道外國風俗還自不同提婆始來義觀之徒莫不沐浴鑚仰此盖小乗法耳便謂理之所極謂無生方等之經皆是魔書提婆末後説經乃不登髙座法顯後至泥洹始唱便謂常住之言衆理之最般若宗極皆出其下以此推之便是無主於内有聞輙變譬之於射後破奪先則知外國之律非定法也偏坐之家無時而正髙座説法亦復企踞外國食多用手戒無匙筯慧義之徒知而不改至於偏坐永為不慙固自為矛盾其誰能解弟子意常謂與人同失賢於自伐其是推心樂同非敢許以求直今之奉法白衣決不可作外國被服沙門何必苦守偏俗論沙門踞食表三首臣言陛下體達佛理将究其致逺心遐期研精入微但恨起予非昔對揚未易臣少信大法積習善性頗聞餘論髣髴𤣥宗往者侍坐過䝉眷誘意猥詞訥不能有所運通此之為恨畢世無巳臣近難慧義踞食盖區區樂同之意不敢求長於人側餐下風已達天聼臣請此事自一國偏法非經通永制外國風俗不同言論亦異聖人不變其言何獨苦改其用言以宣意意達言忘儀以存敬敬立形廢是以聖人因事制誡随俗變法達道乃可無律思夫其防彌繁用捨有時通塞惟理膠柱守株不以疎乎今之沙門匠之善誘道無長壹各信所見尠能虚受乃至競異於一堂之間不和於時雍之世臣竊恥之況於異臣者乎司徒𢎞達悟有理中不以臣言為非今之令望信道未篤意無前定以兩順為美不㫁為大俟此而制河可清矣慧嚴道生本自不企慧觀似悔始位伏度聖心已當有在今不當明詔孤發但令聖㫖粗達宰相則下觀而化孰曰不允皇風方當逺畼文軌将就大同小異雖㣲漸不可長青青不伐将尋斧柯故宜自邇及逺令無思不服江左中興髙座來遊愛樂華夏不言此制釋公信道最篤不苦其節思而不改容有其㫖羅什卓犖不羈不可測落髮而不偏踞如復可尋禪師初至詣闕求通欲以故牀入踞理不可開故不許其進後東安衆集果不偏食此即先朝舊事臣所親見者也謹啟又表臣言陛下近遊祗洹臣固請碑讃如憶髣髴有許法駕既遊臣輒仰刋碑上曰皇帝讚正此三字而已專輒之辠思臣所甘至於記福㝠中未知攸濟若賜神筆數字臣死且不朽以之𢎞奨風尚有益而無損萬機脱有未暇聖㫖自可笑㖟之左史侍衞之臣寧無自效之心禆諶世叔何逺之有可不勞聖慮亦冕旒之意也臣事久謝生塗已盡區區在心唯來世而已臣受恩深重禄賜有餘自度終無報於聖世巳矣盖首並結草之誠願陛下哀而弗責臣言文帝詔答今刻𢎞明誤連前表知與慧義論踞食近亦粗聞率意不異來㫖但不看佛經無經制以所見耳不知慧嚴云何道生便是懸同慧觀似未肯悔其始位也比自可與諸道人更求其中邪祗洹碑讃乃不憶相許既非所習加以無暇不獲相酬甚以為恨又表臣言奉被明詔悚懼屏營管穴偏見不足陳聞直以事已上達不寧寝黙今敕又令更求其中是用猖狂復申本懐臣謂理之所在幸可不以文害意五帝不相襲禮三王不沿其樂革命随時其義並大荘周以古今譬舟車孟軻以專信書不如無書是故證羊非直聞斯兩用大道之行天下為家臣之區區一堂之同而況異俗偏制本非中庸之教生義觀得䝉𢎞接聖㫖脱有下問望其依理上酬不敢以多自助取長於人慧觀答臣都無理據唯襃臣以過言貶臣以干非推此疑其必悔未便有反善怗辭臣𢎞亦謂為然慧義堅陣已崩走伏路絶恃此為救難乎自免況復司契在上遁辭知窮臣近難慧觀輒復上呈如左臣以愚鄙将智而耄豈惟言之不中深懼不覺其惽侍衞之臣實時之望既不能矜臣此意又不能誨臣不逮此皆臣自招之自咎而已伏願陛下録其一往之至不以知拙為辠復敦冒昩干穢竊恃古典不加刑之年並𢎞明集與謝侍中書泰暮年事佛甚精於宅西立秪洹精舎又為佛讃以書示靈運靈運答書兼和其讃祗此二書與靈運答二書今刻𢎞明並混為一卿常何如歴觀髙士類多有情吾亦許卿以同何緬邈之過便是未孤了幽闗也吾猶存舊情東望慨然便是有不馳處也見熾公阡陌如卿問栖僧於山誠是美事屢改驟遷未為快也杖策之郡斯則善也祗洹中轉有竒趣福業深縁森兮滿目見形者所不能傳聞言而悟亦難其人辭煩而已於此絶筆范泰敬謂祗洹塔内讃因熾公相示可少留意省之并同子與人歌而善佛讃謝靈運集載又云范光禄命作誤精粗事阻始末理通捨事就理即朗袪䝉惟此靈覺因心則崇四等極物六度在躬明發儲寝孰是化初夕滅雙樹豈還本無眇眇逺神遙遙安如願言來期免兹淪湑謝靈運陳郡陽夏人襲封康樂公歴侍中秘書監答范光禄書并讃辱告慰企晚寒體中勝常靈運脚諸疾比春更甚憂慮故人有情信如來告企詠之結實過飢渴山澗幽阻音塵闊絶忽見諸讃歎慰良多可謂俗外之詠尋覽三復味翫増懐輒奉和如别雖辭不足覩然意寄盡此從弟恵連後進文悟衰宗之美亦有一首并以逺呈承祗洹法業日茂隨喜何極六梁徽縁竊望不絶即時經始招提在所住山南南檐臨澗北戸背巖以此息心當無所忝邪平生緬然臨紙累歎敬惜為先繼以音告儻值行李輒復承問二月一日謝靈運白答和范光禄祗洹像讃三首并序范侯逺送像讃命余同作神道希微願言所屬輒總三首期之道場佛讃惟此大覺因心則靈垢盡智照數極慧明三達非我一援羣生理阻心行道絶形聲菩薩讃若人仰宗發性遺慮以定養慧和理斯附爰初四等終然十住渉求至矣在外皆去緣覺聲聞合讃厭苦情多兼物志少如彼化城權可得寶誘以涅槃救爾生老肇元三車翻乗一道維摩詰經中十譬讃八首聚沫泡合水性本無泡激流遂聚沫即異成貌状消散歸虚壑君子識根本安事勞與奪愚俗駭變化横復生欣怛燄性内相表状非炎安知火新新相推移熒熒非向我如何滯著人終嵗迷因果芭蕉生分本多端芭蕉知不一含萼不結核敷花何由實至人善取譬無宰誰能律莫昵縁合時當視分散日幻幻工作同異誰復謂非真一從逝物過既往亦何陳謬者疑久近達者皆自賔勿起離合情㑹無百代人夢覺謂寝無知寐中非無見意状盈眼前好惡迭萬變既悟眇已往惜為浮物戀孰視娑婆盡寧當非赤縣影響合影響順形聲資物故生理一旦揮霍去何因得像似羣有靡不然昧漠呼自已四色尚無本八微欲安恃浮雲泛濫明月隂薈蔚南山雨能為變動用在我竟無取俄已就飛散豈復将攅聚諸法既無我何由有我所電倐爍驚電過可見不可逐恒物生滅後誰復覈遲速慎勿留空念横使神理恧發已道易孚忘情長之福和從弟惠連無量夀頌法藏長王宫懐道出國城願言四十八𢎞誓拯羣生浄土一何妙來者皆清英頽年欲安寄乗化必晨征佛影銘并序夫大慈𢎞物因感而接接物之縁端緒不一難以形檢易以理測故已備載經傳具著記論矣雖舟壑緬謝像法猶在感運欽風日月彌深法顯道人至自祗洹具説佛影偏為靈竒幽巖嵌壁若有存形容儀端荘相好具足莫知始終常自湛然廬山法師聞風而悦於是随喜幽室即考空巖北枕峻嶺南映滮澗摹擬遺量寄託青彩豈唯像形也篤故亦傳心者極矣道秉道人逺宣意㫖命余製銘以充刋刻石銘所始寔由功被未有道宗崇大若此之比豈淺思膚學所能宣述事經徂謝永眷㒺已輙罄竭劣薄以諾心許徽猷秘奥萬不寫一庶推誠心頗感羣物飛鴞有革音之期闡提獲自拔之路當相尋於浄土解顔於道場聖不我欺致果必報援筆興言情迫其慨羣生因染六趣牽纒七識迭用九居屢遷劇哉五隂卷矣四縁遍使轉輪苦根迍邅迍邅未已轉輪在已四縁雲薄五隂火起亹亹正覺是極是理動不傷寂行不乖止曉爾長夢貞爾沈詖以我神明成爾靈智我無自我實承其義爾無自爾必袪其偽偽既殊塗義故多端因聲成韻即色開顔望影知易尋響非難形聲之外復有可觀觀逺表相就近曖景匪質匪空莫測莫領倚巖煇林傍潭鑒井借空傳翠激光發冏金好𡨕漠白毫幽曖日月居諸胡寧斯慨曽是望僧擁誠俟對承風遺明曠若有槩敬圖遺縱疏鑿峻峯周流步欄窈窕房櫳激波映墀引月入窻雲往拂山風來過松地勢既美像形亦篤彩淡浮色羣視沈覺若滅若無在摹在學由其潔精能感靈獨誠之云孚恵亦孔續嗟爾懐道慎勿中惕弱喪之推闡提之役反路今覩發䝉兹覿式厲厥心時逝流易敢銘靈宇敬告震錫曇隆法師誄并序夫協理置論百家未見其是因心自了一已不患其躓而終莫相辯我若咸歎翻淪得拔竟知于誰冀行跡立則善惡靡徵欲聲名傳則薫蕕同歇然意非身之所挫期出命之所限者目所親覿見之若人矣慧心朗識發於髫辮生自稟華家贏金帛加以巧乗騎解絲竹沫絶景於康衢弄絃管於華肆者非徒經旬涉朔彌歴年稔而已諒趙李之咸陽程鄭之臨卭矣既而永夜獨悟中飲興歎曰悲夫欣厭迭來終歸憂苦不杜其根於何超絶且三界迴沈諸天倐瞬況齊景牛山趙武企隂催促節物逼迫霜露推此願言伊何能久慨然有擯落榮華兼濟物我之志母氏矜其心姊弟伸其操遂相許諾出家求道一身既然闔門離世妻子長絶歡娛永謝豈唯向之靡樂判之盛年終古恩愛於今仳别矣旅舟南遡投景廬岳一登石門香罏峯六年不下嶺僧衆不堪其深法師不改其節援物之念不以幽居自抗同學嬰疾振錫萬里相救余時謝病東山承風遙羨豈望人期頗以山招法師至正鄙人榮役前詩敘粗已記之故不重煩及中間反山成説款盡遂獲按棟重崖俱挹迴澗茹芝术而共餌披法言而同巻者再歴寒暑非直山陽靡喜慍之容令尹一進已之色實明悟幽微袪滌近滯蕩吝澡垢日忘其疾庶白首同居而乖離無象信順莫歸徵集何縁晚節罹亹逺見㕘尋至止阻濶音塵殆絶值暑遘疾未旬即化誠存亡命也此行頗實有由承㓙感痛寔百常情紙墨㡬時非以斯名盖欽志節追深平生自不能黙已故投懐援筆其辭曰仰尋形識俯探理類採聲知律拔茅覩彚物以靈異人以智貴即是神明觀鑒意謂爰初在稚慧心夙察吐噏芳華懐抱日月如彼蘭苑風過氣越如彼天倪雲披光發求名約身規操束已儻或愚世曾未近似生以意泰意管生理孰是歡慰程鄭趙李家畜金繒才練藝技驤首揮霍繁絃綺靡酒娯調促意妍服侈朝迫景曛夕忌星徙悠悠白日淒淒良夜年往歡流厭來情舍苦樂環迴終卒代謝棄而更適生速名借誰能易奪何術推移精粗渾濟善惡㕘差即心有限在理莫規試覈衆肆庶獲所窺道家躓近羣流缺逺假名恒誰傍義豈反獨有兼忘因心則善傷物沈迷羨彼驅遣變服京師振錫廬頂長别榮兾永息幽嶺舍華襲素去繁就省人苦其難子取其静昬之視明即愚成絶智之秉情對理斯涅吝既弗袪滯亦安拔子之矜之為爾苦節節苦在已利貞存彼以明闇逝以慈累徙欲以援物先宜濟此發軫情違終然理是梁鴻攜妻荷蓧見子雞黍接人行歌通巳於世曰髙於道殊鄙始見法師獨絶神理形夀易盡然諾難判乗心即化棄身靡歎懐道彌厲景命巳晏矜物辭山終息旅館嗚呼哀哉魂氣随之延陵已了鳶螻同施漆園所曉委骸空野豈異豈矯幸有遺餘聊給蟲鳥嗚呼哀哉緬念生平同幽共深相率經始偕是登臨開石通澗剔柯疏林逺眺重叠近矚嶇嶔事寡地閒尋微探賾何句不研奚疑弗析帙舒軸巻藏拔紙襞問來答往俾日餘夕沮溺耦耕夷齊共薇跡同心歡事異意違承疾懐灼聞㓙懣悲孰云不痛零淚霑衣鳴呼哀哉行久節移地邉氣改終秋中冬踰桂投海永念伊人思深情倍俯謝常人仰愧無待嗚呼哀哉廬山慧逺法師誄并序道存一致故異化同暉徳合理妙故殊方齊致昔釋安公振𤣥風於闗右法師嗣沫流於江左聞風而悦四海同歸爾乃懐仁山林隠居求志於是衆僧雲集勤脩浄行同法餐風栖遲道門可謂五百之季仰紹舍衛之風廬山之㟪俯傳靈鷲之㫖洋洋乎未曽聞也予志學之年希門人之末惜哉誠願弗遂永違此世春秋八十有四義煕十三年秋八月六日薨年踰從心功遂身亡有始斯終千載垂光嗚呼哀哉乃為誄曰於昔安公道風允被大法将盡頽綱是寄體静息動懐真整偽事師以孝養徒以義仰𢎞如來宣揚法雨俯授法師威儀允舉學不闚牖鑒不出户粳糧雖御獨為萇楚朗朗髙堂肅肅法庭既嚴既静愈髙愈清從容音㫖優游儀形廣演慈悲饒益衆生堂堂其器亹亹其資𩮰角味道辭親随師供養三寶析微辨疑盛化濟濟仁徳怡怡於焉問道四海承風有心載馳戒徳鞠躬令聲續振五濁暫隆𢎞道讃揚彌虚彌沖十六王子孺童先覺公之出家年未志學如彼鄧林甘露潤澤如彼瓊瑤既磨既琢大宗戾止座衆龍集聿來胥宇靈寺奚立舊望研㡬新學時習公之勗之載和載輯乃脩什公宗望交泰乃延禪衆親承三昧衆美合流可上可大穆穆道徳超於利害六合俱否山崩海竭日月沈暉三光寝晣衆麓摧柯連波中結鴻化垂緒㣲風永滅嗚呼哀哉生盡沖素死増傷悽單縶土槨示同斂骸人天感悴帝釋慟懐習習遺風依依餘淒悲夫法師終然是栖室無停響途有廣蹊嗚呼哀哉端木喪尼哀直六年仰慕洙泗俯憚罤筌今子門徒實同斯艱晨掃虚房夕泣空山鳴呼法師何時復還風嘯竹柏雲靄巖峯川壑如泣山林改容自昔聞風志願歸依山川路邈心往形違始終銜恨宿縁輕㣲安養有寄閻浮無希嗚呼哀哉與諸道人辨宗論同遊諸道人並業心神道求解言外余枕疾務寡頗多暇日聊伸由來之意庶定求宗之悟釋氏之論聖道雖逺積學能至累盡鑒生不應漸悟孔氏之論聖道既妙雖顔殆庶體無鑒周理歸一極有新論道士以為寂鑒㣲妙不容階級積學無限何為自絶今去釋氏之漸悟而取其能至去孔氏之殆庶而取其一極一極異漸悟能至非殆庶故理之所去雖合各取然其離孔釋逺矣余謂二談救物之言道家之唱得意之説敢以折中自許竊謂新論為然聊答下意遲有所悟法勗問敬覽清論明宗極雖㣲而一悟頓了雖欣新剖竊有所疑夫明達者以體理絶欲悠悠者以迷惑嬰累絶欲本乎見理嬰累由於乖宗何以言之經云新學者離般若便如失明者無導是為懐理蕩患於兹顯矣若涉求未漸於大宗希仰有累於塵垢則永劫劬勞期果緬邈既懐猶豫伏遲嘉訓初答道與俗反理不相闗故因權以通之權雖是假㫖在非假智雖是真能為非真非真不傷真本在於濟物非假不遂假濟物則反本如此之劫無為空勤期果有如皎日勗再問案論孔釋其道既同救物之假亦不容異而神道之域雖顔也孔子所不誨實相之妙雖愚也釋氏所必教然則二聖建言何乖背之甚哉再答二教不同者随方應物所化地異也大而校之華民易於見理難於受教故閉其累學而開其一極夷人易於受教難於見理故閉其頓了而開其漸悟漸悟雖可至昧頓了之實一極雖知寄絶累學之冀良由華人悟理無漸而入道無學夷人悟理有學而入道有漸是故權實雖同其用各異昔向子期以儒道為壹應吉甫謂孔老可齊皆欲窺宗而況真實者乎勗三問重尋答以華夷有險易之性故二聖敷異同之教重方附俗可謂美矣然淵極朗鑒作則於上愚民䝉昧伏從於下故作則宜審其政伏從必是其宗今孔廢聖學之路而釋開漸悟之逕筌蹄既已紛錯羣黎何由歸真三答冬夏異性資春秋為始末晝夜殊用縁晨暮以往復況至精之理豈可逕接至粗之人是故傍漸悟者所以密造頓解倚孔教者所以潜成學聖學聖不出六經六經而得頓解不見三藏而以三藏果筌蹄歴然何疑紛錯魚兎既獲羣黎以濟僧維問承新論法師以宗極㣲妙不容階級使夫學者窮有之極自然之無有若符契何須言無也若資無以盡有者焉得不謂之漸悟耶初答夫累既未盡無不可得盡累之弊始可得無耳累盡則無誠如符契将除其累要須傍教在有之時學而非悟悟在有表託學以至但階級教愚之談一悟得意之論矣維再問論云悟在有表得不以漸使夫涉學希宗當日進其明不若使明不日進與不言同若日進其明者得非漸悟乎再答夫明非漸至信由教發何以言之由教而信則有日進之功非漸所明則無入照之分然向道善心起損累出垢伏伏似無同善似惡乖此所務不俱非心本無累至夫一悟萬滯同盡耳維三問論云由教而信則有日進之功非漸所明則無入照之分夫尊教而推宗者雖不永用當推之時豈可不暫令無耶若許其暫合猶自賢於不合非漸如何三答暫者假也真者常也假知無常常知無假今豈可以假知之暫而侵常知之真哉今暫合賢於不合誠如來言竊有㣲證巫臣諫荘王之言物賖於已故理為情先及納夏姬之時已交於物故情居理上情理雲互物已相傾亦中智之率任也若以諫日為悟豈容納時之惑耶且南為聖也北為愚也背北向南非停北之謂向南背北非至南之稱然向南可以至南背北非是停北非是停北故愚可去矣可以至南故悟可得矣慧驎演僧維問當假知之壹合與真知同異初答與真知異驎再問以何為異再答假知者累伏故理暫為用用暫在理不恒其知真知者照寂故理常為用用常在理故永為真知驎三問累不自除故求理以除累今假知之一合理實在心在心而累不去将何以去之乎三答累起因心心觸成累累恒觸者心日昬教為用者心日伏伏累彌久至於滅累然滅之時在累伏之後也伏累滅累貌同實異不可不察滅累之體物我同忘有無壹觀伏累之状他已異情空實殊見殊實空異已他者入於滯矣壹無有同我物者出於照也驎維問三世長於百年三千廣於赤縣四部多於户口七寶妙於石沙此亦方有小大故化有逺近得不謂之然乎初答事理不同恒成四端自有大小各得其宜亦有賢愚違方而處所謂世同時異物是人非譬割雞之政亦有牛刀佩璽而聴豈皆唐虞今謂言游體盡於武城長世皆覃於天下未之聞也且俱稱妙覺而國土精粗不可以精粗國土而言聖有優劣景迹之應本非所徵矣維再問論云或道廣而事狹或事是而人非今不可以事之大小而格道之粗妙誠哉斯言但所疑不在此耳設令周孔實未盡極以之應世故自居宗此自是世去聖逺未足明極夫降妙數階以按羣粗則粗者所不測然數階之妙非極妙之謂推此而言撫世者於粗為妙然於妙猶粗矣以妙求粗則無往不盡以粗求妙則莫覩其源無往不盡故謂之窮理莫覩其原故仰之彌髙今豈可就顔氏所崇而同之極妙耶再答今不藉顔所推而謂之為極但謂顔為庶㡬則孔知機矣且許禹昌言孔非本談以堯則天體無是同同體至極豈計有之小大耶維三問凡聖人所不測而又昌言者皆可以為聖耶三答夫昌言賢者尚許其賢昌言聖者豈得反非聖耶日用不知百姓之迷䝉唯佛究盡實相之崇髙今欲以崇髙之相而令迷䝉所知未之有也茍所不知焉得不以昌言為信既以釋昌為是何以孔昌為非耶竺法綱問敬披髙論探研宗極妙判權實存㫖儒道遺教孔釋昌言折中允然新論可謂激流導源瑩拂發暉矣詳復答勗維之問或謂因權以通或學而非悟爾為𤣥句徒設無闗於胷情焉竊所未安何以言之夫道形天隔㡬二險絶學不漸宗曽無髣髴馳騁有端思不出位神崖曷由而登機峯何從而超哉若勤務於有而坐體於無者譬猶揮毫鍾張之則功侔羿養之能不然明矣盖同有非甚礙尚不可以翫此而善彼豈況乎有無之至背而反得以相通者耶又云累既未盡無不可得盡累之弊始可得無耳論曰夫膏盲大道摧輈𤣥路莫尚於封有之累也葢有不能袪有袪有者必無未有先盡有累然後得無也就如所言累盡則無爾為累之自去實不無待實不無待則不能不無故無無貴矣如彼重闇自晞無假火日無假火日則不能不設亦明無尚焉落等級而竒頓悟将於是乎躓矣暇任之餘幸思嘉釋釋慧琳問三復精議辨㦎二家斟酌儒道實有懐於論矣至於去釋漸悟遺孔殆庶䝉竊惑焉釋云有漸故是自形者有漸孔之無漸亦是自道者無漸何以知其然耶中人可以語上久習可以移性孔氏之訓也一合於道場非十地之所階釋家之唱也如此漸絶文論二聖詳言豈獨夷束於教華拘於理将恐斥離之辨辭長於新論乎勗道人難云絶欲由於體理當謂日損者以理自悟也論曰道與俗反本不相闗故因權以通之物濟則反本問曰權之所假習心者亦終以為慮乎為曉悟之日與經之空理都自反耶若其永背空談翻為末説若始終相扶可循教而至不答維驎假知中殊為藻豔但與立論有違假者以旋迷喪理不以鑚火致惑茍南向可以造越北背可以棄燕信燕北越南矣慮空可以洗心捐有可以袪累亦有愚而空聖矣如此但當勤般若以日忘瞻郢路而驟進復何憂於失所乎将恐一悟之唱更躓於南北之譬耶答綱琳二法師書法綱見誄慧琳見後披覽雙難欣若暫對藻豐論博蔚然滿目可謂勝人之口然未厭於心聊伸前意無由言對執筆長懐謝靈運和南答綱公難來難云同有非甚閲尚不可以翫此而善彼豈況乎有無之至背而反得以相通者耶此是拘於所習以生此疑耳夫専翫筆札者自可不工於弧矢弧矢既工復翫筆札者何為不兼哉若封有而不向宗自是封者之失造無而去滯何為不可得背借不兼之有以詰能兼之無非惟鍾張愧射於更李羿養慚書於羅趙觸類之躓始充巧厯之歎今請循其本夫憑無以伏有伏久則有忘伏時不能知知則不復辨是以坐忘日損之談近出老荘數縁而滅經有舊説如此豈累之自去實無之所濟且明為晦新功在火日但火日不稱功於幽闇般若不言恵於愚蠢耳推此而往詎俟多云答琳公難孔雖曰語上而云聖無階級釋雖曰一合而云物有佛性物有佛性其道有歸所疑者漸教聖無階級其理可貴所疑者殆庶豈二聖異塗将地使之然斥離之歎殆是有在辭長之論無乃角弓耶難云若其永背空談翻與末説若始終相扶可循敎而至可謂公孫之辭辯者之囿矣夫智為權本權為智用今取聖之意則智即經之辭則權傍權以為檢故三乗咸蹄筌既意以歸宗故般若為魚兎良由民多愚也教故迂矣若人皆得意亦何貴於攝悟假知之論㫖明在有者能為達理之諌是為交賖相傾非悟道之謂與其立論有何相違燕北越南有愚空聖其理既當頗獲於心矣若勤者日忘瞻者驟進亦實如來言但勤未是得瞻未是至當其此時可謂向宗既得既至可謂一悟将無同轡來馳而云異轍耶王𢎞字休元琅邪臨沂人領中書監問謝永嘉并書論曰由教而信有日進之功非漸所明無入照之分問曰由教而信而無入照之分則是闇信聖人耶若闇信聖人理不闗心政可無非聖之尤何由有日進之功論曰暫者假也真者常也假知無常常知無假又曰假知累伏理暫為用用暫在理不恒其知問曰暫知為假知者則非不知矣但見理尚淺未能常用耳雖不得與真知等照然寧無入照之分耶若暫知未是見理豈得云理暫為用者又不知以何稱知論曰教為用者心日伏伏累彌久至於滅累問曰教為用而累伏為云何伏耶若都未見理専心闇信當其専心唯信而已謂此為累伏者此是慮不能並屬此則彼廢耳非為理累相權能使累伏也凡厥心數孰不皆然如此之伏根本未異一倚一伏循環無已雖復彌久累何由滅𢎞白一悟之談常謂有心但未有以折中異同之辨故難於厝言耳尋覽來論所釋良多然猶有未好解處試條如上為呼可容此疑不既欲使彼我意盡覽者泠然後對無兆兼當造膝執筆増懐真不可言王𢎞敬謂謝靈運答王衞軍問并書問曰由教而信而無入照之分則是闇信聖人耶若闇信聖人理不闗心正可無非聖之尤何由有日進之功答曰顔子體二未及於照則向善已上莫非闇信但教有可由之理我有求理之志故曰闗心賜以之二囘以之十豈直免尤而已實有日進之功問曰暫知為假知者則非不知矣但見理尚淺未能常用耳雖不得與真知等照然寧可謂無入照之分耶若暫知未是見理豈得云理暫為用又不知以何稱知答曰不知而稱知者正以假知得名耳假者為名非暫知如何不恒其用豈常之謂既非常用所以交賖相傾故諫人則言政理悦已則犯所知若以諌時為照豈有悦時之犯故知言理者浮談犯知者沈惑推此而判自聖巳下無淺深之照然中人之性有崇替之心矣問曰教為用而累伏為云何伏耶若都未見理専心闇信當其専心唯信而已謂此為累伏者此是慮不能並屬此則彼廢耳非為理累相權能使累伏也凡厥心數孰不皆然如此之伏根本未異一倚一伏循環無已雖復彌久累何由滅答曰累伏者屬此則廢彼實如來告凡厥心數孰不皆然亦如來㫖更恨不就學人設言而以恒物為譏耳譬如藥驗者疾易痊理妙者吝可洗洗吝豈復循環疾痊安能起滅則事不侔居然已辨但無漏之功故資世俗之善善心雖在五品之數能出三界之外矣平叔所謂冬日之隂輔嗣亦云逺不必攜聊借此語以況入無果無阻隔靈運白一悟理質以經誥可謂俗文之談然書不盡意亦前世格言幽僻無事聊與同行道人共求其衷猥辱高難詞徴理析莫不精究尋覽彌日欣若暫對輒復更伸前論雖不辨酬釋來問且以示懐耳海嶠岨迥披叙無期臨白增懐眷歎良深謝靈運再拜重答謝永嘉書更尋前答起悟亦不知所以為異正當爾耳已送示生公此間道人故有小小不同小涼當共面盡脱有厝言更白面寫未由寄之於此所散猶多竺道生答王衛軍書生姓魏鉅鹿人居彭城依竺法汰受業又遊長安從什公還都止青園寺為時法匠終廬山究尋謝永嘉論都無間然有同似若妙善不能不以為欣檀越難㫖甚要切想尋必佳通耳且聊試略取論意以伸欣悦之懐以為茍若不知焉能有信然則由教而信非不知也但資彼之知理在我表資彼可以至我庸得無功於日進未是我知何由有分於入照豈不以見理於外非復全昧知不自中未為能照耶並廣𢎞明集釋文紀巻十二
